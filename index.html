// ============================================================
// TW Baustellen-App  -  PDF-Generator (Etappe 6)
// ============================================================
// Erzeugt Stundenzettel-PDFs via jsPDF (CDN).
// Briefkopf-Layout folgt dem Master-App-Muster (analog
// SKILL-jspdf-briefkopf.md). Koordinaten sind gut lesbar
// dokumentiert, damit Thomas das Layout spaeter 1:1 an die
// Master-App angleichen kann.
//
// API:
//   TWMAPdf.erzeugeStundenzettel(stunde) -> Promise<Blob>
// ============================================================

(function(global) {
    'use strict';

    // ---- Firmen-Stammdaten (analog Master-App) ----
    // Duerfen von Thomas vor dem Deployment an Master-App angepasst werden.
    const FIRMA = {
        name:     'Thomas Willwacher Fliesenlegermeister e.K.',
        strasse:  'Am Breitenberg 5',
        plz_ort:  '56472 Nisterau',
        tel:      '02661 / 952 980',
        mail:     'info@fliesen-willwacher.de',
        web:      'www.fliesen-willwacher.de'
    };

    // ---- Farben (analog Master-App Design-System) ----
    const COLOR_PRIMARY   = [30, 136, 229];   // #1E88E5
    const COLOR_DARK      = [33, 37, 41];     // #212529
    const COLOR_MUTED     = [108, 117, 125];  // #6c757d
    const COLOR_BORDER    = [222, 226, 230];  // #dee2e6
    const COLOR_ACCENT    = [196, 30, 30];    // rot fuer Titel

    function checkLibs() {
        if (!(window.jspdf && window.jspdf.jsPDF)) {
            throw new Error('jsPDF ist nicht geladen (CDN fehlt?)');
        }
        return window.jspdf.jsPDF;
    }

    function fmtDatum(iso) {
        if (!iso) return '';
        const parts = iso.split('-');
        if (parts.length !== 3) return iso;
        return parts[2] + '.' + parts[1] + '.' + parts[0];
    }

    function fmtMinAsStd(mins) {
        if (!mins && mins !== 0) return '';
        const h = Math.floor(mins / 60);
        const m = mins % 60;
        return h + ':' + (m < 10 ? '0' + m : m) + ' h';
    }

    // ===== Haupt-Funktion =====
    async function erzeugeStundenzettel(stunde) {
        const JSPDF = checkLibs();
        const doc = new JSPDF({ unit: 'mm', format: 'a4' });
        const pageW = doc.internal.pageSize.getWidth();
        let y = 15;

        // ---------- BRIEFKOPF ----------
        // Firmenlogo (Kreis links mit TW-Monogramm)
        doc.setFillColor(COLOR_PRIMARY[0], COLOR_PRIMARY[1], COLOR_PRIMARY[2]);
        doc.circle(22, y + 8, 10, 'F');
        doc.setTextColor(255, 255, 255);
        doc.setFont('helvetica', 'bold');
        doc.setFontSize(16);
        doc.text('TW', 22, y + 10, { align: 'center' });

        // Firmenadresse rechts vom Logo
        doc.setTextColor(COLOR_DARK[0], COLOR_DARK[1], COLOR_DARK[2]);
        doc.setFont('helvetica', 'bold');
        doc.setFontSize(12);
        doc.text(FIRMA.name, 38, y + 5);
        doc.setFont('helvetica', 'normal');
        doc.setFontSize(9);
        doc.setTextColor(COLOR_MUTED[0], COLOR_MUTED[1], COLOR_MUTED[2]);
        doc.text(FIRMA.strasse + ', ' + FIRMA.plz_ort, 38, y + 10);
        doc.text('Tel: ' + FIRMA.tel + '  \u2022  ' + FIRMA.mail, 38, y + 14);
        doc.text(FIRMA.web, 38, y + 18);

        y += 24;

        // Trennlinie
        doc.setDrawColor(COLOR_BORDER[0], COLOR_BORDER[1], COLOR_BORDER[2]);
        doc.setLineWidth(0.3);
        doc.line(15, y, pageW - 15, y);
        y += 6;

        // ---------- DOKUMENT-TITEL ----------
        doc.setFont('helvetica', 'bold');
        doc.setFontSize(20);
        doc.setTextColor(COLOR_ACCENT[0], COLOR_ACCENT[1], COLOR_ACCENT[2]);
        doc.text('Stundenzettel', 15, y + 4);

        // Datum rechts
        doc.setFont('helvetica', 'normal');
        doc.setFontSize(11);
        doc.setTextColor(COLOR_DARK[0], COLOR_DARK[1], COLOR_DARK[2]);
        doc.text(fmtDatum(stunde.datum), pageW - 15, y + 4, { align: 'right' });

        y += 12;

        // ---------- KOPFDATEN-TABELLE ----------
        const nettoStd = fmtMinAsStd(stunde.netto_min);
        const kopfRows = [
            ['Baustelle', stunde.baustelle_name || '-'],
            ['Mitarbeiter', stunde.mitarbeiter_name || stunde.mitarbeiter_id || '-'],
            ['Arbeitszeit', (stunde.anfang || '-') + ' \u2013 ' + (stunde.ende || '-')
                + '    Pause: ' + (stunde.pause_min || 0) + ' min'
                + '    Netto: ' + nettoStd],
            ['Wetter', stunde.wetter || '-']
        ];

        if (doc.autoTable) {
            doc.autoTable({
                startY: y,
                head: [],
                body: kopfRows,
                theme: 'grid',
                styles: { fontSize: 10, cellPadding: 2.5 },
                columnStyles: {
                    0: { cellWidth: 40, fontStyle: 'bold', fillColor: [245, 247, 250] },
                    1: { cellWidth: 'auto' }
                },
                margin: { left: 15, right: 15 }
            });
            y = doc.lastAutoTable.finalY + 6;
        } else {
            // Fallback ohne autoTable
            doc.setFontSize(10);
            kopfRows.forEach(function(row) {
                doc.setFont('helvetica', 'bold');
                doc.text(row[0] + ':', 15, y);
                doc.setFont('helvetica', 'normal');
                doc.text(String(row[1]), 55, y);
                y += 5;
            });
            y += 4;
        }

        // ---------- TAETIGKEITEN ----------
        doc.setFont('helvetica', 'bold');
        doc.setFontSize(11);
        doc.setTextColor(COLOR_PRIMARY[0], COLOR_PRIMARY[1], COLOR_PRIMARY[2]);
        doc.text('Taetigkeiten', 15, y);
        y += 2;
        doc.setDrawColor(COLOR_PRIMARY[0], COLOR_PRIMARY[1], COLOR_PRIMARY[2]);
        doc.setLineWidth(0.4);
        doc.line(15, y + 1, 55, y + 1);
        y += 5;

        doc.setFont('helvetica', 'normal');
        doc.setFontSize(10);
        doc.setTextColor(COLOR_DARK[0], COLOR_DARK[1], COLOR_DARK[2]);
        const taetLines = (stunde.taetigkeiten || []).map(function(t){ return '\u2022 ' + t; });
        if (taetLines.length === 0) taetLines.push('\u2013');
        taetLines.forEach(function(line) {
            doc.text(line, 18, y);
            y += 5;
        });
        y += 3;

        // ---------- MATERIAL (falls vorhanden) ----------
        if (stunde.material && stunde.material.length > 0) {
            doc.setFont('helvetica', 'bold');
            doc.setFontSize(11);
            doc.setTextColor(COLOR_PRIMARY[0], COLOR_PRIMARY[1], COLOR_PRIMARY[2]);
            doc.text('Verwendetes Material', 15, y);
            doc.setDrawColor(COLOR_PRIMARY[0], COLOR_PRIMARY[1], COLOR_PRIMARY[2]);
            doc.line(15, y + 1, 75, y + 1);
            y += 4;

            const matRows = stunde.material.map(function(m) {
                return [m.name, String(m.menge || ''), m.einheit || ''];
            });

            if (doc.autoTable) {
                doc.autoTable({
                    startY: y,
                    head: [['Material', 'Menge', 'Einheit']],
                    body: matRows,
                    theme: 'striped',
                    headStyles: { fillColor: COLOR_PRIMARY, textColor: 255, fontSize: 10 },
                    styles: { fontSize: 9, cellPadding: 2 },
                    columnStyles: {
                        0: { cellWidth: 'auto' },
                        1: { cellWidth: 25, halign: 'right' },
                        2: { cellWidth: 25 }
                    },
                    margin: { left: 15, right: 15 }
                });
                y = doc.lastAutoTable.finalY + 6;
            } else {
                doc.setFont('helvetica', 'normal');
                doc.setFontSize(9);
                doc.setTextColor(COLOR_DARK[0], COLOR_DARK[1], COLOR_DARK[2]);
                matRows.forEach(function(r) {
                    doc.text(r[0] + '   ' + r[1] + ' ' + r[2], 18, y);
                    y += 4.5;
                });
                y += 3;
            }
        }

        // ---------- BEMERKUNG ----------
        if ((stunde.bemerkung_deutsch && stunde.bemerkung_deutsch.trim())
            || (stunde.bemerkung_original && stunde.bemerkung_original.text && stunde.bemerkung_original.text.trim())) {

            doc.setFont('helvetica', 'bold');
            doc.setFontSize(11);
            doc.setTextColor(COLOR_PRIMARY[0], COLOR_PRIMARY[1], COLOR_PRIMARY[2]);
            doc.text('Bemerkung', 15, y);
            doc.setDrawColor(COLOR_PRIMARY[0], COLOR_PRIMARY[1], COLOR_PRIMARY[2]);
            doc.line(15, y + 1, 45, y + 1);
            y += 6;

            doc.setFont('helvetica', 'normal');
            doc.setFontSize(10);
            doc.setTextColor(COLOR_DARK[0], COLOR_DARK[1], COLOR_DARK[2]);

            const deutsch = (stunde.bemerkung_deutsch || '').trim();
            if (deutsch) {
                const lines = doc.splitTextToSize(deutsch, pageW - 30);
                lines.forEach(function(l) { doc.text(l, 15, y); y += 5; });
            }

            // Original-Sprache als kursiver Untertitel
            const orig = stunde.bemerkung_original;
            if (orig && orig.text && orig.text.trim() && orig.sprache !== 'de') {
                y += 2;
                doc.setFont('helvetica', 'italic');
                doc.setFontSize(9);
                doc.setTextColor(COLOR_MUTED[0], COLOR_MUTED[1], COLOR_MUTED[2]);
                doc.text('Original (' + (orig.sprache || '').toUpperCase() + '):', 15, y);
                y += 4;
                const origLines = doc.splitTextToSize(orig.text.trim(), pageW - 30);
                origLines.forEach(function(l) { doc.text(l, 18, y); y += 4.5; });
            }
            y += 4;
        }

        // ---------- FOOTER ----------
        const footerY = doc.internal.pageSize.getHeight() - 10;
        doc.setDrawColor(COLOR_BORDER[0], COLOR_BORDER[1], COLOR_BORDER[2]);
        doc.setLineWidth(0.2);
        doc.line(15, footerY - 4, pageW - 15, footerY - 4);
        doc.setFont('helvetica', 'italic');
        doc.setFontSize(8);
        doc.setTextColor(COLOR_MUTED[0], COLOR_MUTED[1], COLOR_MUTED[2]);
        const nowStr = new Date().toLocaleString('de-DE');
        doc.text('Erstellt mit TW Baustellen-App am ' + nowStr, 15, footerY);
        doc.text('Geraet: ' + (stunde.mitarbeiter_id || '?').slice(-8), pageW - 15, footerY, { align: 'right' });

        // ---------- BLOB ----------
        return doc.output('blob');
    }

    // ===== Public API =====
    global.TWMAPdf = {
        erzeugeStundenzettel: erzeugeStundenzettel,
        FIRMA: FIRMA
    };

    if (window.TWMACore) TWMACore.log('info', 'PDF', 'TWMAPdf v0.6 geladen');
})(window);

/* ========== js/tw-ma-sync.js ========== */
// ============================================================
// TW Baustellen-App  -  Sync-Orchestrator (Etappe 5)
// ============================================================
// Versucht regelmaessig Fotos aus der IndexedDB Sync-Queue nach
// Drive Staging hochzuladen (Service-Account).
//
// Logik:
//  - Polling alle 60 Sek, wenn Pending-Items da
//  - Online-Check via navigator.onLine + Test-Ping
//  - Drive-Upload via TWMADriveService
//  - Pfad: Staging/{baustelleName}/Bilder/{phase}/{raumName}/{upload_name}.jpg
//  - Zusaetzlich: gleichnamige .json mit Metadaten
//  - Bei Fehler: Exponential Backoff (30s, 2m, 8m, 30m, 2h)
//  - Nach 5 fehlgeschlagenen Versuchen -> sync_status = 'fehler'
//  - Fallback-Mode: kein Upload, Items bleiben in Queue
//
// Emittiert CustomEvent 'tw-ma-sync-progress' mit
//   { pending, success, fehler } am window.
// ============================================================

(function(global) {
    'use strict';

    const POLL_INTERVAL_MS = 60 * 1000;
    const MAX_ATTEMPTS     = 5;
    const BACKOFF_MS       = [30_000, 120_000, 480_000, 1_800_000, 7_200_000];

    let pollTimer = null;
    let laeuftGerade = false;
    let baustellenCache = {};   // baustelleId -> { name, folderId(gecached) }
    let raumCache = {};         // raumId -> name

    function emitProgress(data) {
        try {
            window.dispatchEvent(new CustomEvent('tw-ma-sync-progress', { detail: data }));
        } catch (_) {}
    }

    async function updateProgress() {
        const pending = await TWMAStorage.countPendingSyncItems().catch(() => 0);
        const fehler  = await TWMAStorage.countFotosByStatus('fehler').catch(() => 0);
        const uploaded = await TWMAStorage.countFotosByStatus('uploaded').catch(() => 0);
        emitProgress({ pending: pending, fehler: fehler, uploaded: uploaded });
    }

    // ===== Baustellen-Name auflösen =====
    async function resolveBaustellenName(baustelleId) {
        if (baustellenCache[baustelleId]) return baustellenCache[baustelleId].name;
        // Aus Firebase lesen
        if (window.TWMAFirebase && TWMAFirebase.db && TWMAFirebase.db()) {
            try {
                const snap = await TWMAFirebase.db().ref('aktive_baustellen/' + baustelleId).once('value');
                const v = snap.val();
                if (v && v.name) {
                    baustellenCache[baustelleId] = { name: v.name };
                    return v.name;
                }
            } catch (_) {}
        }
        return baustelleId; // Fallback
    }

    async function resolveRaumName(raumId) {
        if (raumCache[raumId]) return raumCache[raumId];
        try {
            const r = await TWMAStorage.getRaum(raumId);
            if (r && r.bezeichnung) {
                raumCache[raumId] = r.bezeichnung;
                return r.bezeichnung;
            }
        } catch (_) {}
        return raumId;
    }

    // ===== Pfad: Staging-Root -> Baustelle -> Bilder -> Phase -> Raum =====
    async function ensureDrivePath(baustelleName, phase, raumName) {
        const cfg = TWMAConfig.DRIVE_SERVICE_ACCOUNT;
        if (!cfg || !cfg.staging_root_folder_id) throw new Error('Kein Staging-Root konfiguriert');
        const rootId = cfg.staging_root_folder_id;
        const bstId  = await TWMADriveService.findOrCreateFolder(rootId, sanitize(baustelleName));
        const bilderId = await TWMADriveService.findOrCreateFolder(bstId, 'Bilder');
        const phaseId  = await TWMADriveService.findOrCreateFolder(bilderId, phaseLabel(phase));
        const raumId   = await TWMADriveService.findOrCreateFolder(phaseId, sanitize(raumName));
        return raumId;
    }

    function phaseLabel(phase) {
        if (phase === 'rohzustand')    return '1_Rohzustand';
        if (phase === 'abdichtung')    return '2_Abdichtung';
        if (phase === 'fertigstellung') return '3_Fertigstellung';
        if (phase === 'allgemein')     return '0_Allgemein';
        return phase || 'sonstige';
    }

    function sanitize(name) {
        return (name || 'ohne_name').replace(/[\\\/:*?"<>|]/g, '_').trim();
    }

    // ===== Einzelnes Sync-Item abarbeiten =====
    // Ermittelt den Item-Typ ('foto' | 'stunde'). Alte Foto-Items hatten kein typ-Feld.
    function itemTyp(item) {
        if (item.typ) return item.typ;
        if (item.stunde_id) return 'stunde';
        return 'foto';
    }

    async function processItem(item) {
        const typ = itemTyp(item);
        if (typ === 'stunde') return processStundenItem(item);
        return processFotoItem(item);
    }

    // ---- Foto-Item verarbeiten (unveraendert zu E5) ----
    async function processFotoItem(item) {
        const foto = await TWMAStorage.getFoto(item.foto_id);
        if (!foto) {
            // Foto wurde geloescht -> Item raus
            await TWMAStorage.removeSyncItem(item.id);
            return 'deleted';
        }
        if (foto.sync_status === 'uploaded') {
            await TWMAStorage.removeSyncItem(item.id);
            return 'already_uploaded';
        }

        const baustelleName = await resolveBaustellenName(foto.baustelle_id);
        const raumName      = foto.raum_id && foto.raum_id !== 'allgemein'
                              ? await resolveRaumName(foto.raum_id)
                              : 'Allgemein';

        const folderId = await ensureDrivePath(baustelleName, foto.phase, raumName);

        // 1. Foto hochladen
        const uploadName = foto.upload_name || (foto.id + '.jpg');
        const fotoRes = await TWMADriveService.uploadFile(
            folderId, uploadName, foto.foto_blob, 'image/jpeg'
        );

        // 2. Notiz-JSON hochladen (gleicher Name + .json)
        const metaName = uploadName.replace(/\.jpg$/i, '') + '.json';
        const metaObj = {
            id:              foto.id,
            baustelle_id:    foto.baustelle_id,
            raum_id:         foto.raum_id,
            phase:           foto.phase,
            wand_id:         foto.wand_id,
            wand_label:      foto.wand_label || null,
            notiz_original:  foto.notiz_original || null,
            notiz_deutsch:   foto.notiz_deutsch || null,
            aufgenommen_am:  foto.aufgenommen_am,
            aufgenommen_von: foto.aufgenommen_von,
            drive_file_id:   fotoRes.id,
            schema_version:  1
        };
        const metaBlob = new Blob([JSON.stringify(metaObj, null, 2)], { type: 'application/json' });
        await TWMADriveService.uploadFile(folderId, metaName, metaBlob, 'application/json');

        // 3. Foto-Status aktualisieren
        foto.sync_status = 'uploaded';
        foto.foto_url_drive = 'https://drive.google.com/file/d/' + fotoRes.id + '/view';
        foto.foto_blob = null;  // Blob freigeben zur Speicherschonung (Metadaten bleiben)
        await TWMAStorage.saveFoto(foto);

        // 4. Queue-Item entfernen
        await TWMAStorage.removeSyncItem(item.id);

        TWMACore.log('info', 'Sync', 'Foto hochgeladen: ' + uploadName);
        return 'ok';
    }

    // ---- Stunden-Item verarbeiten (Etappe 6) ----
    //   Pfad: Staging/Stunden/{geraet}_Stundenzettel_{datum}.pdf
    async function processStundenItem(item) {
        const stunde = await TWMAStorage.getStunde(item.stunde_id);
        if (!stunde) {
            await TWMAStorage.removeSyncItem(item.id);
            return 'deleted';
        }
        if (stunde.sync_status === 'uploaded') {
            await TWMAStorage.removeSyncItem(item.id);
            return 'already_uploaded';
        }
        if (!stunde.pdf_blob) {
            throw new Error('Kein PDF-Blob in Stunde ' + stunde.id);
        }

        const cfg = TWMAConfig.DRIVE_SERVICE_ACCOUNT;
        if (!cfg || !cfg.staging_root_folder_id) throw new Error('Kein Staging-Root konfiguriert');

        // Stunden-Ordner (pro Baustelle) + Unterordner "Stunden"
        const rootId = cfg.staging_root_folder_id;
        const baustelleName = await resolveBaustellenName(stunde.baustelle_id);
        const bstId    = await TWMADriveService.findOrCreateFolder(rootId, sanitize(baustelleName));
        const stundId  = await TWMADriveService.findOrCreateFolder(bstId, 'Stunden');

        const uploadName = stunde.upload_name || (stunde.id + '.pdf');
        const pdfRes = await TWMADriveService.uploadFile(
            stundId, uploadName, stunde.pdf_blob, 'application/pdf'
        );

        stunde.sync_status = 'uploaded';
        stunde.drive_file_id = pdfRes.id;
        stunde.drive_url     = 'https://drive.google.com/file/d/' + pdfRes.id + '/view';
        // PDF-Blob behalten, da fuer lokale Ansicht weiter gebraucht (kleiner als Foto)
        await TWMAStorage.saveStunde(stunde);

        await TWMAStorage.removeSyncItem(item.id);
        TWMACore.log('info', 'Sync', 'Stundenzettel hochgeladen: ' + uploadName);
        return 'ok';
    }

    async function handleItemError(item, error) {
        const neueVersuche = (item.attempts || 0) + 1;
        const typ = itemTyp(item);
        if (neueVersuche >= MAX_ATTEMPTS) {
            // Definitiv fehlgeschlagen -> Entitaet auf 'fehler' setzen
            if (typ === 'foto') {
                const foto = await TWMAStorage.getFoto(item.foto_id).catch(() => null);
                if (foto) {
                    foto.sync_status = 'fehler';
                    foto.sync_error  = String(error && error.message || error).slice(0, 200);
                    await TWMAStorage.saveFoto(foto).catch(() => {});
                }
                TWMACore.log('error', 'Sync', 'Foto endgueltig gescheitert id=' + item.foto_id, error);
            } else if (typ === 'stunde') {
                const st = await TWMAStorage.getStunde(item.stunde_id).catch(() => null);
                if (st) {
                    st.sync_status = 'fehler';
                    st.sync_error  = String(error && error.message || error).slice(0, 200);
                    await TWMAStorage.saveStunde(st).catch(() => {});
                }
                TWMACore.log('error', 'Sync', 'Stunde endgueltig gescheitert id=' + item.stunde_id, error);
            }
            await TWMAStorage.removeSyncItem(item.id).catch(() => {});
        } else {
            const backoff = BACKOFF_MS[Math.min(neueVersuche, BACKOFF_MS.length - 1)];
            await TWMAStorage.updateSyncItem(item.id, {
                attempts: neueVersuche,
                last_error: String(error && error.message || error).slice(0, 200),
                next_try_at: Date.now() + backoff
            }).catch(() => {});
            TWMACore.log('warn', 'Sync', 'Retry in ' + (backoff/1000) + 's typ=' + typ, error);
        }
    }

    // ===== Haupt-Zyklus =====
    async function runCycle() {
        if (laeuftGerade) return;
        if (!navigator.onLine) return;
        if (TWMADriveService.getMode() !== 'production') return;  // Fallback: nichts tun

        laeuftGerade = true;
        try {
            const items = await TWMAStorage.listPendingSyncItems(20);
            for (let i = 0; i < items.length; i++) {
                const item = items[i];
                try {
                    await processItem(item);
                    await updateProgress();
                } catch (err) {
                    await handleItemError(item, err);
                    await updateProgress();
                }
            }
        } catch (err) {
            TWMACore.log('error', 'Sync', 'Zyklusfehler', err);
        } finally {
            laeuftGerade = false;
        }
    }

    function start() {
        if (pollTimer) return;
        runCycle();
        pollTimer = setInterval(runCycle, POLL_INTERVAL_MS);
        window.addEventListener('online', runCycle);
        updateProgress();
        TWMACore.log('info', 'Sync', 'Auto-Sync gestartet (60s Intervall)');
    }

    function stop() {
        if (pollTimer) clearInterval(pollTimer);
        pollTimer = null;
        window.removeEventListener('online', runCycle);
    }

    function triggerNow() {
        return runCycle();
    }

    // ===== Public API =====
    global.TWMASync = {
        start:         start,
        stop:          stop,
        triggerNow:    triggerNow,
        updateProgress: updateProgress
    };

    if (window.TWMACore) TWMACore.log('info', 'Sync', 'TWMASync v0.5 geladen');
})(window);
    </script>

// ===== MicButton + useSpeech (Etappe 5: Web Speech API) =====
// Mapping MA-Sprachen -> BCP47-Codes fuer Web Speech API
const SPEECH_LANG_MAP = {
    de: 'de-DE',
    cz: 'cs-CZ',
    sk: 'sk-SK',
    pl: 'pl-PL',
    en: 'en-US',
    ro: 'ro-RO',
    ua: 'uk-UA'
};

function speechSupported() {
    return !!(window.SpeechRecognition || window.webkitSpeechRecognition);
}

// Hook: liefert {transcript, recording, supported, start, stop, reset}
function useSpeech(lang) {
    const [transcript, setTranscript] = React.useState('');
    const [recording, setRecording]   = React.useState(false);
    const [supported]                 = React.useState(speechSupported());
    const recRef = React.useRef(null);
    const finalRef = React.useRef('');

    function ensureRecognition() {
        if (recRef.current) return recRef.current;
        const Ctor = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!Ctor) return null;
        const rec = new Ctor();
        rec.continuous = true;
        rec.interimResults = true;
        rec.lang = SPEECH_LANG_MAP[lang] || 'de-DE';

        rec.onresult = function(event) {
            let interim = '';
            for (let i = event.resultIndex; i < event.results.length; i++) {
                const res = event.results[i];
                if (res.isFinal) {
                    finalRef.current += res[0].transcript + ' ';
                } else {
                    interim += res[0].transcript;
                }
            }
            setTranscript(finalRef.current + interim);
        };
        rec.onend = function() {
            setRecording(false);
        };
        rec.onerror = function(e) {
            if (window.TWMACore) TWMACore.log('warn', 'Speech', 'Error', e.error);
            setRecording(false);
        };
        recRef.current = rec;
        return rec;
    }

    // Sprach-Update anwenden
    React.useEffect(function() {
        if (recRef.current) {
            recRef.current.lang = SPEECH_LANG_MAP[lang] || 'de-DE';
        }
    }, [lang]);

    // Cleanup bei Unmount
    React.useEffect(function() {
        return function() {
            if (recRef.current) {
                try { recRef.current.abort(); } catch (_) {}
                recRef.current = null;
            }
        };
    }, []);

    return {
        transcript: transcript,
        recording:  recording,
        supported:  supported,
        start: function() {
            const rec = ensureRecognition();
            if (!rec) return;
            finalRef.current = '';
            setTranscript('');
            try {
                rec.start();
                setRecording(true);
            } catch (e) {
                // Meist: "already started"
                if (window.TWMACore) TWMACore.log('warn', 'Speech', 'Start', e.message);
            }
        },
        stop: function() {
            if (recRef.current) {
                try { recRef.current.stop(); } catch (_) {}
            }
            setRecording(false);
        },
        reset: function() {
            finalRef.current = '';
            setTranscript('');
        },
        setTranscript: function(text) {
            finalRef.current = text || '';
            setTranscript(text || '');
        }
    };
}

// ===== 3) PIN-Setup ==========================================
function MAPinSetup(props) {
    const lang = props.lang;
    const [pin, setPin]         = React.useState('');
    const [pinRepeat, setRepeat] = React.useState('');
    const [error, setError]     = React.useState(null);
    const [working, setWorking] = React.useState(false);

    function submit() {
        setError(null);
        if (pin.length < 4) { setError('pin_zu_kurz'); return; }
        if (pin !== pinRepeat) { setError('pin_mismatch'); return; }
        setWorking(true);
        props.onSetPin(pin).catch(function(e) {
            setWorking(false);
            setError('pin_mismatch');
            TWMACore.log('error', 'PinSetup', e);
        });
    }

    const input = {
        width: '100%', padding: '16px', fontSize: 22,
        textAlign: 'center', letterSpacing: '8px',
        background: 'var(--bg-secondary)', color: 'var(--text-white)',
        border: '1px solid var(--border-color)',
        borderRadius: 'var(--radius-md)',
        fontFamily: 'Oswald, sans-serif', marginBottom: 10,
        boxSizing: 'border-box'
    };

    return (
        <MAOnboardingContainer lang={lang}>
            <div style={{
                maxWidth: 380, width: '100%',
                background: 'var(--bg-card)',
                border: '1px solid var(--success)',
                borderRadius: 'var(--radius-xl)',
                padding: 24, textAlign: 'center'
            }}>
                <div style={{color: 'var(--success)', fontSize: 13, fontFamily: 'Oswald, sans-serif',
                    textTransform: 'uppercase', letterSpacing: '1.5px', marginBottom: 6}}>
                    &#10003; {TWMAConfig.t('onboarding_freigegeben', lang)}
                </div>
                <div style={{
                    fontFamily: 'Oswald, sans-serif', fontSize: 20,
                    color: 'var(--text-white)',
                    textTransform: 'uppercase', letterSpacing: '1.5px',
                    marginBottom: 8
                }}>
                    {TWMAConfig.t('pin_setup_titel', lang)}
                </div>
                <div style={{color: 'var(--text-muted)', fontSize: 13, marginBottom: 20}}>
                    {TWMAConfig.t('pin_setup_info', lang)}
                </div>

                <input type="password" style={input}
                    inputMode="numeric" pattern="[0-9]*"
                    maxLength={6} autoFocus
                    placeholder="PIN"
                    value={pin}
                    onChange={e => setPin(e.target.value.replace(/\D/g, '').substring(0, 6))} />

                <input type="password" style={input}
                    inputMode="numeric" pattern="[0-9]*"
                    maxLength={6}
                    placeholder={TWMAConfig.t('pin_bestaetigen', lang)}
                    value={pinRepeat}
                    onChange={e => setRepeat(e.target.value.replace(/\D/g, '').substring(0, 6))} />

                {error && (
                    <div style={{
                        color: 'var(--accent-red-light)', fontSize: 13,
                        marginTop: 8, marginBottom: 8
                    }}>{TWMAConfig.t(error, lang)}</div>
                )}

                <button onClick={submit}
                    disabled={working || pin.length < 4 || pin !== pinRepeat}
                    className="btn-action"
                    style={{
                        width: '100%', marginTop: 12,
                        opacity: (pin.length >= 4 && pin === pinRepeat && !working) ? 1 : 0.4
                    }}>
                    {TWMAConfig.t('speichern', lang)}
                </button>
            </div>
        </MAOnboardingContainer>
    );
}

// ===== 4) PIN-Login ==========================================
function MAPinLogin(props) {
    const lang = props.lang;
    const [pin, setPin]     = React.useState('');
    const [error, setError] = React.useState(false);
    const [versuche, setVersuche] = React.useState(0);
    const VERSUCHE_MAX = 5;

    React.useEffect(function() {
        if (pin.length >= 4) {
            props.onCheckPin(pin).then(function(ok) {
                if (!ok) {
                    setError(true);
                    setVersuche(v => {
                        const neu = v + 1;
                        if (neu >= VERSUCHE_MAX) {
                            props.onTooManyFailures();
                        }
                        return neu;
                    });
                    setTimeout(function() { setPin(''); setError(false); }, 700);
                }
                // bei ok: App uebernimmt Transition, wir tun nichts
            });
        }
    }, [pin]);

    const verbleibend = VERSUCHE_MAX - versuche;

    return (
        <MAOnboardingContainer lang={lang}>
            <div style={{
                maxWidth: 380, width: '100%',
                background: 'var(--bg-card)',
                border: error ? '2px solid var(--accent-red)' : '1px solid var(--border-color)',
                borderRadius: 'var(--radius-xl)',
                padding: 24, textAlign: 'center',
                transition: 'border 0.2s ease'
            }}>
                <div style={{
                    fontFamily: 'Oswald, sans-serif', fontSize: 20,
                    color: 'var(--text-white)',
                    textTransform: 'uppercase', letterSpacing: '1.5px',
                    marginBottom: 16
                }}>
                    {TWMAConfig.t('pin_login_titel', lang)}
                </div>

                <input type="password"
                    inputMode="numeric" pattern="[0-9]*"
                    maxLength={6} autoFocus
                    value={pin}
                    onChange={e => setPin(e.target.value.replace(/\D/g, '').substring(0, 6))}
                    style={{
                        width: '100%', padding: '20px', fontSize: 28,
                        textAlign: 'center', letterSpacing: '12px',
                        background: 'var(--bg-secondary)',
                        color: error ? 'var(--accent-red-light)' : 'var(--text-white)',
                        border: '1px solid var(--border-color)',
                        borderRadius: 'var(--radius-md)',
                        fontFamily: 'Oswald, sans-serif',
                        boxSizing: 'border-box',
                        animation: error ? 'tw-shake 0.4s' : 'none'
                    }}/>
                <style>{'@keyframes tw-shake { 0%,100%{transform:translateX(0);} 25%{transform:translateX(-8px);} 75%{transform:translateX(8px);} }'}</style>

                {versuche > 0 && (
                    <div style={{
                        marginTop: 14, color: 'var(--accent-red-light)', fontSize: 13
                    }}>
                        {TWMAConfig.t('pin_falsch', lang)} &middot; {verbleibend} {TWMAConfig.t('pin_versuche_uebrig', lang)}
                    </div>
                )}
            </div>
        </MAOnboardingContainer>
    );
}

// ===== Premium-Uhr-Block =====================================
function UhrBlock(props) {
    const lang = props.lang || 'de';
    const [now, setNow] = React.useState(new Date());
    const [pulse, setPulse] = React.useState(true);

    React.useEffect(() => {
        const t = setInterval(() => setNow(new Date()), 1000);
        const p = setInterval(() => setPulse(x => !x), 500);
        return () => { clearInterval(t); clearInterval(p); };
    }, []);

    const hh = String(now.getHours()).padStart(2, '0');
    const mm = String(now.getMinutes()).padStart(2, '0');
    const ss = String(now.getSeconds()).padStart(2, '0');

    const dayIdx   = now.getDay();
    const monatIdx = now.getMonth();
    const wochentag = (WOCHENTAGE[lang] || WOCHENTAGE.de)[dayIdx];
    const datum = now.getDate() + '. ' + (MONATE[lang] || MONATE.de)[monatIdx] + ' ' + now.getFullYear();

    return (
        <div style={{
            position: 'relative',
            padding: '26px 36px',
            background: 'linear-gradient(135deg, var(--bg-card) 0%, var(--bg-secondary) 100%)',
            border: '1px solid rgba(30,136,229,0.25)',
            borderRadius: 'var(--radius-xl)',
            textAlign: 'center', minWidth: 280,
            boxShadow: '0 12px 32px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.04)',
            overflow: 'hidden'
        }}>
            {/* Dekorativer Glanzpunkt */}
            <div style={{
                position: 'absolute', top: -40, right: -40,
                width: 120, height: 120, borderRadius: '50%',
                background: 'radial-gradient(circle, rgba(30,136,229,0.15) 0%, transparent 70%)',
                pointerEvents: 'none'
            }}/>
            <div style={{
                position: 'absolute', bottom: -30, left: -30,
                width: 90, height: 90, borderRadius: '50%',
                background: 'radial-gradient(circle, rgba(230,126,34,0.08) 0%, transparent 70%)',
                pointerEvents: 'none'
            }}/>

            {/* Wochentag */}
            <div style={{
                fontFamily: 'Oswald, sans-serif', fontSize: 14,
                color: 'var(--accent-blue)', letterSpacing: '3px',
                textTransform: 'uppercase', fontWeight: 600,
                marginBottom: 4
            }}>{wochentag}</div>

            {/* Uhrzeit */}
            <div style={{
                fontFamily: 'Oswald, sans-serif',
                fontSize: 52, fontWeight: 500,
                color: 'var(--text-white)',
                letterSpacing: '2px',
                lineHeight: 1,
                position: 'relative', zIndex: 1,
                textShadow: '0 2px 12px rgba(30,136,229,0.3)'
            }}>
                <span>{hh}</span>
                <span style={{opacity: pulse ? 1 : 0.15, transition: 'opacity 0.3s'}}>:</span>
                <span>{mm}</span>
                <span style={{opacity: pulse ? 0.3 : 1, transition: 'opacity 0.3s', fontSize: 38, marginLeft: 2}}>:{ss}</span>
            </div>

            {/* Datum */}
            <div style={{
                marginTop: 8,
                fontFamily: 'Source Sans 3, sans-serif', fontSize: 13,
                color: 'var(--text-light)',
                letterSpacing: '1px'
            }}>{datum}</div>
        </div>
    );
}

// ===== Hilfsfunktionen =======================================
function formatDateiGroesse(bytes) {
    if (!bytes) return '';
    const kb = bytes / 1024;
    if (kb < 1024) return kb.toFixed(0) + ' KB';
    return (kb / 1024).toFixed(1) + ' MB';
}

function dateiIstBild(mime, name) {
    if (mime && mime.indexOf('image/') === 0) return true;
    return /\.(jpg|jpeg|png|gif|webp|bmp)$/i.test(name || '');
}

function dateiIstPdf(mime, name) {
    if (mime === 'application/pdf') return true;
    return /\.pdf$/i.test(name || '');
}

function ermittlePraefixFilter(name) {
    if (!name) return 'alle';
    const upper = name.toUpperCase();
    if (upper.startsWith('KALENDER_'))    return 'kalender';
    if (upper.startsWith('NACHRICHT_'))   return 'nachrichten';
    if (upper.startsWith('ANWEISUNG_'))   return 'anweisungen';
    return 'anweisungen'; // Default laut Master-Dok 6.5
}

// ===== Ansicht 1: Liste ======================================
function MABaustellenListe(props) {
    const lang = props.lang;
    const [baustellen, setBaustellen] = React.useState([]);
    const [suche, setSuche]           = React.useState('');
    const [laedt, setLaedt]           = React.useState(true);

    React.useEffect(() => {
        if (!window.TWMAFirebase || !TWMAFirebase.isReady()) {
            setLaedt(false);
            return;
        }
        const unsub = TWMAFirebase.listenAktiveBaustellen(function(list) {
            // Sortierung: zuletzt angefasste oben
            list.sort(function(a, b) {
                return (b.zuletzt_geaendert || b.ts || 0) - (a.zuletzt_geaendert || a.ts || 0);
            });
            setBaustellen(list);
            setLaedt(false);
        });
        return unsub;
    }, []);

    const gefiltert = React.useMemo(() => {
        if (!suche.trim()) return baustellen;
        const s = suche.toLowerCase();
        return baustellen.filter(function(b) {
            return (b.name || '').toLowerCase().indexOf(s) !== -1
                || (b.adresse || '').toLowerCase().indexOf(s) !== -1
                || (b.bauherr || '').toLowerCase().indexOf(s) !== -1;
        });
    }, [baustellen, suche]);

    return (
        <div style={{flex: 1, padding: '16px 14px 20px', display: 'flex', flexDirection: 'column', gap: 12}}>
            {/* Suchfeld */}
            <div style={{position: 'relative'}}>
                <input type="text" value={suche}
                    onChange={e => setSuche(e.target.value)}
                    placeholder={TWMAConfig.t('bst_suche', lang)}
                    style={{
                        width: '100%', padding: '12px 14px 12px 40px',
                        background: 'var(--bg-card)', color: 'var(--text-primary)',
                        border: '1px solid var(--border-color)',
                        borderRadius: 'var(--radius-md)',
                        fontSize: 14, fontFamily: 'Source Sans 3, sans-serif',
                        boxSizing: 'border-box'
                    }} />
                <span style={{
                    position: 'absolute', left: 14, top: '50%', transform: 'translateY(-50%)',
                    color: 'var(--text-muted)', fontSize: 16
                }}>&#128270;</span>
            </div>

            {laedt && <div style={{textAlign: 'center', color: 'var(--text-muted)', padding: 24}}>
                {TWMAConfig.t('bst_lade', lang)}
            </div>}

            {!laedt && gefiltert.length === 0 && (
                <div style={{
                    textAlign: 'center', padding: 40,
                    color: 'var(--text-muted)', fontSize: 14,
                    background: 'var(--bg-card)',
                    border: '1px dashed var(--border-color)',
                    borderRadius: 'var(--radius-lg)'
                }}>
                    {TWMAConfig.t('bst_keine_baustellen', lang)}
                </div>
            )}

            {/* Liste */}
            {gefiltert.map(function(b) {
                const statusKey = b.status === 'pausiert' ? 'bst_status_pausiert'
                                : b.status === 'beendet'  ? 'bst_status_beendet'
                                : 'bst_status_aktiv';
                const statusColor = b.status === 'pausiert' ? 'var(--warning)'
                                  : b.status === 'beendet'  ? 'var(--text-muted)'
                                  : 'var(--success)';
                return (
                    <button key={b.id} onClick={() => props.onOeffnen(b)}
                        style={{
                            display: 'flex', flexDirection: 'column', gap: 6,
                            padding: '14px 16px', textAlign: 'left',
                            background: 'var(--bg-card)',
                            border: '1px solid var(--border-color)',
                            borderRadius: 'var(--radius-lg)',
                            cursor: 'pointer',
                            transition: 'transform 0.1s ease, border 0.15s ease'
                        }}
                        onMouseDown={e => e.currentTarget.style.transform = 'scale(0.98)'}
                        onMouseUp={e => e.currentTarget.style.transform = 'scale(1)'}>
                        <div style={{
                            display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 8
                        }}>
                            <div style={{
                                fontFamily: 'Oswald, sans-serif', fontSize: 17, fontWeight: 600,
                                color: 'var(--text-white)', letterSpacing: '0.5px',
                                flex: 1, lineHeight: 1.2
                            }}>{b.name || b.id}</div>
                            <span style={{
                                fontSize: 10, fontWeight: 700,
                                padding: '3px 10px', borderRadius: 999,
                                background: statusColor, color: '#fff',
                                textTransform: 'uppercase', letterSpacing: '0.5px',
                                flexShrink: 0, fontFamily: 'Oswald, sans-serif'
                            }}>{TWMAConfig.t(statusKey, lang)}</span>
                        </div>
                        {(b.adresse || b.bauherr) && (
                            <div style={{fontSize: 13, color: 'var(--text-light)'}}>
                                {b.adresse && <span>{b.adresse}</span>}
                                {b.adresse && b.bauherr && <span> &middot; </span>}
                                {b.bauherr && <span>{b.bauherr}</span>}
                            </div>
                        )}
                        {b.neue_dateien > 0 && (
                            <div style={{
                                display: 'inline-flex', alignItems: 'center', gap: 4,
                                alignSelf: 'flex-start',
                                fontSize: 11, color: 'var(--accent-blue)',
                                marginTop: 4
                            }}>
                                <span style={{
                                    background: 'var(--accent-blue)', color: '#fff',
                                    padding: '2px 8px', borderRadius: 999,
                                    fontWeight: 700
                                }}>{b.neue_dateien}</span>
                                <span>neue</span>
                            </div>
                        )}
                    </button>
                );
            })}
        </div>
    );
}

// ===== Ansicht 3: Ordner-Browser =============================
function MAOrdnerBrowser(props) {
    const lang = props.lang;
    const [dateien, setDateien] = React.useState([]);
    const [laedt, setLaedt]     = React.useState(true);
    const [filter, setFilter]   = React.useState('alle');
    const [vorschauDatei, setVorschauDatei] = React.useState(null);

    // Daten laden - hier nur der Fallback-Weg via Firebase
    React.useEffect(() => {
        if (!window.TWMAFirebase || !TWMAFirebase.isReady()) {
            setLaedt(false);
            return;
        }
        const unsub = TWMAFirebase.listenBaustelleDateien(
            props.baustelle.id, props.ordner,
            function(list) {
                setDateien(list);
                setLaedt(false);
            }
        );
        return unsub;
    }, [props.baustelle.id, props.ordner]);

    const zeigtFilter = (props.ordner === 'nachrichten');
    const gefiltert = React.useMemo(() => {
        if (!zeigtFilter || filter === 'alle') return dateien;
        return dateien.filter(function(d) { return ermittlePraefixFilter(d.name) === filter; });
    }, [dateien, filter, zeigtFilter]);

    const ordnerTitel = {
        zeichnungen:  'bst_kachel_zeichnungen',
        bilder:       'bst_kachel_bilder',
        stunden:      'bst_kachel_stunden',
        nachrichten:  'bst_kachel_nachrichten'
    }[props.ordner];

    return (
        <div style={{flex: 1, padding: '12px 12px 20px', display: 'flex', flexDirection: 'column', gap: 10}}>
            {/* Breadcrumb */}
            <div style={{
                padding: '10px 14px',
                background: 'var(--bg-card)',
                border: '1px solid var(--border-color)',
                borderRadius: 'var(--radius-md)',
                fontSize: 13, color: 'var(--text-light)',
                fontFamily: 'Oswald, sans-serif', letterSpacing: '0.5px'
            }}>
                <span style={{color: 'var(--text-muted)'}}>{props.baustelle.name || props.baustelle.id}</span>
                <span style={{margin: '0 8px', color: 'var(--text-muted)'}}>/</span>
                <span style={{color: 'var(--text-white)', textTransform: 'uppercase'}}>
                    {TWMAConfig.t(ordnerTitel, lang)}
                </span>
            </div>

            {/* Filter-Tabs (nur im Nachrichten-Ordner) */}
            {zeigtFilter && (
                <div style={{display: 'flex', gap: 6, flexWrap: 'wrap'}}>
                    {['alle', 'kalender', 'nachrichten', 'anweisungen'].map(function(f) {
                        const aktiv = filter === f;
                        return (
                            <button key={f} onClick={() => setFilter(f)}
                                style={{
                                    padding: '6px 12px', fontSize: 12,
                                    background: aktiv ? 'var(--accent-blue)' : 'var(--bg-card)',
                                    color: aktiv ? '#fff' : 'var(--text-light)',
                                    border: '1px solid ' + (aktiv ? 'var(--accent-blue)' : 'var(--border-color)'),
                                    borderRadius: 999, cursor: 'pointer',
                                    fontFamily: 'Oswald, sans-serif', letterSpacing: '0.5px',
                                    textTransform: 'uppercase'
                                }}>
                                {TWMAConfig.t('bst_filter_' + f, lang)}
                            </button>
                        );
                    })}
                </div>
            )}

            {laedt && <div style={{textAlign: 'center', color: 'var(--text-muted)', padding: 24}}>
                {TWMAConfig.t('bst_lade', lang)}
            </div>}

            {!laedt && gefiltert.length === 0 && (
                <div style={{
                    textAlign: 'center', padding: 32,
                    color: 'var(--text-muted)', fontSize: 14,
                    background: 'var(--bg-card)',
                    border: '1px dashed var(--border-color)',
                    borderRadius: 'var(--radius-lg)'
                }}>
                    {TWMAConfig.t('bst_keine_dateien', lang)}
                </div>
            )}

            {/* Datei-Liste */}
            {gefiltert.map(function(d) {
                return (
                    <button key={d.id} onClick={() => setVorschauDatei(d)}
                        style={{
                            display: 'flex', alignItems: 'center', gap: 12,
                            padding: '12px 14px', textAlign: 'left',
                            background: 'var(--bg-card)',
                            border: '1px solid var(--border-color)',
                            borderRadius: 'var(--radius-md)',
                            cursor: 'pointer'
                        }}>
                        <DateiIcon mime={d.mime || d.mimeType} name={d.name} />

function MABaustellen(props) {

    const [ausgewaehlt, setAusgewaehlt] = React.useState(null);
    const [ordner, setOrdner]           = React.useState(null);

    function oeffneBaustelle(b) {
        setAusgewaehlt(b);
        setAnsicht('detail');
    }
    function oeffneOrdner(o) {
        setOrdner(o);
        setAnsicht('browser');
    }
    function zurueckZuListe() {
        setAnsicht('liste');
        setAusgewaehlt(null);
        setOrdner(null);

    function zurueckZuDetail() {
        setAnsicht('detail');
        setOrdner(null);
    }

    switch (ansicht) {
        case 'detail':
            return (
                <div style={{flex: 1, display: 'flex', flexDirection: 'column'}}>
                    <MAInternerHeader lang={props.lang}
                        titel={ausgewaehlt.name || ausgewaehlt.id}
                        onZurueck={zurueckZuListe} />
                    <MABaustellenDetail lang={props.lang}
                        baustelle={ausgewaehlt}
                        onOrdnerOeffnen={oeffneOrdner} />

            );
        case 'browser':
            return (
                <div style={{flex: 1, display: 'flex', flexDirection: 'column'}}>
                    <MAInternerHeader lang={props.lang}
                        titel={TWMAConfig.t('bst_kachel_' + ordner, props.lang)}
                        onZurueck={zurueckZuDetail} />
                    <MAOrdnerBrowser lang={props.lang}
                        baustelle={ausgewaehlt}

                </div>
            );
        case 'liste':
        default:
            return <MABaustellenListe lang={props.lang} onOeffnen={oeffneBaustelle} />;
    }
}

// ============================================================
// TW Baustellen-App  -  Modul Kalender (Etappe 8)
// ============================================================
// Read-only-Kalender, Datenquelle: Firebase /kalender/{deviceId}
//
// Ansichten:
//   - Monat (Default): klassisches 7x6-Raster, Farbbalken pro Tag
//   - Woche: 7 Tage untereinander mit vollen Eintraegen
//
// Datum-Key in Firebase: YYYYMMDD
//
// Baustellen-Farbcodes: hash(baustelle_id) -> eine von 10 Farben (deterministisch)
// ============================================================

// ===== Utilities =============================================

function kalFormatDatumKey(date) {
    return date.getFullYear() + String(date.getMonth()+1).padStart(2,'0') + String(date.getDate()).padStart(2,'0');
}

function kalIstHeute(date) {
    const h = new Date();
    return date.getFullYear() === h.getFullYear()
        && date.getMonth()    === h.getMonth()
        && date.getDate()     === h.getDate();
}

function kalErsterMontag(jahr, monat) {
    // Liefert das Datum des Montags, das die Monatsansicht startet
    const first = new Date(jahr, monat, 1);
    const tag = (first.getDay() + 6) % 7; // 0 = Mo
    first.setDate(first.getDate() - tag);
    return first;
}

// Deterministische Farbwahl pro Baustellen-ID
const KAL_FARBEN = [
    '#e74c3c', '#e67e22', '#f39c12', '#16a085',
    '#27ae60', '#2980b9', '#8e44ad', '#c0392b',
    '#d35400', '#2c3e50'
];
function kalFarbeFuerBaustelle(baustelleId) {
    if (!baustelleId) return '#7f8c8d';
    let h = 0;
    for (let i = 0; i < baustelleId.length; i++) {
        h = ((h << 5) - h + baustelleId.charCodeAt(i)) | 0;
    }
    return KAL_FARBEN[Math.abs(h) % KAL_FARBEN.length];
}

function kalFarbeFuerTyp(typ) {
    switch (typ) {
        case 'urlaub':    return '#f1c40f';
        case 'krankheit': return '#e74c3c';
        case 'termin':    return '#9b59b6';
        default:          return null; // arbeit -> Baustellen-Farbe
    }
}

function kalIconFuerTyp(typ) {
    switch (typ) {
        case 'urlaub':    return '\uD83C\uDFD6';  // Strandhaus
        case 'krankheit': return '\u271A';         // Kreuz
        case 'termin':    return '\uD83D\uDCCC';   // Pin
        default:          return '';
    }
}

// ===== Monatsansicht (7x6-Raster) ============================

function KalMonat(props) {
    const { lang, jahr, monat, eintraege, onTagKlick } = props;
    const wochentage = TWMAConfig.KAL_WOCHENTAGE[lang] || TWMAConfig.KAL_WOCHENTAGE.de;

    const start = kalErsterMontag(jahr, monat);
    const tage = [];
    for (let i = 0; i < 42; i++) {
        const d = new Date(start);
        d.setDate(start.getDate() + i);
        tage.push(d);
    }

    return (
        <div style={{padding:'10px 10px', flex:1, display:'flex', flexDirection:'column', minHeight:0}}>
            {/* Wochentag-Header */}
            <div style={{
                display:'grid', gridTemplateColumns:'repeat(7, 1fr)',
                gap:4, marginBottom:6
            }}>
                {wochentage.map(function(w, i) {
                    const istWE = i >= 5;
                    return (
                        <div key={w+i} style={{
                            textAlign:'center', padding:'4px 0',
                            fontFamily:'Oswald,sans-serif', fontSize:10,
                            color: istWE ? 'var(--accent-red-light)' : 'var(--text-muted)',
                            textTransform:'uppercase', letterSpacing:'1px', fontWeight:600
                        }}>{w}</div>
                    );
                })}
            </div>

            {/* Tage-Raster */}
            <div style={{
                flex:1, display:'grid',
                gridTemplateColumns:'repeat(7, 1fr)',
                gridAutoRows:'1fr',
                gap:4
            }}>
                {tage.map(function(d, idx) {
                    const key       = kalFormatDatumKey(d);
                    const eintrag   = eintraege[key];
                    const istFrememd = d.getMonth() !== monat;
                    const istWE     = d.getDay() === 0 || d.getDay() === 6;
                    const istToday  = kalIstHeute(d);

                    let farbe = null;
                    let icon = '';
                    let anzahl = 0;
                    if (eintrag) {
                        // Kann ein Einzel-Eintrag oder ein Objekt mit mehreren sein
                        // Bei unserer Struktur ist pro Tag 1 Eintrag (Master-Dok 7.5).
                        anzahl = 1;
                        farbe = kalFarbeFuerTyp(eintrag.typ) || kalFarbeFuerBaustelle(eintrag.baustelle_id);
                        icon = kalIconFuerTyp(eintrag.typ);
                    }

                    return (
                        <button key={key+'_'+idx}
                            onClick={function(){ onTagKlick(d, eintrag); }}
                            style={{
                                background: istToday
                                    ? 'rgba(30,136,229,0.18)'
                                    : istFrememd ? 'transparent' : 'var(--bg-card)',
                                border: istToday
                                    ? '2px solid var(--accent-blue)'
                                    : '1px solid var(--border-color)',
                                borderRadius:'var(--radius-sm)',
                                padding:'4px 3px',
                                display:'flex', flexDirection:'column',
                                alignItems:'stretch', justifyContent:'flex-start',
                                cursor:'pointer',
                                color: istFrememd ? 'var(--text-muted)'
                                     : istWE      ? 'var(--accent-red-light)'
                                                  : 'var(--text-white)',
                                opacity: istFrememd ? 0.4 : 1,
                                minHeight:50, position:'relative'
                            }}>
                            <div style={{
                                fontSize:12, fontWeight: istToday ? 700 : 500,
                                textAlign:'right', lineHeight:1
                            }}>{d.getDate()}</div>
                            {eintrag && (
                                <div style={{
                                    marginTop:4, padding:'2px 3px',
                                    background: farbe, color:'#fff',
                                    borderRadius:3, fontSize:9, fontWeight:600,
                                    overflow:'hidden', textOverflow:'ellipsis',
                                    whiteSpace:'nowrap', textAlign:'left'
                                }}>
                                    {icon && <span style={{marginRight:2}}>{icon}</span>}
                                    {eintrag.typ === 'urlaub'    ? TWMAConfig.t('kal_typ_urlaub', lang)
                                   : eintrag.typ === 'krankheit' ? TWMAConfig.t('kal_typ_krankheit', lang)
                                   : eintrag.typ === 'termin'    ? TWMAConfig.t('kal_typ_termin', lang)
                                   : (eintrag.baustelle_name || '').slice(0, 8)}
                                </div>
                            )}
                        </button>
                    );
                })}
            </div>
        </div>
    );
}

// ===== Wochenansicht (7 Tage untereinander) ==================

function KalWoche(props) {
    const { lang, jahr, monat, eintraege, onTagKlick, refDatum } = props;
    const wochentage = TWMAConfig.KAL_WOCHENTAGE[lang] || TWMAConfig.KAL_WOCHENTAGE.de;

    // Die Woche, die refDatum enthaelt (Montag als Anker)
    const start = new Date(refDatum);
    const tag = (start.getDay() + 6) % 7;
    start.setDate(start.getDate() - tag);

    const tage = [];
    for (let i = 0; i < 7; i++) {
        const d = new Date(start);
        d.setDate(start.getDate() + i);
        tage.push(d);
    }

    return (
        <div style={{flex:1, overflowY:'auto', padding:'10px 12px'}}>
            {tage.map(function(d, idx) {
                const key     = kalFormatDatumKey(d);
                const eintrag = eintraege[key];
                const istHeute = kalIstHeute(d);
                const farbe = eintrag
                    ? (kalFarbeFuerTyp(eintrag.typ) || kalFarbeFuerBaustelle(eintrag.baustelle_id))
                    : '#7f8c8d';

                return (
                    <button key={key} onClick={function(){ onTagKlick(d, eintrag); }}
                        style={{
                            width:'100%', marginBottom:8, padding:'12px 14px',
                            background: istHeute ? 'rgba(30,136,229,0.12)' : 'var(--bg-card)',
                            border: istHeute ? '2px solid var(--accent-blue)' : '1px solid var(--border-color)',
                            borderRadius:'var(--radius-lg)',
                            display:'flex', alignItems:'center', gap:12,
                            cursor:'pointer', textAlign:'left',
                            borderLeftWidth: 6,
                            borderLeftColor: eintrag ? farbe : 'var(--border-color)',
                            borderLeftStyle:'solid'
                        }}>
                        <div style={{
                            minWidth:50, textAlign:'center'
                        }}>
                            <div style={{
                                fontSize:10, color:'var(--text-muted)',
                                fontFamily:'Oswald,sans-serif', textTransform:'uppercase', letterSpacing:'1px'
                            }}>{wochentage[idx]}</div>
                            <div style={{
                                fontSize:20, fontWeight:700, color:'var(--text-white)',
                                fontFamily:'Oswald,sans-serif'
                            }}>{d.getDate()}</div>
                        </div>
                        <div style={{flex:1}}>
                            {eintrag ? (
                                <React.Fragment>
                                    <div style={{
                                        color:'var(--text-white)', fontSize:14, fontWeight:600
                                    }}>
                                        {kalIconFuerTyp(eintrag.typ)
                                            ? kalIconFuerTyp(eintrag.typ) + ' '
                                            : ''}
                                        {eintrag.typ === 'urlaub'    ? TWMAConfig.t('kal_typ_urlaub', lang)
                                       : eintrag.typ === 'krankheit' ? TWMAConfig.t('kal_typ_krankheit', lang)
                                       : eintrag.typ === 'termin'    ? TWMAConfig.t('kal_typ_termin', lang)
                                       : (eintrag.baustelle_name || '-')}
                                    </div>
                                    {(eintrag.von || eintrag.bis) && (
                                        <div style={{color:'var(--text-muted)', fontSize:12, marginTop:2}}>
                                            {(eintrag.von || '') + ' \u2013 ' + (eintrag.bis || '')}
                                        </div>
                                    )}
                                    {eintrag.bemerkung && (
                                        <div style={{
                                            marginTop:4, fontSize:12, fontStyle:'italic',
                                            color:'var(--text-light)'
                                        }}>{eintrag.bemerkung}</div>
                                    )}
                                </React.Fragment>
                            ) : (
                                <div style={{color:'var(--text-muted)', fontSize:13, fontStyle:'italic'}}>
                                    {TWMAConfig.t('kal_keine_eintraege', lang)}
                                </div>
                            )}
                        </div>
                    </button>
                );
            })}
        </div>
    );
}

function MAKalender(props) {
    const { lang } = props;
    const heute = new Date();

    const [jahr, setJahr]         = React.useState(heute.getFullYear());
    const [monat, setMonat]       = React.useState(heute.getMonth());
    const [refDatum, setRefDatum] = React.useState(new Date()); // fuer Wochenansicht
    const [view, setView]         = React.useState('monat');
    const [eintraege, setEintraege] = React.useState({});
    const [tagDetail, setTagDetail] = React.useState(null);
    const [tagEintrag, setTagEintrag] = React.useState(null);

    // Firebase-Listener fuer Kalender-Eintraege
    React.useEffect(function() {
        if (!window.TWMAFirebase || !TWMAFirebase.isReady()) return;
        const deviceId = TWMACore.getDeviceId();
        const unsub = TWMAFirebase.listenKalenderEintraege(deviceId, setEintraege);
        return unsub;
    }, []);

    function prev() {
        if (view === 'monat') {
            if (monat === 0) { setMonat(11); setJahr(jahr - 1); }
            else setMonat(monat - 1);
        } else {
            const d = new Date(refDatum);
            d.setDate(d.getDate() - 7);
            setRefDatum(d);
            setMonat(d.getMonth()); setJahr(d.getFullYear());
        }
    }

    function next() {
        if (view === 'monat') {
            if (monat === 11) { setMonat(0); setJahr(jahr + 1); }
            else setMonat(monat + 1);
        } else {
            const d = new Date(refDatum);
            d.setDate(d.getDate() + 7);
            setRefDatum(d);
            setMonat(d.getMonth()); setJahr(d.getFullYear());
        }
    }

    function sprungHeute() {
        const h = new Date();
        setJahr(h.getFullYear());
        setMonat(h.getMonth());
        setRefDatum(h);
    }

    function onTagKlick(datum, eintrag) {
        setTagDetail(datum);
        setTagEintrag(eintrag);
    }

    return (
        <div style={{flex:1, display:'flex', flexDirection:'column', minHeight:0}}>
            <KalHeader lang={lang} jahr={jahr} monat={monat} view={view}
                onPrev={prev} onNext={next} onHeute={sprungHeute}
                onViewChange={setView} />

            {view === 'monat' ? (
                <KalMonat lang={lang} jahr={jahr} monat={monat}
                    eintraege={eintraege} onTagKlick={onTagKlick} />
            ) : (
                <KalWoche lang={lang} jahr={jahr} monat={monat}
                    refDatum={refDatum}
                    eintraege={eintraege} onTagKlick={onTagKlick} />
            )}

            <KalTagDetail lang={lang} datum={tagDetail} eintrag={tagEintrag}
                onClose={function(){ setTagDetail(null); setTagEintrag(null); }} />
        </div>
    );
}

// ============================================================
// TW Baustellen-App  -  Modul Fotos (Etappe 5 - HERZSTUECK)
// ============================================================
// Stufen-Workflow:
//   1. Baustelle waehlen
//   2. Raum waehlen oder neu anlegen
//   3. Phase waehlen (Rohzustand / Abdichtung / Fertigstellung)
//   4. Wand-Auswahl (2x2 / 3x2 / 4x2 Grid + Boden + Decke)
//   5. Kamera aufrufen + Foto aufnehmen
//   6. Sprach-Notiz + Uebersetzung + Speichern
//
// Datenfluss:
//   - Foto wird lokal als Blob in IndexedDB gespeichert
//   - Automatisch in sync_queue eingereiht
//   - TWMASync laedt hoch sobald online
//
// Separater Zweig: Allgemeines Foto (bis 20/Baustelle, kein Raum noetig)
// ============================================================

// ===== Kompressions-Utility ==================================
// Komprimiert ein File/Blob auf max 1920px lange Seite (JPEG q=0.85)
async function komprimiereFoto(fileOrBlob, maxDim) {
    maxDim = maxDim || 1920;
    const bitmap = await createImageBitmap(fileOrBlob);
    const faktor = Math.min(1, maxDim / Math.max(bitmap.width, bitmap.height));
    const w = Math.round(bitmap.width * faktor);
    const h = Math.round(bitmap.height * faktor);
    const canvas = document.createElement('canvas');
    canvas.width = w; canvas.height = h;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(bitmap, 0, 0, w, h);
    try { bitmap.close(); } catch (_) {}
    return await new Promise(function(resolve) {
        canvas.toBlob(function(b) { resolve(b); }, 'image/jpeg', 0.85);
    });
}

async function erstelleThumbnail(blob) {
    return komprimiereFoto(blob, 320);
}

function formatTs(ts) {
    if (!ts) return '';
    const d = new Date(ts);
    const pad = n => n < 10 ? '0' + n : '' + n;
    return d.getFullYear() + pad(d.getMonth()+1) + pad(d.getDate()) + '-'
        + pad(d.getHours()) + pad(d.getMinutes()) + pad(d.getSeconds());
}

function buildUploadName(foto, geraeteKurz) {
    // IVAN_roh_bad-1_wand-1_20260418-143022.jpg
    const phaseKurz = { rohzustand: 'roh', abdichtung: 'abd', fertigstellung: 'fert', allgemein: 'allg' }[foto.phase] || foto.phase;
    return [
        geraeteKurz || 'MA',
        phaseKurz,
        foto.raum_id || 'allg',
        foto.wand_id || 'x',
        formatTs(foto.aufgenommen_am)
    ].join('_') + '.jpg';
}

function blobObjectUrl(blob) {
    if (!blob) return null;
    try { return URL.createObjectURL(blob); } catch (_) { return null; }
}
