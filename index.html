<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TW Baustellen-App</title>

    <!-- ===== PWA Meta ===== -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f1923">
    <meta name="description" content="Baustellen-App von Thomas Willwacher Fliesenlegermeister e.K.">
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="TW Baustelle">
    <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
    <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">

    <!-- ===== Fonts (1:1 Master-App) ===== -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Source+Sans+3:ital,wght@0,400;0,600;0,700;1,700&display=swap" rel="stylesheet">

    <!-- ===== React + Babel (CDN) ===== -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- ===== Firebase SDK (Compat-Mode wie Master-App) ===== -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-messaging-compat.js"></script>

    <!-- ===== Auth-Modul (Login Code+PIN gegen Master-App-Schema) ===== -->
    <script src="js/tw-ma-auth.js"></script>

    <!-- ===== Etappe-4b-Module (NEU) ============================================
         Reihenfolge wichtig: core → storage → config → firebase → drive-service.
         Diese Module setzen window.TWMaConfig, window.TWMaFirebase,
         window.TWMaDriveService und werden vom Babel-Block (Etappe-4b-Code)
         konsumiert.
         ======================================================================== -->
    <script src="js/tw-ma-core.js"></script>
    <script src="js/tw-ma-storage.js"></script>
    <script src="js/tw-ma-config.js"></script>
    <script src="js/tw-ma-firebase.js"></script>
    <script src="js/tw-ma-drive-service.js"></script>
    <script src="js/tw-ma-translation.js"></script>

    <!-- ===== Globaler Error-Handler ===== -->
    <script>
    window.onerror = function(msg, url, line, col, err) {
        console.error('App Error:', msg, 'Line:', line, err);
        var d = document.getElementById('crash-info');
        if (!d) {
            d = document.createElement('div');
            d.id = 'crash-info';
            d.style.cssText = 'position:fixed;top:20px;left:20px;right:20px;padding:20px;background:#1a2638;color:#ff4757;border:2px solid #c41e1e;border-radius:14px;z-index:99999;font-family:monospace;font-size:13px;max-height:80vh;overflow:auto;';
            document.body.appendChild(d);
        }
        d.innerHTML = '<b>Fehler:</b> ' + msg + '<br><b>Zeile:</b> ' + line +
            '<br><button onclick="this.parentNode.remove()" style="margin-top:10px;padding:8px 16px;background:#1E88E5;color:#fff;border:none;border-radius:8px;cursor:pointer;font-weight:bold">Schliessen</button>';
    };
    </script>

    <!-- ===== Service-Worker-Registrierung ===== -->
    <script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
            navigator.serviceWorker.register('service-worker.js')
                .then(function(reg) { console.log('SW registriert:', reg.scope); })
                .catch(function(err) { console.warn('SW Fehler:', err); });
        });
    }
    </script>

    <style>
    /* ═══════════════════════════════════════════════════════════
       TW BAUSTELLEN-APP — Etappe 1 v2 — IDENTISCH zur Master-App
       Quelle: tw-design.css der Master-App (1:1 übernommen)
       ═══════════════════════════════════════════════════════════ */

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    button {
        -webkit-tap-highlight-color: rgba(30,136,229,0.2);
        touch-action: manipulation;
        -webkit-user-select: none;
        user-select: none;
        cursor: pointer;
    }

    :root {
        --bg-primary: #0f1923;
        --bg-secondary: #1a2a3c;
        --bg-tertiary: #223448;
        --bg-card: #2a3a50;
        --bg-hover: #324560;
        --accent-red: #c41e1e;
        --accent-red-light: #e63535;
        --accent-blue: #4da6ff;
        --accent-orange: #e67e22;
        --accent-orange-light: #f39c12;
        --text-primary: #e8ecf1;
        --text-secondary: #b0c0d4;
        --text-white: #f0f2f5;
        --text-light: #b8c4d4;
        --text-muted: #8a9ab4;
        --border-color: #2e4562;
        --success: #27ae60;
        --shadow-lg: 0 10px 40px rgba(0,0,0,0.4);
        --shadow-md: 0 4px 20px rgba(0,0,0,0.3);
        --radius-sm: 6px;
        --radius-md: 12px;
        --radius-lg: 20px;
        --safe-top: env(safe-area-inset-top, 0px);
        --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    html, body {
        height: 100%;
        font-family: 'Source Sans 3', -apple-system, sans-serif;
        background: var(--bg-primary);
        color: var(--text-white);
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
    }

    #root {
        min-height: 100%;
        display: flex;
        flex-direction: column;
    }

    /* Schriftgrösse-Toggle (wie Master-App) */
    body.tw-font-large {
        font-size: 1.5em;
    }

    /* ═══════════════════════════════════════════
       LOGO STYLES (1:1 Master-App)
       ═══════════════════════════════════════════ */
    .logo-container {
        display: inline-flex;
        flex-direction: column;
        align-items: flex-start;
        user-select: none;
    }

    .logo-thomas-row {
        display: flex;
        align-items: baseline;
        margin-bottom: -18px;
        padding-left: 1px;
        align-self: flex-start;
        position: relative;
        z-index: 2;
    }

    .logo-thomas-text {
        font-family: 'Source Sans 3', serif;
        font-style: italic;
        font-weight: 700;
        color: var(--accent-red);
        font-size: 14.5px;
        letter-spacing: 0.3px;
    }

    .logo-word-row {
        display: flex;
        align-items: baseline;
        font-family: 'Oswald', sans-serif;
        font-weight: 700;
        color: var(--text-white);
        line-height: 1;
    }

    .logo-w { font-size: 62px; }

    .logo-i-wrap {
        position: relative;
        font-size: 62px;
        display: inline-block;
    }

    .logo-i-wrap .logo-i-char { font-size: 62px; }

    .logo-i-dot {
        position: absolute;
        top: 6px;
        left: 50%;
        transform: translateX(-50%);
        width: 10px;
        height: 10px;
        background: var(--accent-red);
    }

    .logo-LL {
        font-size: 84px;
        letter-spacing: 1px;
        line-height: 0.75;
    }

    .logo-wacher { font-size: 62px; }

    .logo-subtitle-row {
        display: flex;
        justify-content: flex-end;
        width: 100%;
        margin-top: 1px;
    }

    .logo-subtitle-text {
        font-family: 'Source Sans 3', sans-serif;
        font-weight: 600;
        color: var(--accent-red);
        font-size: 14.5px;
        letter-spacing: 2.5px;
    }

    .logo-address {
        font-family: 'Source Sans 3', sans-serif;
        font-weight: 400;
        color: var(--text-muted);
        font-size: 12px;
        letter-spacing: 0.5px;
        margin-top: 10px;
        text-align: center;
        width: 100%;
    }

    /* ═══════════════════════════════════════════
       APP HEADER (1:1 Master-App)
       ═══════════════════════════════════════════ */
    .app-header {
        background: linear-gradient(180deg, var(--bg-secondary) 0%, var(--bg-primary) 100%);
        border-bottom: 1px solid var(--border-color);
        padding: calc(12px + var(--safe-top)) 16px 12px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        position: sticky;
        top: 0;
        z-index: 100;
        gap: 8px;
    }

    .header-title {
        font-family: 'Oswald', sans-serif;
        font-size: 14px;
        font-weight: 500;
        color: var(--text-light);
        letter-spacing: 2px;
        text-transform: uppercase;
        flex: 1;
        text-align: center;
    }

    /* ═══════════════════════════════════════════
       MODUL-TAB-LEISTE (rote Pillen, wie Bild 1)
       ═══════════════════════════════════════════ */
    .modul-tabs {
        display: grid;
        grid-template-columns: repeat(6, 1fr);
        gap: 6px;
        padding: 8px 12px;
        background: var(--bg-secondary);
        border-bottom: 1px solid var(--border-color);
    }

    .modul-tab {
        padding: 10px 4px;
        border: none;
        border-radius: var(--radius-sm);
        background: linear-gradient(135deg, var(--accent-red-light), var(--accent-red));
        color: var(--text-white);
        font-family: 'Oswald', sans-serif;
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.6px;
        cursor: pointer;
        box-shadow: 0 3px 10px rgba(196,30,30,0.3);
        transition: all 0.2s ease;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 3px;
        line-height: 1;
    }

    .modul-tab:active { transform: scale(0.96); }

    .modul-tab.active {
        background: linear-gradient(135deg, #e84040, #ff5252);
        box-shadow: 0 0 0 2px var(--accent-orange), 0 4px 14px rgba(196,30,30,0.5);
    }

    .modul-tab svg {
        width: 18px;
        height: 18px;
        stroke-width: 2;
    }

    /* ═══════════════════════════════════════════
       STARTSEITE (1:1 Master-App)
       ═══════════════════════════════════════════ */
    .startseite {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        padding: 30px 24px calc(24px + var(--safe-bottom));
        position: relative;
        overflow: hidden;
    }

    /* Subtle tile pattern background — der schöne Schachbrett-Effekt */
    .startseite::before {
        content: '';
        position: absolute;
        inset: 0;
        background-image:
            linear-gradient(45deg, rgba(255,255,255,0.015) 25%, transparent 25%),
            linear-gradient(-45deg, rgba(255,255,255,0.015) 25%, transparent 25%),
            linear-gradient(45deg, transparent 75%, rgba(255,255,255,0.015) 75%),
            linear-gradient(-45deg, transparent 75%, rgba(255,255,255,0.015) 75%);
        background-size: 40px 40px;
        background-position: 0 0, 0 20px, 20px -20px, -20px 0;
        pointer-events: none;
    }

    .logo-section {
        position: relative;
        z-index: 1;
        margin-bottom: 30px;
        animation: fadeInDown 0.8s ease-out;
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    @keyframes fadeInDown {
        from { opacity: 0; transform: translateY(-20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    /* ═══════════════════════════════════════════
       UHR-PULSE
       ═══════════════════════════════════════════ */
    .tw-clock-pulse {
        animation: tw-clock-pulse-anim 1s ease-in-out infinite;
    }
    @keyframes tw-clock-pulse-anim {
        0%, 100% { opacity: 1; }
        50%      { opacity: 0.3; }
    }

    /* ═══════════════════════════════════════════
       SPRACH-PILLE (statt Verbindungs-Buttons)
       ═══════════════════════════════════════════ */
    .sprach-pill {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 10px 20px;
        background: var(--bg-secondary);
        border: 1px solid var(--border-color);
        border-radius: 50px;
        color: var(--text-primary);
        font-family: 'Source Sans 3', sans-serif;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        position: relative;
        z-index: 1;
    }

    .sprach-pill:hover { border-color: var(--accent-blue); }
    .sprach-pill .flag { font-size: 20px; }

    /* ═══════════════════════════════════════════
       MODUL-PLATZHALTER
       ═══════════════════════════════════════════ */
    .modul-platzhalter {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 60px 20px;
        gap: 20px;
        position: relative;
        z-index: 1;
    }

    .modul-platzhalter-icon {
        width: 96px;
        height: 96px;
        background: linear-gradient(135deg, var(--bg-card), var(--bg-secondary));
        border: 2px dashed var(--accent-blue);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--accent-blue);
    }
    .modul-platzhalter-icon svg { width: 48px; height: 48px; }

    .modul-platzhalter-titel {
        font-family: 'Oswald', sans-serif;
        font-size: 26px;
        font-weight: 600;
        color: var(--text-white);
        text-transform: uppercase;
        letter-spacing: 2px;
    }

    .modul-platzhalter-text {
        font-size: 15px;
        color: var(--text-light);
        max-width: 320px;
        line-height: 1.5;
    }

    .modul-platzhalter-info {
        margin-top: 12px;
        padding: 14px 20px;
        background: var(--bg-card);
        border-left: 3px solid var(--accent-orange);
        border-radius: var(--radius-sm);
        font-size: 13px;
        color: var(--text-light);
        max-width: 360px;
        text-align: left;
    }

    /* ═══════════════════════════════════════════
       MODAL (Sprach-Auswahl)
       ═══════════════════════════════════════════ */
    .modal-backdrop {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.7);
        backdrop-filter: blur(4px);
        z-index: 1000;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        animation: fade-in 0.2s ease;
    }

    @keyframes fade-in {
        from { opacity: 0; }
        to { opacity: 1; }
    }

    .modal {
        background: var(--bg-secondary);
        border: 1px solid var(--border-color);
        border-radius: var(--radius-lg);
        padding: 24px;
        max-width: 400px;
        width: 100%;
        max-height: 80vh;
        overflow-y: auto;
        box-shadow: var(--shadow-lg);
    }

    .modal-titel {
        font-family: 'Oswald', sans-serif;
        font-size: 18px;
        color: var(--text-white);
        margin-bottom: 16px;
        text-align: center;
        letter-spacing: 1.5px;
        text-transform: uppercase;
    }

    .sprach-liste {
        display: flex;
        flex-direction: column;
        gap: 8px;
    }

    .sprach-option {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 12px 16px;
        background: var(--bg-tertiary);
        border: 1px solid var(--border-color);
        border-radius: var(--radius-md);
        cursor: pointer;
        transition: all 0.15s;
        font-size: 15px;
        color: var(--text-primary);
    }

    .sprach-option:hover {
        border-color: var(--accent-blue);
        background: var(--bg-hover);
    }

    .sprach-option.aktiv {
        border-color: var(--accent-blue);
        background: rgba(77,166,255,0.15);
    }

    .sprach-option .flag { font-size: 24px; }
    .sprach-option .name { flex: 1; font-weight: 600; }
    .sprach-option .check { color: var(--success); font-weight: 700; }

    /* Status unten */
    .status-leiste {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        padding: 8px 12px;
        font-size: 11px;
        color: var(--text-muted);
        position: relative;
        z-index: 1;
    }

    .status-dot {
        display: inline-block;
        width: 8px;
        height: 8px;
        border-radius: 50%;
    }
    /* ═══════════════════════════════════════════
       ONBOARDING / PIN-SCREENS (Etappe 3)
       ═══════════════════════════════════════════ */
    .auth-screen {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 40px 24px calc(40px + var(--safe-bottom));
        position: relative;
        text-align: center;
        gap: 24px;
    }

    .auth-screen::before {
        content: '';
        position: absolute;
        inset: 0;
        background-image:
            linear-gradient(45deg, rgba(255,255,255,0.015) 25%, transparent 25%),
            linear-gradient(-45deg, rgba(255,255,255,0.015) 25%, transparent 25%),
            linear-gradient(45deg, transparent 75%, rgba(255,255,255,0.015) 75%),
            linear-gradient(-45deg, transparent 75%, rgba(255,255,255,0.015) 75%);
        background-size: 40px 40px;
        background-position: 0 0, 0 20px, 20px -20px, -20px 0;
        pointer-events: none;
    }

    .auth-logo-mini {
        position: relative;
        z-index: 1;
        transform: scale(0.5);
        margin-bottom: -40px;
    }

    .auth-titel {
        position: relative; z-index: 1;
        font-family: 'Oswald', sans-serif;
        font-size: 22px;
        font-weight: 600;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--text-white);
    }

    .auth-untertitel {
        position: relative; z-index: 1;
        font-size: 14px;
        color: var(--text-light);
        max-width: 360px;
        line-height: 1.5;
    }

    /* 6-Code-Anzeige */
    .auth-code-box {
        position: relative; z-index: 1;
        background: linear-gradient(135deg, rgba(15,25,35,0.95), rgba(20,40,70,0.9));
        border: 2px solid var(--accent-blue);
        border-radius: var(--radius-lg);
        padding: 28px 36px;
        box-shadow: 0 0 30px rgba(77,166,255,0.3), 0 8px 32px rgba(0,0,0,0.3);
    }

    .auth-code-label {
        font-family: 'Oswald', sans-serif;
        font-size: 11px;
        color: rgba(77,166,255,0.8);
        letter-spacing: 4px;
        text-transform: uppercase;
        margin-bottom: 12px;
    }

    .auth-code {
        font-family: 'SF Mono', 'Roboto Mono', monospace;
        font-size: 56px;
        font-weight: 700;
        color: var(--text-white);
        letter-spacing: 12px;
        line-height: 1;
        font-variant-numeric: tabular-nums;
        text-shadow: 0 0 20px rgba(77,166,255,0.4);
    }

    /* Wartepunkt-Animation */
    .auth-warten {
        position: relative; z-index: 1;
        display: flex;
        gap: 8px;
        align-items: center;
        color: var(--text-light);
        font-size: 13px;
    }

    .auth-warten-dots {
        display: inline-flex;
        gap: 4px;
    }

    .auth-warten-dots span {
        width: 8px;
        height: 8px;
        background: var(--accent-blue);
        border-radius: 50%;
        animation: warten-pulse 1.4s ease-in-out infinite;
    }
    .auth-warten-dots span:nth-child(2) { animation-delay: 0.2s; }
    .auth-warten-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes warten-pulse {
        0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
        40% { opacity: 1; transform: scale(1.2); }
    }

    /* PIN-Input */
    .pin-input-wrapper {
        position: relative; z-index: 1;
        display: flex;
        gap: 12px;
        justify-content: center;
    }

    .pin-digit {
        width: 56px;
        height: 72px;
        background: var(--bg-secondary);
        border: 2px solid var(--border-color);
        border-radius: var(--radius-md);
        text-align: center;
        font-family: 'Oswald', sans-serif;
        font-size: 32px;
        font-weight: 600;
        color: var(--text-white);
        outline: none;
        transition: all 0.2s;
    }

    .pin-digit:focus {
        border-color: var(--accent-blue);
        box-shadow: 0 0 12px rgba(77,166,255,0.4);
    }

    .pin-digit.filled {
        background: var(--bg-tertiary);
        border-color: var(--success);
    }

    .pin-digit.fehler {
        border-color: var(--accent-red);
        animation: shake 0.4s ease-in-out;
    }

    @keyframes shake {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-8px); }
        75% { transform: translateX(8px); }
    }

    .auth-action-btn {
        position: relative; z-index: 1;
        padding: 14px 32px;
        background: linear-gradient(135deg, var(--accent-red-light), var(--accent-red));
        border: none;
        border-radius: var(--radius-md);
        color: var(--text-white);
        font-family: 'Oswald', sans-serif;
        font-size: 14px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        cursor: pointer;
        box-shadow: 0 4px 15px rgba(196,30,30,0.4);
        transition: all 0.2s;
    }

    .auth-action-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(196,30,30,0.5); }
    .auth-action-btn:active { transform: scale(0.97); }
    .auth-action-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .auth-fehler {
        position: relative; z-index: 1;
        color: var(--accent-red-light);
        font-size: 13px;
        font-weight: 600;
    }

    .auth-info-box {
        position: relative; z-index: 1;
        background: var(--bg-card);
        border-left: 3px solid var(--accent-orange);
        border-radius: var(--radius-sm);
        padding: 14px 18px;

    /* ═══════════════════════════════════════════════════════════

       ═══════════════════════════════════════════════════════════ */

        min-height: calc(100vh - var(--header-h, 64px));

    }

        padding: 8px 6px 12px 6px;

        flex: 0 0 auto;
        width: 40px; height: 40px;
        border: 1px solid var(--border-color);

    .ma-kal-titel .ma-kal-jahr {
        color: var(--accent-red-light);

    }

    .ma-kal-heute-btn {
        background: var(--accent-red);
        color: #fff;
        border: none;
        font-family: 'Oswald', sans-serif;
        font-weight: 600;

        letter-spacing: 1px;
        text-transform: uppercase;

        box-shadow: 0 4px 12px rgba(230,53,53,0.3);
        touch-action: manipulation;
    }
    .ma-kal-heute-btn:active { transform: scale(0.95); }

    .ma-kal-wochentage {
        display: grid;

        gap: 4px;
        padding: 0 2px 6px 2px;

    .ma-kal-wochentag {
        text-align: center;
        font-family: 'Oswald', sans-serif;
        font-size: 0.7rem;
        font-weight: 600;
        color: var(--text-muted);
        letter-spacing: 1px;
        text-transform: uppercase;
        padding: 4px 0;
    }
    .ma-kal-wochentag.we { color: var(--accent-red-light); opacity: 0.8; }

    .ma-kal-grid {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 4px;
    }

    .ma-kal-tag {
        position: relative;
        min-height: 56px;
        background: var(--bg-card);
        border: 1px solid var(--border-color);

        overflow: hidden;
        display: flex;
        flex-direction: column;

    .ma-kal-tag.ausserhalb {
        opacity: 0.3;

    }
    .ma-kal-tag.wochenende {
        background: rgba(230,53,53,0.06);
    }
    .ma-kal-tag.heute {
        border: 2px solid var(--accent-red);
        box-shadow: 0 0 0 1px rgba(230,53,53,0.3);
    }

    .ma-kal-tag-nummer {

        font-weight: 600;
        color: var(--text-primary);

    .ma-kal-tag.wochenende .ma-kal-tag-nummer { color: var(--accent-red-light); }
    .ma-kal-tag.heute .ma-kal-tag-nummer { color: #fff; }

    .ma-kal-tag-glyph {
        position: absolute;
        top: 3px; right: 3px;
        width: 18px; height: 18px;
        border-radius: 50%;
        font-size: 11px;
        font-weight: 700;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-family: 'Oswald', sans-serif;
    }
    .ma-kal-tag-glyph.anwesend { background: var(--success); }
    .ma-kal-tag-glyph.urlaub   { background: var(--accent-blue); }
    .ma-kal-tag-glyph.krank    { background: var(--accent-red); }
    .ma-kal-tag-glyph.frei     { background: var(--text-muted); opacity: 0.6; }

    .ma-kal-balken-container {
        position: absolute;
        bottom: 3px; left: 3px; right: 3px;
        display: flex;
        flex-direction: column;
        gap: 1px;
    }
    .ma-kal-balken {
        height: 3px;
        border-radius: 2px;
    }
    .ma-kal-balken-plus {
        font-family: 'Oswald', sans-serif;
        font-size: 9px;
        color: var(--text-muted);
        text-align: center;
        margin-top: 1px;
    }

    .ma-kal-info-banner {
        margin: 12px 6px 0 6px;
        padding: 10px 14px;
        background: rgba(77,166,255,0.12);
        border: 1px solid rgba(77,166,255,0.3);
        border-radius: var(--radius-md);
        color: var(--text-light);
        font-size: 0.78rem;
        text-align: center;
    }

    .ma-kal-legende {
        margin: 14px 6px 0 6px;
        display: flex;
        flex-wrap: wrap;
        gap: 10px 14px;
        padding: 10px 14px;
        background: var(--bg-card);
        border: 1px solid var(--border-color);
        border-radius: var(--radius-md);
        justify-content: center;
    }
    .ma-kal-legende-item {
        display: flex;
        align-items: center;
        gap: 5px;
        font-size: 0.72rem;
        color: var(--text-light);
    }
    .ma-kal-legende-dot {
        width: 10px; height: 10px; border-radius: 50%;
    }

    /* ═══════════════════════════════════════════════════════════
       ETAPPE 5 · B3 · TAGES-MODAL
       ═══════════════════════════════════════════════════════════ */
    .ma-kal-modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.72);
        z-index: 2000;
        display: flex;
        align-items: flex-end;
        justify-content: center;
        animation: ma-fadeIn 0.18s ease-out;
        padding-bottom: 0;
    }
    @media (min-width: 680px) {
        .ma-kal-modal-overlay { align-items: center; padding-bottom: 0; }
    }

    .ma-kal-modal {
        width: 100%;
        max-width: 520px;
        max-height: 92vh;
        background: var(--bg-secondary);
        border: 1px solid var(--border-color);
        border-radius: var(--radius-md) var(--radius-md) 0 0;
        box-shadow: 0 -10px 40px rgba(0,0,0,0.6);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        animation: ma-slideUp 0.22s ease-out;
    }
    @media (min-width: 680px) {
        .ma-kal-modal { border-radius: var(--radius-md); }
    }

    @keyframes ma-slideUp {
        from { transform: translateY(100%); }
        to   { transform: translateY(0); }
    }

    .ma-kal-modal-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 16px;
        border-bottom: 1px solid var(--border-color);
        background: var(--bg-card);
    }
    .ma-kal-modal-datum {
        font-family: 'Oswald', sans-serif;
        font-weight: 600;
        font-size: 1.05rem;
        color: var(--text-white);
        letter-spacing: 0.5px;
    }
    .ma-kal-modal-datum .wt { color: var(--accent-red-light); margin-right: 8px; }
    .ma-kal-modal-close {
        background: transparent;
        border: none;
        color: var(--text-light);
        font-size: 26px;
        line-height: 1;
        cursor: pointer;
        width: 36px; height: 36px;
        display: flex; align-items: center; justify-content: center;
    }
    .ma-kal-modal-close:active { color: var(--accent-red); }

    .ma-kal-modal-body {
        padding: 16px;
        overflow-y: auto;
        flex: 1;
    }

    .ma-kal-modal-section {
        margin-bottom: 18px;
    }
    .ma-kal-modal-label {
        display: block;
        font-family: 'Oswald', sans-serif;
        font-size: 0.78rem;
        font-weight: 600;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 8px;
    }

    .ma-kal-status-radios {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 8px;
    }
    .ma-kal-status-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 12px 8px;
        background: var(--bg-card);
        border: 2px solid var(--border-color);
        border-radius: var(--radius-md);
        color: var(--text-primary);
        font-family: 'Oswald', sans-serif;
        font-size: 0.88rem;
        font-weight: 600;
        cursor: pointer;
        min-height: 52px;
        touch-action: manipulation;
    }
    .ma-kal-status-btn:active { transform: scale(0.97); }
    .ma-kal-status-btn .dot {
        width: 14px; height: 14px; border-radius: 50%;
    }
    .ma-kal-status-btn.anwesend .dot { background: var(--success); }
    .ma-kal-status-btn.urlaub   .dot { background: var(--accent-blue); }
    .ma-kal-status-btn.krank    .dot { background: var(--accent-red); }
    .ma-kal-status-btn.frei     .dot { background: var(--text-muted); }
    .ma-kal-status-btn.aktiv {
        border-color: var(--accent-red);
        background: rgba(230,53,53,0.12);
        box-shadow: 0 0 0 1px rgba(230,53,53,0.25) inset;
    }

    .ma-kal-stunden-picker {
        display: flex;
        align-items: center;
        gap: 10px;
    }
    .ma-kal-stunden-btn {
        width: 44px; height: 44px;
        border-radius: 50%;
        background: var(--bg-card);
        border: 1px solid var(--border-color);
        color: var(--text-primary);
        font-size: 22px;
        font-weight: 700;
        font-family: 'Oswald', sans-serif;
        cursor: pointer;
        display: flex; align-items: center; justify-content: center;
        touch-action: manipulation;
    }
    .ma-kal-stunden-btn:active { background: var(--accent-red); color: #fff; }
    .ma-kal-stunden-btn[disabled] { opacity: 0.35; cursor: not-allowed; }
    .ma-kal-stunden-value {
        flex: 1;
        text-align: center;
        font-family: 'Oswald', sans-serif;
        font-size: 1.7rem;
        font-weight: 600;
        color: var(--text-white);
        background: var(--bg-card);
        border: 1px solid var(--border-color);
        border-radius: var(--radius-md);
        padding: 8px 12px;
    }
    .ma-kal-stunden-unit {
        color: var(--text-muted);
        font-size: 0.85rem;
        margin-left: 4px;
    }

    .ma-kal-select {
        width: 100%;
        padding: 12px 14px;
        background: var(--bg-card);
        border: 1px solid var(--border-color);
        border-radius: var(--radius-md);
        color: var(--text-primary);
        font-family: 'Source Sans 3', sans-serif;
        font-size: 1rem;
        cursor: pointer;
    }

    .ma-kal-textarea-wrap {
        position: relative;
    }
    .ma-kal-textarea {
        width: 100%;
        min-height: 90px;
        padding: 12px 48px 12px 14px;
        background: var(--bg-card);
        border: 1px solid var(--border-color);
        border-radius: var(--radius-md);
        color: var(--text-primary);
        font-family: 'Source Sans 3', sans-serif;
        font-size: 0.95rem;
        resize: vertical;
        box-sizing: border-box;
    }
    .ma-kal-mikro-btn {
        position: absolute;
        top: 10px; right: 10px;
        width: 34px; height: 34px;
        border-radius: 50%;
        background: var(--bg-primary);
        border: 1px solid var(--border-color);
        color: var(--text-light);
        cursor: pointer;
        display: flex; align-items: center; justify-content: center;
        font-size: 16px;
    }
    .ma-kal-mikro-btn.aktiv {
        background: var(--accent-red);
        color: #fff;
        border-color: var(--accent-red);
        animation: ma-pulse 1.2s ease-in-out infinite;
    }
    .ma-kal-mikro-btn[disabled] { opacity: 0.35; cursor: not-allowed; }
    @keyframes ma-pulse {
        0%,100% { box-shadow: 0 0 0 0 rgba(230,53,53,0.5); }
        50%     { box-shadow: 0 0 0 8px rgba(230,53,53,0); }
    }

    .ma-kal-modal-toast {
        margin-top: 10px;
        padding: 8px 12px;
        border-radius: var(--radius-sm);
        font-size: 0.85rem;
        text-align: center;
    }
    .ma-kal-modal-toast.ok   { background: rgba(39,174,96,0.15); color: var(--success); border: 1px solid rgba(39,174,96,0.4); }
    .ma-kal-modal-toast.err  { background: rgba(230,53,53,0.15); color: var(--accent-red-light); border: 1px solid rgba(230,53,53,0.4); }
    .ma-kal-modal-toast.info { background: rgba(77,166,255,0.15); color: var(--accent-blue); border: 1px solid rgba(77,166,255,0.4); }

    .ma-kal-modal-footer {
        display: flex;
        gap: 8px;
        padding: 12px 16px;
        border-top: 1px solid var(--border-color);
        background: var(--bg-card);
    }
    .ma-kal-modal-btn {
        flex: 1;
        padding: 14px 10px;
        border: none;
        border-radius: var(--radius-md);
        font-family: 'Oswald', sans-serif;
        font-weight: 600;
        font-size: 0.88rem;
        letter-spacing: 1px;
        text-transform: uppercase;
        cursor: pointer;
        touch-action: manipulation;
    }
    .ma-kal-modal-btn.speichern {
        background: var(--success);
        color: #fff;
        box-shadow: 0 4px 12px rgba(39,174,96,0.25);
    }
    .ma-kal-modal-btn.speichern:active { transform: scale(0.97); }
    .ma-kal-modal-btn.speichern[disabled] { opacity: 0.4; cursor: not-allowed; box-shadow: none; }
    .ma-kal-modal-btn.loeschen {
        background: var(--accent-red);
        color: #fff;
        flex: 0 0 auto;
        padding-left: 18px; padding-right: 18px;
    }
    .ma-kal-modal-btn.loeschen:active { transform: scale(0.97); }
    .ma-kal-modal-btn.abbrechen {
        background: transparent;
        color: var(--text-light);
        border: 1px solid var(--border-color);
    }
    .ma-kal-modal-btn.abbrechen:active { background: var(--bg-primary); }

    /* ═══════════════════════════════════════════════════════════
       ETAPPE 5 · B4 · NACHRICHTEN-MODUL (Chat)
       ═══════════════════════════════════════════════════════════ */

        min-height: calc(100vh - var(--header-h, 64px));
        background: var(--bg-primary);

        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 14px;

        border-bottom: 1px solid var(--border-color);
        position: sticky;
        top: 0;
        z-index: 10;
    }
    .ma-nach-header-icon {
        width: 36px; height: 36px;

        background: var(--accent-red);

        font-size: 18px;
        flex-shrink: 0;

    .ma-nach-header-text {
        flex: 1;
        min-width: 0;
    }
    .ma-nach-header-titel {
        font-family: 'Oswald', sans-serif;

        color: var(--text-white);
        letter-spacing: 0.5px;
        line-height: 1.2;

    .ma-nach-badge {

        font-size: 0.7rem;
        font-weight: 600;
        letter-spacing: 0.5px;
        flex-shrink: 0;
    }

    .ma-nach-thread {
        flex: 1;
        overflow-y: auto;
        padding: 12px 10px 20px 10px;
        display: flex;
        flex-direction: column;
        gap: 6px;
    }

    .ma-nach-trenner {
        align-self: center;
        margin: 10px 0 6px 0;
        padding: 4px 12px;

        border: 1px solid var(--border-color);

    .ma-nach-bubble-row.ma    { justify-content: flex-end; }

        border: 1px solid var(--border-color);

        box-shadow: 0 0 0 2px rgba(230,53,53,0.15);

    .ma-nach-dringend-badge {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        background: var(--accent-red);
        color: #fff;

        font-size: 0.68rem;
        font-weight: 700;
        letter-spacing: 1px;
        margin-bottom: 6px;
    }

    .ma-nach-absender {
        font-family: 'Oswald', sans-serif;
        font-size: 0.7rem;
        font-weight: 600;
        color: var(--accent-red-light);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 2px;
    }
    .ma-nach-bubble.ma .ma-nach-absender { color: rgba(255,255,255,0.85); }

    .ma-nach-text {
        font-size: 0.95rem;
        line-height: 1.4;

    }

        color: var(--text-muted);

    }

        display: inline-block;

        color: var(--text-white);
        margin-bottom: 8px;

        font-size: 0.88rem;
        color: var(--text-light);
        line-height: 1.5;
        max-width: 320px;

        bottom: 0;

    }

    .ma-nach-input-wrap {
        flex: 1;
        position: relative;
        display: flex;
        align-items: flex-end;

</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    /* ═══════════════════════════════════════════════════════════
       FIREBASE-INITIALISIERUNG (Etappe 3)
       Identische Config wie Master-App: Projekt einkaufsliste-98199
       ═══════════════════════════════════════════════════════════ */
    const FIREBASE_CONFIG = {
        apiKey: "AIzaSyBUHOr2dM2H-sUnhNODoVSerM224vPsC_E",
        authDomain: "einkaufsliste-98199.firebaseapp.com",
        databaseURL: "https://einkaufsliste-98199-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "einkaufsliste-98199",
        storageBucket: "einkaufsliste-98199.firebasestorage.app",
        messagingSenderId: "411877213047",
        appId: "1:411877213047:web:f04e3b9b98a8d97120d772"
    };

    let firebaseDB = null;
    let firebaseStatus = 'init';

    try {
        if (typeof firebase !== 'undefined') {
            firebase.initializeApp(FIREBASE_CONFIG);
            firebaseDB = firebase.database();
            firebaseStatus = 'ok';
            console.log('Firebase initialisiert: ' + FIREBASE_CONFIG.projectId);
        } else {
            firebaseStatus = 'fehler';
            console.error('Firebase SDK nicht geladen');
        }
    } catch(e) {
        firebaseStatus = 'fehler';
        console.error('Firebase Init Fehler:', e);
    }

    /* ═══════════════════════════════════════════════════════════
       AUTH-COMPONENTS (Etappe 3 — neu, Schema invitations/+users/)
       Helpers liegen in js/tw-ma-auth.js (window.TWMAAuth)
       ═══════════════════════════════════════════════════════════ */

    // Mini-Logo oben in Auth-Bildschirmen
    function AuthLogo() {
        return (
            <div className="auth-logo-mini"><FirmenLogo size="large"/></div>
        );
    }

    // Wartepunkt-Animation
    function WartenDots() {
        return (
            <span className="auth-warten-dots"><span/><span/><span/></span>
        );
    }

    // SCREEN 1: Code + PIN eingeben
    // Mitarbeiter erhaelt Code+PIN von Thomas (mundlich, WhatsApp oder QR-Code).
    // Beide Felder werden gegen invitations/{code}.pin in Firebase geprueft.
    function ScreenCodeEingabe({ lang, onErfolg, onFehler }) {
        const [code, setCode] = useState('');
        const [pin, setPin] = useState('');
        const [fehler, setFehler] = useState('');
        const [busy, setBusy] = useState(false);
        const codeRef = useRef(null);
        const pinRef = useRef(null);

        useEffect(() => { if (codeRef.current) codeRef.current.focus(); }, []);

        // Code-Format: 6 Zeichen alphanumerisch (siehe _generateInvitationCode in Master)
        // Erlaubte Zeichen: ABCDEFGHJKMNPQRSTUVWXYZ23456789 — also alle Buchstaben
        // ausser I/L/O und alle Ziffern ausser 0/1
        const handleCodeChange = (e) => {
            const v = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g, '').slice(0, 6);
            setCode(v);
            if (v.length === 6 && pinRef.current) pinRef.current.focus();
        };

        const handlePinChange = (e) => {
            const v = e.target.value.replace(/\D/g, '').slice(0, 6);
            setPin(v);
        };

        const handleAnmelden = async () => {
            if (code.length !== 6 || pin.length < 4) return;
            setBusy(true);
            setFehler('');
            try {
                const result = await window.TWMAAuth.einloggen(code, pin, lang);
                onErfolg(result);
            } catch (e) {
                const E = window.TWMAAuth.ERR;
                let msg;
                switch (e.code) {
                    case E.CODE_NOT_FOUND:   msg = t('auth_fehler_code_unbekannt', lang); break;
                    case E.PIN_FALSE:        msg = t('auth_fehler_pin_falsch', lang); break;
                    case E.INVITE_EXPIRED:   msg = t('auth_fehler_abgelaufen', lang); break;
                    case E.INVITE_USED:      msg = t('auth_fehler_verwendet', lang); break;
                    case E.INVITE_REVOKED:   msg = t('auth_fehler_widerrufen', lang); break;
                    case E.FIREBASE_DOWN:    msg = t('auth_fb_fehler', lang); break;
                    default:                 msg = e.message || 'Fehler';
                }
                setFehler(msg);
                setBusy(false);
                onFehler && onFehler(e);
            }
        };

        return (
            <div className="auth-screen">
                <AuthLogo/>
                <div className="auth-titel">{t('auth_titel_anmeldung', lang)}</div>
                <div className="auth-untertitel">{t('auth_text_anmeldung', lang)}</div>

                <div style={{display:'flex', flexDirection:'column', gap:'14px', alignItems:'center', position:'relative', zIndex:1, marginTop:'8px'}}>
                    {/* Code-Feld */}
                    <div style={{display:'flex', flexDirection:'column', alignItems:'center', gap:'4px'}}>
                        <div style={{fontSize:'11px', color:'var(--text-muted)', textTransform:'uppercase', letterSpacing:'2px'}}>
                            {t('auth_code_label', lang)}
                        </div>
                        <input
                            ref={codeRef}
                            type="text"
                            inputMode="text"
                            autoCapitalize="characters"
                            autoComplete="off"
                            spellCheck="false"
                            maxLength={6}
                            value={code}
                            onChange={handleCodeChange}
                            placeholder="ABC123"
                            style={{
                                width:'260px', height:'60px', textAlign:'center',
                                background:'var(--bg-secondary)',
                                border: fehler ? '2px solid var(--accent-red)' : '2px solid var(--border-color)',
                                borderRadius:'var(--radius-md)', color:'var(--text-white)',
                                fontFamily:'Courier New, monospace', fontSize:'28px', fontWeight:'700',
                                letterSpacing:'6px', outline:'none', textTransform:'uppercase'
                            }}
                        />
                    </div>

                    {/* PIN-Feld */}
                    <div style={{display:'flex', flexDirection:'column', alignItems:'center', gap:'4px'}}>
                        <div style={{fontSize:'11px', color:'var(--text-muted)', textTransform:'uppercase', letterSpacing:'2px'}}>
                            {t('auth_pin_label', lang)}
                        </div>
                        <input
                            ref={pinRef}
                            type="password"
                            inputMode="numeric"
                            autoComplete="off"
                            maxLength={6}
                            value={pin}
                            onChange={handlePinChange}
                            onKeyDown={e => { if (e.key === 'Enter') handleAnmelden(); }}
                            placeholder="••••"
                            style={{
                                width:'260px', height:'60px', textAlign:'center',
                                background:'var(--bg-secondary)',
                                border: fehler ? '2px solid var(--accent-red)' : '2px solid var(--border-color)',
                                borderRadius:'var(--radius-md)', color:'var(--text-white)',
                                fontFamily:'Oswald, sans-serif', fontSize:'28px', fontWeight:'600',
                                letterSpacing:'10px', outline:'none'
                            }}
                        />
                    </div>
                </div>

                {fehler && <div className="auth-fehler">{fehler}</div>}

                <button className="auth-action-btn"
                        disabled={busy || code.length !== 6 || pin.length < 4}
                        onClick={handleAnmelden}>
                    {busy ? '...' : t('auth_anmelden', lang)}
                </button>

                <div className="auth-info-box">
                    <strong>{t('auth_hinweis_titel', lang)}</strong> {t('auth_hinweis_text', lang)}
                </div>
            </div>
        );
    }

    // SCREEN 2: Warten auf Freigabe durch Thomas
    // Wird gezeigt nach erfolgreichem Code+PIN, solange users/{uid}/approved=false.
    // Persistiert via LocalStorage — beim erneuten App-Start direkt hierher springen.
    function ScreenWarteAufFreigabe({ lang, name, onAbbrechen }) {
        return (
            <div className="auth-screen">
                <AuthLogo/>
                <div className="auth-titel">{t('auth_warte_titel', lang)}</div>
                <div className="auth-untertitel">
                    {t('auth_warte_hallo', lang)} <strong style={{color:'var(--accent-blue)'}}>{name}</strong>!
                    <br/>
                    {t('auth_warte_text', lang)}
                </div>

                <div className="auth-warten" style={{marginTop:'24px'}}>
                    <WartenDots/>
                    <span>{t('auth_warten', lang)}</span>
                </div>

                <div className="auth-info-box" style={{marginTop:'24px'}}>
                    {t('auth_warte_info', lang)}
                </div>

                {/* Notausgang: erneut anmelden (z.B. falscher Code erwischt) */}
                <button
                    onClick={onAbbrechen}
                    style={{
                        marginTop:'16px',
                        background:'transparent',
                        border:'1px solid var(--border-color)',
                        color:'var(--text-muted)',
                        padding:'10px 20px',
                        borderRadius:'var(--radius-sm)',
                        fontFamily:'Oswald, sans-serif',
                        fontSize:'12px',
                        textTransform:'uppercase',
                        letterSpacing:'1px',
                        cursor:'pointer'
                    }}>
                    {t('auth_neu_anmelden', lang)}
                </button>
            </div>
        );
    }

    // SCREEN 4: Wipe-Bildschirm (kurz, dann Reload)
    function ScreenWipe({ lang }) {
        return (
            <div className="auth-screen">
                <AuthLogo/>
                <div className="auth-titel" style={{color:'var(--accent-red-light)'}}>!</div>
                <div className="auth-untertitel">{t('auth_gewipt', lang)}</div>
                <div className="auth-warten">
                    <WartenDots/>
                </div>
            </div>
        );
    }

    // Firebase-Status-Indikator (oben rechts in Auth-Screens)
    function FirebaseStatus({ status }) {
        const txt = status === 'ok' ? 'Server ✓' : status === 'fehler' ? 'Offline' : 'Verbinde...';
        return (
            <div className="auth-firebase-status">
                <span className={'dot ' + (status === 'ok' ? 'ok' : 'fehler')}/>
                <span>{txt}</span>
            </div>
        );
    }

    /* ═══════════════════════════════════════════════════════════
       AUTH-CONTAINER — Top-Level State Machine (neu, Schema invitations/+users/)
       Stati: 'pruefen' | 'code-eingabe' | 'wartet' | 'app' | 'wipe'
       ═══════════════════════════════════════════════════════════ */
    function AuthContainer({ lang }) {
        const [authState, setAuthState] = useState('pruefen');
        const [uid, setUid] = useState(null);
        const [name, setName] = useState('');
        const approvedListenerRef = useRef(null);

        // ── Initial-Check beim App-Start ──
        useEffect(() => {
            const stand = window.TWMAAuth.ladeGespeichertenStand();

            if (!stand) {
                // Komplett neuer User -> Code+PIN-Eingabe
                setAuthState('code-eingabe');
                return;
            }

            // Stand vorhanden: 'wartet' oder 'aktiv'
            setUid(stand.uid);
            setName(stand.name);

            if (stand.status === 'aktiv') {
                // Anonymous-Auth-Token persistiert ueber Sessions hinweg.
                // Der bereits eingeloggte User springt direkt in die App.
                // Listener trotzdem starten — Thomas koennte zwischenzeitlich gesperrt haben.
                setAuthState('app');
                starteApprovedListener(stand.uid);
            } else {
                // 'wartet' -> Wartebildschirm wieder zeigen, weiter horchen
                setAuthState('wartet');
                starteApprovedListener(stand.uid);
            }
        }, []);

        // Cleanup beim Unmount
        useEffect(() => {
            return () => {
                if (approvedListenerRef.current) {
                    approvedListenerRef.current();
                    approvedListenerRef.current = null;
                }
            };
        }, []);

        function starteApprovedListener(userUid) {
            // Bestehenden Listener abbauen
            if (approvedListenerRef.current) {
                approvedListenerRef.current();
                approvedListenerRef.current = null;
            }
            const unsub = window.TWMAAuth.horcheAufApproved(
                userUid,
                /* onApproved */ function(userData) {
                    console.log('Freigabe erteilt - App entsperrt');
                    if (userData && userData.profile && userData.profile.name) {
                        setName(userData.profile.name);
                    }
                    setAuthState('app');
                },
                /* onLocked */ function(grund) {
                    console.warn('Geraet gesperrt/entfernt:', grund);
                    handleWipe(grund);
                },
                /* onError */ function(err) {
                    console.error('Approved-Listener-Fehler:', err);
                }
            );
            approvedListenerRef.current = unsub;
        }

        // ── Code+PIN erfolgreich eingegeben ──
        function handleAnmeldungErfolg(result) {
            // result = { uid, name, status: 'wartet' }
            setUid(result.uid);
            setName(result.name);
            setAuthState('wartet');
            starteApprovedListener(result.uid);
        }

        function handleAnmeldungFehler(err) {
            // Fehler wird im Code-Eingabe-Screen angezeigt — hier nichts zu tun
        }

        // ── Wipe / Reset ──
        async function handleWipe(grund) {
            console.warn('WIPE: ' + grund);
            setAuthState('wipe');

            // Listener abbauen
            if (approvedListenerRef.current) {
                approvedListenerRef.current();
                approvedListenerRef.current = null;
            }

            // Lokal alles weg + signOut
            try {
                await window.TWMAAuth.wipeNachAnordnung();
            } catch(e) {
                console.warn('Wipe-Fehler:', e);
            }

            // Kurzer visueller Hinweis, dann Reload (App startet bei Code-Eingabe)
            setTimeout(function() {
                window.location.reload();
            }, 2500);
        }

        // ── Notausgang aus Wartebildschirm: erneut anmelden ──
        async function handleNeuAnmelden() {
            // Lokal-Stand verwerfen, signOut, zurueck zur Code-Eingabe
            if (approvedListenerRef.current) {
                approvedListenerRef.current();
                approvedListenerRef.current = null;
            }
            await window.TWMAAuth.logoutLokal();
            setUid(null);
            setName('');
            setAuthState('code-eingabe');
        }

        // ── Frueher Abbruch wenn Firebase nicht erreichbar ──
        if (firebaseStatus === 'fehler' && (authState === 'pruefen' || authState === 'code-eingabe')) {
            return (
                <div className="auth-screen">
                    <AuthLogo/>
                    <div className="auth-titel" style={{color:'var(--accent-red-light)'}}>Server-Fehler</div>
                    <div className="auth-untertitel">{t('auth_fb_fehler', lang)}</div>
                    <button className="auth-action-btn" onClick={() => window.location.reload()}>
                        Neu laden
                    </button>
                </div>
            );
        }

        return (
            <>
                {authState !== 'app' && <FirebaseStatus status={firebaseStatus}/>}

                {authState === 'pruefen' && (
                    <div className="auth-screen">
                        <AuthLogo/>
                        <div className="auth-warten"><WartenDots/></div>
                    </div>
                )}

                {authState === 'code-eingabe' && (
                    <ScreenCodeEingabe
                        lang={lang}
                        onErfolg={handleAnmeldungErfolg}
                        onFehler={handleAnmeldungFehler}/>
                )}

                {authState === 'wartet' && (
                    <ScreenWarteAufFreigabe
                        lang={lang}
                        name={name}
                        onAbbrechen={handleNeuAnmelden}/>
                )}

                {authState === 'wipe' && <ScreenWipe lang={lang}/>}

                {authState === 'app' && <MainApp lang={lang}/>}
            </>
        );

    function UhrBlock({ lang }) {
        const [currentTime, setCurrentTime] = useState(new Date());

        useEffect(() => {
            const t = setInterval(() => setCurrentTime(new Date()), 1000);
            return () => clearInterval(t);
        }, []);

        // Sprach-spezifische Wochentage und Monate
        const tageMap = {
            de: ['Sonntag','Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'],
            cs: ['Nedele','Pondeli','Utery','Streda','Ctvrtek','Patek','Sobota'],

            pl: ['Niedziela','Poniedzialek','Wtorek','Sroda','Czwartek','Piatek','Sobota'],
            en: ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'],
            ro: ['Duminica','Luni','Marti','Miercuri','Joi','Vineri','Sambata'],

        };
        const monateMap = {
            de: ['Januar','Februar','M\u00e4rz','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'],
            cs: ['Leden','Unor','Brezen','Duben','Kveten','Cerven','Cervenec','Srpen','Zari','Rijen','Listopad','Prosinec'],
            sk: ['Januar','Februar','Marec','April','Maj','Jun','Jul','August','September','Oktober','November','December'],
            pl: ['Styczen','Luty','Marzec','Kwiecien','Maj','Czerwiec','Lipiec','Sierpien','Wrzesien','Pazdziernik','Listopad','Grudzien'],
            en: ['January','February','March','April','May','June','July','August','September','October','November','December'],
            ro: ['Ianuarie','Februarie','Martie','Aprilie','Mai','Iunie','Iulie','August','Septembrie','Octombrie','Noiembrie','Decembrie'],
            uk: ['Sichen','Lyutyi','Berezen','Kviten','Traven','Cherven','Lypen','Serpen','Veresen','Zhovten','Lystopad','Hruden']
        };
        const tage = tageMap[lang] || tageMap.de;
        const monate = monateMap[lang] || monateMap.de;

        const tag = tage[currentTime.getDay()];

    function tConfig(key, repl) {

            return (window.TWMaConfig && window.TWMaConfig.getCurrentLanguage())

        useEffect(function(){

            window.addEventListener('tw-ma-lang-changed', handler);
            return function(){ window.removeEventListener('tw-ma-lang-changed', handler); };
        }, []);
        return langInner;

// ============================================================
// TW Baustellen-App - Modul: Baustellen (Etappe 4b - Vollausbau)
// ============================================================
// Container-Komponente fuer den Baustellen-Bereich.
//
// Interne Navigation (eigener State, unabhaengig vom Top-Level-Tab):
//   liste     - Kunden-Liste (was das Buero freigegeben hat)
//   detail    - Eine Baustelle gewaehlt, zeigt 5 Sub-Kacheln
//   browser   - Eine Sub-Kachel offen - je nach Kachel-Typ:
//                 Zeichnungen / Anweisungen -> Drive-Browser
//                 Baustellendaten           -> strukturierte Felder-Ansicht
//                 Fotos / Stunden           -> Stub-Ansicht bis Etappe 6/7
//
// Etappe 4b: Drive-Browser + Baustellendaten implementiert,
//            Fotos + Stunden bleiben explizite Stubs.
// ============================================================

function MABaustellenModul({ wechseleZuTab }) {
    const lang = useSprache();

    // View-State (innerhalb dieses Moduls)
    const [view, setView]                   = useState('liste');
    const [aktiveBaustelle, setAktive]      = useState(null);
    const [aktiveKachel, setAktiveKachel]   = useState(null);

    function zurueckZuStart() { wechseleZuTab('start'); }
    function zurueckZuListe() { setView('liste');  setAktive(null); setAktiveKachel(null); }
    function zurueckZuDetail(){ setView('detail'); setAktiveKachel(null); }

    function wechseleZuDetail(baustelle) {
        setAktive(baustelle);
        setView('detail');
    }

    function wechseleZuBrowser(kachel) {
        setAktiveKachel(kachel);
        setView('browser');
    }

    if (view === 'detail' && aktiveBaustelle) {
        return (
            <MABaustelleDetail
                baustelle={aktiveBaustelle}
                onZurueck={zurueckZuListe}
                onKachelClick={wechseleZuBrowser}/>
        );
    }

    if (view === 'browser' && aktiveBaustelle && aktiveKachel) {
        return (
            <MAKachelRouter
                baustelle={aktiveBaustelle}
                kachel={aktiveKachel}
                onZurueck={zurueckZuDetail}/>
        );
    }

    return (
        <MABaustellenListe
            onZurueck={zurueckZuStart}
            onSelect={wechseleZuDetail}/>
    );
}

function MABaustellenListe({ onZurueck, onSelect }) {
    const lang = useSprache();
    const [baustellen, setBaustellen] = useState(null); // null = laedt, [] = leer
    const [fehler, setFehler]         = useState('');

    useEffect(function(){
        if (!window.TWMaFirebase || !window.TWMaFirebase.subscribeAktiveBaustellen) {
            setBaustellen([]);
            return;
        }
        // Live-Subscription: Liste aktualisiert sich, wenn das Buero eine neue
        // Baustelle freigibt oder eine Baustelle den Status wechselt.
        const unsub = window.TWMaFirebase.subscribeAktiveBaustellen(function(liste){
            setBaustellen(liste || []);
            setFehler('');
        });
        return unsub;
    }, []);

    return (
        <div className="ma-bau-container" style={maContainerStyle}>
            <MASubHeader
                titel={tConfig('baustellen.titel')}
                onZurueck={onZurueck}/>

            <div style={{padding:'16px', maxWidth:620, margin:'0 auto', width:'100%'}}>
                {baustellen === null ? (
                    <div style={maSpinnerContainerStyle}>
                        <div style={maSpinnerStyle}></div>
                        <div style={{marginTop:12, color:'#666', fontSize:'0.9rem'}}>
                            {tConfig('baustellen.warte')}
                        </div>
                    </div>
                ) : baustellen.length === 0 ? (
                    <div style={maEmptyStateStyle}>
                        <div style={{fontSize:'3rem', marginBottom:8, opacity:0.4}}>{'\u{1F3D7}\uFE0F'}</div>
                        <div style={{color:'#666', fontSize:'0.95rem', lineHeight:1.5, maxWidth:320}}>

function MAKachelRouter({ baustelle, kachel, onZurueck }) {
    if (kachel.id === 'baustellendaten') {
        return <MABaustellendatenView baustelle={baustelle} kachel={kachel} onZurueck={onZurueck}/>;
    }
    if (kachel.id === 'fotos') {
        return <MAFotosView baustelle={baustelle} kachel={kachel} onZurueck={onZurueck}/>;
    }
    if (kachel.id === 'stunden') {
        return (
            <MAStubView
                baustelle={baustelle} kachel={kachel} onZurueck={onZurueck}
                emoji={'\u{23F1}\uFE0F'}
                titel={tConfig('stub.stunden.titel')}
                text={tConfig('stub.stunden.text')}/>

    // Default: Zeichnungen + Anweisungen -> echter Drive-Browser
    return <MABaustelleBrowser baustelle={baustelle} kachel={kachel} onZurueck={onZurueck}/>;
}

// ============================================================
// Sub-View: Drive-Browser (Zeichnungen + Anweisungen)
// ============================================================
//
// Status-Maschine:
//   lade              - Initial-Listing laeuft
//   ok                - Eintraege geladen (auch [] = leerer Ordner)
//   keinApiKey        - DRIVE_CONFIG.apiKey nicht gesetzt
//   nichtKonfig       - baustelle.staging_folder_id fehlt
//   unterordnerFehlt  - Root existiert, aber Unterordner (z.B. "Zeichnungen") fehlt
//   fehler            - HTTP-Fehler
//
// pfadStack: Array<{folderId, name}>
//   - Index 0 = Wurzel (die Sub-Kachel, z.B. "Zeichnungen")
//   - jeder weitere Eintrag = Ordner tiefer geklickt
// ============================================================

function MABaustelleBrowser({ baustelle, kachel, onZurueck }) {
    const lang = useSprache();
    const [status, setStatus]         = useState('lade');
    const [eintraege, setEintraege]   = useState([]);
    const [fehler, setFehler]         = useState('');
    const [pfadStack, setPfadStack]   = useState([]);
    const [vorschau, setVorschau]     = useState(null); // {type:'bild'|'pdf', file}

    function ladeWurzel() {
        setStatus('lade');
        setFehler('');
        const ds = window.TWMaDriveService;
        if (!ds || !ds.listKachelFolder) {
            setStatus('fehler');
            setFehler('DriveService nicht geladen');
            return;
        }
        ds.listKachelFolder(baustelle, kachel.id).then(function(res){
            if (res.kind === 'ok') {
                setEintraege(res.eintraege || []);
                setPfadStack([{ folderId: res.folderId, name: kachel.label }]);
                setStatus('ok');
            } else if (res.kind === 'keinApiKey') {
                setStatus('keinApiKey');
            } else if (res.kind === 'nichtKonfig') {
                setStatus('nichtKonfig');
            } else if (res.kind === 'unterordnerFehlt') {
                setStatus('unterordnerFehlt');
                setFehler(res.missingName || kachel.label);
            } else {
                setStatus('fehler');
                setFehler((res.fehler && res.fehler.message) || 'Unbekannter Fehler');
            }
        }).catch(function(err){
            setStatus('fehler');
            setFehler((err && err.message) || String(err));
        });
    }

    useEffect(ladeWurzel, [baustelle && baustelle.id, kachel && kachel.id]);

    function oeffneUnterordner(folder) {
        setStatus('lade');
        setFehler('');
        window.TWMaDriveService.listFolder(folder.id).then(function(entries){
            setEintraege(entries);
            setPfadStack(function(prev){
                return prev.concat([{ folderId: folder.id, name: folder.name }]);
            });
            setStatus('ok');
        }).catch(function(err){
            setStatus('fehler');
            setFehler((err && err.message) || String(err));
        });
    }

    function springeZuBreadcrumb(index) {
        // Alles ab index+1 verwerfen, dann das Listing des Ziels neu laden
        const ziel = pfadStack[index];
        if (!ziel) return;
        setStatus('lade');
        setFehler('');
        window.TWMaDriveService.listFolder(ziel.folderId).then(function(entries){
            setEintraege(entries);
            setPfadStack(pfadStack.slice(0, index + 1));
            setStatus('ok');
        }).catch(function(err){
            setStatus('fehler');
            setFehler((err && err.message) || String(err));
        });
    }

    function eineEbeneHoch() {
        if (pfadStack.length <= 1) {
            // Schon auf Wurzel-Ebene -> zurueck zum Baustellen-Detail
            onZurueck();
            return;
        }
        springeZuBreadcrumb(pfadStack.length - 2);
    }

    function aktualisieren() {
        // Cache leeren und aktuellen Ordner neu laden
        if (window.TWMaDriveService && window.TWMaDriveService.clearCache) {
            window.TWMaDriveService.clearCache();
        }
        if (pfadStack.length === 0) {
            ladeWurzel();
        } else {
            springeZuBreadcrumb(pfadStack.length - 1);
        }
    }

    function klickAufEintrag(eintrag) {
        if (eintrag.isFolder) {
            oeffneUnterordner(eintrag);
            return;
        }
        if (eintrag.isImage) {
            setVorschau({ type: 'bild', file: eintrag });
            return;
        }
        if (eintrag.isPdf) {
            setVorschau({ type: 'pdf', file: eintrag });
            return;
        }
        // Office / sonstiges: in neuem Tab auf Drive oeffnen
        const url = window.TWMaDriveService.getViewUrl(eintrag.id);
        window.open(url, '_blank', 'noopener');
    }

    // Header-Titel = Kachel-Label + aktueller Ordnername (falls tiefer)
    const headerTitel = pfadStack.length > 1
        ? (pfadStack[pfadStack.length-1].name + ' \u00B7 ' + (baustelle.name || baustelle.id))
        : (kachel.label + ' \u00B7 ' + (baustelle.name || baustelle.id));

    return (
        <div className="ma-bau-container" style={maContainerStyle}>
            <MASubHeader titel={headerTitel} onZurueck={eineEbeneHoch}/>

            {/* Breadcrumb + Refresh-Leiste (nur wenn Daten geladen) */}
            {status === 'ok' && pfadStack.length > 0 ? (
                <MABrowserToolbar
                    pfadStack={pfadStack}
                    onBreadcrumbClick={springeZuBreadcrumb}
                    onAktualisieren={aktualisieren}
                    anzahl={eintraege.length}/>
            ) : null}

            <div style={{
                padding:'12px 16px 32px',
                maxWidth:720, margin:'0 auto', width:'100%',
                flex:1
            }}>
                {status === 'lade' ? (
                    <div style={maSpinnerContainerStyle}>
                        <div style={maSpinnerStyle}></div>
                        <div style={{marginTop:12, color:'#666', fontSize:'0.9rem'}}>
                            {tConfig('browser.laden')}
                        </div>
                    </div>
                ) : status === 'keinApiKey' ? (
                    <MABrowserHinweis
                        emoji={'\u{1F511}'}
                        titel={tConfig('browser.keinApiKey')}
                        farbe="#F9A825"/>
                ) : status === 'nichtKonfig' ? (
                    <MABrowserHinweis
                        emoji={'\u{1F527}'}
                        titel={tConfig('browser.nichtKonfig')}
                        farbe="#455A64"/>
                ) : status === 'unterordnerFehlt' ? (
                    <MABrowserHinweis
                        emoji={'\u{1F4C2}'}
                        titel={tConfig('browser.unterordnerFehlt', { name: fehler || kachel.label })}
                        farbe="#455A64"/>
                ) : status === 'fehler' ? (
                    <MABrowserHinweis
                        emoji={'\u{26A0}\uFE0F'}
                        titel={tConfig('browser.fehler')}
                        farbe="#C62828"
                        detail={fehler}/>
                ) : eintraege.length === 0 ? (
                    <MABrowserHinweis
                        emoji={'\u{1F4ED}'}
                        titel={tConfig('browser.leer')}
                        farbe="#9E9E9E"/>
                ) : (
                    <MADateiListe
                        eintraege={eintraege}
                        onClick={klickAufEintrag}/>
                )}
            </div>

            {/* Vorschau-Overlays */}
            {vorschau && vorschau.type === 'bild' ? (
                <MABildLightbox
                    datei={vorschau.file}
                    onClose={function(){ setVorschau(null); }}/>
            ) : null}
            {vorschau && vorschau.type === 'pdf' ? (
                <MAPdfViewer
                    datei={vorschau.file}
                    onClose={function(){ setVorschau(null); }}/>
            ) : null}
        </div>
    );
}

                display:'flex', alignItems:'center', gap:12,
                padding:'10px 12px',

// Datenquelle: baustelle.baustellendaten (Objekt aus /aktive_baustellen/{id}/)
// Erwartete Felder (alle optional):
//   bauherr, bauherr_tel, bauherr_mail, architekt, architekt_tel,
//   bauleitung, bauleitung_tel, ansprechpartner, ansprechpartner_tel,
//   hausmeister, hausmeister_tel, zugangsinfo,
//   strom_verfuegbar (bool), wasser_verfuegbar (bool),
//   start_datum, end_datum, besonderheiten
//
// Neben baustellendaten lesen wir auch direkt von baustelle:
//   name, adresse (Top-Level-Felder des aktive_baustellen-Eintrags)
// ============================================================

function MABaustellendatenView({ baustelle, kachel, onZurueck }) {
    const lang = useSprache();
    const bd = baustelle.baustellendaten || {};

    // Pruefen, ob ueberhaupt etwas inhaltliches da ist
    function hatWert(v) {
        if (v === undefined || v === null) return false;
        if (typeof v === 'string') return v.trim().length > 0;
        if (typeof v === 'boolean') return true;
        if (typeof v === 'number') return true;
        return false;
    }
    const bdFelder = ['bauherr','bauherr_tel','bauherr_mail','architekt','architekt_tel',
                      'bauleitung','bauleitung_tel','ansprechpartner','ansprechpartner_tel',
                      'hausmeister','hausmeister_tel','zugangsinfo',
                      'strom_verfuegbar','wasser_verfuegbar',
                      'start_datum','end_datum','besonderheiten'];
    const hatBdDaten = bdFelder.some(function(k){ return hatWert(bd[k]); });
    const hatObjektDaten = hatWert(baustelle.name) || hatWert(baustelle.adresse);

    const titel = kachel.label + ' \u00B7 ' + (baustelle.name || baustelle.id);

    if (!hatBdDaten && !hatObjektDaten) {
        return (
            <div className="ma-bau-container" style={maContainerStyle}>
                <MASubHeader titel={titel} onZurueck={onZurueck}/>
                <MABrowserHinweis
                    emoji={'\u{1F4CB}'}
                    titel={tConfig('bdaten.leer')}
                    farbe="#455A64"/>
            </div>
        );
    }

    return (
        <div className="ma-bau-container" style={maContainerStyle}>
            <MASubHeader titel={titel} onZurueck={onZurueck}/>

            <div style={{padding:'16px', maxWidth:620, margin:'0 auto', width:'100%'}}>
                {/* Gruppe: Objekt */}
                <MABdGruppe titel={tConfig('bdaten.gruppe.objekt')}>
                    <MABdFeld label={tConfig('bdaten.name')}    wert={baustelle.name}/>
                    <MABdFeld label={tConfig('bdaten.adresse')} wert={baustelle.adresse}/>
                </MABdGruppe>

                {/* Gruppe: Bauherr */}
                <MABdGruppe titel={tConfig('bdaten.gruppe.bauherr')}>
                    <MABdFeld label={tConfig('bdaten.bauherr')}      wert={bd.bauherr}/>
                    <MABdFeld label={tConfig('bdaten.bauherr_tel')}  wert={bd.bauherr_tel}  tel={bd.bauherr_tel}/>
                    <MABdFeld label={tConfig('bdaten.bauherr_mail')} wert={bd.bauherr_mail} mail={bd.bauherr_mail}/>
                </MABdGruppe>

                {/* Gruppe: Beteiligte */}
                <MABdGruppe titel={tConfig('bdaten.gruppe.beteiligte')}>
                    <MABdFeld label={tConfig('bdaten.architekt')}          wert={bd.architekt}/>
                    <MABdFeld label={tConfig('bdaten.architekt_tel')}      wert={bd.architekt_tel}      tel={bd.architekt_tel}/>
                    <MABdFeld label={tConfig('bdaten.bauleitung')}         wert={bd.bauleitung}/>
                    <MABdFeld label={tConfig('bdaten.bauleitung_tel')}     wert={bd.bauleitung_tel}     tel={bd.bauleitung_tel}/>
                    <MABdFeld label={tConfig('bdaten.ansprechpartner')}    wert={bd.ansprechpartner}/>
                    <MABdFeld label={tConfig('bdaten.ansprechpartner_tel')} wert={bd.ansprechpartner_tel} tel={bd.ansprechpartner_tel}/>
                </MABdGruppe>

                {/* Gruppe: Zugang */}
                <MABdGruppe titel={tConfig('bdaten.gruppe.zugang')}>
                    <MABdFeld label={tConfig('bdaten.hausmeister')}     wert={bd.hausmeister}/>
                    <MABdFeld label={tConfig('bdaten.hausmeister_tel')} wert={bd.hausmeister_tel} tel={bd.hausmeister_tel}/>
                    <MABdFeld label={tConfig('bdaten.zugangsinfo')}     wert={bd.zugangsinfo}/>
                </MABdGruppe>

                {/* Gruppe: Technik */}
                <MABdGruppe titel={tConfig('bdaten.gruppe.technik')}>
                    <MABdFeld label={tConfig('bdaten.strom')}  wert={formatBool(bd.strom_verfuegbar)}/>
                    <MABdFeld label={tConfig('bdaten.wasser')} wert={formatBool(bd.wasser_verfuegbar)}/>
                </MABdGruppe>

                {/* Gruppe: Zeitraum */}
                <MABdGruppe titel={tConfig('bdaten.gruppe.zeitraum')}>
                    <MABdFeld label={tConfig('bdaten.start')} wert={formatDatum(bd.start_datum)}/>
                    <MABdFeld label={tConfig('bdaten.ende')}  wert={formatDatum(bd.end_datum)}/>
                </MABdGruppe>

                {/* Gruppe: Besonderheiten */}
                <MABdGruppe titel={tConfig('bdaten.gruppe.besonderheiten')}>
                    <MABdFeld label={''} wert={bd.besonderheiten} mehrzeilig={true}/>
                </MABdGruppe>
            </div>
        </div>
    );
}

function formatBool(v) {
    if (v === true)  return tConfig('bdaten.ja');
    if (v === false) return tConfig('bdaten.nein');
    return '';
}

function formatDatum(v) {
    if (!v) return '';
    // Erlaubt: ISO "2026-05-01", Unix-ms, oder schon fertig formatiert
    try {
        if (typeof v === 'number') {
            const d = new Date(v);
            if (!isNaN(d.getTime())) {
                const pad = function(x){ return x < 10 ? '0'+x : ''+x; };
                return pad(d.getDate()) + '.' + pad(d.getMonth()+1) + '.' + d.getFullYear();
            }
        }
        if (typeof v === 'string' && /^\d{4}-\d{2}-\d{2}/.test(v)) {
            const parts = v.substring(0, 10).split('-');
            return parts[2] + '.' + parts[1] + '.' + parts[0];
        }
    } catch(e) { /* fallthrough */ }
    return String(v);
}

function MABdGruppe({ titel, children }) {
    // Wenn alle Kinder leer sind, blende die ganze Gruppe aus.
    // Trick: wir rendern die Kinder in einem Container und pruefen per Filter.
    const kinder = React.Children.toArray(children);
    const sichtbare = kinder.filter(function(c){
        // Feld ist nicht-leer, wenn es einen wert-Wert hat (props.wert truthy)
        return c && c.props && (c.props.wert || c.props.wert === 0 || c.props.wert === tConfig('bdaten.nein'));
    });
    if (sichtbare.length === 0) return null;

    return (
        <div style={{
            marginBottom:16,
            background:'#fff',
            border:'1px solid #E0E0E0',
            borderRadius:12,
            overflow:'hidden'
        }}>
            {titel ? (
                <div style={{
                    padding:'10px 14px',
                    background:'#F5F7FA',
                    borderBottom:'1px solid #EEE',
                    fontFamily:'var(--font-headline, Oswald)',
                    fontSize:'0.85rem',
                    fontWeight:600,
                    color:'#455A64',
                    textTransform:'uppercase',
                    letterSpacing:'0.03em'
                }}>
                    {titel}
                </div>
            ) : null}
            <div style={{padding:'4px 0'}}>
                {sichtbare}
            </div>
        </div>
    );
}
