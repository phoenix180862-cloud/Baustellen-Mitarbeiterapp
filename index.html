<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TW Baustellen-App</title>

    <!-- ===== PWA Meta ===== -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a1019">
    <meta name="description" content="Baustellen-App von Thomas Willwacher Fliesenlegermeister e.K.">

    <!-- iOS-spezifisch -->
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="TW Baustelle">

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
    <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">

    <!-- ===== Fonts (Master-App-Optik: Oswald + Source Sans 3) ===== -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">

    <!-- ===== React + Babel (CDN) ===== -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- ===== Globaler Error-Handler ===== -->
    <script>
    window.onerror = function(msg, url, line, col, err) {
        console.error('App Error:', msg, 'Line:', line, err);
        var d = document.getElementById('crash-info');
        if (!d) {
            d = document.createElement('div');
            d.id = 'crash-info';
            d.style.cssText = 'position:fixed;top:20px;left:20px;right:20px;padding:20px;background:#1a2638;color:#ff4757;border:2px solid #c41e1e;border-radius:14px;z-index:99999;font-family:monospace;font-size:13px;max-height:80vh;overflow:auto;';
            document.body.appendChild(d);
        }
        d.innerHTML = '<b>Fehler:</b> ' + msg + '<br><b>Zeile:</b> ' + line +
            '<br><button onclick="this.parentNode.remove()" style="margin-top:10px;padding:8px 16px;background:#1E88E5;color:#fff;border:none;border-radius:8px;cursor:pointer;font-weight:bold">Schliessen</button>';
    };
    </script>

    <!-- ===== Service-Worker-Registrierung ===== -->
    <script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
            navigator.serviceWorker.register('service-worker.js')
                .then(function(reg) { console.log('SW registriert:', reg.scope); })
                .catch(function(err) { console.warn('SW Fehler:', err); });
        });
    }
    </script>

    <style>
    /* ═══════════════════════════════════════════════════════════
       TW BAUSTELLEN-APP — Etappe 1 — Master-App-Optik
       ═══════════════════════════════════════════════════════════ */

    :root {
        /* Hintergrund-Farben */
        --bg-primary: #0a1019;
        --bg-secondary: #141e2e;
        --bg-card: #1a2638;
        /* Text-Farben */
        --text-white: #ffffff;
        --text-primary: #e8ecf2;
        --text-light: #b0bcc8;
        --text-muted: #8896a8;
        /* Akzent-Farben */
        --accent-blue: #1E88E5;
        --accent-blue-dark: #1565C0;
        --accent-orange: #e67e22;
        --accent-red: #c41e1e;
        --accent-red-light: #ff4757;
        --success: #27ae60;
        --warning: #f39c12;
        /* Strukturen */
        --border-color: rgba(255,255,255,0.08);
        --radius-sm: 6px;
        --radius-md: 10px;
        --radius-lg: 14px;
        --radius-xl: 20px;
        /* Schriften */
        --font-display: 'Oswald', sans-serif;
        --font-body: 'Source Sans 3', sans-serif;
        /* Schriftgrösse-Toggle */
        --font-scale: 1;
        /* Safe-Area iOS */
        --safe-top: env(safe-area-inset-top, 0px);
        --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
        width: 100%;
        overflow-x: hidden;
    }

    body {
        font-family: var(--font-body);
        background: var(--bg-primary);
        color: var(--text-primary);
        min-height: 100vh;
        font-size: calc(15px * var(--font-scale));
        -webkit-font-smoothing: antialiased;
        -webkit-tap-highlight-color: transparent;
    }

    /* ── Atmosphärischer Hintergrund-Glow (subtil) ── */
    body::before {
        content: '';
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background:
            radial-gradient(circle at 20% 0%, rgba(30,136,229,0.08), transparent 50%),
            radial-gradient(circle at 80% 100%, rgba(230,126,34,0.04), transparent 50%);
        pointer-events: none;
        z-index: 0;
    }

    #root {
        position: relative;
        z-index: 1;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
    }

    /* ── Scrollbar (dezent) ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg-primary); }
    ::-webkit-scrollbar-thumb { background: var(--bg-card); border-radius: 3px; }

    /* ═══════════════════════════════════════════════════════════
       HEADER-LEISTE (oben, fest)
       ═══════════════════════════════════════════════════════════ */
    .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: calc(8px + var(--safe-top)) 12px 8px;
        background: linear-gradient(180deg, var(--bg-secondary) 0%, var(--bg-primary) 100%);
        border-bottom: 1px solid var(--border-color);
        position: sticky;
        top: 0;
        z-index: 100;
    }

    .topbar-nav {
        display: flex;
        gap: 6px;
    }

    .topbar-btn {
        width: 36px;
        height: 36px;
        background: rgba(196,30,30,0.15);
        border: 1px solid rgba(196,30,30,0.4);
        color: var(--accent-red-light);
        border-radius: var(--radius-sm);
        font-size: 16px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s;
    }

    .topbar-btn:hover, .topbar-btn:active {
        background: rgba(196,30,30,0.3);
        transform: scale(0.97);
    }

    .topbar-title {
        font-family: var(--font-display);
        font-size: calc(15px * var(--font-scale));
        font-weight: 600;
        letter-spacing: 1.5px;
        color: var(--text-white);
        text-transform: uppercase;
    }

    .topbar-actions {
        display: flex;
        gap: 4px;
    }

    .topbar-action {
        height: 36px;
        padding: 0 10px;
        background: var(--bg-card);
        border: 1px solid var(--border-color);
        color: var(--text-light);
        border-radius: var(--radius-sm);
        font-family: var(--font-display);
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 3px;
    }

    .topbar-action.active {
        background: var(--accent-blue);
        color: var(--text-white);
    }

    /* ═══════════════════════════════════════════════════════════
       MODUL-NAVIGATION (6 Buttons, 3x2-Grid auf Handy)
       ═══════════════════════════════════════════════════════════ */
    .module-nav {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 6px;
        padding: 8px 12px;
        background: var(--bg-secondary);
        border-bottom: 1px solid var(--border-color);
    }

    .module-btn {
        background: linear-gradient(135deg, #1E88E5, #1565C0);
        box-shadow: 0 4px 12px rgba(30,136,229,0.20);
        border: none;
        color: var(--text-white);
        border-radius: var(--radius-md);
        padding: 8px 4px;
        font-family: var(--font-display);
        font-size: calc(11px * var(--font-scale));
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        cursor: pointer;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        transition: all 0.15s;
        position: relative;
    }

    .module-btn:active {
        transform: scale(0.96);
    }

    .module-btn.active {
        box-shadow: 0 0 0 2px var(--accent-orange), 0 4px 16px rgba(230,126,34,0.40);
    }

    .module-btn svg {
        width: 20px;
        height: 20px;
        stroke-width: 2;
    }

    @media (min-width: 600px) {
        .module-nav {
            grid-template-columns: repeat(6, 1fr);
        }
    }

    /* ═══════════════════════════════════════════════════════════
       HAUPT-INHALT
       ═══════════════════════════════════════════════════════════ */
    .main-content {
        flex: 1;
        padding: 16px 16px calc(16px + var(--safe-bottom));
        display: flex;
        flex-direction: column;
        gap: 14px;
    }

    /* ── Firmen-Header-Block ── */
    .firma-header {
        text-align: center;
        padding: 14px 12px 10px;
    }

    .firmen-logo {
        margin: 0 auto 8px;
        width: 200px;
        max-width: 80vw;
    }

    .firmen-adresse {
        font-size: calc(11px * var(--font-scale));
        color: var(--text-muted);
        letter-spacing: 0.5px;
    }

    .firmen-untertitel {
        margin-top: 6px;
        font-family: var(--font-display);
        font-size: calc(12px * var(--font-scale));
        font-weight: 700;
        color: var(--accent-blue);
        letter-spacing: 2.5px;
        text-transform: uppercase;
    }

    /* ── Premium-Uhr-Block ── */
    .uhr-block {
        background: linear-gradient(135deg, var(--bg-card), var(--bg-secondary));
        border: 1px solid var(--border-color);
        border-radius: var(--radius-lg);
        padding: 16px 12px;
        text-align: center;
        position: relative;
        overflow: hidden;
        box-shadow: 0 6px 24px rgba(0,0,0,0.3);
    }

    .uhr-block::before {
        content: '';
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 50%;
        background: linear-gradient(180deg, rgba(255,255,255,0.04), transparent);
        transform: rotate(-2deg);
        pointer-events: none;
    }

    .uhr-tag {
        font-family: var(--font-display);
        font-size: calc(13px * var(--font-scale));
        font-weight: 600;
        color: var(--accent-orange);
        letter-spacing: 4px;
        text-transform: uppercase;
        margin-bottom: 4px;
    }

    .uhr-zeit {
        font-family: var(--font-display);
        font-size: calc(46px * var(--font-scale));
        font-weight: 500;
        color: var(--text-white);
        letter-spacing: 2px;
        line-height: 1;
        font-variant-numeric: tabular-nums;
    }

    .uhr-doppelpunkt {
        animation: pulse-doppelpunkt 1s ease-in-out infinite;
        color: var(--accent-blue);
    }

    @keyframes pulse-doppelpunkt {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.3; }
    }

    .uhr-datum {
        font-size: calc(13px * var(--font-scale));
        color: var(--text-light);
        margin-top: 6px;
        letter-spacing: 0.5px;
    }

    /* ── Sprach-Auswahl-Pill ── */
    .sprach-pill-wrapper {
        display: flex;
        justify-content: center;
    }

    .sprach-pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 16px;
        background: var(--bg-card);
        border: 1px solid var(--border-color);
        border-radius: 50px;
        color: var(--text-primary);
        font-size: calc(13px * var(--font-scale));
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
    }

    .sprach-pill:hover {
        border-color: var(--accent-blue);
    }

    .sprach-pill .flag {
        font-size: 18px;
    }

    /* ── Bauteam-Animation (CSS-only, vereinfacht) ── */
    .bauteam {
        background: var(--bg-card);
        border: 1px solid var(--border-color);
        border-radius: var(--radius-lg);
        padding: 18px 12px;
        position: relative;
        overflow: hidden;
        min-height: 110px;
    }

    .bauteam-titel {
        font-family: var(--font-display);
        font-size: calc(11px * var(--font-scale));
        color: var(--text-muted);
        letter-spacing: 2px;
        text-transform: uppercase;
        text-align: center;
        margin-bottom: 12px;
    }

    .bauteam-szene {
        display: flex;
        justify-content: space-around;
        align-items: flex-end;
        height: 60px;
        position: relative;
    }

    .bauarbeiter {
        font-size: 32px;
        animation: bauarbeiter-bounce 2s ease-in-out infinite;
        filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
    }

    .bauarbeiter:nth-child(1) { animation-delay: 0s; }
    .bauarbeiter:nth-child(2) { animation-delay: 0.4s; }
    .bauarbeiter:nth-child(3) { animation-delay: 0.8s; }
    .bauarbeiter:nth-child(4) { animation-delay: 1.2s; }

    @keyframes bauarbeiter-bounce {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-8px); }
    }

    .bauteam-boden {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 3px;
        background: linear-gradient(90deg, transparent, var(--accent-orange), transparent);
        opacity: 0.5;
    }

    /* ── Status-Indikator ── */
    .status-leiste {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        padding: 8px 12px;
        font-size: calc(11px * var(--font-scale));
        color: var(--text-muted);
        background: var(--bg-secondary);
        border-radius: var(--radius-md);
        border: 1px solid var(--border-color);
    }

    .status-dot {
        display: inline-block;
        width: 8px;
        height: 8px;
        border-radius: 50%;
    }

    .status-dot.online { background: var(--success); box-shadow: 0 0 8px var(--success); }
    .status-dot.offline { background: var(--text-muted); }

    /* ── Modul-Platzhalter (für Module 2-6) ── */
    .modul-platzhalter {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 40px 20px;
        gap: 16px;
    }

    .modul-platzhalter-icon {
        width: 80px;
        height: 80px;
        background: linear-gradient(135deg, var(--bg-card), var(--bg-secondary));
        border: 2px dashed var(--accent-blue);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--accent-blue);
    }

    .modul-platzhalter-icon svg {
        width: 40px;
        height: 40px;
    }

    .modul-platzhalter-titel {
        font-family: var(--font-display);
        font-size: calc(22px * var(--font-scale));
        font-weight: 600;
        color: var(--text-white);
        text-transform: uppercase;
        letter-spacing: 2px;
    }

    .modul-platzhalter-text {
        font-size: calc(14px * var(--font-scale));
        color: var(--text-light);
        max-width: 300px;
        line-height: 1.5;
    }

    .modul-platzhalter-info {
        margin-top: 16px;
        padding: 12px 18px;
        background: var(--bg-card);
        border-left: 3px solid var(--accent-orange);
        border-radius: var(--radius-sm);
        font-size: calc(12px * var(--font-scale));
        color: var(--text-light);
        max-width: 320px;
        text-align: left;
    }

    /* ═══════════════════════════════════════════════════════════
       MODAL (Sprach-Auswahl)
       ═══════════════════════════════════════════════════════════ */
    .modal-backdrop {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.7);
        backdrop-filter: blur(4px);
        z-index: 1000;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        animation: fade-in 0.2s ease;
    }

    @keyframes fade-in {
        from { opacity: 0; }
        to { opacity: 1; }
    }

    .modal {
        background: var(--bg-card);
        border: 1px solid var(--border-color);
        border-radius: var(--radius-xl);
        padding: 20px;
        max-width: 400px;
        width: 100%;
        max-height: 80vh;
        overflow-y: auto;
        box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .modal-titel {
        font-family: var(--font-display);
        font-size: 18px;
        color: var(--text-white);
        margin-bottom: 16px;
        text-align: center;
        letter-spacing: 1.5px;
        text-transform: uppercase;
    }

    .sprach-liste {
        display: flex;
        flex-direction: column;
        gap: 8px;
    }

    .sprach-option {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 12px 16px;
        background: var(--bg-secondary);
        border: 1px solid var(--border-color);
        border-radius: var(--radius-md);
        cursor: pointer;
        transition: all 0.15s;
        font-size: 15px;
        color: var(--text-primary);
    }

    .sprach-option:hover {
        border-color: var(--accent-blue);
        background: var(--bg-primary);
    }

    .sprach-option.aktiv {
        border-color: var(--accent-blue);
        background: rgba(30,136,229,0.15);
    }

    .sprach-option .flag {
        font-size: 24px;
    }

    .sprach-option .name {
        flex: 1;
        font-weight: 600;
    }

    .sprach-option .check {
        color: var(--success);
        font-weight: 700;
    }

    /* ═══════════════════════════════════════════════════════════
       SVG-LOGO-STIL
       ═══════════════════════════════════════════════════════════ */
    .firmen-logo svg {
        width: 100%;
        height: auto;
    }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
    /* ═══════════════════════════════════════════════════════════
       KONFIGURATION
       ═══════════════════════════════════════════════════════════ */

            cs: 'Tento modul bude zpristupnen v nasledujici etape.',
            sk: 'Tento modul bude spristupneny v nasledujucej etape.',
            pl: 'Ten modul zostanie udostepniony w nastepnym etapie.',
            en: 'This module will be enabled in one of the next stages.',
            ro: 'Acest modul va fi disponibil intr-o etapa viitoare.',
            uk: 'Tsey modul bude vidkryto v nastupniy etapi.'
        },
        modul_etappe: {
            de: 'Aktuelle Etappe: 1 von 8 — Startseite & Navigation',
            cs: 'Aktualni etapa: 1 z 8 — Hlavni stranka a navigace',
            sk: 'Aktualna etapa: 1 z 8 — Hlavna stranka a navigacia',
            pl: 'Aktualny etap: 1 z 8 — Strona glowna i nawigacja',
            en: 'Current stage: 1 of 8 — Home & Navigation',
            ro: 'Etapa curenta: 1 din 8 — Pagina principala si navigare',
            uk: 'Potochnyy etap: 1 z 8 — Holovna storinka ta navigatsiya'
        }
    };

    function t(key, lang) {
        const entry = UI_LABELS[key];
        if (!entry) return key;
        return entry[lang] || entry.de || key;
    }

    /* ═══════════════════════════════════════════════════════════
       SVG-IKONEN (lucide-style, schlank)
       ═══════════════════════════════════════════════════════════ */
    const Icon = {
        Home: () => (
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeLinecap="round" strokeLinejoin="round">
                <path d="M3 12L12 3l9 9"/><path d="M5 10v10h14V10"/>
            </svg>
        ),
        Helm: () => (
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeLinecap="round" strokeLinejoin="round">
                <path d="M2 18h20"/><path d="M4 18v-3a8 8 0 0116 0v3"/><path d="M9 18V8m6 10V8"/>
            </svg>
        ),
        Kalender: () => (
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeLinecap="round" strokeLinejoin="round">
                <rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 10h18M8 3v4M16 3v4"/>
            </svg>
        ),
        Kamera: () => (
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeLinecap="round" strokeLinejoin="round">
                <path d="M3 8h3l2-3h8l2 3h3v11H3z"/><circle cx="12" cy="13" r="4"/>
            </svg>
        ),
        Uhr: () => (
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeLinecap="round" strokeLinejoin="round">
                <circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/>
            </svg>
        ),
        Sprechblase: () => (
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeLinecap="round" strokeLinejoin="round">
                <path d="M21 15a3 3 0 01-3 3H8l-5 4V6a3 3 0 013-3h12a3 3 0 013 3z"/>
            </svg>
        ),
        Werkzeug: () => (
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeLinecap="round" strokeLinejoin="round">
                <path d="M14.7 6.3a4.5 4.5 0 005.6 5.6L21 17l-4 4-4.7-4.7-3 3-3.6-3.6 3-3L4 8l4-4 5.1 5.1z"/>
            </svg>
        )
    };

    /* ═══════════════════════════════════════════════════════════
       FIRMEN-LOGO (SVG, im Master-App-Stil)
       ═══════════════════════════════════════════════════════════ */
    function FirmenLogo() {
        return (
            <div className="firmen-logo">
                <svg viewBox="0 0 200 70" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stopColor="#1E88E5"/>
                            <stop offset="100%" stopColor="#1565C0"/>
                        </linearGradient>
                    </defs>
                    {/* TW Monogramm Hintergrund */}
                    <rect x="4" y="4" width="62" height="62" rx="10" fill="url(#logoGrad)"/>
                    <text x="35" y="45" textAnchor="middle"
                          fontFamily="Oswald, sans-serif" fontSize="32" fontWeight="700"
                          fill="#fff" letterSpacing="1">TW</text>
                    {/* Akzent-Strich */}
                    <rect x="4" y="60" width="62" height="6" rx="0" fill="#e67e22"/>
                    {/* Firmenname */}
                    <text x="76" y="32" fontFamily="Oswald, sans-serif" fontSize="18" fontWeight="700"
                          fill="#e8ecf2" letterSpacing="0.5">THOMAS WILLWACHER</text>
                    <text x="76" y="50" fontFamily="Source Sans 3, sans-serif" fontSize="11"
                          fill="#b0bcc8" letterSpacing="2">FLIESENLEGERMEISTER e.K.</text>
                </svg>
            </div>
        );
    }

    /* ═══════════════════════════════════════════════════════════
       UHR-BLOCK (Tag · grosse Uhrzeit · Datum)
       ═══════════════════════════════════════════════════════════ */
    function UhrBlock({ lang }) {
        const [zeit, setZeit] = React.useState(new Date());

        React.useEffect(() => {
            const i = setInterval(() => setZeit(new Date()), 1000);
            return () => clearInterval(i);
        }, []);

        // Wochentag-Lokalisierung pro Sprache
        const localeMap = { de: 'de-DE', cs: 'cs-CZ', sk: 'sk-SK', pl: 'pl-PL', en: 'en-GB', ro: 'ro-RO', uk: 'uk-UA' };
        const locale = localeMap[lang] || 'de-DE';
        const tag = zeit.toLocaleDateString(locale, { weekday: 'long' }).toUpperCase();
        const datum = zeit.toLocaleDateString(locale, { day: '2-digit', month: 'long', year: 'numeric' });
        const hh = String(zeit.getHours()).padStart(2, '0');
        const mm = String(zeit.getMinutes()).padStart(2, '0');
        const ss = String(zeit.getSeconds()).padStart(2, '0');

        return (
            <div className="uhr-block">
                <div className="uhr-tag">{tag}</div>
                <div className="uhr-zeit">
                    {hh}<span className="uhr-doppelpunkt">:</span>{mm}<span className="uhr-doppelpunkt">:</span>{ss}
                </div>
                <div className="uhr-datum">{datum}</div>
            </div>
        );
    }

    /* ═══════════════════════════════════════════════════════════
       BAUTEAM-ANIMATION (CSS-only, vereinfacht)
       ═══════════════════════════════════════════════════════════ */
    function BauteamAnimation({ lang }) {
        return (
            <div className="bauteam">
                <div className="bauteam-titel">{t('bauteam', lang)}</div>
                <div className="bauteam-szene">
                    <span className="bauarbeiter">👷</span>
                    <span className="bauarbeiter">🔨</span>
                    <span className="bauarbeiter">👷‍♀️</span>
                    <span className="bauarbeiter">🧱</span>
                </div>
                <div className="bauteam-boden"/>
            </div>
        );
    }

    /* ═══════════════════════════════════════════════════════════
       SPRACH-AUSWAHL-MODAL
       ═══════════════════════════════════════════════════════════ */
    function SprachModal({ aktuell, onWaehle, onSchliessen }) {
        return (
            <div className="modal-backdrop" onClick={onSchliessen}>
                <div className="modal" onClick={e => e.stopPropagation()}>
                    <div className="modal-titel">{t('sprache_waehlen', aktuell)}</div>
                    <div className="sprach-liste">
                        {SPRACHEN.map(s => (
                            <div key={s.code}
                                 className={'sprach-option' + (s.code === aktuell ? ' aktiv' : '')}
                                 onClick={() => onWaehle(s.code)}>
                                <span className="flag">{s.flag}</span>
                                <span className="name">{s.name}</span>
                                {s.code === aktuell && <span className="check">✓</span>}
                            </div>
                        ))}
                    </div>
                </div>
            </div>
        );
    }

    /* ═══════════════════════════════════════════════════════════
       STARTSEITE (Modul "Start" Inhalt)
       ═══════════════════════════════════════════════════════════ */
    function MAStartseite({ lang, onSprachOeffnen }) {
        const aktSprache = SPRACHEN.find(s => s.code === lang) || SPRACHEN[0];
        return (
            <>
                <div className="firma-header">
                    <FirmenLogo/>
                    <div className="firmen-adresse">Flurweg 14a · 56472 Nisterau · Tel. 02661-63101</div>
                    <div className="firmen-untertitel">{t('baustellen_app', lang)}</div>
                </div>
                <UhrBlock lang={lang}/>
                <div className="sprach-pill-wrapper">
                    <button className="sprach-pill" onClick={onSprachOeffnen}>
                        <span className="flag">{aktSprache.flag}</span>
                        <span>{aktSprache.name}</span>
                        <span style={{fontSize: 11, color: 'var(--text-muted)'}}>▼</span>
                    </button>
                </div>
                <BauteamAnimation lang={lang}/>
                <div className="status-leiste">
                    <span className="status-dot online"/>
                    <span>{t('online', lang)}</span>
                    <span style={{color: 'var(--text-muted)'}}>·</span>
                    <span>v{APP_VERSION}</span>
                </div>
            </>
        );
    }

    /* ═══════════════════════════════════════════════════════════
       MODUL-PLATZHALTER (für Module 2-6, die noch leer sind)
       ═══════════════════════════════════════════════════════════ */
    function ModulPlatzhalter({ lang, titel, IconComp }) {
        return (
            <div className="modul-platzhalter">
                <div className="modul-platzhalter-icon">
                    <IconComp/>
                </div>
                <div className="modul-platzhalter-titel">{titel}</div>
                <div className="modul-platzhalter-text">
                    {t('modul_im_bau_text', lang)}
                </div>
                <div className="modul-platzhalter-info">
                    🏗️ {t('modul_etappe', lang)}
                </div>
            </div>
        );
    }

    /* ═══════════════════════════════════════════════════════════
       TOP-LEVEL-APP
       ═══════════════════════════════════════════════════════════ */
    function MAApp() {
        // State aus localStorage laden
        const [lang, setLang] = React.useState(() => {
            return localStorage.getItem('tw-ma-sprache') || 'de';
        });
        const [fontScale, setFontScale] = React.useState(() => {
            return parseFloat(localStorage.getItem('tw-ma-fontscale') || '1');
        });
        const [aktiverTab, setAktiverTab] = React.useState('start');
        const [sprachModalOffen, setSprachModalOffen] = React.useState(false);

        // Schriftgroesse anwenden (CSS-Variable setzen)
        React.useEffect(() => {
            document.documentElement.style.setProperty('--font-scale', fontScale);
            localStorage.setItem('tw-ma-fontscale', String(fontScale));
        }, [fontScale]);

        // Sprache speichern
        React.useEffect(() => {
            localStorage.setItem('tw-ma-sprache', lang);
        }, [lang]);

        const setSprache = (code) => {
            setLang(code);
            setSprachModalOffen(false);
        };

        const tabs = [
            { id: 'start',       label: t('start', lang),       Icon: Icon.Home },
            { id: 'baustellen',  label: t('baustellen', lang),  Icon: Icon.Helm },
            { id: 'kalender',    label: t('kalender', lang),    Icon: Icon.Kalender },
            { id: 'fotos',       label: t('fotos', lang),       Icon: Icon.Kamera },
            { id: 'stunden',     label: t('stunden', lang),     Icon: Icon.Uhr },
            { id: 'nachrichten', label: t('nachrichten', lang), Icon: Icon.Sprechblase }
        ];

        return (
            <>
                {/* Top-Bar */}
                <div className="topbar">
                    <div className="topbar-nav">
                        <button className="topbar-btn" title={t('zurueck', lang)} onClick={() => history.back()}>‹</button>
                        <button className="topbar-btn" title={t('vor', lang)} onClick={() => history.forward()}>›</button>
                    </div>
                    <div className="topbar-title">{t('baustellen_app', lang)}</div>
                    <div className="topbar-actions">
                        <button className={'topbar-action' + (fontScale > 1 ? ' active' : '')}
                                onClick={() => setFontScale(s => Math.min(1.4, s + 0.1))}
                                title={t('gross', lang)}>A↑</button>
                        <button className={'topbar-action' + (fontScale < 1 ? ' active' : '')}
                                onClick={() => setFontScale(s => Math.max(0.8, s - 0.1))}
                                title={t('klein', lang)}>A↓</button>
                    </div>
                </div>

                {/* Modul-Navigation */}
                <div className="module-nav">
                    {tabs.map(tab => (
                        <button key={tab.id}
                                className={'module-btn' + (aktiverTab === tab.id ? ' active' : '')}
                                onClick={() => setAktiverTab(tab.id)}>
                            <tab.Icon/>
                            <span>{tab.label}</span>
                        </button>
                    ))}
                </div>

                {/* Hauptinhalt */}
                <div className="main-content">
                    {aktiverTab === 'start' && (
                        <MAStartseite lang={lang} onSprachOeffnen={() => setSprachModalOffen(true)}/>
                    )}
                    {aktiverTab === 'baustellen' && (
                        <ModulPlatzhalter lang={lang} titel={t('baustellen', lang)} IconComp={Icon.Helm}/>
                    )}
                    {aktiverTab === 'kalender' && (
                        <ModulPlatzhalter lang={lang} titel={t('kalender', lang)} IconComp={Icon.Kalender}/>
                    )}
                    {aktiverTab === 'fotos' && (
                        <ModulPlatzhalter lang={lang} titel={t('fotos', lang)} IconComp={Icon.Kamera}/>
                    )}
                    {aktiverTab === 'stunden' && (
                        <ModulPlatzhalter lang={lang} titel={t('stunden', lang)} IconComp={Icon.Uhr}/>
                    )}
                    {aktiverTab === 'nachrichten' && (
                        <ModulPlatzhalter lang={lang} titel={t('nachrichten', lang)} IconComp={Icon.Sprechblase}/>
                    )}
                </div>

                {/* Sprach-Modal */}
                {sprachModalOffen && (
                    <SprachModal aktuell={lang}
                                 onWaehle={setSprache}
                                 onSchliessen={() => setSprachModalOffen(false)}/>
                )}
            </>
        );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<MAApp/>);
    </script>
</body>
</html>
