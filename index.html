// ============================================================
// ETAPPE 5 · KALENDER-MODUL (Baustein 2: UI-Geruest, read-only)
// ============================================================
// Zeigt 3-Jahres-Kalender (aktuelles Jahr -1, aktuelles, +1) mit
// Monats-Navigation, Status-Glyphen pro Tag und Baustellen-Balken
// am unteren Tag-Rand. Tap auf Tag oeffnet noch kein Modal —
// das ist Baustein 3. Für Baustein 2 nur Read-Only-Anzeige.

function kalPadZero(n) { return n < 10 ? '0' + n : '' + n; }

function kalDatumIso(datum) {
    // Date -> "YYYY-MM-DD"
    return datum.getFullYear() + '-' + kalPadZero(datum.getMonth() + 1) + '-' + kalPadZero(datum.getDate());
}

function kalIstHeute(jahr, monat, tag) {
    const h = new Date();
    return h.getFullYear() === jahr && h.getMonth() === monat && h.getDate() === tag;
}

function kalIstWochenende(jahr, monat, tag) {
    const d = new Date(jahr, monat, tag);
    const wt = d.getDay(); // 0 = Sonntag, 6 = Samstag
    return wt === 0 || wt === 6;
}

function kalErsterWochentagMoIdx(jahr, monat) {
    // Liefert den Montags-Index (0=Montag..6=Sonntag) des 1. Tags im Monat
    const d = new Date(jahr, monat, 1);
    const jsWt = d.getDay(); // 0=Sonntag..6=Samstag
    return (jsWt + 6) % 7;   // 0=Montag..6=Sonntag
}

function kalTageImMonat(jahr, monat) {
    return new Date(jahr, monat + 1, 0).getDate();
}

function MAKalenderModul() {
    const lang = useSprache();
    const jetzt = new Date();
    const [anzeigeJahr, setAnzeigeJahr]     = useState(jetzt.getFullYear());
    const [anzeigeMonat, setAnzeigeMonat]   = useState(jetzt.getMonth());
    const [maId, setMaId]                   = useState(null);
    const [eintraege, setEintraege]         = useState({});
    const [planungen, setPlanungen]         = useState([]);
    const [baustellen, setBaustellen]       = useState({});
    const [lade, setLade]                   = useState(true);
    const [aktivesModalIso, setAktivesModalIso] = useState(null);

    // Mitarbeiter-ID einmalig aufloesen
    useEffect(function(){
        let abgebrochen = false;
        if (window.TWMaFirebase && TWMaFirebase.getMeineMaId) {
            TWMaFirebase.getMeineMaId().then(function(id){
                if (!abgebrochen) setMaId(id || null);
            }).catch(function(){ if (!abgebrochen) setMaId(null); });
        }
        return function(){ abgebrochen = true; };
    }, []);

    // Kalender-Eintraege fuer das aktuell angezeigte Jahr abonnieren
    useEffect(function(){
        if (!maId || !window.TWMaFirebase) { setLade(false); return; }
        setLade(true);
        const unsub = TWMaFirebase.subscribeKalenderJahr(maId, anzeigeJahr, function(data){
            setEintraege(data || {});
            setLade(false);
        });
        return function(){ try { unsub(); } catch(e){} };
    }, [maId, anzeigeJahr]);

    // Baustellen-Planungen (global) abonnieren
    useEffect(function(){
        if (!window.TWMaFirebase || !TWMaFirebase.subscribeBaustellenPlanungen) return;
        const unsub = TWMaFirebase.subscribeBaustellenPlanungen(function(list){
            setPlanungen(Array.isArray(list) ? list : []);
        });
        return function(){ try { unsub(); } catch(e){} };
    }, []);

    // Baustellen-Stammdaten (fuer Farbe/Name) einmalig laden
    useEffect(function(){
        if (!window.TWMaFirebase || !TWMaFirebase.ladeAktiveBaustellen) return;
        TWMaFirebase.ladeAktiveBaustellen().then(function(arr){
            const map = {};
            (arr || []).forEach(function(b){ map[b.id] = b; });
            setBaustellen(map);
        }).catch(function(){ /* still */ });
    }, []);

    function monatName(idx) {
        const key = 'kal_monat_' + kalPadZero(idx + 1);
        return t(key, lang);
    }

    function navVor() {
        if (anzeigeMonat === 11) {
            setAnzeigeJahr(anzeigeJahr + 1);
            setAnzeigeMonat(0);
        } else {
            setAnzeigeMonat(anzeigeMonat + 1);
        }
    }
    function navZurueck() {
        if (anzeigeMonat === 0) {
            setAnzeigeJahr(anzeigeJahr - 1);
            setAnzeigeMonat(11);
        } else {
            setAnzeigeMonat(anzeigeMonat - 1);
        }
    }
    function navHeute() {
        const h = new Date();
        setAnzeigeJahr(h.getFullYear());
        setAnzeigeMonat(h.getMonth());
    }

    function oeffneModal(iso) {
        setAktivesModalIso(iso);
    }
    function schliesseModal() {
        setAktivesModalIso(null);
    }

    // Baustellen als sortiertes Array fuer das Dropdown im Modal
    const baustellenArr = Object.keys(baustellen).map(function(id){
        return baustellen[id];
    }).filter(function(b){
        return b && (b.status === 'aktiv' || !b.status); // alles was nicht pausiert/beendet ist
    }).sort(function(a, b){
        return String(a.name || '').localeCompare(String(b.name || ''));
    });

    // Filtere Baustellen-Planungen, die den eingeloggten MA betreffen
    const meinePlanungen = (maId && planungen.length > 0)
        ? planungen.filter(function(p){ return p && p.mitarbeiter && p.mitarbeiter[maId] === true; })
        : [];

    return (
        <div className="ma-kal-wrapper">
            <MAKalenderHeader
                lang={lang}
                monatName={monatName(anzeigeMonat)}
                jahr={anzeigeJahr}
                onVor={navVor}
                onZurueck={navZurueck}
                onHeute={navHeute}/>

            <MAKalenderWochentage lang={lang}/>

            <MAKalenderGrid
                jahr={anzeigeJahr}
                monat={anzeigeMonat}
                eintraege={eintraege}
                planungen={meinePlanungen}
                baustellen={baustellen}
                lade={lade}
                lang={lang}
                onTagKlick={oeffneModal}/>

            <MAKalenderLegende lang={lang}/>

            <div className="ma-kal-info-banner">
                {t('kal_info_tap', lang)}
            </div>

            {aktivesModalIso && (
                <MAKalenderTagesModal
                    iso={aktivesModalIso}
                    eintrag={eintraege[aktivesModalIso] || null}
                    maId={maId}
                    baustellen={baustellenArr}
                    lang={lang}
                    onClose={schliesseModal}/>
            )}
        </div>
    );
}

function MAKalenderHeader({ lang, monatName, jahr, onVor, onZurueck, onHeute }) {
    return (
        <div className="ma-kal-header">
            <button className="ma-kal-nav-btn" onClick={onZurueck} aria-label="prev">

            </button>
            <div className="ma-kal-titel">

function MAKalenderWochentage({ lang }) {
    const tage = ['mo','di','mi','do','fr','sa','so'];
    return (
        <div className="ma-kal-wochentage">
            {tage.map(function(k){
                const isWE = k === 'sa' || k === 'so';
                return (
                    <div key={k} className={'ma-kal-wochentag' + (isWE ? ' we' : '')}>
                        {t('kal_wt_' + k, lang)}
                    </div>
                );
            })}
        </div>
    );
}

function MAKalenderGrid({ jahr, monat, eintraege, planungen, baustellen, lade, lang, onTagKlick }) {
    // 42 Zellen (6 Wochen x 7 Tage) — Montag als erster Tag.
    const offset = kalErsterWochentagMoIdx(jahr, monat);
    const tageImMonat = kalTageImMonat(jahr, monat);
    const tageImVormonat = kalTageImMonat(jahr, monat - 1);

    const zellen = [];
    for (let i = 0; i < 42; i++) {
        const posImMonat = i - offset + 1; // 1..tageImMonat = im aktuellen Monat

        let zellJahr  = jahr;
        let zellMonat = monat;
        let tagNr;
        let ausserhalb = false;

        if (posImMonat < 1) {
            // Tage aus Vormonat
            tagNr = tageImVormonat + posImMonat;
            zellMonat = monat - 1;
            if (zellMonat < 0) { zellMonat = 11; zellJahr = jahr - 1; }
            ausserhalb = true;
        } else if (posImMonat > tageImMonat) {
            // Tage aus Folgemonat
            tagNr = posImMonat - tageImMonat;
            zellMonat = monat + 1;
            if (zellMonat > 11) { zellMonat = 0; zellJahr = jahr + 1; }
            ausserhalb = true;
        } else {
            tagNr = posImMonat;
        }

        zellen.push({ jahr: zellJahr, monat: zellMonat, tag: tagNr, ausserhalb: ausserhalb });
    }

    return (
        <div className="ma-kal-grid">
            {zellen.map(function(z, i){
                const iso = z.jahr + '-' + kalPadZero(z.monat + 1) + '-' + kalPadZero(z.tag);
                const eintrag = (!z.ausserhalb && eintraege) ? eintraege[iso] : null;
                const tagesBalken = (!z.ausserhalb) ? balkenFuerTag(z.jahr, z.monat, z.tag, planungen, baustellen) : [];
                return (
                    <MAKalenderTag
                        key={i}
                        jahr={z.jahr}
                        monat={z.monat}
                        tag={z.tag}
                        iso={iso}
                        ausserhalb={z.ausserhalb}
                        eintrag={eintrag}
                        balken={tagesBalken}
                        lang={lang}
                        onTagKlick={onTagKlick}/>
                );
            })}
        </div>
    );
}

function balkenFuerTag(jahr, monat, tag, planungen, baustellen) {
    if (!Array.isArray(planungen) || planungen.length === 0) return [];
    const tagStart = new Date(jahr, monat, tag, 0, 0, 0).getTime();
    const tagEnde  = new Date(jahr, monat, tag, 23, 59, 59).getTime();
    const treffer = [];
    planungen.forEach(function(p){
        if (typeof p.von !== 'number' || typeof p.bis !== 'number') return;
        // Ueberlappung: Planung-Zeitraum trifft den aktuellen Tag
        if (p.von <= tagEnde && p.bis >= tagStart) {
            const b = baustellen[p.baustelle_id] || {};
            treffer.push({
                baustelle_id: p.baustelle_id,
                farbe: p.farbe || '#1E88E5',
                name:  b.name || p.baustelle_id
            });
        }
    });
    return treffer;
}

function MAKalenderTag({ jahr, monat, tag, iso, ausserhalb, eintrag, balken, lang, onTagKlick }) {
    const heute = kalIstHeute(jahr, monat, tag);
    const we    = kalIstWochenende(jahr, monat, tag);

    let cls = 'ma-kal-tag';
    if (ausserhalb) cls += ' ausserhalb';
    if (we && !ausserhalb) cls += ' wochenende';
    if (heute && !ausserhalb) cls += ' heute';

    // Status-Glyph
    let glyph = null;
    if (eintrag && eintrag.status) {
        const statusKlassen = {
            anwesend: 'anwesend',
            urlaub:   'urlaub',
            krank:    'krank',
            frei:     'frei'
        };
        const sk = statusKlassen[eintrag.status];
        const zeichen = {
            anwesend: '\u2713', // ✓
            urlaub:   'U',
            krank:    'K',
            frei:     '\u00B7'  // ·
        };
        if (sk) {
            glyph = <div className={'ma-kal-tag-glyph ' + sk}>{zeichen[eintrag.status]}</div>;
        }
    }

    // Balken: max 3 anzeigen, sonst "+N"
    const MAX_BALKEN = 3;
    const sichtbar = balken.slice(0, MAX_BALKEN);
    const rest = balken.length - MAX_BALKEN;

    function klickHandler() {
        if (ausserhalb) return;
        if (typeof onTagKlick === 'function') {
            onTagKlick(iso);
        }
    }

    return (
        <div className={cls} onClick={klickHandler}>
            <div className="ma-kal-tag-nummer">{tag}</div>
            {glyph}
            {sichtbar.length > 0 && (
                <div className="ma-kal-balken-container">
                    {sichtbar.map(function(b, i){
                        return <div key={i} className="ma-kal-balken" style={{ background: b.farbe }} title={b.name}></div>;
                    })}
                    {rest > 0 && (
                        <div className="ma-kal-balken-plus">+{rest}</div>
                    )}
                </div>
            )}
        </div>
    );
}

function kalIsoZuWochentagKey(iso) {
    // "YYYY-MM-DD" -> Key fuer t('kal_wtl_xx', lang)
    const d = kalIsoZuDate(iso);
    if (!d) return 'kal_wtl_mo';
    const map = ['kal_wtl_so','kal_wtl_mo','kal_wtl_di','kal_wtl_mi','kal_wtl_do','kal_wtl_fr','kal_wtl_sa'];
    return map[d.getDay()];
}

function kalIsoZuDate(iso) {
    if (typeof iso !== 'string') return null;
    const m = iso.match(/^(\d{4})-(\d{2})-(\d{2})$/);
    if (!m) return null;
    return new Date(parseInt(m[1],10), parseInt(m[2],10)-1, parseInt(m[3],10));
}

function kalFormatiereDatumLokal(iso, lang) {
    const d = kalIsoZuDate(iso);
    if (!d) return iso;
    const wt = t(kalIsoZuWochentagKey(iso), lang);
    const monat = t('kal_monat_' + kalPadZero(d.getMonth()+1), lang);
    return { wt: wt, rest: d.getDate() + '. ' + monat + ' ' + d.getFullYear() };
}

function langZuSpeechApiLang(lang) {
    const m = {
        de: 'de-DE', cs: 'cs-CZ', sk: 'sk-SK', pl: 'pl-PL',
        en: 'en-US', ro: 'ro-RO', uk: 'uk-UA'
    };
    return m[lang] || 'de-DE';
}

function MAKalenderTagesModal({ iso, eintrag, maId, baustellen, lang, onClose }) {
    // Ausgangs-State aus bestehendem Eintrag (oder Defaults)
    const [status, setStatus]               = useState(eintrag && eintrag.status ? eintrag.status : 'anwesend');
    const [stunden, setStunden]             = useState(
        eintrag && typeof eintrag.stunden === 'number' ? eintrag.stunden : 8
    );
    const [baustelleId, setBaustelleId]     = useState(eintrag && eintrag.baustelle_id ? eintrag.baustelle_id : '');
    const [sonderheiten, setSonderheiten]   = useState(eintrag && eintrag.sonderheiten ? String(eintrag.sonderheiten) : '');
    const [speichert, setSpeichert]         = useState(false);
    const [toast, setToast]                 = useState(null); // { kind: 'ok'|'err'|'info', text: '...' }
    const [horcht, setHorcht]               = useState(false);
    const recognitionRef = useRef(null);

    const hatEintrag = !!eintrag;
    const datumInfo = kalFormatiereDatumLokal(iso, lang);

    // ESC schließt Modal
    useEffect(function(){
        function onKey(e){ if (e.key === 'Escape') onClose(); }
        window.addEventListener('keydown', onKey);
        return function(){ window.removeEventListener('keydown', onKey); };
    }, [onClose]);

    // Cleanup: laufende Spracherkennung bei Unmount stoppen
    useEffect(function(){
        return function(){
            if (recognitionRef.current) {
                try { recognitionRef.current.stop(); } catch(e){}
                recognitionRef.current = null;
            }
        };
    }, []);

    function stundenAendern(delta) {
        let neu = stunden + delta;
        if (neu < 0) neu = 0;
        if (neu > 24) neu = 24;
        // auf 15-Min-Raster snappen
        neu = Math.round(neu * 4) / 4;
        setStunden(neu);
    }

    function speichereEintrag() {
        if (!maId) { setToast({ kind:'err', text: t('kal_modal_speicher_err', lang) }); return; }
        setSpeichert(true);
        setToast(null);
        const payload = { status: status };
        if (status === 'anwesend') {
            payload.stunden = stunden;
            if (baustelleId) payload.baustelle_id = baustelleId;
        }
        if (sonderheiten && sonderheiten.trim()) {
            payload.sonderheiten = sonderheiten.trim();
        }
        TWMaFirebase.schreibeKalenderEintrag(maId, iso, payload)
            .then(function(){
                setToast({ kind:'ok', text: t('kal_modal_speicher_ok', lang) });
                // Kurz anzeigen, dann schliessen
                setTimeout(function(){ onClose(); }, 700);
            })
            .catch(function(err){
                console.error('[Kalender] Speichern fehlgeschlagen:', err);
                setToast({ kind:'err', text: t('kal_modal_speicher_err', lang) });
                setSpeichert(false);
            });
    }

    function loescheEintrag() {
        if (!maId) return;
        if (!window.confirm(t('kal_modal_loesch_frage', lang))) return;
        setSpeichert(true);
        TWMaFirebase.loescheKalenderEintrag(maId, iso)
            .then(function(){
                onClose();
            })
            .catch(function(err){
                console.error('[Kalender] Loeschen fehlgeschlagen:', err);
                setToast({ kind:'err', text: t('kal_modal_speicher_err', lang) });
                setSpeichert(false);
            });
    }

    function starteSpracheingabe() {
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SR) {
            setToast({ kind:'err', text: t('kal_modal_mikro_aus', lang) });
            return;
        }
        if (horcht && recognitionRef.current) {
            // Toggle aus
            try { recognitionRef.current.stop(); } catch(e){}
            return;
        }
        const rec = new SR();
        rec.lang = langZuSpeechApiLang(lang);
        rec.interimResults = false;
        rec.maxAlternatives = 1;
        rec.continuous = false;

        rec.onstart = function(){
            setHorcht(true);
            setToast({ kind:'info', text: t('kal_modal_horcht', lang) });
        };
        rec.onresult = function(ev){
            const erkannt = (ev.results && ev.results[0] && ev.results[0][0]) ? ev.results[0][0].transcript : '';
            if (erkannt) {
                setSonderheiten(function(prev){
                    return prev ? (prev.replace(/\s+$/,'') + ' ' + erkannt) : erkannt;
                });
            }
        };
        rec.onerror = function(){
            setToast({ kind:'err', text: t('kal_modal_mikro_aus', lang) });
        };
        rec.onend = function(){
            setHorcht(false);
            recognitionRef.current = null;
            // Info-Toast ausblenden
            setToast(function(t){ return (t && t.kind === 'info') ? null : t; });
        };

        try {
            rec.start();
            recognitionRef.current = rec;
        } catch(e) {
            setToast({ kind:'err', text: t('kal_modal_mikro_aus', lang) });
        }
    }

    function statusKnopf(wert, labelKey) {
        const istAktiv = status === wert;
        return (
            <button
                type="button"
                className={'ma-kal-status-btn ' + wert + (istAktiv ? ' aktiv' : '')}
                onClick={function(){ setStatus(wert); }}>
                <span className="dot"></span>
                <span>{t(labelKey, lang)}</span>
            </button>
        );
    }

    function overlayClick(e) {
        // Klick auf Overlay (Hintergrund) schliesst Modal
        if (e.target === e.currentTarget) onClose();
    }

    return (
        <div className="ma-kal-modal-overlay" onClick={overlayClick}>
            <div className="ma-kal-modal" role="dialog" aria-modal="true">
                <div className="ma-kal-modal-header">
                    <div className="ma-kal-modal-datum">
                        <span className="wt">{datumInfo.wt}</span>
                        <span>{datumInfo.rest}</span>
                    </div>
                    <button className="ma-kal-modal-close" onClick={onClose} aria-label="close">{'\u00D7'}</button>
                </div>

                <div className="ma-kal-modal-body">
                    {/* Status */}
                    <div className="ma-kal-modal-section">
                        <label className="ma-kal-modal-label">{t('kal_modal_status_lbl', lang)}</label>
                        <div className="ma-kal-status-radios">
                            {statusKnopf('anwesend', 'kal_status_anwesend')}
                            {statusKnopf('urlaub',   'kal_status_urlaub')}
                            {statusKnopf('krank',    'kal_status_krank')}
                            {statusKnopf('frei',     'kal_status_frei')}
                        </div>
                    </div>

                    {/* Stunden (nur bei anwesend) */}
                    {status === 'anwesend' && (
                        <div className="ma-kal-modal-section">
                            <label className="ma-kal-modal-label">{t('kal_modal_stunden', lang)}</label>
                            <div className="ma-kal-stunden-picker">
                                <button
                                    type="button"
                                    className="ma-kal-stunden-btn"
                                    disabled={stunden <= 0}
                                    onClick={function(){ stundenAendern(-0.25); }}>
                                    {'\u2212'}
                                </button>
                                <div className="ma-kal-stunden-value">
                                    {stunden.toFixed(2).replace('.',',')}
                                    <span className="ma-kal-stunden-unit">h</span>
                                </div>
                                <button
                                    type="button"
                                    className="ma-kal-stunden-btn"
                                    disabled={stunden >= 24}
                                    onClick={function(){ stundenAendern(+0.25); }}>
                                    {'+'}
                                </button>
                            </div>
                        </div>
                    )}

                    {/* Baustelle (nur bei anwesend) */}
                    {status === 'anwesend' && (
                        <div className="ma-kal-modal-section">
                            <label className="ma-kal-modal-label">{t('kal_modal_baustelle', lang)}</label>
                            {baustellen && baustellen.length > 0 ? (
                                <select
                                    className="ma-kal-select"
                                    value={baustelleId}
                                    onChange={function(e){ setBaustelleId(e.target.value); }}>
                                    <option value="">{t('kal_modal_waehlen', lang)}</option>
                                    {baustellen.map(function(b){
                                        return <option key={b.id} value={b.id}>{b.name || b.id}</option>;
                                    })}
                                </select>
                            ) : (
                                <div style={{
                                    padding:'12px 14px',
                                    background:'var(--bg-card)',
                                    border:'1px solid var(--border-color)',
                                    borderRadius:'var(--radius-md)',
                                    color:'var(--text-muted)',
                                    fontSize:'0.9rem'
                                }}>
                                    {t('kal_modal_keine_bst', lang)}
                                </div>
                            )}
                        </div>
                    )}

                    {/* Sonderheiten + Spracheingabe */}
                    <div className="ma-kal-modal-section">
                        <label className="ma-kal-modal-label">{t('kal_modal_sonder', lang)}</label>
                        <div className="ma-kal-textarea-wrap">
                            <textarea
                                className="ma-kal-textarea"
                                value={sonderheiten}
                                placeholder={t('kal_modal_sonder_ph', lang)}
                                onChange={function(e){ setSonderheiten(e.target.value); }}/>
                            <button
                                type="button"
                                className={'ma-kal-mikro-btn' + (horcht ? ' aktiv' : '')}
                                title={t('kal_modal_diktat', lang)}
                                onClick={starteSpracheingabe}>
                                {'\u{1F3A4}'}
                            </button>
                        </div>
                    </div>

                    {toast && (
                        <div className={'ma-kal-modal-toast ' + toast.kind}>
                            {toast.text}
                        </div>
                    )}
                </div>

                <div className="ma-kal-modal-footer">
                    <button
                        type="button"
                        className="ma-kal-modal-btn abbrechen"
                        onClick={onClose}
                        disabled={speichert}>
                        {t('kal_modal_abbrechen', lang)}
                    </button>
                    {hatEintrag && (
                        <button
                            type="button"
                            className="ma-kal-modal-btn loeschen"
                            onClick={loescheEintrag}
                            disabled={speichert}>
                            {t('kal_modal_loeschen', lang)}
                        </button>
                    )}
                    <button
                        type="button"
                        className="ma-kal-modal-btn speichern"
                        onClick={speichereEintrag}
                        disabled={speichert}>
                        {t('kal_modal_speichern', lang)}
                    </button>
                </div>
            </div>
        </div>
    );
}

function nachIstHeute(ts) {
    const d = new Date(ts);
    const h = new Date();
    return d.getFullYear() === h.getFullYear()
        && d.getMonth()    === h.getMonth()
        && d.getDate()     === h.getDate();
}

function nachIstGestern(ts) {
    const d = new Date(ts);
    const g = new Date();
    g.setDate(g.getDate() - 1);
    return d.getFullYear() === g.getFullYear()
        && d.getMonth()    === g.getMonth()
        && d.getDate()     === g.getDate();
}

function nachFormatUhrzeit(ts) {
    const d = new Date(ts);
    return kalPadZero(d.getHours()) + ':' + kalPadZero(d.getMinutes());
}

function nachDatumTrennerText(ts, lang) {
    if (nachIstHeute(ts))   return t('nach_heute',   lang);
    if (nachIstGestern(ts)) return t('nach_gestern', lang);
    const d = new Date(ts);
    // Wenn innerhalb der letzten 7 Tage: Wochentag
    const diff = (Date.now() - ts) / (1000 * 60 * 60 * 24);
    if (diff < 7) {
        const wtMap = ['kal_wtl_so','kal_wtl_mo','kal_wtl_di','kal_wtl_mi','kal_wtl_do','kal_wtl_fr','kal_wtl_sa'];
        return t(wtMap[d.getDay()], lang);
    }
    // Sonst: Tag. Monat Jahr
    return d.getDate() + '. ' + t('kal_monat_' + kalPadZero(d.getMonth()+1), lang) + ' ' + d.getFullYear();
}

function nachTagKey(ts) {
    const d = new Date(ts);
    return d.getFullYear() + '-' + kalPadZero(d.getMonth()+1) + '-' + kalPadZero(d.getDate());
}

function MANachrichtenModul() {
    const lang = useSprache();
    const [maId, setMaId]               = useState(null);
    const [absenderName, setAbsenderName] = useState('');
    const [nachrichten, setNachrichten] = useState(null); // null = laedt, [] = leer
    const threadRef = useRef(null);

    // Mitarbeiter-ID + Stammdaten aufloesen — mit Retry-Logik und UID-Fallback,
    // damit auch bei spaetem Auth (App-Start-Race) die Identity nachgezogen wird.
    // HOTFIX v1.0.0-etappe5-b6-fcm-badge-hotfix1
    useEffect(function(){
        let abgebrochen = false;
        let retryTimer  = null;

        function versucheIdentityLaden(attempt) {
            if (abgebrochen) return;
            if (!window.TWMaFirebase || !TWMaFirebase.ladeMeinenMitarbeiter) {
                if (attempt < 12) {
                    retryTimer = setTimeout(function(){ versucheIdentityLaden(attempt + 1); }, 500);
                }
                return;
            }
            TWMaFirebase.ladeMeinenMitarbeiter().then(function(ma){
                if (abgebrochen) return;
                if (ma && ma.ma_id) {
                    setMaId(ma.ma_id);
                    setAbsenderName(ma.name || 'Mitarbeiter');
                    return;
                }
                // Fallback: wenigstens die blanke maId via getMeineMaId holen
                if (TWMaFirebase.getMeineMaId) {
                    TWMaFirebase.getMeineMaId().then(function(rawId){
                        if (abgebrochen) return;
                        if (rawId) {
                            setMaId(rawId);
                            setAbsenderName('Mitarbeiter');
                        } else if (attempt < 12) {
                            retryTimer = setTimeout(function(){ versucheIdentityLaden(attempt + 1); }, 600);
                        }
                    }).catch(function(){
                        if (!abgebrochen && attempt < 12) {
                            retryTimer = setTimeout(function(){ versucheIdentityLaden(attempt + 1); }, 600);
                        }
                    });
                } else if (attempt < 12) {
                    retryTimer = setTimeout(function(){ versucheIdentityLaden(attempt + 1); }, 600);
                }
            }).catch(function(){
                if (!abgebrochen && attempt < 12) {
                    retryTimer = setTimeout(function(){ versucheIdentityLaden(attempt + 1); }, 600);
                }
            });
        }

        versucheIdentityLaden(0);

        return function(){
            abgebrochen = true;
            if (retryTimer) clearTimeout(retryTimer);
        };
    }, []);

    // Chat-Thread live abonnieren
    useEffect(function(){
        if (!maId || !window.TWMaFirebase || !TWMaFirebase.subscribeChat) return;
        const unsub = TWMaFirebase.subscribeChat(maId, function(arr){
            setNachrichten(Array.isArray(arr) ? arr : []);
        });
        return function(){ try { unsub(); } catch(e){} };
    }, [maId]);

    // Auto-Scroll zum unteren Ende bei neuen Nachrichten
    useEffect(function(){
        if (threadRef.current && Array.isArray(nachrichten) && nachrichten.length > 0) {
            requestAnimationFrame(function(){
                if (threadRef.current) {
                    threadRef.current.scrollTop = threadRef.current.scrollHeight;
                }
            });
        }
    }, [nachrichten ? nachrichten.length : 0]);

    // Ungelesene Buero-Nachrichten nach kurzer Verzoegerung als gelesen markieren
    useEffect(function(){
        if (!maId || !Array.isArray(nachrichten) || nachrichten.length === 0) return;
        const ungeleseneBuero = nachrichten.filter(function(n){
            return n && n.von === 'buero' && n.gelesen !== true;
        });
        if (ungeleseneBuero.length === 0) return;
        const timer = setTimeout(function(){
            ungeleseneBuero.forEach(function(n){
                if (TWMaFirebase.markiereNachrichtGelesen) {
                    TWMaFirebase.markiereNachrichtGelesen(maId, n.id).catch(function(){});
                }
            });
        }, 1200);
        return function(){ clearTimeout(timer); };
    }, [maId, nachrichten]);

    const ungelesenCount = Array.isArray(nachrichten)
        ? nachrichten.filter(function(n){ return n && n.von === 'buero' && n.gelesen !== true; }).length
        : 0;

    return (
        <div className="ma-nach-wrapper">
            <MANachrichtenHeader lang={lang} ungelesen={ungelesenCount}/>

function MAChatThread({ nachrichten, lang }) {
    // Gruppiere Nachrichten nach Tag fuer Datum-Trenner
    const elemente = [];
    let letzterTag = null;
    nachrichten.forEach(function(n, i){
        const tagKey = nachTagKey(n.timestamp);
        if (tagKey !== letzterTag) {
            elemente.push(
                <div key={'trenner-' + tagKey} className="ma-nach-trenner">
                    {nachDatumTrennerText(n.timestamp, lang)}
                </div>
            );
            letzterTag = tagKey;
        }
        elemente.push(
            <MAChatBubble
                key={n.id}
                nachricht={n}
                lang={lang}/>
        );
    });
    return <React.Fragment>{elemente}</React.Fragment>;
}

function MAChatBubble({ nachricht, lang }) {
    const [zeigeOriginal, setZeigeOriginal] = useState(false);

    const istMa = nachricht.von === 'ma';
    const istBuero = nachricht.von === 'buero';
    const dringend = nachricht.dringend === true;

    // Uebersetzungs-Logik:
    // - Wenn Uebersetzung fuer aktuelle Sprache existiert und sich vom Original unterscheidet: zeige Uebersetzung + Toggle
    // - Wenn gleiche Sprache ODER keine Uebersetzung: zeige Original
    // - Wenn Uebersetzung noch laeuft (Buero-Nachricht, kein text_uebersetzt): zeige "Uebersetze ..." Hinweis
    const uebersetztObj = nachricht.text_uebersetzt || {};
    const uebersetzt = uebersetztObj[lang];
    const originalSprache = nachricht.sprache_original || 'de';
    const brauchtUebersetzung = (originalSprache !== lang);
    const zeigeUebersetzungLoading = istBuero && brauchtUebersetzung && !uebersetzt;
    const hatUebersetzung = brauchtUebersetzung && typeof uebersetzt === 'string' && uebersetzt.length > 0;

    let anzeigeText = nachricht.text_original || '';
    if (hatUebersetzung) anzeigeText = uebersetzt;

    let bubbleCls = 'ma-nach-bubble ' + (istMa ? 'ma' : 'buero');
    if (dringend) bubbleCls += ' dringend';

    // Lesestatus nur fuer eigene (MA-)Nachrichten anzeigen
    let statusCheck = null;
    if (istMa) {
        if (nachricht.gelesen === true) {
            statusCheck = <span className="ma-nach-check gelesen">{'\u2713\u2713'}</span>;
        } else {
            statusCheck = <span className="ma-nach-check">{'\u2713'}</span>;
        }
    }

    return (
        <div className={'ma-nach-bubble-row ' + (istMa ? 'ma' : 'buero')}>
            <div className={bubbleCls}>
                {dringend && (
                    <div className="ma-nach-dringend-badge">
                        <span>{'\u{1F514}'}</span>
                        <span>{t('nach_dringend', lang)}</span>
                    </div>
                )}
                {istBuero && (
                    <div className="ma-nach-absender">
                        {nachricht.absender_name || t('nach_buero', lang)}
                    </div>
                )}
                {zeigeUebersetzungLoading ? (
                    <div className="ma-nach-text uebersetze">
                        {t('nach_uebersetze', lang)}
                    </div>
                ) : (
                    <div className="ma-nach-text">{anzeigeText}</div>
                )}
                {hatUebersetzung && (
                    <React.Fragment>
                        <button
                            type="button"
                            className="ma-nach-original-toggle"
                            onClick={function(){ setZeigeOriginal(!zeigeOriginal); }}>
                            {zeigeOriginal ? t('nach_original_aus', lang) : t('nach_original_an', lang)}
                        </button>
                        {zeigeOriginal && (
                            <div className="ma-nach-original-text">{nachricht.text_original}</div>
                        )}
                    </React.Fragment>
                )}
                <div className="ma-nach-meta">
                    <span>{nachFormatUhrzeit(nachricht.timestamp)}</span>
                    {statusCheck}
                </div>
            </div>
        </div>
    );
}

function MANachrichtenInput({ maId, absenderName, lang }) {
    const [text, setText]           = useState('');
    const [dringend, setDringend]   = useState(false);
    const [sendet, setSendet]       = useState(false);
    const [fehler, setFehler]       = useState(null); // { text, retryData } oder null
    const [horcht, setHorcht]       = useState(false);
    const textareaRef   = useRef(null);
    const recognitionRef = useRef(null);

    // Auto-Resize der Textarea (max 4 Zeilen)
    useEffect(function(){
        if (!textareaRef.current) return;
        const el = textareaRef.current;
        el.style.height = 'auto';
        const neueHoehe = Math.min(el.scrollHeight, 104);
        el.style.height = neueHoehe + 'px';
    }, [text]);

    // Cleanup: Spracherkennung bei Unmount
    useEffect(function(){
        return function(){
            if (recognitionRef.current) {
                try { recognitionRef.current.stop(); } catch(e){}
                recognitionRef.current = null;
            }
        };
    }, []);

    function istSendbereit() {
        return maId && text.trim().length > 0 && !sendet;
    }

    function sendeNachricht() {
        if (!istSendbereit()) return;
        const inhalt = text.trim();
        const dringendFlag = dringend;
        setSendet(true);
        setFehler(null);

        TWMaFirebase.sendeChatNachricht(maId, absenderName || 'Mitarbeiter', inhalt, lang || 'de', dringendFlag)
            .then(function(){
                // Erfolg: Input leeren, Dringend-Flag zuruecksetzen
                setText('');
                setDringend(false);
                setSendet(false);
                // Focus zurueck auf Textarea fuer schnelles Weitertippen
                if (textareaRef.current) {
                    requestAnimationFrame(function(){
                        if (textareaRef.current) textareaRef.current.focus();
                    });
                }
            })
            .catch(function(err){
                console.error('[Chat] Senden fehlgeschlagen:', err);
                setSendet(false);
                setFehler({
                    text:   t('nach_senden_fehler', lang),
                    inhalt: inhalt,
                    dringend: dringendFlag
                });
                // Text bleibt im Feld, User kann Retry
            });
    }

    function retrySenden() {
        if (!fehler) return;
        // Text wieder in den Zustand setzen und sofort senden
        setText(fehler.inhalt);
        setDringend(fehler.dringend);
        setFehler(null);
        // Kurz warten bis State gesetzt, dann senden
        setTimeout(function(){ sendeNachricht(); }, 50);
    }

    function onTextChange(e) {
        setText(e.target.value);
    }

    function onKeyDown(e) {
        // Desktop-Shortcut: Strg+Enter sendet. Normales Enter macht Zeilenumbruch auf Mobile.
        if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
            e.preventDefault();
            sendeNachricht();
        }
    }

    function toggleDringend() {
        setDringend(!dringend);
    }

    function starteSpracheingabe() {
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SR) {
            setFehler({ text: t('kal_modal_mikro_aus', lang), inhalt: text, dringend: dringend });
            return;
        }
        if (horcht && recognitionRef.current) {
            try { recognitionRef.current.stop(); } catch(e){}
            return;
        }
        const rec = new SR();
        rec.lang = langZuSpeechApiLang(lang);
        rec.interimResults = false;
        rec.maxAlternatives = 1;
        rec.continuous = false;

        rec.onstart = function(){ setHorcht(true); };
        rec.onresult = function(ev){
            const erkannt = (ev.results && ev.results[0] && ev.results[0][0]) ? ev.results[0][0].transcript : '';
            if (erkannt) {
                setText(function(prev){
                    return prev ? (prev.replace(/\s+$/,'') + ' ' + erkannt) : erkannt;
                });
            }
        };
        rec.onerror = function(){
            setFehler({ text: t('kal_modal_mikro_aus', lang), inhalt: text, dringend: dringend });
        };
        rec.onend = function(){
            setHorcht(false);
            recognitionRef.current = null;
        };

        try {
            rec.start();
            recognitionRef.current = rec;
        } catch(e) {
            setFehler({ text: t('kal_modal_mikro_aus', lang), inhalt: text, dringend: dringend });
        }
    }

    // HOTFIX v1.0.0-etappe5-b6-fcm-badge-hotfix1:
    // Frueher: inputDisabled = !maId || sendet  — das hat die Textarea komplett gesperrt,
    // wenn die Mitarbeiter-Identity noch nicht aufgeloest war (Auth-Race beim App-Start).
    // Jetzt: Eingabe ist immer moeglich, nur waehrend des Sendens kurz gesperrt.
    // Der Senden-Button bleibt weiterhin ueber istSendbereit() korrekt gesteuert.
    const inputDisabled = sendet;
    const rowCls = 'ma-nach-input-row' + (dringend ? ' dringend-aktiv' : '');

    return (
        <React.Fragment>
            {fehler && (
                <div className="ma-nach-fehler-banner">
                    <span className="text">{'\u26A0 '}{fehler.text}</span>
                    <button type="button" onClick={retrySenden}>{'\u21BB'}</button>
                    <button type="button" onClick={function(){ setFehler(null); }}>{'\u00D7'}</button>
                </div>
            )}
            {dringend && (
                <div className="ma-nach-dringend-banner">
                    {'\u{1F514} '}{t('nach_dringend_aktiv', lang)}
                </div>
            )}
            <div className={rowCls}>
                <button
                    type="button"
                    className={'ma-nach-dringend-toggle' + (dringend ? ' aktiv' : '')}
                    onClick={toggleDringend}
                    disabled={inputDisabled}
                    title={t('nach_dringend_hint', lang)}
                    aria-label="urgent toggle">
                    {'\u{1F514}'}
                </button>
                <div className="ma-nach-input-wrap">
                    <textarea
                        ref={textareaRef}
                        className="ma-nach-input"
                        rows={1}
                        placeholder={sendet ? t('nach_sende', lang) : t('nach_senden_placeholder', lang)}
                        value={text}
                        onChange={onTextChange}
                        onKeyDown={onKeyDown}
                        disabled={inputDisabled}/>
                    <button
                        type="button"
                        className={'ma-nach-input-mikro' + (horcht ? ' aktiv' : '')}
                        onClick={starteSpracheingabe}
                        disabled={inputDisabled}
                        title={t('kal_modal_diktat', lang)}
                        aria-label="voice input">
                        {'\u{1F3A4}'}
                    </button>
                </div>
                <button
                    type="button"
                    className={'ma-nach-senden-btn' + (dringend ? ' dringend' : '')}
                    onClick={sendeNachricht}
                    disabled={!istSendbereit()}
                    aria-label="send">
                    {'\u27A4'}
                </button>
            </div>
        </React.Fragment>
    );
}

/**
 * Globaler Hook: liefert Ungelesen-Zaehler und ma_id.
 * Wird einmal pro MainApp-Lifecycle verwendet (siehe dort).
 * Gibt { ungelesenCount, maId } zurueck.
 */
function useGlobaleChatSubscription() {
    const [maId, setMaId]                 = useState(null);
    const [ungelesenCount, setUngelesen]  = useState(0);

    useEffect(function(){
        let abgebrochen = false;
        if (window.TWMaFirebase && TWMaFirebase.getMeineMaId) {
            TWMaFirebase.getMeineMaId().then(function(id){
                if (!abgebrochen) setMaId(id || null);
            }).catch(function(){});
        }
        return function(){ abgebrochen = true; };
    }, []);

    useEffect(function(){
        if (!maId || !window.TWMaFirebase || !TWMaFirebase.subscribeChat) return;
        const unsub = TWMaFirebase.subscribeChat(maId, function(arr){
            if (!Array.isArray(arr)) { setUngelesen(0); return; }
            const n = arr.filter(function(m){
                return m && m.von === 'buero' && m.gelesen !== true;
            }).length;
            setUngelesen(n);
        });
        return function(){ try { unsub(); } catch(e){} };
    }, [maId]);

    return { maId: maId, ungelesenCount: ungelesenCount };
}

    if (status === 'granted' || status === 'dismissed' || status === 'unsupported') return null;

                <div className="ma-push-banner-actions">

            )}

    );
}

    /* ═══════════════════════════════════════════════════════════
       MAIN APP — der eigentliche App-Inhalt nach erfolgreichem Login
       (vorher hieß diese Komponente MAApp)
       ═══════════════════════════════════════════════════════════ */
    function MainApp({ lang: initialLang }) {
        const [lang, setLang] = useState(initialLang);
        const [fontLarge, setFontLarge] = useState(() => localStorage.getItem('tw_font_scale') === 'large');
        const [aktiverTab, setAktiverTab] = useState('start');
        const [sprachModalOffen, setSprachModalOffen] = useState(false);

        // Etappe 5 · B6 — globale Chat-Subscription fuer Badge + Status-Indikator
        const { ungelesenCount } = useGlobaleChatSubscription();

        // Etappe 5 · B6 — Push-Permission-State
        const [pushStatus, setPushStatus] = useState(function(){
            if (typeof Notification === 'undefined') return 'unsupported';
            // "dismissed" wird in sessionStorage gemerkt (nur fuer diese Session)
            if (sessionStorage.getItem('tw_ma_push_dismissed') === '1') return 'dismissed';
            return Notification.permission; // 'granted' | 'denied' | 'default'
        });

        useEffect(() => {
            if (fontLarge) {
                document.body.classList.add('tw-font-large');
                localStorage.setItem('tw_font_scale', 'large');
            } else {
                document.body.classList.remove('tw-font-large');
                localStorage.setItem('tw_font_scale', 'normal');
            }
        }, [fontLarge]);

        useEffect(() => {
            localStorage.setItem('tw-ma-sprache', lang);
        }, [lang]);

        // FCM beim App-Start initialisieren, falls bereits Permission granted ist
        useEffect(function(){
            if (pushStatus !== 'granted') return;
            if (!window.TWMaFirebase || !TWMaFirebase.initFcm) return;
            const vapidKey = (window.TWMaConfig && TWMaConfig.getFcmVapidKey)
                ? TWMaConfig.getFcmVapidKey()
                : (window.TW_FCM_VAPID_KEY || '');
            TWMaFirebase.initFcm(vapidKey).then(function(result){
                if (result.status === 'granted') {
                    console.log('[MA] FCM registriert');
                } else {
                    console.log('[MA] FCM Status:', result.status, result.reason || '');
                }
            });
        }, [pushStatus]);

        // Foreground-FCM-Handler (App offen, Notification soll nicht vom OS kommen)
        useEffect(function(){
            if (pushStatus !== 'granted' || !window.TWMaFirebase || !TWMaFirebase.subscribeFcmForeground) return;
            const unsub = TWMaFirebase.subscribeFcmForeground(function(payload){
                // Wenn Nachrichten-Tab offen: Live-Listener hat es ohnehin,
                // also keine Doppel-Notification noetig.
                console.log('[MA] Foreground FCM:', payload);
            });
            return function(){ if (typeof unsub === 'function') unsub(); };
        }, [pushStatus]);

        // Service-Worker-Message-Handler: Tap auf Hintergrund-Notification
        // oeffnet den Nachrichten-Tab
        useEffect(function(){
            if (!('serviceWorker' in navigator)) return;
            function handler(ev) {
                const data = ev.data;
                if (data && data.type === 'fcm-notification-click') {
                    setAktiverTab('nachrichten');
                }
            }
            navigator.serviceWorker.addEventListener('message', handler);
            return function(){ navigator.serviceWorker.removeEventListener('message', handler); };
        }, []);

        function pushAktivieren() {
            if (!window.TWMaFirebase || !TWMaFirebase.initFcm) {
                setPushStatus('unsupported');
                return;
            }
            const vapidKey = (window.TWMaConfig && TWMaConfig.getFcmVapidKey)
                ? TWMaConfig.getFcmVapidKey()
                : (window.TW_FCM_VAPID_KEY || '');
            if (!vapidKey) {
                console.warn('[MA] VAPID-Key fehlt - FCM kann nicht aktiviert werden');
                setPushStatus('unsupported');
                return;
            }
            TWMaFirebase.initFcm(vapidKey).then(function(result){
                setPushStatus(result.status);
            });
        }

        function pushSpaeter() {
            sessionStorage.setItem('tw_ma_push_dismissed', '1');
            setPushStatus('dismissed');
        }

        const tabs = [
            { id: 'start',       label: t('start', lang),       Icon: Icon.Home },
            { id: 'baustellen',  label: t('baustellen', lang),  Icon: Icon.Helm },
            { id: 'kalender',    label: t('kalender', lang),    Icon: Icon.Kalender },
            { id: 'fotos',       label: t('fotos', lang),       Icon: Icon.Kamera },
            { id: 'stunden',     label: t('stunden', lang),     Icon: Icon.Uhr },
            { id: 'nachrichten', label: t('nachrichten', lang), Icon: Icon.Sprechblase, badge: ungelesenCount }
        ];

        return (
            <>
                <NavHeader lang={lang}
                           onBack={() => history.back()}
                           onForward={() => history.forward()}
                           fontLarge={fontLarge}
                           onToggleFont={() => setFontLarge(f => !f)} />

                <div className="modul-tabs">
                    {tabs.map(tab => (
                        <button key={tab.id}
                                className={'modul-tab' + (aktiverTab === tab.id ? ' active' : '')}
                                onClick={() => setAktiverTab(tab.id)}>
                            <tab.Icon/>
                            <span>{tab.label}</span>
                            {tab.badge > 0 && <MAUngelesenBadge count={tab.badge}/>}
                        </button>
                    ))}
                </div>

                {aktiverTab === 'start' && (
                    <>
                        <MAPushPermissionBanner
                            lang={lang}
                            status={pushStatus}
                            onAktivieren={pushAktivieren}
                            onSpaeter={pushSpaeter}/>
                        {ungelesenCount > 0 && (
                            <MAStartIndikator
                                count={ungelesenCount}
                                lang={lang}
                                onKlick={() => setAktiverTab('nachrichten')}/>
                        )}
                    </>
                )}

                {aktiverTab === 'start' && (
                    <MAStartseite lang={lang} onSprachOeffnen={() => setSprachModalOffen(true)}/>
                )}
                {aktiverTab === 'baustellen' && (
                    <MABaustellenModul wechseleZuTab={setAktiverTab}/>
                )}
                {aktiverTab === 'kalender' && (
                    <MAKalenderModul/>
                )}
                {aktiverTab === 'fotos' && (
                    <ModulPlatzhalter lang={lang} titel={t('fotos', lang)} IconComp={Icon.Kamera}/>
                )}
                {aktiverTab === 'stunden' && (
                    <ModulPlatzhalter lang={lang} titel={t('stunden', lang)} IconComp={Icon.Uhr}/>
                )}
                {aktiverTab === 'nachrichten' && (
                    <MANachrichtenModul/>
                )}

                {sprachModalOffen && (
                    <SprachModal aktuell={lang}
                                 onWaehle={(c) => { setLang(c); setSprachModalOffen(false); }}
                                 onSchliessen={() => setSprachModalOffen(false)}/>
                )}
            </>
        );
    }

// ============================================================
// TW Baustellen-App - Modul Fotos (Etappe 6)
// ============================================================
// Master-Dokument Kap. 8: Foto-Dokumentation in 3 Phasen.
// Workflow: Raum waehlen -> Phase waehlen -> Wand antippen
//           -> Foto aufnehmen -> Editor -> Sprach-Notiz -> Speichern.
//
// Baustein 6.1 (DIESE DATEI):
//   - MAFotosView (Hauptkomponente, ersetzt den Stub)
//   - MARaumListe (Liste der angelegten Raeume + Neuer-Raum-Button)
//   - MARaumDialog (Anlegen / Bearbeiten eines Raumes)
//   - MAPhaseAuswahl (3 Buttons: Rohzustand / Vorarbeiten / Fertigstellung)
//   - MAWandRaster (4-8 Wand-Kacheln + Boden + Decke optional)
//
// Stufe 5+6 (Foto-Aufnahme + Editor + Sprach-Notiz) folgen in
// Baustein 6.2 / 6.3 / 6.4. Klick auf Wand-Kachel zeigt vorerst
// einen "Bald-Verfuegbar"-Hinweis.
// ============================================================

// 3-Phasen-Definition (1:1 wie Master-App tw-aufmass.jsx Z. 5322)
const MA_FOTO_PHASEN = [
    { key: 'rohzustand',     nr: 1, color: '#E67E22' },
    { key: 'vorarbeiten',    nr: 2, color: '#1E88E5' },
    { key: 'fertigstellung', nr: 3, color: '#43A047' }
];

// Zulaessige Wandzahlen
const MA_WANDZAHLEN = [3, 4, 5, 6, 7, 8];

// Geschoss-Optionen (Master-Dokument 8.4)
const MA_GESCHOSSE = ['KG', 'EG', 'OG', 'DG'];

// ============================================================
// MAFotosView - Hauptkomponente, ersetzt den MAStubView fuer Fotos
// ============================================================
//
// Routing-State:
//   'raumliste'   - Liste aller Raeume + "Neuer Raum"-Button (Stufe 2)
//   'neuerRaum'   - Dialog zum Anlegen eines Raums
//   'raumEdit'    - Dialog zum Bearbeiten eines Raums
//   'phasen'      - 3 Phase-Buttons mit Fortschritt (Stufe 3)
//   'waende'      - Wand-Raster der gewaehlten Phase (Stufe 4)
//
// ============================================================

function MAFotosView({ baustelle, kachel, onZurueck }) {
    const lang = useSprache();
    const [stufe, setStufe] = useState('raumliste');
    const [raeume, setRaeume] = useState([]);
    const [aktiverRaum, setAktiverRaum] = useState(null);
    const [aktivePhase, setAktivePhase] = useState(null);
    const [editRaum, setEditRaum] = useState(null);
    const [laden, setLaden] = useState(true);
    // Counter, der bei jeder Foto-Aenderung hochgezaehlt wird; triggert
    // ein Reload der Phasen-Fortschritte in MAPhaseAuswahl.
    const [aenderungsKey, setAenderungsKey] = useState(0);

    const baustelleId = baustelle && (baustelle.id || baustelle.staging_folder_id || baustelle.name);

    // Raeume aus IndexedDB laden, wenn Komponente gemountet wird oder
    // Baustelle wechselt.
    useEffect(function(){
        if (!baustelleId || !window.TWMaStorage || !window.TWMaStorage.listRaeume) {
            setLaden(false);
            return;
        }
        setLaden(true);
        window.TWMaStorage.listRaeume(baustelleId).then(function(liste){
            setRaeume(liste || []);
            setLaden(false);
        }).catch(function(err){
            console.warn('[MAFotosView] listRaeume fehlgeschlagen:', err.message);
            setRaeume([]);
            setLaden(false);
        });
    }, [baustelleId]);

    // Hilfs-Reload nach Anlegen / Aendern / Loeschen
    function reloadRaeume() {
        if (!baustelleId || !window.TWMaStorage || !window.TWMaStorage.listRaeume) return;
        window.TWMaStorage.listRaeume(baustelleId).then(function(liste){
            setRaeume(liste || []);
        }).catch(function(){});
    }

    // ============================================================
    // Render-Logik nach Stufe
    // ============================================================

    if (stufe === 'neuerRaum' || stufe === 'raumEdit') {
        return (
            <MARaumDialog
                baustelleId={baustelleId}
                raum={stufe === 'raumEdit' ? editRaum : null}
                onAbbrechen={function(){
                    setEditRaum(null);
                    setStufe('raumliste');
                }}
                onGespeichert={function(neuerRaum){
                    setEditRaum(null);
                    reloadRaeume();
                    setStufe('raumliste');
                    if (neuerRaum) {
                        // Direkt zur Phase-Auswahl springen, wenn neuer Raum
                        setAktiverRaum(neuerRaum);
                        setStufe('phasen');
                    }
                }}/>
        );
    }

    if (stufe === 'phasen' && aktiverRaum) {
        return (
            <MAPhaseAuswahl
                baustelle={baustelle}
                raum={aktiverRaum}
                aenderungsKey={aenderungsKey}
                onZurueck={function(){
                    setAktiverRaum(null);
                    setStufe('raumliste');
                }}
                onPhaseGewaehlt={function(phase){
                    setAktivePhase(phase);
                    setStufe('waende');
                }}/>
        );
    }

    if (stufe === 'waende' && aktiverRaum && aktivePhase) {
        return (
            <MAWandRaster
                baustelle={baustelle}
                raum={aktiverRaum}
                phase={aktivePhase}
                onZurueck={function(){
                    setAktivePhase(null);
                    setStufe('phasen');
                }}
                onAenderung={function(){
                    setAenderungsKey(function(prev){ return prev + 1; });
                }}/>
        );
    }

    // Default: Raum-Liste (Stufe 2)
    return (
        <MARaumListe
            baustelle={baustelle}
            raeume={raeume}
            laden={laden}
            onZurueck={onZurueck}
            onNeuerRaum={function(){ setStufe('neuerRaum'); }}
            onRaumWaehlen={function(raum){
                setAktiverRaum(raum);
                setStufe('phasen');
            }}
            onRaumBearbeiten={function(raum){
                setEditRaum(raum);
                setStufe('raumEdit');
            }}
            onRaumLoeschen={function(raum){
                if (!window.TWMaStorage || !window.TWMaStorage.deleteRaum) return;
                if (!confirm(tConfig('fotos.raum.loeschen.bestaetigen', { name: raum.bezeichnung }))) return;
                window.TWMaStorage.deleteRaum(raum.id).then(function(){
                    reloadRaeume();
                }).catch(function(err){
                    alert(tConfig('fotos.raum.loeschen.fehler') + '\n' + err.message);
                });
            }}/>
    );
}

// ============================================================
// MARaumListe - Stufe 2: Liste der Raeume + Neuer-Raum-Button
// ============================================================

function MARaumListe({ baustelle, raeume, laden, onZurueck, onNeuerRaum, onRaumWaehlen, onRaumBearbeiten, onRaumLoeschen }) {

    // Sortier-Reihenfolge: KG < EG < OG < DG, dann alphabetisch nach bezeichnung
    const geschossOrder = { 'KG': 0, 'EG': 1, 'OG': 2, 'DG': 3 };
    const sortierteRaeume = (raeume || []).slice().sort(function(a, b){
        const ga = geschossOrder[a.geschoss] !== undefined ? geschossOrder[a.geschoss] : 99;
        const gb = geschossOrder[b.geschoss] !== undefined ? geschossOrder[b.geschoss] : 99;
        if (ga !== gb) return ga - gb;
        return (a.bezeichnung || '').localeCompare(b.bezeichnung || '');

    return (
        <div className="ma-bau-container" style={maContainerStyle}>
            <MASubHeader
                titel={tConfig('fotos.raumliste.titel')}

                onZurueck={onZurueck}/>

            <div style={{padding:'16px', maxWidth:620, margin:'0 auto', width:'100%'}}>
                {/* Hinweis-Box */}
                <div style={{
                    padding:'10px 14px',
                    background:'#FFF8E1',
                    border:'1px solid #FFE082',
                    borderRadius:8,
                    fontSize:'0.85rem',
                    color:'#5D4037',
                    marginBottom:14
                }}>
                    {tConfig('fotos.raumliste.hinweis')}
                </div>

                {/* "Neuer Raum"-Button */}
                <button
                    onClick={onNeuerRaum}
                    style={{
                        width:'100%',
                        padding:'14px',
                        marginBottom:14,
                        background:'linear-gradient(135deg, #1E88E5, #1565C0)',
                        color:'#fff',
                        border:'none',
                        borderRadius:12,
                        fontSize:'1rem',
                        fontWeight:600,
                        fontFamily:'var(--font-headline, Oswald)',
                        cursor:'pointer',
                        boxShadow:'0 4px 12px rgba(30,136,229,0.3)',
                        display:'flex',
                        alignItems:'center',
                        justifyContent:'center',
                        gap:10,
                        minHeight:54
                    }}>
                    <span style={{fontSize:'1.4rem', lineHeight:1}}>+</span>
                    <span>{tConfig('fotos.raum.neu')}</span>
                </button>

                {/* Raum-Liste oder Empty-State */}
                {laden ? (
                    <div style={{textAlign:'center', padding:40, color:'#999'}}>
                        {tConfig('fotos.raumliste.lade')}
                    </div>
                ) : sortierteRaeume.length === 0 ? (
                    <div style={{
                        textAlign:'center',
                        padding:'30px 20px',
                        color:'#999',
                        background:'#fff',
                        borderRadius:12,
                        border:'1px dashed #DDD'
                    }}>
                        <div style={{fontSize:'2.5rem', marginBottom:8, opacity:0.5}}>{'\u{1F4D0}'}</div>
                        <div style={{fontSize:'0.95rem', fontWeight:600, color:'#666', marginBottom:4}}>
                            {tConfig('fotos.raumliste.leer.titel')}
                        </div>
                        <div style={{fontSize:'0.85rem'}}>
                            {tConfig('fotos.raumliste.leer.text')}
                        </div>
                    </div>
                ) : (
                    <div style={{display:'flex', flexDirection:'column', gap:8}}>
                        {sortierteRaeume.map(function(r){
                            return (
                                <MARaumRow
                                    key={r.id}
                                    raum={r}
                                    onClick={function(){ onRaumWaehlen(r); }}
                                    onBearbeiten={function(){ onRaumBearbeiten(r); }}
                                    onLoeschen={function(){ onRaumLoeschen(r); }}/>
                            );
                        })}
                    </div>
                )}
            </div>
        </div>
    );
}

// ============================================================
// MARaumDialog - Anlegen / Bearbeiten eines Raumes
// ============================================================
// Felder: Bezeichnung (mit Spracheingabe), Nummer (optional),
// Geschoss (Dropdown), Wandzahl (Auswahl 3-8).

function MARaumDialog({ baustelleId, raum, onAbbrechen, onGespeichert }) {
    const lang = useSprache();
    const istNeu = !raum;
    const [bezeichnung, setBezeichnung] = useState(raum ? (raum.bezeichnung || '') : '');
    const [nummer, setNummer] = useState(raum ? (raum.nummer || '') : '');
    const [geschoss, setGeschoss] = useState(raum ? (raum.geschoss || 'EG') : 'EG');
    const [wandzahl, setWandzahl] = useState(raum ? (raum.wandzahl || 4) : 4);
    const [hatBoden, setHatBoden] = useState(raum && raum.hatBoden !== undefined ? raum.hatBoden : true);
    const [hatDecke, setHatDecke] = useState(raum && raum.hatDecke !== undefined ? raum.hatDecke : false);
    const [speichern, setSpeichern] = useState(false);
    const [fehler, setFehler] = useState(null);

    function handleSpeichern() {
        const bez = (bezeichnung || '').trim();
        if (!bez) {
            setFehler(tConfig('fotos.raum.fehler.bezeichnung'));
            return;
        }
        if (!baustelleId) {
            setFehler(tConfig('fotos.raum.fehler.baustelle'));
            return;
        }
        if (!window.TWMaStorage || !window.TWMaStorage.saveRaum) {
            setFehler(tConfig('fotos.raum.fehler.storage'));
            return;
        }

        setFehler(null);
        setSpeichern(true);

        const id = (raum && raum.id) || ('raum-' + baustelleId + '-' + Date.now() + '-' + Math.random().toString(36).slice(2,7));
        const datensatz = {
            id: id,
            baustelle_id: baustelleId,
            bezeichnung: bez,
            nummer: (nummer || '').trim(),
            geschoss: geschoss,
            wandzahl: parseInt(wandzahl, 10) || 4,
            hatBoden: !!hatBoden,
            hatDecke: !!hatDecke,
            angelegt_am: (raum && raum.angelegt_am) || Date.now(),
            geaendert_am: Date.now()
        };

        window.TWMaStorage.saveRaum(datensatz).then(function(){
            setSpeichern(false);
            onGespeichert(istNeu ? datensatz : null);
        }).catch(function(err){
            setSpeichern(false);
            setFehler(err.message || tConfig('fotos.raum.fehler.speichern'));
        });
    }

    return (
        <div className="ma-bau-container" style={maContainerStyle}>
            <MASubHeader
                titel={istNeu ? tConfig('fotos.raum.neu.titel') : tConfig('fotos.raum.bearbeiten.titel')}
                onZurueck={onAbbrechen}/>

            <div style={{padding:'16px', maxWidth:620, margin:'0 auto', width:'100%'}}>
                {/* Bezeichnung */}
                <div style={{marginBottom:16}}>
                    <label style={maLabelStyle}>
                        {tConfig('fotos.raum.feld.bezeichnung')} <span style={{color:'#E53935'}}>*</span>
                    </label>
                    <input
                        type="text"
                        value={bezeichnung}
                        onChange={function(e){ setBezeichnung(e.target.value); }}
                        placeholder={tConfig('fotos.raum.feld.bezeichnung.platzhalter')}
                        style={maInputStyle}
                        autoFocus={istNeu}/>
                </div>

                {/* Nummer (optional) */}
                <div style={{marginBottom:16}}>
                    <label style={maLabelStyle}>{tConfig('fotos.raum.feld.nummer')}</label>
                    <input
                        type="text"
                        inputMode="text"
                        value={nummer}
                        onChange={function(e){ setNummer(e.target.value); }}
                        placeholder={tConfig('fotos.raum.feld.nummer.platzhalter')}
                        style={maInputStyle}/>
                </div>

                {/* Geschoss */}
                <div style={{marginBottom:16}}>
                    <label style={maLabelStyle}>{tConfig('fotos.raum.feld.geschoss')}</label>
                    <div style={{display:'flex', gap:6}}>
                        {MA_GESCHOSSE.map(function(g){
                            const aktiv = geschoss === g;
                            return (
                                <button
                                    key={g}
                                    onClick={function(){ setGeschoss(g); }}
                                    style={{
                                        flex:1,
                                        padding:'12px',
                                        borderRadius:10,
                                        fontSize:'0.95rem',
                                        fontWeight:700,
                                        fontFamily:'var(--font-headline, Oswald)',
                                        border: aktiv ? '2px solid #1E88E5' : '1px solid #DDD',
                                        background: aktiv ? '#E3F2FD' : '#fff',
                                        color: aktiv ? '#1565C0' : '#666',
                                        cursor:'pointer',
                                        minHeight:44
                                    }}>
                                    {g}
                                </button>
                            );
                        })}
                    </div>
                </div>

                {/* Wandzahl */}
                <div style={{marginBottom:16}}>
                    <label style={maLabelStyle}>{tConfig('fotos.raum.feld.wandzahl')}</label>
                    <div style={{display:'flex', gap:6, flexWrap:'wrap'}}>
                        {MA_WANDZAHLEN.map(function(n){
                            const aktiv = wandzahl === n;
                            return (
                                <button
                                    key={n}
                                    onClick={function(){ setWandzahl(n); }}
                                    style={{
                                        flex:'1 1 60px',
                                        padding:'12px 8px',
                                        borderRadius:10,
                                        fontSize:'1.05rem',
                                        fontWeight:700,
                                        fontFamily:'var(--font-headline, Oswald)',
                                        border: aktiv ? '2px solid #43A047' : '1px solid #DDD',
                                        background: aktiv ? '#E8F5E9' : '#fff',
                                        color: aktiv ? '#2E7D32' : '#666',
                                        cursor:'pointer',
                                        minHeight:48
                                    }}>
                                    {n}
                                </button>
                            );
                        })}
                    </div>
                </div>

                {/* Boden / Decke */}
                <div style={{marginBottom:20}}>
                    <label style={maLabelStyle}>{tConfig('fotos.raum.feld.zusaetze')}</label>
                    <div style={{display:'flex', gap:8}}>
                        <MAToggleKachel
                            label={tConfig('fotos.raum.boden')}
                            aktiv={hatBoden}
                            onClick={function(){ setHatBoden(!hatBoden); }}/>
                        <MAToggleKachel
                            label={tConfig('fotos.raum.decke')}
                            aktiv={hatDecke}
                            onClick={function(){ setHatDecke(!hatDecke); }}/>
                    </div>
                </div>

                {/* Fehler-Anzeige */}
                {fehler ? (
                    <div style={{
                        padding:'10px 14px',
                        background:'#FFEBEE',
                        color:'#C62828',
                        borderRadius:8,
                        fontSize:'0.85rem',
                        marginBottom:14
                    }}>
                        {fehler}
                    </div>
                ) : null}

                {/* Speichern + Abbrechen */}
                <div style={{display:'flex', gap:10}}>
                    <button
                        onClick={onAbbrechen}
                        disabled={speichern}
                        style={{
                            flex:1,
                            padding:'14px',
                            background:'#fff',
                            color:'#666',
                            border:'1px solid #DDD',
                            borderRadius:10,
                            fontSize:'0.95rem',
                            fontWeight:600,
                            cursor: speichern ? 'not-allowed' : 'pointer',
                            opacity: speichern ? 0.5 : 1,
                            minHeight:50
                        }}>
                        {tConfig('fotos.raum.abbrechen')}
                    </button>
                    <button
                        onClick={handleSpeichern}
                        disabled={speichern}
                        style={{
                            flex:2,
                            padding:'14px',
                            background: speichern
                                ? '#90CAF9'
                                : 'linear-gradient(135deg, #43A047, #2E7D32)',
                            color:'#fff',
                            border:'none',
                            borderRadius:10,
                            fontSize:'1rem',
                            fontWeight:700,
                            fontFamily:'var(--font-headline, Oswald)',
                            cursor: speichern ? 'not-allowed' : 'pointer',
                            boxShadow: speichern ? 'none' : '0 4px 12px rgba(67,160,71,0.3)',
                            minHeight:50
                        }}>

                    </button>
                </div>
            </div>
        </div>
    );
}

// ============================================================
// MAPhaseAuswahl - Stufe 3: 3 Phase-Buttons mit Fortschritt
// ============================================================
// Pro Phase: "X von Y Waenden dokumentiert" (Fortschritts-Indikator).
// Master-Dokument 8.5.

function MAPhaseAuswahl({ baustelle, raum, aenderungsKey, onZurueck, onPhaseGewaehlt }) {
    const lang = useSprache();
    const [fortschritt, setFortschritt] = useState({ rohzustand: 0, vorarbeiten: 0, fertigstellung: 0 });

    // Anzahl moeglicher Foto-Slots (Waende + ggf. Boden + ggf. Decke)
    const slotsTotal = (raum.wandzahl || 4) + (raum.hatBoden ? 1 : 0) + (raum.hatDecke ? 1 : 0);

    // Foto-Anzahl pro Phase laden. aenderungsKey loest reload aus, wenn
    // ein Foto in der Wand-Raster-Ansicht hinzugefuegt/geloescht wurde.
    useEffect(function(){
        if (!window.TWMaStorage || !window.TWMaStorage.zaehleFotos) return;
        window.TWMaStorage.zaehleFotos(raum.id).then(function(map){
            setFortschritt(map || { rohzustand: 0, vorarbeiten: 0, fertigstellung: 0 });
        }).catch(function(){});
    }, [raum.id, aenderungsKey]);

    return (
        <div className="ma-bau-container" style={maContainerStyle}>
            <MASubHeader
                titel={raum.bezeichnung + (raum.nummer ? ' \u00B7 ' + raum.nummer : '')}
                untertitel={(raum.geschoss || '') + ' \u00B7 ' + tConfig('fotos.raum.waende', { n: raum.wandzahl || 4 })}
                onZurueck={onZurueck}/>

            <div style={{padding:'16px', maxWidth:620, margin:'0 auto', width:'100%'}}>
                <div style={{
                    fontSize:'0.85rem',
                    color:'#666',
                    marginBottom:14,
                    textAlign:'center'
                }}>
                    {tConfig('fotos.phase.intro')}
                </div>

                <div style={{display:'flex', flexDirection:'column', gap:12}}>
                    {MA_FOTO_PHASEN.map(function(phase){
                        const anzahl = fortschritt[phase.key] || 0;
                        return (
                            <MAPhaseKachel
                                key={phase.key}
                                phase={phase}
                                anzahlFotos={anzahl}
                                slotsTotal={slotsTotal}
                                onClick={function(){ onPhaseGewaehlt(phase); }}/>
                        );
                    })}
                </div>
            </div>
        </div>
    );
}
