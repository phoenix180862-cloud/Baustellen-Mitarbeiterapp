// ===== Chat-Bubble ============================================

function ChatBubble(props) {
    const { msg, lang } = props;
    const eigene = msg.richtung === 'von_ma';

    // Was zeigen wir oben (gross) und unten (klein)?
    // Eigene Bubble: oben Original (MA-Sprache), unten Deutsch
    // Fremde Bubble: oben Uebersetzung in MA-Sprache, unten Original (DE)
    let oben, unten, obenSprache, untenSprache;
    if (eigene) {
        oben         = (msg.original && msg.original.text) || '';
        obenSprache  = (msg.original && msg.original.sprache) || lang;
        unten        = msg.uebersetzung && msg.uebersetzung.text;
        untenSprache = msg.uebersetzung && msg.uebersetzung.sprache;
    } else {
        // Eingehend: Original ist DE, MA will Uebersetzung in MA-Sprache sehen
        oben         = msg.uebersetzung && msg.uebersetzung.text;
        obenSprache  = msg.uebersetzung && msg.uebersetzung.sprache;
        unten        = (msg.original && msg.original.text) || '';
        untenSprache = (msg.original && msg.original.sprache) || 'de';
        if (!oben) { // Notfall: keine Uebersetzung -> Original gross zeigen
            oben = unten; obenSprache = untenSprache;
            unten = null;
        }
    }

    const istWartet = msg.lokal_status === 'wartet';
    const istFehler = msg.lokal_status === 'fehler';
    const trennfarbeOK = eigene ? 'rgba(255,255,255,0.35)' : 'rgba(255,255,255,0.15)';

    // Status-Icon (nur eigene)
    let statusIcon = null;
    if (eigene) {
        if (istWartet) statusIcon = '\u29D6'; // sanduhr-aehnlich
        else if (istFehler) statusIcon = '!';
        else if (msg.gelesen_am) statusIcon = '\u2713\u2713';
        else statusIcon = '\u2713';
    }

    // Zeit
    let zeitStr = '';
    if (msg.gesendet_am) {
        const d = new Date(msg.gesendet_am);
        zeitStr = String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
    }

    return (
        <div style={{
            display:'flex',
            justifyContent: eigene ? 'flex-end' : 'flex-start',
            marginBottom: 6
        }}>
            <div style={{
                maxWidth: '78%',
                padding: '8px 12px',
                background: eigene
                    ? 'linear-gradient(135deg,#1E88E5,#1565C0)'
                    : 'var(--bg-card)',
                color: eigene ? '#fff' : 'var(--text-white)',
                border: eigene ? 'none' : '1px solid var(--border-color)',
                borderRadius: 'var(--radius-lg)',
                borderTopRightRadius: eigene ? 4 : 'var(--radius-lg)',
                borderTopLeftRadius:  eigene ? 'var(--radius-lg)' : 4,
                opacity: istWartet ? 0.7 : 1,
                position:'relative'
            }}>
                {!eigene && msg.absender_name && (
                    <div style={{
                        fontSize: 10, fontWeight:700,
                        color:'var(--accent-blue)',
                        marginBottom: 3,
                        textTransform:'uppercase', letterSpacing:'0.5px'
                    }}>{msg.absender_name}</div>
                )}

                {/* Haupt-Text (gross) */}
                <div style={{
                    fontSize: 14, lineHeight: 1.35,
                    whiteSpace: 'pre-wrap', wordBreak:'break-word'
                }}>{oben || (msg.uebersetzung_status === 'failed'
                       ? '(' + TWMAConfig.t('nch_uebersetzung_fehlt', lang) + ')'
                       : '')}</div>

                {/* Trennlinie + Untertitel */}
                {unten && unten !== oben && (
                    <React.Fragment>
                        <div style={{
                            display:'flex', alignItems:'center', gap:6,
                            margin:'5px 0 3px',
                            fontSize:9,
                            color: eigene ? 'rgba(255,255,255,0.7)' : 'var(--text-muted)'
                        }}>
                            <span>{'\u{1F310}'}</span>
                            <span style={{
                                flex:1, height:1, background: trennfarbeOK
                            }}></span>
                            <span style={{textTransform:'uppercase', letterSpacing:'0.5px'}}>
                                {(untenSprache || '').toUpperCase()}
                            </span>
                        </div>
                        <div style={{
                            fontSize: 12, lineHeight: 1.3,
                            opacity: 0.85, fontStyle:'italic',
                            whiteSpace:'pre-wrap', wordBreak:'break-word'
                        }}>{unten}</div>
                    </React.Fragment>
                )}

                {msg.uebersetzung_status === 'failed' && (
                    <div style={{
                        marginTop:4, fontSize:10,
                        color: eigene ? '#ffcccc' : '#c41e1e'
                    }}>{'\u26A0 '}{TWMAConfig.t('nch_uebersetzung_fehlt', lang)}</div>
                )}

                {/* Footer */}
                <div style={{
                    display:'flex', justifyContent:'flex-end', gap:6,
                    marginTop:3, fontSize:10,
                    color: eigene ? 'rgba(255,255,255,0.75)' : 'var(--text-muted)'
                }}>
                    <span>{zeitStr}</span>
                    {statusIcon && (
                        <span style={{
                            color: istFehler ? '#ff7675'
                                  : (eigene && msg.gelesen_am) ? '#a8e6cf'
                                  : 'inherit',
                            fontWeight: 700
                        }}>{statusIcon}</span>
                    )}
                </div>
            </div>
        </div>
    );
}

// ===== Chat-Eingabezeile ======================================

function ChatEingabe(props) {
    const { lang, onSenden, deaktiviert } = props;
    const [text, setText] = React.useState('');
    const speech = useSpeech(lang);
    const taRef = React.useRef(null);

    React.useEffect(function() {
        if (speech.transcript) {
            setText(function(t) {
                return t ? (t + ' ' + speech.transcript) : speech.transcript;
            });
        }
    }, [speech.transcript]);

    function senden() {
        const t = text.trim();
        if (!t || deaktiviert) return;
        onSenden(t);
        setText('');
        if (taRef.current) taRef.current.style.height = '40px';
    }

    function autoResize(e) {
        const ta = e.target;
        ta.style.height = '40px';
        ta.style.height = Math.min(ta.scrollHeight, 120) + 'px';
    }

    return (
        <div style={{
            padding:'10px 12px',
            background:'var(--bg-secondary)',
            borderTop:'1px solid var(--border-color)',
            display:'flex', gap:8, alignItems:'flex-end'
        }}>
            <textarea ref={taRef}
                value={text}
                onChange={function(e){ setText(e.target.value); autoResize(e); }}
                onKeyDown={function(e) {
                    if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault();
                        senden();
                    }
                }}
                placeholder={TWMAConfig.t('nch_eingabe_platzhalter', lang)}
                rows={1}
                style={{
                    flex:1, padding:'10px 12px',
                    background:'var(--bg-card)',
                    color:'var(--text-white)',
                    border:'1px solid var(--border-color)',
                    borderRadius:'var(--radius-lg)',
                    fontSize:14, fontFamily:'inherit',
                    height:40, minHeight:40, maxHeight:120,
                    resize:'none', overflowY:'auto',
                    boxSizing:'border-box'
                }} />

            {speech.supported && (
                <MicButton size={40}
                    recording={speech.recording}
                    onClick={function(){ speech.recording ? speech.stop() : speech.start(); }} />
            )}

            <button onClick={senden}
                disabled={!text.trim() || deaktiviert}
                style={{
                    width:48, height:40,
                    background: text.trim() && !deaktiviert
                        ? 'linear-gradient(135deg,#1E88E5,#1565C0)'
                        : 'var(--bg-card)',
                    color: text.trim() && !deaktiviert ? '#fff' : 'var(--text-muted)',
                    border:'none', borderRadius:'var(--radius-lg)',
                    fontSize:18, fontWeight:700,
                    cursor: text.trim() && !deaktiviert ? 'pointer' : 'not-allowed',
                    flexShrink:0
                }}>{'\u27A4'}</button>
        </div>
    );
}

// ===== Chat-Ansicht ===========================================

function ChatAnsicht(props) {
    const { lang } = props;
    const [messages, setMessages]     = React.useState([]);
    const [pending, setPending]       = React.useState([]); // lokale, noch nicht gesendete
    const [warnung, setWarnung]       = React.useState('');
    const scrollRef = React.useRef(null);
    const deviceId = TWMACore.getDeviceId();

    // Firebase-Listener
    React.useEffect(function() {
        if (!window.TWMAFirebase || !TWMAFirebase.isReady()) return;
        const unsub = TWMAFirebase.listenForMessages(deviceId, function(list) {
            setMessages(list);
            // Eigene gesendete koennen jetzt aus pending entfernt werden
            setPending(function(p) {
                return p.filter(function(localMsg) {
                    // Match per local_id im Firebase-Eintrag (wir nutzen ihn nicht, also einfach via timestamp+text)
                    return !list.find(function(m) {
                        return m.richtung === 'von_ma'
                            && m.original && localMsg.original
                            && m.original.text === localMsg.original.text
                            && Math.abs((m.gesendet_am || 0) - (localMsg.gesendet_am || 0)) < 60000;
                    });
                });
            });
            // Eingehende ungelesene als gelesen markieren
            list.forEach(function(m) {
                if (m.richtung === 'von_buero' && !m.gelesen_am) {
                    TWMAFirebase.markMessageAsRead(deviceId, m.id);
                }
            });
        });
        return unsub;
    }, [deviceId]);

    // Auto-Scroll bei neuer Nachricht
    React.useEffect(function() {
        if (scrollRef.current) {
            scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
        }
    }, [messages, pending]);

    // Kein-API-Key-Hinweis
    React.useEffect(function() {
        const t = setTimeout(function() {
            if (window.TWMATranslate && !TWMATranslate.hasApiKey()) {
                setWarnung(TWMAConfig.t('nch_kein_apikey', lang));
            }
        }, 1000);
        return function() { clearTimeout(t); };
    }, []);

    async function senden(text) {
        if (!window.TWMAFirebase || !TWMAFirebase.isReady()) {
            setWarnung('Firebase nicht bereit');
            return;
        }

        const localMsg = {
            id: 'local_' + Date.now(),
            richtung: 'von_ma',
            absender_name: TWMAConfig.t('nch_du', lang),
            original: { sprache: lang, text: text },
            uebersetzung: null,
            gesendet_am: Date.now(),
            lokal_status: 'wartet',
            uebersetzung_status: 'pending'
        };
        setPending(function(p) { return p.concat(localMsg); });

        // Uebersetzen (DE-Default oder weglassen wenn schon DE)
        let uebers = null;
        let ueberStatus = 'ok';
        if (lang === 'de') {
            uebers = { sprache: 'de', text: text };
        } else if (window.TWMATranslate) {
            try {
                const tr = await TWMATranslate.translate(text, lang, 'de');
                if (tr.success) {
                    uebers = { sprache: 'de', text: tr.text };
                } else {
                    uebers = { sprache: 'de', text: text }; // Fallback Original
                    ueberStatus = 'failed';
                }
            } catch (_) {
                uebers = { sprache: 'de', text: text };
                ueberStatus = 'failed';
            }
        }

        // An Firebase
        try {
            await TWMAFirebase.sendMessage({
                deviceId: deviceId,
                richtung: 'von_ma',
                absender_name: TWMAConfig.t('nch_du', 'de'),
                original: { sprache: lang, text: text },
                uebersetzung: uebers,
                uebersetzung_status: ueberStatus,
                typ: 'chat'
            });
            // Pending wird durch listenForMessages-Sync abgeraeumt
        } catch (err) {
            // Markiere als Fehler (bleibt in pending)
            setPending(function(p) {
                return p.map(function(m) {
                    return m.id === localMsg.id
                        ? Object.assign({}, m, { lokal_status: 'fehler' })
                        : m;
                });
            });
        }
    }

    // Kombinierte Liste (Firebase + lokale Pending)
    const alle = messages.concat(pending);

    return (
        <div style={{flex:1, display:'flex', flexDirection:'column', minHeight:0}}>
            {warnung && (
                <div style={{
                    padding:'8px 14px',
                    background:'rgba(243,156,18,0.15)',
                    borderBottom:'1px solid rgba(243,156,18,0.3)',
                    color:'#f39c12',
                    fontSize:11, textAlign:'center'
                }}>{'\u26A0 '}{warnung}</div>
            )}

            <div ref={scrollRef} style={{
                flex:1, overflowY:'auto',
                padding:'12px 14px',
                background:'var(--bg-primary)'
            }}>
                {alle.length === 0 && (
                    <div style={{
                        padding:'40px 20px', textAlign:'center',
                        color:'var(--text-muted)', fontStyle:'italic'
                    }}>{TWMAConfig.t('nch_keine_nachrichten', lang)}</div>
                )}
                {alle.map(function(msg) {
                    return <ChatBubble key={msg.id} msg={msg} lang={lang} />;
                })}
            </div>

            <ChatEingabe lang={lang} onSenden={senden}
                deaktiviert={!window.TWMAFirebase || !TWMAFirebase.isReady()} />
        </div>
    );
}

    );
}

function MAModulNavigation(props) {
    const lang = props.lang;
    const tabs = [
        { id: 'start',       label: TWMAConfig.t('start',       lang) },
        { id: 'baustellen',  label: TWMAConfig.t('baustellen',  lang) },
        { id: 'kalender',    label: TWMAConfig.t('kalender',    lang) },
        { id: 'fotos',       label: TWMAConfig.t('fotos',       lang) },
        { id: 'stunden',     label: TWMAConfig.t('stunden',     lang) },
        { id: 'nachrichten', label: TWMAConfig.t('nachrichten', lang) }
    ];
    return (
        <div style={{
            display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)',
            gap: 8, padding: '10px 12px',
            background: 'var(--bg-secondary)',
            borderBottom: '1px solid var(--border-color)'
        }}>
            {tabs.map(tab => (
                <ModulButton key={tab.id}
                    id={tab.id} label={tab.label}
                    aktiv={props.aktiv === tab.id}
                    onClick={() => props.onSelect(tab.id)} />
            ))}
        </div>
    );
}

// ===== Checking-Screen (Splash) ==============================
function MACheckingScreen(props) {
    return (
        <MAOnboardingContainer lang={props.lang}>
            <div style={{
                display: 'inline-block', width: 36, height: 36,
                border: '3px solid var(--border-color)',
                borderTopColor: 'var(--accent-blue)',
                borderRadius: '50%',
                animation: 'tw-spin 1s linear infinite'
            }}/>
            <style>{'@keyframes tw-spin { to { transform: rotate(360deg); } }'}</style>
        </MAOnboardingContainer>
    );
}

// ===== Haupt-App (nach erfolgreichem Login) ==================
function MAMainApp(props) {
    // History-Stack fuer Zurueck/Vor
    const [history, setHistory] = React.useState(['start']);
    const [cursor,  setCursor]  = React.useState(0);
    const [fontScale, setFontScale] = React.useState(1);

    const aktiverTab = history[cursor];
    const lang = props.lang;

    React.useEffect(() => {
        if (!window.TWMAStorage) return;
        TWMAStorage.getSetting('font_scale').then(f => {
            if (f && typeof f === 'number') setFontScale(f);
        }).catch(() => {});
    }, []);

    React.useEffect(() => {
        if (window.TWMAStorage) TWMAStorage.setSetting('font_scale', fontScale).catch(() => {});
        document.documentElement.style.fontSize = (16 * fontScale) + 'px';
    }, [fontScale]);

    function navigateTo(tabId) {
        if (tabId === aktiverTab) return;
        const neuesHistory = history.slice(0, cursor + 1);
        neuesHistory.push(tabId);
        setHistory(neuesHistory);
        setCursor(neuesHistory.length - 1);
    }

    function goBack()    { if (cursor > 0) setCursor(cursor - 1); }
    function goForward() { if (cursor < history.length - 1) setCursor(cursor + 1); }
    function fontBigger()  { setFontScale(s => Math.min(s + 0.1, 1.5)); }
    function fontSmaller() { setFontScale(s => Math.max(s - 0.1, 0.8)); }

    const commonProps = { lang: lang, setLang: props.setLang };

    let modul;
    switch (aktiverTab) {
        case 'start':       modul = <MAStartseite   {...commonProps} />; break;
        case 'baustellen':  modul = <MABaustellen   {...commonProps} />; break;
        case 'kalender':    modul = <MAKalender     {...commonProps} />; break;
        case 'fotos':       modul = <MAFotos        {...commonProps} />; break;
        case 'stunden':     modul = <MAStunden      {...commonProps} />; break;
        case 'nachrichten': modul = <MANachrichten  {...commonProps} />; break;
        default:            modul = <MAStartseite   {...commonProps} />;
    }

    return (
        <div style={{
            minHeight: '100vh',
            display: 'flex', flexDirection: 'column',
            background: 'var(--bg-primary)'
        }}>
            <MAHeader
                titel={TWMAConfig.t('app_name', lang)}
                canBack={cursor > 0}
                canForward={cursor < history.length - 1}
                onBack={goBack}
                onForward={goForward}
                onFontBigger={fontBigger}
                onFontSmaller={fontSmaller}
            />
            <MAModulNavigation
                aktiv={aktiverTab}
                onSelect={navigateTo}
                lang={lang}
            />
            {modul}
            <div style={{
                padding: '6px 8px', textAlign: 'center',
                color: 'var(--text-muted)', fontSize: 10,
                borderTop: '1px solid var(--border-color)',
                fontFamily: 'Oswald, sans-serif', letterSpacing: 1,
                background: 'var(--bg-secondary)'
            }}>
                TW Baustellen-App v{TWMAConfig.APP_VERSION}
            </div>
        </div>
    );
}

// ===== Top-Level MAApp mit State-Machine =====================
function MAApp() {
    const [phase, setPhase]           = React.useState('checking');
    const [lang,  setLang]            = React.useState('de');
    const [anmeldeCode, setAnmCode]   = React.useState(null);
    const [firebaseConfig, setFbCfg]  = React.useState(null);

    const deviceId = React.useMemo(() => TWMACore.getDeviceId(), []);

    // ---- Init: Sprache laden, Firebase-Config pruefen, Firebase initen ----
    React.useEffect(() => {
        (async function() {
            try {
                // Sprache
                const storedLang = await TWMAStorage.getSetting('ui_lang');
                if (storedLang) setLang(storedLang);
            } catch (e) {}

            // 1) Firebase-Config laden
            let cfg = null;
            try {
                const stored = await TWMAStorage.getSetting('firebase_config');
                if (stored && stored.apiKey) cfg = stored;
            } catch (e) {}

            if (!cfg) {
                const defaultCfg = TWMAConfig.FIREBASE_CONFIG;
                if (defaultCfg && defaultCfg.apiKey) cfg = defaultCfg;
            }

            if (!cfg) {
                setPhase('firebase_config');
                return;
            }

            setFbCfg(cfg);
            const ok = TWMAFirebase.init(cfg);
            if (!ok) {
                setPhase('firebase_config');
                return;
            }

            await weiterMitGeraetStatus();
        })();
    }, []);

    // ---- Nach Firebase-Init: Geraete-Status pruefen ----
    async function weiterMitGeraetStatus() {
        try {
            const pinHash = await TWMAStorage.getSetting('pin_hash_local');
            if (pinHash) {
                // Lokaler PIN-Hash vorhanden -> direkt zum PIN-Login
                setPhase('pin_login');
                startFirebaseListener();
                return;
            }
        } catch (e) {}

        // Kein lokaler PIN -> Onboarding
        // Bestehenden Code wiederverwenden falls da
        let code = null;
        try { code = await TWMAStorage.getSetting('anmelde_code'); } catch (e) {}
        if (!code) {
            code = TWMACore.generateAnmeldeCode();
            try { await TWMAStorage.setSetting('anmelde_code', code); } catch (e) {}
        }
        setAnmCode(code);

        // Freigabe in Firebase registrieren (fire-and-forget)
        TWMAFirebase.requestDeviceApproval(deviceId, code).catch(function(e) {
            TWMACore.log('error', 'App', 'requestDeviceApproval', e);
        });

        setPhase('onboarding_code');
        startFirebaseListener();
    }

    // ---- Firebase-Status-Listener ----
    const unsubRef = React.useRef(null);

    function startFirebaseListener() {
        if (unsubRef.current) return;
        unsubRef.current = TWMAFirebase.onDeviceStatus(deviceId, function(data) {
            if (!data) return;
            TWMACore.log('info', 'App', 'Geraete-Status-Update', data.status);

            if (data.status === 'wipe' || data.status === 'gesperrt') {
                handleWipe();
                return;
            }
            if (data.status === 'abgelehnt') {
                setPhase('onboarding_abgelehnt');
                return;
            }
            if (data.status === 'freigegeben' || data.status === 'aktiv') {
                // Wenn gerade im Onboarding-Code-Screen: zum PIN-Setup
                setPhase(prev => {
                    if (prev === 'onboarding_code') return 'pin_setup';
                    return prev;
                });
            }
        });

        // Heartbeat alle 60s
        const hbInterval = setInterval(function() {
            TWMAFirebase.heartbeat(deviceId).catch(function() {});
        }, 60000);
        // Initialer Heartbeat
        TWMAFirebase.heartbeat(deviceId).catch(function() {});

        // Cleanup bei Unload
        window.addEventListener('beforeunload', function() {
            clearInterval(hbInterval);
            if (unsubRef.current) { unsubRef.current(); unsubRef.current = null; }
        });
    }

    // ---- Firebase-Config uebernehmen ----
    async function handleFirebaseConfigSubmit(cfg) {
        try {
            await TWMAStorage.setSetting('firebase_config', cfg);
            setFbCfg(cfg);
            const ok = TWMAFirebase.init(cfg);
            if (ok) {
                await weiterMitGeraetStatus();
            }
        } catch (e) {
            TWMACore.log('error', 'App', 'Config-Save', e);
        }
    }

    // ---- PIN setzen ----
    async function handleSetPin(pin) {
        const hash = await TWMACore.hashPin(pin, deviceId);
        await TWMAStorage.setSetting('pin_hash_local', hash);
        await TWMAFirebase.setPinHash(deviceId, hash).catch(function() {});
        await TWMAFirebase.resetFailedPinCounter(deviceId).catch(function() {});
        setPhase('app');
    }

    // ---- PIN pruefen ----
    async function handleCheckPin(pin) {
        const hash = await TWMACore.hashPin(pin, deviceId);
        const stored = await TWMAStorage.getSetting('pin_hash_local');
        if (hash === stored) {
            TWMAFirebase.resetFailedPinCounter(deviceId).catch(function() {});
            setPhase('app');
            return true;
        }
        TWMAFirebase.incrementFailedPinCounter(deviceId).catch(function() {});
        return false;
    }

    // ---- Zu viele Fehlversuche ----
    async function handleTooManyFailures() {
        TWMACore.log('warn', 'App', 'Zu viele PIN-Fehlversuche - Wipe');
        if (firebaseConfig) {
            // Geraete-Status in Firebase auf wipe setzen
            try {
                const db = TWMAFirebase.db();
                if (db) db.ref('geraete/' + deviceId + '/status').set('auto_wipe');
            } catch (e) {}
        }
        handleWipe();
    }

    async function handleWipe() {
        if (unsubRef.current) { unsubRef.current(); unsubRef.current = null; }
        await TWMACore.wipeApp();
        TWMACore.clearDeviceId();
        setPhase('wipe');
        setTimeout(function() { location.reload(); }, 2500);
    }

    // ---- Sprach-Persistenz ----
    React.useEffect(() => {
        if (window.TWMAStorage) TWMAStorage.setSetting('ui_lang', lang).catch(() => {});
    }, [lang]);

    // ---- Sync-Orchestrator starten sobald die App laeuft ----
    React.useEffect(() => {
        if (phase === 'app' && window.TWMASync) {
            TWMASync.start();
        }
    }, [phase]);

    // ---- Render ----
    const commonProps = { lang: lang };

    switch (phase) {
        case 'checking':
            return <MACheckingScreen {...commonProps} />;
        case 'firebase_config':
            return <MAFirebaseConfigDialog {...commonProps} onSubmit={handleFirebaseConfigSubmit} />;
        case 'onboarding_code':
            return <MAOnboardingCode {...commonProps} code={anmeldeCode} />;
        case 'onboarding_abgelehnt':
            return <MAOnboardingAbgelehnt {...commonProps} />;
        case 'pin_setup':
            return <MAPinSetup {...commonProps} onSetPin={handleSetPin} />;
        case 'pin_login':
            return <MAPinLogin {...commonProps}
                        onCheckPin={handleCheckPin}
                        onTooManyFailures={handleTooManyFailures} />;
        case 'wipe':
            return (
                <MAOnboardingContainer lang={lang}>
                    <div style={{
                        padding: 20, maxWidth: 380, textAlign: 'center',
                        color: 'var(--accent-red-light)', fontSize: 16,
                        background: 'var(--bg-card)',
                        border: '2px solid var(--accent-red)',
                        borderRadius: 'var(--radius-xl)'
                    }}>
                        {TWMAConfig.t('wipe_nachricht', lang)}
                    </div>
                </MAOnboardingContainer>
            );
        case 'app':
        default:
            return <MAMainApp lang={lang} setLang={setLang} />;
    }
}

ReactDOM.createRoot(document.getElementById('root')).render(<MAApp />);
</script>
</body>
