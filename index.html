    const [suche, setSuche] = React.useState('');

    if (!offen) return null;

    const kategorien = [
        { id: 'fliesen',     label: TWMAConfig.t('std_mat_kat_fliesen', lang) },
        { id: 'kleber',      label: TWMAConfig.t('std_mat_kat_kleber', lang) },
        { id: 'fuge',        label: TWMAConfig.t('std_mat_kat_fuge', lang) },
        { id: 'silikon',     label: TWMAConfig.t('std_mat_kat_silikon', lang) },
        { id: 'abdicht',     label: TWMAConfig.t('std_mat_kat_abdicht', lang) },
        { id: 'hilfsmittel', label: TWMAConfig.t('std_mat_kat_hilfsmittel', lang) },
        { id: 'werkzeug',    label: TWMAConfig.t('std_mat_kat_werkzeug', lang) },
        { id: 'sonstiges',   label: TWMAConfig.t('std_mat_kat_sonstiges', lang) }
    ];

    const alleMats = TWMAConfig.MATERIAL_DB;
    const gefiltert = alleMats.filter(function(m) {
        if (suche.trim()) {
            return m.name.toLowerCase().indexOf(suche.toLowerCase()) !== -1;
        }
        return m.kategorie === kategorie;
    });

    function istGewaehlt(matId) {
        return gewaehlt && gewaehlt.some(function(g){ return g.material_id === matId; });
    }

    function addMaterial(m) {
        if (istGewaehlt(m.id)) return;
        const neu = (gewaehlt || []).concat({
            material_id: m.id,
            name: m.name,
            menge: '',
            einheit: m.default_einheit
        });
        onChange(neu);
    }

    return (
        <div style={{
            position:'fixed', inset:0, zIndex:1000,
            background:'rgba(0,0,0,0.75)',
            display:'flex', alignItems:'flex-end', justifyContent:'center'
        }} onClick={onClose}>
            <div onClick={function(e){ e.stopPropagation(); }}
                style={{
                    width:'100%', maxWidth:480, maxHeight:'85vh',
                    background:'var(--bg-card)',
                    borderTopLeftRadius:'var(--radius-xl)',
                    borderTopRightRadius:'var(--radius-xl)',
                    display:'flex', flexDirection:'column',
                    overflow:'hidden'
                }}>
                {/* Header */}
                <div style={{
                    padding:'14px 16px',
                    borderBottom:'1px solid var(--border-color)',
                    display:'flex', alignItems:'center', justifyContent:'space-between'
                }}>
                    <div style={{
                        fontFamily:'Oswald,sans-serif', fontSize:15, fontWeight:600,
                        color:'var(--text-white)', textTransform:'uppercase', letterSpacing:'1px'
                    }}>{TWMAConfig.t('std_material_hinzu', lang)}</div>
                    <button onClick={onClose} style={{
                        background:'transparent', color:'var(--accent-red-light)',
                        border:'none', fontSize:22, cursor:'pointer', padding:0
                    }}>&times;</button>
                </div>

                {/* Suche */}
                <div style={{padding:'10px 14px'}}>
                    <input type="search" value={suche}
                        onChange={function(e){ setSuche(e.target.value); }}
                        placeholder={TWMAConfig.t('std_material_suche', lang)}
                        style={stdInputStyle} />
                </div>

                {/* Kategorien */}
                {!suche.trim() && (
                    <div style={{
                        display:'flex', gap:6, overflowX:'auto',
                        padding:'0 14px 10px 14px'
                    }}>
                        {kategorien.map(function(k) {
                            const aktiv = kategorie === k.id;
                            return (
                                <button key={k.id} onClick={function(){ setKategorie(k.id); }}
                                    style={{
                                        flexShrink:0, padding:'6px 12px',
                                        background: aktiv ? 'linear-gradient(135deg,#1E88E5,#1565C0)' : 'var(--bg-secondary)',
                                        color: aktiv ? '#fff' : 'var(--text-light)',
                                        border: aktiv ? '2px solid #fff' : '1px solid var(--border-color)',
                                        borderRadius: 999,
                                        fontSize: 11, fontFamily:'Oswald,sans-serif',
                                        textTransform:'uppercase', letterSpacing:'0.5px',
                                        cursor:'pointer', whiteSpace:'nowrap'
                                    }}>{k.label}</button>
                            );
                        })}
                    </div>
                )}

                {/* Material-Liste */}
                <div style={{flex:1, overflowY:'auto', padding:'4px 14px 14px'}}>
                    {gefiltert.length === 0 && (
                        <div style={{padding:20, textAlign:'center', color:'var(--text-muted)', fontStyle:'italic'}}>
                            {TWMAConfig.t('std_keine_eintraege', lang)}
                        </div>

                        const genommen = istGewaehlt(m.id);
                        return (

                                    display:'flex', alignItems:'center', gap:10,

                                    <div style={{color:'var(--text-white)', fontSize:13, fontWeight:500}}>{m.name}</div>
                                    <div style={{color:'var(--text-muted)', fontSize:11}}>{m.default_einheit}</div>
                                </div>
                                <div style={{
                                    width:32, height:32, borderRadius:'50%',

                <input type="text" value={eintrag.einheit}
                    onChange={function(e){ onAendern(Object.assign({}, eintrag, { einheit: e.target.value })); }}

function StundenFormular(props) {
    const { lang } = props;

    // Formular-State
    const heute = formatDatumIso(new Date());
    const [datum, setDatum]                 = React.useState(heute);
    const [baustellen, setBaustellen]       = React.useState([]);
    const [baustelleId, setBaustelleId]     = React.useState('');
    const [anfang, setAnfang]               = React.useState('07:00');
    const [ende, setEnde]                   = React.useState('16:30');
    const [pauseMin, setPauseMin]           = React.useState(30);
    const [taetigkeiten, setTaetigkeiten]   = React.useState([]);
    const [materialOffen, setMaterialOffen] = React.useState(false);
    const [material, setMaterial]           = React.useState([]);
    const [wetter, setWetter]               = React.useState('');
    const [wetterLaedt, setWetterLaedt]     = React.useState(false);
    const [speichert, setSpeichert]         = React.useState(false);
    const [toastText, setToastText]         = React.useState('');

    const bemSpeech = useSpeech(lang);
    const [bemOriginal, setBemOriginal] = React.useState('');
    const [bemDeutsch, setBemDeutsch]   = React.useState('');

    React.useEffect(function() {
        if (bemSpeech.transcript) setBemOriginal(bemSpeech.transcript);
    }, [bemSpeech.transcript]);

    // Baustellen aus Firebase laden
    React.useEffect(function() {
        if (!window.TWMAFirebase || !TWMAFirebase.isReady()) return;
        const unsub = TWMAFirebase.listenAktiveBaustellen(function(list) {
            list.sort(function(a,b){ return (b.zuletzt_geaendert||0) - (a.zuletzt_geaendert||0); });
            setBaustellen(list);
            // Wenn noch nicht gewaehlt: letzte Baustelle waehlen
            if (!baustelleId && list.length > 0) {
                TWMAStorage.getSetting('std_last_baustelle').then(function(last) {
                    if (last && list.find(function(b){ return b.id === last; })) {
                        setBaustelleId(last);
                    } else {
                        setBaustelleId(list[0].id);
                    }
                });
            }
        });
        return unsub;
    }, []);

    // WIP laden (einmalig beim Mount)
    React.useEffect(function() {
        TWMAStorage.loadWip('stunden').then(function(wip) {
            if (!wip) return;
            if (wip.datum && wip.datum === heute) {
                setDatum(wip.datum);
                if (wip.baustelle_id) setBaustelleId(wip.baustelle_id);
                if (wip.anfang) setAnfang(wip.anfang);
                if (wip.ende) setEnde(wip.ende);
                if (typeof wip.pause_min === 'number') setPauseMin(wip.pause_min);
                if (wip.taetigkeiten) setTaetigkeiten(wip.taetigkeiten);
                if (wip.material) setMaterial(wip.material);
                if (wip.bemerkung_original) setBemOriginal(wip.bemerkung_original);
                if (wip.bemerkung_deutsch) setBemDeutsch(wip.bemerkung_deutsch);
                if (wip.wetter) setWetter(wip.wetter);
                showToast(TWMAConfig.t('std_entwurf_geladen', lang));
            }
        }).catch(function(){});
    }, []);

    // WIP-Auto-Save (nach State-Aenderung, gedrosselt)
    const wipTimerRef = React.useRef(null);
    React.useEffect(function() {
        if (wipTimerRef.current) clearTimeout(wipTimerRef.current);
        wipTimerRef.current = setTimeout(function() {
            TWMAStorage.saveWip('stunden', {
                datum: datum, baustelle_id: baustelleId,
                anfang: anfang, ende: ende, pause_min: pauseMin,
                taetigkeiten: taetigkeiten, material: material,
                bemerkung_original: bemOriginal, bemerkung_deutsch: bemDeutsch,
                wetter: wetter
            }).catch(function(){});
        }, 800);
        return function() { if (wipTimerRef.current) clearTimeout(wipTimerRef.current); };
    }, [datum, baustelleId, anfang, ende, pauseMin, taetigkeiten, material, bemOriginal, bemDeutsch, wetter]);

    function showToast(text) {
        setToastText(text);
        setTimeout(function(){ setToastText(''); }, 2800);
    }

    async function wetterAuto() {
        setWetterLaedt(true);
        try {
            const pos = await holeStandort();
            const w = await holeWetterAuto(pos.lat, pos.lng);
            if (w) setWetter(w);
        } catch (err) {
            TWMACore.log('warn', 'Stunden', 'Wetter-Auto fehlgeschlagen', err.message);
        }
        setWetterLaedt(false);
    }

    const nettoMin = berechneNettoMin(anfang, ende, pauseMin);

    // Pausen-Dropdown-Werte
    const pausenOptions = [0, 15, 30, 45, 60];

    const baustelleObj = baustellen.find(function(b){ return b.id === baustelleId; });

    async function speichernUndPdf() {
        // Validierung
        if (!baustelleId || !datum || !anfang || !ende || taetigkeiten.length === 0) {
            alert(TWMAConfig.t('std_pflichtfelder', lang));
            return;
        }
        setSpeichert(true);
        try {
            const geraeteId = TWMACore.getDeviceId();
            const dLabel = datum.replace(/-/g, '');
            const uploadName = ((geraeteId || 'MA').slice(-6).toUpperCase())
                             + '_Stundenzettel_' + dLabel + '.pdf';

            // Taetigkeiten menschenlesbar fuer PDF
            const taetLabels = taetigkeiten.map(function(id) {
                if (id.indexOf('__free:') === 0) return id.substring(7);
                return TWMAConfig.taetigkeit(id, 'de'); // PDF ist Deutsch
            });

            const stunde = {
                id: 'stunde_' + dLabel + '_' + Math.random().toString(36).slice(2,8),
                datum: datum,
                baustelle_id: baustelleId,
                baustelle_name: baustelleObj ? baustelleObj.name : '-',
                mitarbeiter_id: geraeteId,
                mitarbeiter_name: (geraeteId || '').slice(-8).toUpperCase(),
                anfang: anfang,
                ende: ende,
                pause_min: pauseMin,
                netto_min: nettoMin,
                taetigkeiten: taetLabels,
                material: material.map(function(m) {
                    return { material_id: m.material_id, name: m.name, menge: m.menge, einheit: m.einheit };
                }),
                bemerkung_original: bemOriginal ? { sprache: lang, text: bemOriginal.trim() } : null,
                bemerkung_deutsch: (bemDeutsch || bemOriginal || '').trim(),
                wetter: wetter || null,
                sync_status: 'pending',
                upload_name: uploadName,
                ts: Date.now()
            };

            // PDF erzeugen
            const pdfBlob = await TWMAPdf.erzeugeStundenzettel(stunde);
            stunde.pdf_blob = pdfBlob;

            // Speichern + Sync
            await TWMAStorage.saveStunde(stunde);
            await TWMAStorage.enqueueSync({ typ: 'stunde', stunde_id: stunde.id });

            // Last-Baustelle merken
            await TWMAStorage.setSetting('std_last_baustelle', baustelleId);

            // WIP loeschen
            await TWMAStorage.saveWip('stunden', null).catch(function(){});

            // Formular reset
            setTaetigkeiten([]);
            setMaterial([]);
            setBemOriginal('');
            setBemDeutsch('');
            setWetter('');

            // Sync anstossen
            if (navigator.onLine && window.TWMASync) TWMASync.triggerNow();
            if (window.TWMASync) TWMASync.updateProgress();

            // Direkt PDF anzeigen
            props.onPdfAnzeigen(stunde);
        } catch (err) {
            alert('Speicher-Fehler: ' + err.message);
        }
        setSpeichert(false);
    }

    return (
        <div style={{padding:'12px 14px', display:'flex', flexDirection:'column', gap:12, position:'relative'}}>

function MAStunden(props) {
    const { lang } = props;
    const [tab, setTab] = React.useState('heute');
    const [historie, setHistorie] = React.useState([]);
    const [pdfVorschau, setPdfVorschau] = React.useState(null);

    async function reloadHistorie() {
        const heute = new Date();

        // Wochenstart: Montag
        const woMontag = new Date(heute);
        const tag = (heute.getDay() + 6) % 7; // 0 = Mo, 6 = So
        woMontag.setDate(heute.getDate() - tag);
        const vor30 = new Date(heute);
        vor30.setDate(heute.getDate() - 30);

        let filter = {};
        if (tab === 'heute') {
            filter = { datum: formatDatumIso(heute) };
        } else if (tab === 'woche') {
            filter = { datum_ab: formatDatumIso(woMontag), datum_bis: formatDatumIso(heute) };
        } else {
            filter = { datum_ab: formatDatumIso(vor30), datum_bis: formatDatumIso(heute) };
        }

        const list = await TWMAStorage.listStunden(filter).catch(function(){ return []; });
        list.sort(function(a,b){ return (b.ts||0) - (a.ts||0); });
        setHistorie(list);
    }

    React.useEffect(function() {
        if (tab !== 'heute') reloadHistorie();
        window.addEventListener('tw-ma-sync-progress', reloadHistorie);
        return function() { window.removeEventListener('tw-ma-sync-progress', reloadHistorie); };
    }, [tab]);

    function onPdfAnzeigen(stunde) {
        setPdfVorschau(stunde);
        reloadHistorie();
    }

    return (
        <div style={{flex:1, display:'flex', flexDirection:'column', minHeight:0}}>
            <StdTabs lang={lang} aktiv={tab} onChange={setTab} />

            <div style={{flex:1, overflowY:'auto'}}>
                {tab === 'heute' ? (
                    <StundenFormular lang={lang} onPdfAnzeigen={onPdfAnzeigen} />
                ) : (
                    <StundenListe lang={lang} eintraege={historie} onOeffnen={onPdfAnzeigen} />
                )}
            </div>

            <PdfVorschau stunde={pdfVorschau} lang={lang}
                onClose={function(){ setPdfVorschau(null); }} />
        </div>
    );
}

// ===== Haupt-App (nach erfolgreichem Login) ==================
function MAMainApp(props) {
    // History-Stack fuer Zurueck/Vor
    const [history, setHistory] = React.useState(['start']);
    const [cursor,  setCursor]  = React.useState(0);
    const [fontScale, setFontScale] = React.useState(1);

    const aktiverTab = history[cursor];
    const lang = props.lang;

    React.useEffect(() => {
        if (!window.TWMAStorage) return;
        TWMAStorage.getSetting('font_scale').then(f => {
            if (f && typeof f === 'number') setFontScale(f);
        }).catch(() => {});
    }, []);

    React.useEffect(() => {
        if (window.TWMAStorage) TWMAStorage.setSetting('font_scale', fontScale).catch(() => {});
        document.documentElement.style.fontSize = (16 * fontScale) + 'px';
    }, [fontScale]);

    function navigateTo(tabId) {
        if (tabId === aktiverTab) return;
        const neuesHistory = history.slice(0, cursor + 1);
        neuesHistory.push(tabId);
        setHistory(neuesHistory);
        setCursor(neuesHistory.length - 1);
    }

    function goBack()    { if (cursor > 0) setCursor(cursor - 1); }
    function goForward() { if (cursor < history.length - 1) setCursor(cursor + 1); }
    function fontBigger()  { setFontScale(s => Math.min(s + 0.1, 1.5)); }
    function fontSmaller() { setFontScale(s => Math.max(s - 0.1, 0.8)); }

    const commonProps = { lang: lang, setLang: props.setLang };

    let modul;
    switch (aktiverTab) {
        case 'start':       modul = <MAStartseite   {...commonProps} />; break;
        case 'baustellen':  modul = <MABaustellen   {...commonProps} />; break;
        case 'kalender':    modul = <MAKalender     {...commonProps} />; break;
        case 'fotos':       modul = <MAFotos        {...commonProps} />; break;
        case 'stunden':     modul = <MAStunden      {...commonProps} />; break;
        case 'nachrichten': modul = <MANachrichten  {...commonProps} />; break;
        default:            modul = <MAStartseite   {...commonProps} />;
    }

    return (
        <div style={{
            minHeight: '100vh',
            display: 'flex', flexDirection: 'column',
            background: 'var(--bg-primary)'
        }}>
            <MAHeader
                titel={TWMAConfig.t('app_name', lang)}
                canBack={cursor > 0}
                canForward={cursor < history.length - 1}
                onBack={goBack}
                onForward={goForward}
                onFontBigger={fontBigger}
                onFontSmaller={fontSmaller}
            />
            <MAModulNavigation
                aktiv={aktiverTab}
                onSelect={navigateTo}
                lang={lang}
            />
            {modul}
            <div style={{
                padding: '6px 8px', textAlign: 'center',
                color: 'var(--text-muted)', fontSize: 10,
                borderTop: '1px solid var(--border-color)',
                fontFamily: 'Oswald, sans-serif', letterSpacing: 1,
                background: 'var(--bg-secondary)'
            }}>
                TW Baustellen-App v{TWMAConfig.APP_VERSION}
            </div>
        </div>
    );
}

// ===== Top-Level MAApp mit State-Machine =====================
function MAApp() {
    const [phase, setPhase]           = React.useState('checking');
    const [lang,  setLang]            = React.useState('de');
    const [anmeldeCode, setAnmCode]   = React.useState(null);
    const [firebaseConfig, setFbCfg]  = React.useState(null);

    const deviceId = React.useMemo(() => TWMACore.getDeviceId(), []);

    // ---- Init: Sprache laden, Firebase-Config pruefen, Firebase initen ----
    React.useEffect(() => {
        (async function() {
            try {
                // Sprache
                const storedLang = await TWMAStorage.getSetting('ui_lang');
                if (storedLang) setLang(storedLang);
            } catch (e) {}

            // 1) Firebase-Config laden
            let cfg = null;
            try {
                const stored = await TWMAStorage.getSetting('firebase_config');
                if (stored && stored.apiKey) cfg = stored;
            } catch (e) {}

            if (!cfg) {
                const defaultCfg = TWMAConfig.FIREBASE_CONFIG;
                if (defaultCfg && defaultCfg.apiKey) cfg = defaultCfg;
            }

            if (!cfg) {
                setPhase('firebase_config');
                return;
            }

            setFbCfg(cfg);
            const ok = TWMAFirebase.init(cfg);
            if (!ok) {
                setPhase('firebase_config');
                return;
            }

            await weiterMitGeraetStatus();
        })();
    }, []);

    // ---- Nach Firebase-Init: Geraete-Status pruefen ----
    async function weiterMitGeraetStatus() {
        try {
            const pinHash = await TWMAStorage.getSetting('pin_hash_local');
            if (pinHash) {
                // Lokaler PIN-Hash vorhanden -> direkt zum PIN-Login
                setPhase('pin_login');
                startFirebaseListener();
                return;
            }
        } catch (e) {}

        // Kein lokaler PIN -> Onboarding
        // Bestehenden Code wiederverwenden falls da
        let code = null;
        try { code = await TWMAStorage.getSetting('anmelde_code'); } catch (e) {}
        if (!code) {
            code = TWMACore.generateAnmeldeCode();
            try { await TWMAStorage.setSetting('anmelde_code', code); } catch (e) {}
        }
        setAnmCode(code);

        // Freigabe in Firebase registrieren (fire-and-forget)
        TWMAFirebase.requestDeviceApproval(deviceId, code).catch(function(e) {
            TWMACore.log('error', 'App', 'requestDeviceApproval', e);
        });

        setPhase('onboarding_code');
        startFirebaseListener();
    }

    // ---- Firebase-Status-Listener ----
    const unsubRef = React.useRef(null);

    function startFirebaseListener() {
        if (unsubRef.current) return;
        unsubRef.current = TWMAFirebase.onDeviceStatus(deviceId, function(data) {
            if (!data) return;
            TWMACore.log('info', 'App', 'Geraete-Status-Update', data.status);

            if (data.status === 'wipe' || data.status === 'gesperrt') {
                handleWipe();
                return;
            }
            if (data.status === 'abgelehnt') {
                setPhase('onboarding_abgelehnt');
                return;
            }
            if (data.status === 'freigegeben' || data.status === 'aktiv') {
                // Wenn gerade im Onboarding-Code-Screen: zum PIN-Setup
                setPhase(prev => {
                    if (prev === 'onboarding_code') return 'pin_setup';
                    return prev;
                });
            }
        });

        // Heartbeat alle 60s
        const hbInterval = setInterval(function() {
            TWMAFirebase.heartbeat(deviceId).catch(function() {});
        }, 60000);
        // Initialer Heartbeat
        TWMAFirebase.heartbeat(deviceId).catch(function() {});

        // Cleanup bei Unload
        window.addEventListener('beforeunload', function() {
            clearInterval(hbInterval);
            if (unsubRef.current) { unsubRef.current(); unsubRef.current = null; }
        });
    }

    // ---- Firebase-Config uebernehmen ----
    async function handleFirebaseConfigSubmit(cfg) {
        try {
            await TWMAStorage.setSetting('firebase_config', cfg);
            setFbCfg(cfg);
            const ok = TWMAFirebase.init(cfg);
            if (ok) {
                await weiterMitGeraetStatus();
            }
        } catch (e) {
            TWMACore.log('error', 'App', 'Config-Save', e);
        }
    }

    // ---- PIN setzen ----
    async function handleSetPin(pin) {
        const hash = await TWMACore.hashPin(pin, deviceId);
        await TWMAStorage.setSetting('pin_hash_local', hash);
        await TWMAFirebase.setPinHash(deviceId, hash).catch(function() {});
        await TWMAFirebase.resetFailedPinCounter(deviceId).catch(function() {});
        setPhase('app');
    }

    // ---- PIN pruefen ----
    async function handleCheckPin(pin) {
        const hash = await TWMACore.hashPin(pin, deviceId);
        const stored = await TWMAStorage.getSetting('pin_hash_local');
        if (hash === stored) {
            TWMAFirebase.resetFailedPinCounter(deviceId).catch(function() {});
            setPhase('app');
            return true;
        }
        TWMAFirebase.incrementFailedPinCounter(deviceId).catch(function() {});
        return false;
    }

    // ---- Zu viele Fehlversuche ----
    async function handleTooManyFailures() {
        TWMACore.log('warn', 'App', 'Zu viele PIN-Fehlversuche - Wipe');
        if (firebaseConfig) {
            // Geraete-Status in Firebase auf wipe setzen
            try {
                const db = TWMAFirebase.db();
                if (db) db.ref('geraete/' + deviceId + '/status').set('auto_wipe');
            } catch (e) {}
        }
        handleWipe();
    }

    async function handleWipe() {
        if (unsubRef.current) { unsubRef.current(); unsubRef.current = null; }
        await TWMACore.wipeApp();
        TWMACore.clearDeviceId();
        setPhase('wipe');
        setTimeout(function() { location.reload(); }, 2500);
    }

    // ---- Sprach-Persistenz ----
    React.useEffect(() => {
        if (window.TWMAStorage) TWMAStorage.setSetting('ui_lang', lang).catch(() => {});
    }, [lang]);

    // ---- Sync-Orchestrator starten sobald die App laeuft ----
    React.useEffect(() => {
        if (phase === 'app' && window.TWMASync) {
            TWMASync.start();
        }
    }, [phase]);

    // ---- Render ----
    const commonProps = { lang: lang };

    switch (phase) {
        case 'checking':
            return <MACheckingScreen {...commonProps} />;
        case 'firebase_config':
            return <MAFirebaseConfigDialog {...commonProps} onSubmit={handleFirebaseConfigSubmit} />;
        case 'onboarding_code':
            return <MAOnboardingCode {...commonProps} code={anmeldeCode} />;
        case 'onboarding_abgelehnt':
            return <MAOnboardingAbgelehnt {...commonProps} />;
        case 'pin_setup':
            return <MAPinSetup {...commonProps} onSetPin={handleSetPin} />;
        case 'pin_login':
            return <MAPinLogin {...commonProps}
                        onCheckPin={handleCheckPin}
                        onTooManyFailures={handleTooManyFailures} />;
        case 'wipe':
            return (
                <MAOnboardingContainer lang={lang}>
                    <div style={{
                        padding: 20, maxWidth: 380, textAlign: 'center',
                        color: 'var(--accent-red-light)', fontSize: 16,
                        background: 'var(--bg-card)',
                        border: '2px solid var(--accent-red)',
                        borderRadius: 'var(--radius-xl)'
                    }}>
                        {TWMAConfig.t('wipe_nachricht', lang)}
                    </div>
                </MAOnboardingContainer>
            );
        case 'app':
        default:
            return <MAMainApp lang={lang} setLang={setLang} />;
    }
}

ReactDOM.createRoot(document.getElementById('root')).render(<MAApp />);
</script>
</body>
</html>
