                lang={lang}
                baustelleId={props.baustelle.id}
                onSchliessen={function(){ setDialogOffen(false); }}
                onGespeichert={onGespeichert} />
        </div>
    );
}

// ===== Stufe 3: Phase-Auswahl ================================
function FotPhaseWahl(props) {
    const lang = props.lang;
    const [fortschritt, setFortschritt] = React.useState({});

    React.useEffect(function() {
        async function calc() {
            const f = {};
            const phasen = ['rohzustand', 'abdichtung', 'fertigstellung'];
            for (let i = 0; i < phasen.length; i++) {
                const fotos = await TWMAStorage.listFotos({
                    baustelle_id: props.baustelle.id,
                    raum_id: props.raum.id,
                    phase: phasen[i]
                }).catch(() => []);
                const waende = new Set(fotos.map(function(x){ return x.wand_id; }));
                f[phasen[i]] = waende.size;
            }
            setFortschritt(f);
        }
        calc();
    }, [props.baustelle.id, props.raum.id]);

    const phasen = [
        { id:'rohzustand', label:TWMAConfig.t('fot_phase_roh', lang), beschr:TWMAConfig.t('fot_phase_roh_beschr', lang),
          gradient:'linear-gradient(135deg,#546e7a,#37474f)' },
        { id:'abdichtung', label:TWMAConfig.t('fot_phase_abd', lang), beschr:TWMAConfig.t('fot_phase_abd_beschr', lang),
          gradient:'linear-gradient(135deg,#e67e22,#ca6f1e)' },
        { id:'fertigstellung', label:TWMAConfig.t('fot_phase_fert', lang), beschr:TWMAConfig.t('fot_phase_fert_beschr', lang),
          gradient:'linear-gradient(135deg,#27ae60,#1e8449)' }
    ];

    const total = (props.raum.wand_zahl || 4) + 2; // +Boden +Decke

    return (
        <div style={{flex:1, display:'flex', flexDirection:'column', minHeight:0}}>
            <FotoKopfzeile titel={props.raum.bezeichnung} onBack={props.onBack}
                rechts={<SyncBadge pending={props.pending} online={props.online} onSync={props.onSync} />} />
            <div style={{flex:1, overflowY:'auto', padding:'14px', display:'flex', flexDirection:'column', gap:12}}>
                <div style={{
                    textAlign:'center', color:'var(--text-muted)',
                    fontFamily:'Oswald,sans-serif', fontSize:12, letterSpacing:'1px',
                    textTransform:'uppercase'
                }}>
                    {TWMAConfig.t('fot_phase_waehlen', lang)}
                </div>
                {phasen.map(function(p) {
                    const cnt = fortschritt[p.id] || 0;
                    return (
                        <button key={p.id} onClick={function(){ props.onWahl(p.id); }}
                            style={{
                                padding:'20px 18px',
                                background: p.gradient, color:'#fff',
                                border:'1px solid rgba(255,255,255,0.12)',
                                borderRadius:'var(--radius-lg)',
                                display:'flex', flexDirection:'column', gap:6,
                                textAlign:'left', cursor:'pointer',
                                boxShadow:'0 4px 12px rgba(0,0,0,0.25)'
                            }}>
                            <div style={{
                                fontFamily:'Oswald,sans-serif', fontSize:18, fontWeight:600,
                                textTransform:'uppercase', letterSpacing:'1px'
                            }}>{p.label}</div>
                            <div style={{fontSize:12, opacity:0.85}}>{p.beschr}</div>
                            <div style={{
                                marginTop:4, fontSize:12, fontFamily:'Oswald,sans-serif',
                                padding:'4px 10px', alignSelf:'flex-start',
                                background:'rgba(0,0,0,0.25)',
                                borderRadius:'var(--radius-sm)', letterSpacing:'0.5px'
                            }}>
                                {cnt} {TWMAConfig.t('fot_fortschritt', lang)} {total} {TWMAConfig.t('fot_waende_dokumentiert', lang)}
                            </div>
                        </button>
                    );
                })}
            </div>
        </div>
    );
}

// ===== Stufe 4: Wand-Auswahl =================================
function WandKachel(props) {
    const { label, foto, onClick, farbe } = props;
    const url = foto ? blobObjectUrl(foto.thumb_blob || foto.foto_blob) : null;
    const status = !foto ? 'leer' : (foto.sync_status === 'uploaded' ? 'ok' : foto.sync_status === 'fehler' ? 'fehler' : 'pending');

    React.useEffect(function() {
        return function() { if (url) try { URL.revokeObjectURL(url); } catch(_){} };
    }, [url]);

    const statusFarbe = status === 'ok' ? '#27ae60' : status === 'fehler' ? '#c41e1e' : status === 'pending' ? '#f39c12' : '#7f8c8d';
    const statusIcon  = status === 'ok' ? '\u2713' : status === 'fehler' ? '!' : status === 'pending' ? '\u21BB' : '';

    return (
        <button onClick={onClick} style={{
            position:'relative',
            aspectRatio:'1',
            background: url ? '#000' : (farbe || 'var(--bg-card)'),
            border:'1px solid var(--border-color)',
            borderRadius:'var(--radius-md)',
            cursor:'pointer', padding:0, overflow:'hidden',
            display:'flex', flexDirection:'column'
        }}>
            {url ? (
                <img src={url} alt={label} style={{
                    position:'absolute', inset:0, width:'100%', height:'100%',
                    objectFit:'cover', opacity:0.75
                }} />
            ) : null}
            <div style={{
                position:'absolute', inset:0,
                display:'flex', alignItems:'center', justifyContent:'center',
                fontFamily:'Oswald,sans-serif', fontSize:12, fontWeight:600,
                color:'#fff', textShadow:'0 1px 3px rgba(0,0,0,0.8)',
                textTransform:'uppercase', letterSpacing:'0.5px',
                textAlign:'center', padding:4
            }}>{label}</div>
            {foto && (
                <div style={{
                    position:'absolute', top:4, right:4,
                    width:22, height:22, borderRadius:'50%',
                    background: statusFarbe, color:'#fff',
                    display:'flex', alignItems:'center', justifyContent:'center',
                    fontSize:12, fontWeight:700,
                    boxShadow:'0 2px 6px rgba(0,0,0,0.5)'
                }}>{statusIcon}</div>
            )}
        </button>
    );
}

function FotWandWahl(props) {
    const lang = props.lang;
    const [fotos, setFotos] = React.useState([]);
    const [zeigeDecke, setZeigeDecke] = React.useState(false);

    async function reload() {
        const list = await TWMAStorage.listFotos({
            baustelle_id: props.baustelle.id,
            raum_id: props.raum.id,
            phase: props.phase
        }).catch(() => []);
        setFotos(list);
    }

    React.useEffect(function() {
        reload();
        window.addEventListener('tw-ma-sync-progress', reload);
        return function() { window.removeEventListener('tw-ma-sync-progress', reload); };
    }, [props.baustelle.id, props.raum.id, props.phase]);

    // Gruppieren: latest per wand_id gewinnt
    const fotoByWand = React.useMemo(function() {
        const m = {};
        fotos.forEach(function(f) {
            if (!m[f.wand_id] || (m[f.wand_id].aufgenommen_am || 0) < (f.aufgenommen_am || 0)) {
                m[f.wand_id] = f;
            }
        });
        return m;
    }, [fotos]);

    const wandZahl = props.raum.wand_zahl || 4;
    const spalten = wandZahl <= 4 ? 2 : wandZahl <= 6 ? 3 : 4;
    const waende = [];
    for (let i = 1; i <= wandZahl; i++) waende.push('wand-' + i);

    const phaseLabel = {
        rohzustand:    TWMAConfig.t('fot_phase_roh', lang),
        abdichtung:    TWMAConfig.t('fot_phase_abd', lang),
        fertigstellung:TWMAConfig.t('fot_phase_fert', lang)
    }[props.phase];

    function onKachel(wandId) {
        props.onKameraOffnen(wandId);
    }

    return (
        <div style={{flex:1, display:'flex', flexDirection:'column', minHeight:0}}>
            <FotoKopfzeile
                titel={props.raum.bezeichnung + ' \u2022 ' + phaseLabel}
                onBack={props.onBack}
                rechts={<SyncBadge pending={props.pending} online={props.online} onSync={props.onSync} />} />

            <div style={{flex:1, overflowY:'auto', padding:'12px 14px'}}>
                <div style={{
                    display:'grid', gap:8,
                    gridTemplateColumns: 'repeat(' + spalten + ', 1fr)'
                }}>
                    {waende.map(function(wid, idx) {
                        return (
                            <WandKachel key={wid}
                                label={TWMAConfig.t('fot_wand', lang) + ' ' + (idx+1)}
                                foto={fotoByWand[wid]}
                                onClick={function(){ onKachel(wid); }} />
                        );
                    })}
                </div>
                <div style={{
                    display:'grid', gap:8, marginTop:8,
                    gridTemplateColumns: zeigeDecke ? '1fr 1fr' : '1fr'
                }}>
                    <WandKachel
                        label={TWMAConfig.t('fot_boden', lang)}
                        foto={fotoByWand['boden']}
                        farbe="linear-gradient(135deg,#5d4037,#3e2723)"
                        onClick={function(){ onKachel('boden'); }} />
                    {zeigeDecke && (
                        <WandKachel
                            label={TWMAConfig.t('fot_decke', lang)}
                            foto={fotoByWand['decke']}
                            farbe="linear-gradient(135deg,#455a64,#263238)"
                            onClick={function(){ onKachel('decke'); }} />
                    )}
                </div>
                {!zeigeDecke && (
                    <button onClick={function(){ setZeigeDecke(true); }}
                        style={{
                            marginTop:8, width:'100%', padding:'8px',
                            background:'transparent', color:'var(--text-muted)',
                            border:'1px dashed var(--border-color)',
                            borderRadius:'var(--radius-sm)',
                            fontFamily:'Oswald,sans-serif', fontSize:11,
                            textTransform:'uppercase', letterSpacing:'1px',
                            cursor:'pointer'
                        }}>
                        + {TWMAConfig.t('fot_decke', lang)}
                    </button>
                )}
            </div>
        </div>
    );
}

// ===== Stufe 5+6: Foto aufnehmen + Sprach-Notiz ==============
function FotAufnahme(props) {
    const lang = props.lang;
    const [fotoBlob, setFotoBlob] = React.useState(null);
    const [fotoUrl, setFotoUrl]   = React.useState(null);
    const [komprimiere, setKomprimiere] = React.useState(false);
    const [notiz, setNotiz]       = React.useState('');
    const [notizDe, setNotizDe]   = React.useState('');
    const [speichert, setSpeichert] = React.useState(false);
    const [uebersetze, setUebersetze] = React.useState(false);
    const fileInputRef = React.useRef(null);
    const speech = useSpeech(lang);

    // URL-Cleanup
    React.useEffect(function() {
        return function() { if (fotoUrl) try { URL.revokeObjectURL(fotoUrl); } catch(_){} };
    }, [fotoUrl]);

    // Speech-Transkript ins Feld spiegeln + ggf uebersetzen
    React.useEffect(function() {
        if (speech.transcript) setNotiz(speech.transcript);
    }, [speech.transcript]);

    // Auto-Kamera-Oeffnen beim ersten Rendern
    React.useEffect(function() {
        if (!fotoBlob && fileInputRef.current) {
            // Kleiner Delay fuer mobiles Chrome
            setTimeout(function() {
                try { fileInputRef.current.click(); } catch(_){}
            }, 100);
        }
    }, []);

    async function onFileSelect(e) {
        const file = e.target.files && e.target.files[0];
        if (!file) return;
        setKomprimiere(true);
        try {
            const blob = await komprimiereFoto(file, 1920);
            setFotoBlob(blob);
            setFotoUrl(URL.createObjectURL(blob));
        } catch (err) {
            alert('Foto-Fehler: ' + err.message);
        }
        setKomprimiere(false);
        e.target.value = ''; // reset fuer Wiederholungs-Klick
    }

    function wiederholen() {
        if (fotoUrl) try { URL.revokeObjectURL(fotoUrl); } catch(_){}
        setFotoBlob(null);
        setFotoUrl(null);
        setNotiz(''); setNotizDe('');
        speech.reset();
        setTimeout(function() {
            if (fileInputRef.current) fileInputRef.current.click();
        }, 100);
    }

    async function uebersetzeNotiz() {
        if (!notiz.trim() || lang === 'de') {
            setNotizDe(notiz.trim());
            return;
        }
        if (!window.TWMATranslation || !TWMATranslation.translate) {
            // Etappe 7 liefert echte Uebersetzung. Vorerst Passthrough.
            setNotizDe(notiz);
            return;
        }
        setUebersetze(true);
        try {
            const t = await TWMATranslation.translate(notiz, lang, 'de');
            setNotizDe(t || notiz);
        } catch (_) {
            setNotizDe(notiz);
        }
        setUebersetze(false);
    }

    // Auto-Uebersetzung wenn Mic stoppt
    React.useEffect(function() {
        if (!speech.recording && notiz.trim()) {
            uebersetzeNotiz();
        }
    }, [speech.recording]);

    async function speichereFoto() {
        if (!fotoBlob) return;
        setSpeichert(true);
        try {
            const thumb = await erstelleThumbnail(fotoBlob);
            const geraeteId = TWMACore.getDeviceId();
            const geraeteKurz = (geraeteId || 'MA').slice(-6).toUpperCase();
            const id = 'foto_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2,8);
            const foto = {
                id: id,
                baustelle_id: props.baustelle.id,
                raum_id: props.raum ? props.raum.id : 'allgemein',
                phase: props.phase,
                wand_id: props.wandId,
                wand_label: props.wandLabel || null,
                foto_blob: fotoBlob,
                thumb_blob: thumb,
                notiz_original: {
                    sprache: lang,
                    text: notiz.trim()
                },
                notiz_deutsch: (notizDe || notiz || '').trim(),
                aufgenommen_am: Date.now(),
                aufgenommen_von: geraeteId,
                sync_status: 'pending',
                upload_name: null
            };
            foto.upload_name = buildUploadName(foto, geraeteKurz);

            await TWMAStorage.saveFoto(foto);
            await TWMAStorage.enqueueSync({ foto_id: id });

            // Sofort Sync antriggern wenn online
            if (navigator.onLine && window.TWMASync) {
                TWMASync.triggerNow();
            }
            if (window.TWMASync) TWMASync.updateProgress();

            props.onFertig();
        } catch (err) {
            alert('Speicher-Fehler: ' + err.message);
        }
        setSpeichert(false);
    }

    const titelParts = [];
    if (props.raum) titelParts.push(props.raum.bezeichnung);
    if (props.wandLabel) titelParts.push(props.wandLabel);
    else if (props.wandId) titelParts.push(props.wandId);

    return (
        <div style={{flex:1, display:'flex', flexDirection:'column', minHeight:0, background:'var(--bg-primary)'}}>
            <FotoKopfzeile titel={titelParts.join(' \u2022 ')} onBack={props.onBack} />

            {/* Hidden File Input (Mobile-Kamera) */}
            <input ref={fileInputRef} type="file"
                accept="image/*" capture="environment"
                onChange={onFileSelect}
                style={{display:'none'}} />

            <div style={{flex:1, overflowY:'auto', padding:'14px', display:'flex', flexDirection:'column', gap:14}}>

                {komprimiere && (
                    <div style={{
                        textAlign:'center', padding:40, color:'var(--accent-blue)',
                        fontFamily:'Oswald,sans-serif', fontSize:14,
                        textTransform:'uppercase', letterSpacing:'1px'
                    }}>
                        {TWMAConfig.t('bst_lade', lang)}
                    </div>
                )}

                {!komprimiere && !fotoBlob && (
                    <div style={{
                        display:'flex', flexDirection:'column', gap:10,
                        padding:'40px 20px', textAlign:'center'
                    }}>
                        <div style={{fontSize:48}}>&#128247;</div>
                        <button onClick={function(){ if (fileInputRef.current) fileInputRef.current.click(); }}
                            style={Object.assign({}, btnPrimary, {padding:'16px', fontSize:14})}>
                            {TWMAConfig.t('fot_foto_aufnehmen', lang)}
                        </button>
                    </div>
                )}

                {!komprimiere && fotoBlob && fotoUrl && (
                    <React.Fragment>
                        {/* Foto-Vorschau */}
                        <div style={{
                            position:'relative', width:'100%',
                            background:'#000',
                            borderRadius:'var(--radius-lg)',
                            overflow:'hidden',
                            aspectRatio:'4/3'
                        }}>
                            <img src={fotoUrl} style={{
                                width:'100%', height:'100%', objectFit:'contain'
                            }} />
                        </div>

                        {/* Wiederholen/Verwenden (erst wenn noch keine Notiz) */}
                        <div style={{display:'flex', gap:8}}>
                            <button onClick={wiederholen} style={Object.assign({}, btnGhost, {
                                background:'var(--accent-red)', color:'#fff', border:'none'
                            })}>
                                &#10006; {TWMAConfig.t('fot_wiederholen', lang)}
                            </button>
                        </div>

                        {/* Sprach-Notiz-Bereich */}
                        <div style={{
                            background:'var(--bg-card)',
                            border:'1px solid var(--border-color)',
                            borderRadius:'var(--radius-lg)',
                            padding:14,
                            display:'flex', flexDirection:'column', gap:10
                        }}>
                            <div style={{display:'flex', alignItems:'center', gap:10}}>
                                <MicButton size={54}
                                    disabled={!speech.supported}
                                    recording={speech.recording}
                                    onClick={function(){ speech.recording ? speech.stop() : speech.start(); }} />
                                <div style={{flex:1, fontFamily:'Oswald,sans-serif', fontSize:12,
                                    color: speech.supported ? 'var(--text-light)' : 'var(--text-muted)',
                                    letterSpacing:'0.5px', textTransform:'uppercase'}}>
                                    {speech.supported
                                        ? TWMAConfig.t('fot_notiz_aufnehmen', lang)
                                        : TWMAConfig.t('fot_mic_nicht_verfuegbar', lang)}
                                </div>
                            </div>

                            <div>
                                <label style={labelStyle}>{TWMAConfig.t('fot_notiz_original', lang)} ({lang.toUpperCase()})</label>
                                <textarea value={notiz}
                                    onChange={function(e){ setNotiz(e.target.value); speech.setTranscript(e.target.value); }}
                                    onBlur={uebersetzeNotiz}
                                    placeholder={TWMAConfig.t('fot_notiz_platzhalter', lang)}
                                    rows={3}
                                    style={Object.assign({}, inputStyle, {resize:'vertical', marginTop:6})} />
                            </div>

                            {lang !== 'de' && (
                                <div>
                                    <label style={labelStyle}>
                                        {TWMAConfig.t('fot_notiz_deutsch', lang)}
                                        {uebersetze && <span style={{marginLeft:8, fontStyle:'italic', textTransform:'none'}}>...</span>}
                                    </label>
                                    <textarea value={notizDe}
                                        onChange={function(e){ setNotizDe(e.target.value); }}
                                        rows={2}
                                        style={Object.assign({}, inputStyle, {
                                            resize:'vertical', marginTop:6,
                                            background:'rgba(30,136,229,0.08)'
                                        })} />
                                </div>
                            )}
                        </div>

                        {/* Speichern-Button */}
                        <button onClick={speichereFoto}
                            disabled={speichert}
                            style={Object.assign({}, btnPrimary, {
                                padding:'16px', fontSize:14,
                                background:'linear-gradient(135deg,#27ae60,#1e8449)',
                                opacity: speichert ? 0.6 : 1,
                                cursor: speichert ? 'wait' : 'pointer'
                            })}>
                            {speichert ? '...' : '\u2713 ' + TWMAConfig.t('fot_speichern', lang)}
                        </button>
                    </React.Fragment>
                )}
            </div>
        </div>
    );
}

// ===== Allgemein-Ansicht =====================================
function FotAllgemein(props) {
    const lang = props.lang;
    const [fotos, setFotos] = React.useState([]);

    async function reload() {
        const list = await TWMAStorage.listFotos({
            baustelle_id: props.baustelle.id
        }).catch(() => []);
        const allg = list.filter(function(f){ return f.phase === 'allgemein' || f.raum_id === 'allgemein'; });
        allg.sort(function(a,b){ return (b.aufgenommen_am||0) - (a.aufgenommen_am||0); });
        setFotos(allg);
    }

    React.useEffect(function() {
        reload();
        window.addEventListener('tw-ma-sync-progress', reload);
        return function() { window.removeEventListener('tw-ma-sync-progress', reload); };
    }, [props.baustelle.id]);

    const limit = 20;
    const verfuegbar = fotos.length < limit;

    function neuesFoto() {
        const n = fotos.length + 1;
        const wandId = 'allgemein-' + n;
        props.onKameraOffnen(wandId);
    }

    async function loescheFoto(f) {
        if (!window.confirm(TWMAConfig.t('fot_bestaetigung_loeschen', lang))) return;
        await TWMAStorage.deleteFoto(f.id).catch(() => {});
        await TWMAStorage.removeSyncItemsByFotoId(f.id).catch(() => {});
        reload();
    }

    return (
        <div style={{flex:1, display:'flex', flexDirection:'column', minHeight:0}}>
            <FotoKopfzeile
                titel={props.baustelle.name + ' \u2022 ' + TWMAConfig.t('fot_allgemein', lang)}
                onBack={props.onBack}
                rechts={<SyncBadge pending={props.pending} online={props.online} onSync={props.onSync} />} />
            <div style={{flex:1, overflowY:'auto', padding:'12px 14px', display:'flex', flexDirection:'column', gap:10}}>

                <button onClick={neuesFoto}
                    disabled={!verfuegbar}
                    style={Object.assign({}, btnPrimary, {
                        padding:'14px',
                        background: verfuegbar ? 'linear-gradient(135deg,#8e44ad,#6c3483)' : 'var(--bg-secondary)',
                        opacity: verfuegbar ? 1 : 0.5,
                        cursor: verfuegbar ? 'pointer' : 'not-allowed'
                    })}>
                    {verfuegbar
                        ? '+ ' + TWMAConfig.t('fot_allgemeines_foto', lang) + ' (' + fotos.length + '/' + limit + ')'
                        : TWMAConfig.t('fot_allg_limit', lang)}
                </button>

                <div style={{display:'grid', gap:8, gridTemplateColumns:'repeat(2, 1fr)'}}>
                    {fotos.map(function(f) {
                        const url = blobObjectUrl(f.thumb_blob || f.foto_blob);
                        const status = f.sync_status === 'uploaded' ? '\u2713'
                                     : f.sync_status === 'fehler'   ? '!'
                                     : '\u21BB';
                        const statusColor = f.sync_status === 'uploaded' ? '#27ae60'
                                          : f.sync_status === 'fehler'   ? '#c41e1e'
                                          : '#f39c12';
                        return (
                            <div key={f.id} style={{
                                position:'relative', aspectRatio:'1',
                                background:'var(--bg-card)', overflow:'hidden',
                                borderRadius:'var(--radius-md)',
                                border:'1px solid var(--border-color)'
                            }}>
                                {url ? (
                                    <img src={url} style={{width:'100%', height:'100%', objectFit:'cover'}}/>
                                ) : (
                                    <div style={{
                                        position:'absolute', inset:0,
                                        display:'flex', alignItems:'center', justifyContent:'center',
                                        color:'var(--text-muted)', fontSize:11
                                    }}>{TWMAConfig.t('fot_sync_ok', lang)}</div>
                                )}
                                <div style={{
                                    position:'absolute', top:4, right:4,
                                    width:22, height:22, borderRadius:'50%',
                                    background: statusColor, color:'#fff',
                                    display:'flex', alignItems:'center', justifyContent:'center',
                                    fontSize:12, fontWeight:700
                                }}>{status}</div>
                                <button onClick={function(){ loescheFoto(f); }}
                                    style={{
                                        position:'absolute', bottom:4, right:4,
                                        width:28, height:28, borderRadius:'50%',
                                        background:'rgba(0,0,0,0.7)', color:'#fff',
                                        border:'none', fontSize:14, cursor:'pointer'
                                    }}>&#128465;</button>
                                {f.notiz_deutsch && (
                                    <div style={{

                                        padding:'4px 6px',

function MAFotos(props) {
    const lang = props.lang;
    // View-Stack: { stufe: 'baustelle'|'raum'|'phase'|'wand'|'aufnahme'|'allgemein', ... }
    const [baustelle, setBaustelle] = React.useState(null);
    const [raum, setRaum]           = React.useState(null);
    const [phase, setPhase]         = React.useState(null);
    const [aufnahmeKontext, setAufnahmeKontext] = React.useState(null); // {wandId, wandLabel, raum, phase}
    const [allgemeinOffen, setAllgemeinOffen]   = React.useState(false);

    // Sync-Progress
    const [pending, setPending] = React.useState(0);
    const [online, setOnline]   = React.useState(navigator.onLine);

    React.useEffect(function() {
        function onProgress(e) {
            if (e.detail) setPending(e.detail.pending || 0);
        }
        function onOnline()  { setOnline(true);  }
        function onOffline() { setOnline(false); }
        window.addEventListener('tw-ma-sync-progress', onProgress);
        window.addEventListener('online', onOnline);
        window.addEventListener('offline', onOffline);
        // Initial-Lesung
        if (window.TWMAStorage) {
            TWMAStorage.countPendingSyncItems().then(function(n){ setPending(n); }).catch(() => {});
        }
        return function() {
            window.removeEventListener('tw-ma-sync-progress', onProgress);
            window.removeEventListener('online', onOnline);
            window.removeEventListener('offline', onOffline);
        };
    }, []);

    function syncTriggern() {
        if (window.TWMASync) TWMASync.triggerNow();
    }

    const syncProps = { pending: pending, online: online, onSync: syncTriggern };

    // Routing
    if (aufnahmeKontext) {
        return (
            <FotAufnahme
                lang={lang}
                baustelle={baustelle}
                raum={aufnahmeKontext.raum}
                phase={aufnahmeKontext.phase}
                wandId={aufnahmeKontext.wandId}
                wandLabel={aufnahmeKontext.wandLabel}
                onBack={function(){ setAufnahmeKontext(null); }}
                onFertig={function(){ setAufnahmeKontext(null); }}
            />
        );
    }

    if (allgemeinOffen && baustelle) {
        return (
            <FotAllgemein
                lang={lang}
                baustelle={baustelle}
                {...syncProps}
                onBack={function(){ setAllgemeinOffen(false); }}
                onKameraOffnen={function(wandId) {
                    setAufnahmeKontext({
                        wandId: wandId,
                        wandLabel: null,
                        raum: null,
                        phase: 'allgemein'
                    });
                }}
            />
        );
    }

    if (!baustelle) {
        return <FotBaustellenWahl lang={lang} onWahl={setBaustelle} />;
    }

    if (!raum) {
        return (
            <FotRaumWahl
                lang={lang}
                baustelle={baustelle}
                {...syncProps}
                onBack={function(){ setBaustelle(null); }}
                onWahl={setRaum}
                onAllgemein={function(){ setAllgemeinOffen(true); }}
            />
        );
    }

    if (!phase) {
        return (
            <FotPhaseWahl
                lang={lang}
                baustelle={baustelle}
                raum={raum}
                {...syncProps}
                onBack={function(){ setRaum(null); }}
                onWahl={setPhase}
            />
        );
    }

    return (
        <FotWandWahl
            lang={lang}
            baustelle={baustelle}
            raum={raum}
            phase={phase}
            {...syncProps}
            onBack={function(){ setPhase(null); }}
            onKameraOffnen={function(wandId) {
                setAufnahmeKontext({
                    wandId: wandId,
                    wandLabel: null,
                    raum: raum,
                    phase: phase
                });
            }}
        />
    );
}

// ===== Utility-Funktionen ====================================

function formatDatumIso(date) {
    const y = date.getFullYear();
    const m = String(date.getMonth()+1).padStart(2,'0');
    const d = String(date.getDate()).padStart(2,'0');
    return y + '-' + m + '-' + d;
}

function formatDatumKurz(iso) {
    if (!iso) return '';
    const p = iso.split('-');
    return p[2] + '.' + p[1] + '.';
}

function parseTimeToMin(hhmm) {
    if (!hhmm || typeof hhmm !== 'string') return 0;
    const p = hhmm.split(':');
    return (parseInt(p[0],10) || 0) * 60 + (parseInt(p[1],10) || 0);
}

function berechneNettoMin(anfang, ende, pauseMin) {
    const a = parseTimeToMin(anfang);
    const e = parseTimeToMin(ende);
    let diff = e - a;
    if (diff < 0) diff += 24 * 60; // Nachtschicht-Toleranz
    return Math.max(0, diff - (pauseMin || 0));
}

function fmtMinAsStd(mins) {
    if (!mins && mins !== 0) return '';
    const h = Math.floor(mins / 60);
    const m = mins % 60;
    return h + ':' + (m < 10 ? '0'+m : m) + ' h';
}

// Mapping Wetter-Code (Open-Meteo WMO) -> unsere 4 Kategorien
function wmoToWetter(code) {
    if (code == null) return null;
    if (code === 0 || code === 1) return 'Sonnig';
    if (code === 2 || code === 3) return 'Bewoelkt';
    if (code >= 51 && code <= 67) return 'Regen';
    if (code >= 71 && code <= 77) return 'Schnee';
    if (code >= 80 && code <= 82) return 'Regen';
    if (code >= 85 && code <= 86) return 'Schnee';
    if (code >= 95) return 'Regen';
    return 'Bewoelkt';
}

// Open-Meteo API (kostenfrei, kein Key noetig)
async function holeWetterAuto(lat, lng) {
    const url = 'https://api.open-meteo.com/v1/forecast?latitude=' + lat
              + '&longitude=' + lng + '&current_weather=true';
    const res = await fetch(url);
    if (!res.ok) throw new Error('Wetter-API ' + res.status);
    const data = await res.json();
    const code = data && data.current_weather && data.current_weather.weathercode;
    return wmoToWetter(code);
}

// Liefert Lat/Lng aus Browser-Geolocation
function holeStandort() {
    return new Promise(function(resolve, reject) {
        if (!navigator.geolocation) { reject(new Error('Keine Geolocation')); return; }
        navigator.geolocation.getCurrentPosition(
            function(pos) { resolve({ lat: pos.coords.latitude, lng: pos.coords.longitude }); },
            function(err) { reject(err); },
            { timeout: 8000, maximumAge: 600000 }
        );
    });
}

// ===== Taetigkeits-Picker ====================================

function TaetigkeitsPicker(props) {
    const { lang, selected, onChange } = props;
    const taet = TWMAConfig.TAETIGKEITEN;
    const [sonstigText, setSonstigText] = React.useState('');

    const selSet = React.useMemo(function() {
        return new Set((selected || []).filter(function(s) {
            return typeof s === 'string' && s.indexOf('__free:') !== 0;
        }));
    }, [selected]);

    const freeTexts = React.useMemo(function() {
        return (selected || []).filter(function(s) {
            return typeof s === 'string' && s.indexOf('__free:') === 0;
        }).map(function(s){ return s.substring(7); });
    }, [selected]);

    function toggle(id) {
        const neu = new Set(selSet);
        if (neu.has(id)) neu.delete(id);
        else neu.add(id);
        onChange([].concat(Array.from(neu), freeTexts.map(function(t){ return '__free:' + t; })));
    }

    function addFreeText() {
        if (!sonstigText.trim()) return;
        const neu = Array.from(selSet)
            .concat(freeTexts.map(function(t){ return '__free:' + t; }))
            .concat('__free:' + sonstigText.trim());
        onChange(neu);
        setSonstigText('');
    }

    function removeFreeText(idx) {
        const neu = freeTexts.filter(function(_,i){ return i !== idx; });
        onChange(Array.from(selSet).concat(neu.map(function(t){ return '__free:' + t; })));
    }

    return (
        <div style={{display:'flex', flexDirection:'column', gap:8}}>
            <div style={{fontSize:11, color:'var(--text-muted)', marginBottom:4}}>
                {TWMAConfig.t('std_taetigkeiten_waehlen', lang)}
            </div>
            <div style={{display:'grid', gridTemplateColumns:'repeat(2, 1fr)', gap:6}}>
                {taet.map(function(t) {
                    const aktiv = selSet.has(t.id);
                    return (
                        <button key={t.id} onClick={function(){ toggle(t.id); }}
                            style={{
                                padding:'8px 10px',
                                background: aktiv ? 'linear-gradient(135deg,#1E88E5,#1565C0)' : 'var(--bg-secondary)',
                                color: aktiv ? '#fff' : 'var(--text-light)',
                                border: aktiv ? '2px solid #fff' : '1px solid var(--border-color)',
                                borderRadius:'var(--radius-sm)',
                                fontSize:11, fontWeight:600,
                                fontFamily:'inherit',
                                cursor:'pointer', textAlign:'left',
                                lineHeight:1.2
                            }}>
                            {aktiv ? '\u2713 ' : ''}{TWMAConfig.taetigkeit(t.id, lang)}
                        </button>
                    );
                })}
            </div>

            {/* Sonstiges Freitext */}
            <div style={{display:'flex', gap:6, marginTop:4}}>
                <input type="text" value={sonstigText}
                    onChange={function(e){ setSonstigText(e.target.value); }}
                    placeholder={TWMAConfig.t('std_taet_sonstiges', lang)}
                    style={stdInputStyle} />
                <button onClick={addFreeText}
                    disabled={!sonstigText.trim()}
                    style={{
                        padding:'0 16px',
                        background:'var(--accent-blue)', color:'#fff',
                        border:'none', borderRadius:'var(--radius-md)',
                        fontSize:18, fontWeight:700, cursor:'pointer',
                        opacity: sonstigText.trim() ? 1 : 0.4
                    }}>+</button>
            </div>
            {freeTexts.length > 0 && (
                <div style={{display:'flex', flexWrap:'wrap', gap:6, marginTop:4}}>
                    {freeTexts.map(function(t, i) {
                        return (
                            <span key={i} style={{
                                display:'inline-flex', alignItems:'center', gap:6,
                                padding:'4px 10px',
                                background:'var(--bg-secondary)',
                                border:'1px solid var(--border-color)',
                                borderRadius:999, fontSize:12,
                                color:'var(--text-light)'
                            }}>
                                {t}
                                <button onClick={function(){ removeFreeText(i); }}
                                    style={{
                                        background:'transparent', color:'var(--accent-red-light)',
                                        border:'none', cursor:'pointer', fontSize:14,
                                        padding:0, lineHeight:1
                                    }}>&times;</button>
                            </span>
                        );
                    })}
                </div>
            )}
        </div>
    );
}

function MaterialPopup(props) {
    const { lang, offen, gewaehlt, onClose, onChange } = props;

    const [suche, setSuche] = React.useState('');

    if (!offen) return null;

    const kategorien = [
        { id: 'fliesen',     label: TWMAConfig.t('std_mat_kat_fliesen', lang) },
        { id: 'kleber',      label: TWMAConfig.t('std_mat_kat_kleber', lang) },
        { id: 'fuge',        label: TWMAConfig.t('std_mat_kat_fuge', lang) },
        { id: 'silikon',     label: TWMAConfig.t('std_mat_kat_silikon', lang) },
        { id: 'abdicht',     label: TWMAConfig.t('std_mat_kat_abdicht', lang) },
        { id: 'hilfsmittel', label: TWMAConfig.t('std_mat_kat_hilfsmittel', lang) },
        { id: 'werkzeug',    label: TWMAConfig.t('std_mat_kat_werkzeug', lang) },
        { id: 'sonstiges',   label: TWMAConfig.t('std_mat_kat_sonstiges', lang) }
    ];

    const alleMats = TWMAConfig.MATERIAL_DB;
    const gefiltert = alleMats.filter(function(m) {
        if (suche.trim()) {
            return m.name.toLowerCase().indexOf(suche.toLowerCase()) !== -1;
        }
        return m.kategorie === kategorie;
    });

    function istGewaehlt(matId) {
        return gewaehlt && gewaehlt.some(function(g){ return g.material_id === matId; });
    }

    function addMaterial(m) {
        if (istGewaehlt(m.id)) return;
        const neu = (gewaehlt || []).concat({
            material_id: m.id,
            name: m.name,
            menge: '',
            einheit: m.default_einheit

        onChange(neu);

    return (
        <div style={{
            position:'fixed', inset:0, zIndex:1000,
            background:'rgba(0,0,0,0.75)',

                    borderTopRightRadius:'var(--radius-xl)',

                    padding:'14px 16px',
                    borderBottom:'1px solid var(--border-color)',

                }}>
                    <div style={{
                        fontFamily:'Oswald,sans-serif', fontSize:15, fontWeight:600,
                        color:'var(--text-white)', textTransform:'uppercase', letterSpacing:'1px'
                    }}>{TWMAConfig.t('std_material_hinzu', lang)}</div>
                    <button onClick={onClose} style={{
                        background:'transparent', color:'var(--accent-red-light)',
                        border:'none', fontSize:22, cursor:'pointer', padding:0
                    }}>&times;</button>
                </div>

                {/* Suche */}
                <div style={{padding:'10px 14px'}}>
                    <input type="search" value={suche}
                        onChange={function(e){ setSuche(e.target.value); }}
                        placeholder={TWMAConfig.t('std_material_suche', lang)}
                        style={stdInputStyle} />
                </div>

                {/* Kategorien */}
                {!suche.trim() && (
                    <div style={{
                        display:'flex', gap:6, overflowX:'auto',
                        padding:'0 14px 10px 14px'
                    }}>
                        {kategorien.map(function(k) {
                            const aktiv = kategorie === k.id;
                            return (
                                <button key={k.id} onClick={function(){ setKategorie(k.id); }}
                                    style={{
                                        flexShrink:0, padding:'6px 12px',
                                        background: aktiv ? 'linear-gradient(135deg,#1E88E5,#1565C0)' : 'var(--bg-secondary)',
                                        color: aktiv ? '#fff' : 'var(--text-light)',
                                        border: aktiv ? '2px solid #fff' : '1px solid var(--border-color)',
                                        borderRadius: 999,
                                        fontSize: 11, fontFamily:'Oswald,sans-serif',
                                        textTransform:'uppercase', letterSpacing:'0.5px',
                                        cursor:'pointer', whiteSpace:'nowrap'
                                    }}>{k.label}</button>

                        })}

                )}

                <div style={{flex:1, overflowY:'auto', padding:'4px 14px 14px'}}>
                    {gefiltert.length === 0 && (
                        <div style={{padding:20, textAlign:'center', color:'var(--text-muted)', fontStyle:'italic'}}>
                            {TWMAConfig.t('std_keine_eintraege', lang)}
                        </div>

                        const genommen = istGewaehlt(m.id);
                        return (
                            <button key={m.id} onClick={function(){ addMaterial(m); }}

            </div>
        </div>
    );

                                width:22, height:22, borderRadius:'50%',
                                background:statusColor, color:'#fff',
                                display:'flex', alignItems:'center', justifyContent:'center',
                                fontSize:12, fontWeight:700
                            }}>{statusIcon}</div>

                        <div style={{fontSize:12, color:'var(--text-muted)'}}>
                            {(e.baustelle_name || '-') + ' \u2022 ' + e.anfang + '\u2013' + e.ende}
                        </div>
                    </button>
                );
            })}
        </div>
    );
}

// ===== PDF-Vorschau (iframe) =================================

function PdfVorschau(props) {
    const { stunde, onClose, lang } = props;
    const [url, setUrl] = React.useState(null);

    React.useEffect(function() {
        if (stunde && stunde.pdf_blob) {
            const u = URL.createObjectURL(stunde.pdf_blob);
            setUrl(u);
            return function() { try { URL.revokeObjectURL(u); } catch(_){} };
        }
    }, [stunde]);

    if (!stunde) return null;

    return (
        <div style={{
            position:'fixed', inset:0, zIndex:2000,
            background:'rgba(0,0,0,0.92)',
            display:'flex', flexDirection:'column'
        }}>
            <div style={{
                display:'flex', alignItems:'center', justifyContent:'space-between',
                padding:'10px 14px', background:'var(--bg-secondary)',
                borderBottom:'1px solid var(--border-color)'
            }}>
                <div style={{color:'var(--text-white)', fontFamily:'Oswald,sans-serif', fontSize:14, letterSpacing:'1px'}}>
                    {TWMAConfig.t('std_titel', lang) + ' \u2022 ' + formatDatumKurz(stunde.datum)}
                </div>
                <button onClick={onClose} style={{
                    background:'var(--accent-red)', color:'#fff', border:'none',
                    borderRadius:'var(--radius-md)', padding:'8px 16px',
                    fontFamily:'Oswald,sans-serif', fontSize:12, cursor:'pointer',
                    textTransform:'uppercase', letterSpacing:'1px'
                }}>{TWMAConfig.t('schliessen', lang)}</button>
            </div>
            {url ? (
                <iframe src={url} style={{flex:1, border:'none', background:'#fff'}} />
            ) : (
                <div style={{flex:1, display:'flex', alignItems:'center', justifyContent:'center', color:'#888'}}>
                    PDF nicht mehr verfuegbar (bereits hochgeladen, lokaler Cache geleert)
                </div>
            )}
        </div>
    );
}

// ===== Hauptformular "Heute" =================================

function StundenFormular(props) {
    const { lang } = props;

    // Formular-State
    const heute = formatDatumIso(new Date());
    const [datum, setDatum]                 = React.useState(heute);
    const [baustellen, setBaustellen]       = React.useState([]);
    const [baustelleId, setBaustelleId]     = React.useState('');
    const [anfang, setAnfang]               = React.useState('07:00');
    const [ende, setEnde]                   = React.useState('16:30');
    const [pauseMin, setPauseMin]           = React.useState(30);
    const [taetigkeiten, setTaetigkeiten]   = React.useState([]);
    const [materialOffen, setMaterialOffen] = React.useState(false);
    const [material, setMaterial]           = React.useState([]);
    const [wetter, setWetter]               = React.useState('');
    const [wetterLaedt, setWetterLaedt]     = React.useState(false);
    const [speichert, setSpeichert]         = React.useState(false);
    const [toastText, setToastText]         = React.useState('');

    const bemSpeech = useSpeech(lang);
    const [bemOriginal, setBemOriginal] = React.useState('');
    const [bemDeutsch, setBemDeutsch]   = React.useState('');

    React.useEffect(function() {
        if (bemSpeech.transcript) setBemOriginal(bemSpeech.transcript);
    }, [bemSpeech.transcript]);

    // Baustellen aus Firebase laden
    React.useEffect(function() {
        if (!window.TWMAFirebase || !TWMAFirebase.isReady()) return;
        const unsub = TWMAFirebase.listenAktiveBaustellen(function(list) {
            list.sort(function(a,b){ return (b.zuletzt_geaendert||0) - (a.zuletzt_geaendert||0); });
            setBaustellen(list);
            // Wenn noch nicht gewaehlt: letzte Baustelle waehlen
            if (!baustelleId && list.length > 0) {
                TWMAStorage.getSetting('std_last_baustelle').then(function(last) {
                    if (last && list.find(function(b){ return b.id === last; })) {
                        setBaustelleId(last);
                    } else {
                        setBaustelleId(list[0].id);
                    }
                });
            }
        });
        return unsub;
    }, []);

    // WIP laden (einmalig beim Mount)
    React.useEffect(function() {
        TWMAStorage.loadWip('stunden').then(function(wip) {
            if (!wip) return;
            if (wip.datum && wip.datum === heute) {
                setDatum(wip.datum);
                if (wip.baustelle_id) setBaustelleId(wip.baustelle_id);
                if (wip.anfang) setAnfang(wip.anfang);
                if (wip.ende) setEnde(wip.ende);
                if (typeof wip.pause_min === 'number') setPauseMin(wip.pause_min);
                if (wip.taetigkeiten) setTaetigkeiten(wip.taetigkeiten);
                if (wip.material) setMaterial(wip.material);
                if (wip.bemerkung_original) setBemOriginal(wip.bemerkung_original);
                if (wip.bemerkung_deutsch) setBemDeutsch(wip.bemerkung_deutsch);
                if (wip.wetter) setWetter(wip.wetter);
                showToast(TWMAConfig.t('std_entwurf_geladen', lang));
            }
        }).catch(function(){});
    }, []);

    // WIP-Auto-Save (nach State-Aenderung, gedrosselt)
    const wipTimerRef = React.useRef(null);
    React.useEffect(function() {
        if (wipTimerRef.current) clearTimeout(wipTimerRef.current);
        wipTimerRef.current = setTimeout(function() {
            TWMAStorage.saveWip('stunden', {
                datum: datum, baustelle_id: baustelleId,
                anfang: anfang, ende: ende, pause_min: pauseMin,
                taetigkeiten: taetigkeiten, material: material,
                bemerkung_original: bemOriginal, bemerkung_deutsch: bemDeutsch,
                wetter: wetter
            }).catch(function(){});
        }, 800);
        return function() { if (wipTimerRef.current) clearTimeout(wipTimerRef.current); };
    }, [datum, baustelleId, anfang, ende, pauseMin, taetigkeiten, material, bemOriginal, bemDeutsch, wetter]);

    function showToast(text) {
        setToastText(text);
        setTimeout(function(){ setToastText(''); }, 2800);
    }

    async function wetterAuto() {
        setWetterLaedt(true);
        try {
            const pos = await holeStandort();
            const w = await holeWetterAuto(pos.lat, pos.lng);
            if (w) setWetter(w);
        } catch (err) {
            TWMACore.log('warn', 'Stunden', 'Wetter-Auto fehlgeschlagen', err.message);
        }
        setWetterLaedt(false);
    }

    const nettoMin = berechneNettoMin(anfang, ende, pauseMin);

    // Pausen-Dropdown-Werte
    const pausenOptions = [0, 15, 30, 45, 60];

    const baustelleObj = baustellen.find(function(b){ return b.id === baustelleId; });

    async function speichernUndPdf() {
        // Validierung
        if (!baustelleId || !datum || !anfang || !ende || taetigkeiten.length === 0) {
            alert(TWMAConfig.t('std_pflichtfelder', lang));
            return;
        }
        setSpeichert(true);
        try {
            const geraeteId = TWMACore.getDeviceId();
            const dLabel = datum.replace(/-/g, '');
            const uploadName = ((geraeteId || 'MA').slice(-6).toUpperCase())
                             + '_Stundenzettel_' + dLabel + '.pdf';

            // Taetigkeiten menschenlesbar fuer PDF
            const taetLabels = taetigkeiten.map(function(id) {
                if (id.indexOf('__free:') === 0) return id.substring(7);
                return TWMAConfig.taetigkeit(id, 'de'); // PDF ist Deutsch
            });

            const stunde = {
                id: 'stunde_' + dLabel + '_' + Math.random().toString(36).slice(2,8),
                datum: datum,
                baustelle_id: baustelleId,
                baustelle_name: baustelleObj ? baustelleObj.name : '-',
                mitarbeiter_id: geraeteId,
                mitarbeiter_name: (geraeteId || '').slice(-8).toUpperCase(),
                anfang: anfang,
                ende: ende,
                pause_min: pauseMin,
                netto_min: nettoMin,
                taetigkeiten: taetLabels,
                material: material.map(function(m) {
                    return { material_id: m.material_id, name: m.name, menge: m.menge, einheit: m.einheit };
                }),
                bemerkung_original: bemOriginal ? { sprache: lang, text: bemOriginal.trim() } : null,
                bemerkung_deutsch: (bemDeutsch || bemOriginal || '').trim(),
                wetter: wetter || null,
                sync_status: 'pending',
                upload_name: uploadName,
                ts: Date.now()
            };

            // PDF erzeugen
            const pdfBlob = await TWMAPdf.erzeugeStundenzettel(stunde);
            stunde.pdf_blob = pdfBlob;

            // Speichern + Sync
            await TWMAStorage.saveStunde(stunde);
            await TWMAStorage.enqueueSync({ typ: 'stunde', stunde_id: stunde.id });

            // Last-Baustelle merken
            await TWMAStorage.setSetting('std_last_baustelle', baustelleId);

            // WIP loeschen
            await TWMAStorage.saveWip('stunden', null).catch(function(){});

            // Formular reset
            setTaetigkeiten([]);
            setMaterial([]);
            setBemOriginal('');
            setBemDeutsch('');
            setWetter('');

            // Sync anstossen
            if (navigator.onLine && window.TWMASync) TWMASync.triggerNow();
            if (window.TWMASync) TWMASync.updateProgress();

            // Direkt PDF anzeigen
            props.onPdfAnzeigen(stunde);
        } catch (err) {
            alert('Speicher-Fehler: ' + err.message);
        }
        setSpeichert(false);
    }

    return (
        <div style={{padding:'12px 14px', display:'flex', flexDirection:'column', gap:12, position:'relative'}}>
            {toastText && (
                <div style={{
                    position:'fixed', top:90, left:'50%', transform:'translateX(-50%)',
                    zIndex:500, padding:'10px 20px',
                    background:'linear-gradient(135deg,#27ae60,#1e8449)', color:'#fff',
                    borderRadius:999, fontSize:13, fontWeight:600,
                    boxShadow:'0 4px 14px rgba(0,0,0,0.4)'
                }}>{toastText}</div>
            )}

            {/* Datum + Baustelle */}
            <div style={stdCardStyle}>
                <label style={stdLabelStyle}>{TWMAConfig.t('std_datum', lang)}</label>
                <input type="date" value={datum}
                    onChange={function(e){ setDatum(e.target.value); }}
                    style={stdInputStyle} />

                <label style={Object.assign({}, stdLabelStyle, {marginTop:6})}>
                    {TWMAConfig.t('std_baustelle', lang)}
                </label>
                <select value={baustelleId}
                    onChange={function(e){ setBaustelleId(e.target.value); }}
                    style={stdInputStyle}>
                    <option value="">{TWMAConfig.t('std_baustelle_waehlen', lang)}</option>
                    {baustellen.map(function(b) {
                        return <option key={b.id} value={b.id}>{b.name}</option>;
                    })}
                </select>
            </div>

            {/* Arbeitszeit */}
            <div style={stdCardStyle}>
                <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:10}}>
                    <div>
                        <label style={stdLabelStyle}>{TWMAConfig.t('std_anfang', lang)}</label>
                        <input type="time" step="900" value={anfang}
                            onChange={function(e){ setAnfang(e.target.value); }}
                            style={stdInputStyle} />
                    </div>
                    <div>
                        <label style={stdLabelStyle}>{TWMAConfig.t('std_ende', lang)}</label>
                        <input type="time" step="900" value={ende}
                            onChange={function(e){ setEnde(e.target.value); }}
                            style={stdInputStyle} />
                    </div>
                </div>
                <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:10, alignItems:'end'}}>
                    <div>
                        <label style={stdLabelStyle}>{TWMAConfig.t('std_pause', lang)}</label>
                        <select value={pauseMin}
                            onChange={function(e){ setPauseMin(parseInt(e.target.value,10)); }}
                            style={stdInputStyle}>
                            {pausenOptions.map(function(p) {
                                return <option key={p} value={p}>{p + ' ' + TWMAConfig.t('std_min', lang)}</option>;
                            })}
                        </select>
                    </div>
                    <div style={{
                        padding:'10px 12px',
                        background:'rgba(30,136,229,0.15)',
                        border:'1px solid rgba(30,136,229,0.4)',
                        borderRadius:'var(--radius-md)',
                        textAlign:'center'
                    }}>
                        <div style={{fontSize:10, color:'var(--text-muted)', fontFamily:'Oswald,sans-serif', letterSpacing:'1px', textTransform:'uppercase'}}>
                            {TWMAConfig.t('std_netto', lang)}
                        </div>
                        <div style={{fontSize:20, fontWeight:700, color:'var(--accent-blue)', fontFamily:'Oswald,sans-serif'}}>
                            {fmtMinAsStd(nettoMin)}
                        </div>
                    </div>
                </div>
            </div>

            {/* Taetigkeiten */}
            <div style={stdCardStyle}>
                <label style={stdLabelStyle}>{TWMAConfig.t('std_taetigkeiten', lang)}</label>
                <TaetigkeitsPicker lang={lang} selected={taetigkeiten} onChange={setTaetigkeiten} />
            </div>

            {/* Material */}
            <div style={stdCardStyle}>
                <label style={stdLabelStyle}>{TWMAConfig.t('std_material_verwendet', lang)}</label>
                {material.length > 0 && (
                    <div style={{display:'flex', flexDirection:'column', gap:6}}>
                        {material.map(function(m, idx) {
                            return (
                                <MaterialZeile key={m.material_id + '_' + idx}
                                    lang={lang} eintrag={m}
                                    onAendern={function(neuerEintrag) {
                                        setMaterial(material.map(function(x,i){ return i === idx ? neuerEintrag : x; }));
                                    }}
                                    onEntfernen={function() {
                                        setMaterial(material.filter(function(_,i){ return i !== idx; }));
                                    }} />
                            );
                        })}
                    </div>
                )}
                <button onClick={function(){ setMaterialOffen(true); }}
                    style={Object.assign({}, stdBtnPrimary, {
                        background: 'linear-gradient(135deg,#8e44ad,#6c3483)',
                        padding:'10px', fontSize:13
                    })}>
                    + {TWMAConfig.t('std_material_hinzu', lang)}
                </button>
            </div>

            {/* Bemerkung */}
            <div style={stdCardStyle}>
                <label style={stdLabelStyle}>{TWMAConfig.t('std_bemerkung', lang)}</label>
                <div style={{display:'flex', gap:8}}>
                    <textarea value={bemOriginal}
                        onChange={function(e){ setBemOriginal(e.target.value); }}
                        placeholder={TWMAConfig.t('std_bemerkung_platzhalter', lang)}
                        rows={3}
                        style={Object.assign({}, stdInputStyle, {resize:'vertical'})} />
                    {bemSpeech.supported && (
                        <MicButton size={44}
                            recording={bemSpeech.recording}
                            onClick={function(){ bemSpeech.recording ? bemSpeech.stop() : bemSpeech.start(); }} />
                    )}
                </div>
                {lang !== 'de' && bemOriginal && (
                    <React.Fragment>
                        <label style={Object.assign({}, stdLabelStyle, {marginTop:6})}>
                            {TWMAConfig.t('fot_notiz_deutsch', lang)}
                        </label>
                        <textarea value={bemDeutsch}
                            onChange={function(e){ setBemDeutsch(e.target.value); }}
                            rows={2}
                            style={Object.assign({}, stdInputStyle, {
                                resize:'vertical',
                                background:'rgba(30,136,229,0.08)'
                            })} />
                    </React.Fragment>
                )}
            </div>

            {/* Wetter */}
            <div style={stdCardStyle}>
                <div style={{display:'flex', alignItems:'center', justifyContent:'space-between'}}>
                    <label style={Object.assign({}, stdLabelStyle, {marginBottom:0})}>
                        {TWMAConfig.t('std_wetter', lang)}
                    </label>
                    <button onClick={wetterAuto}
                        disabled={wetterLaedt}
                        style={{
                            padding:'6px 12px',
                            background:'var(--bg-secondary)',
                            color:'var(--accent-blue)',
                            border:'1px solid rgba(30,136,229,0.4)',
                            borderRadius:999,
                            fontSize:11, fontFamily:'Oswald,sans-serif',
                            textTransform:'uppercase', letterSpacing:'0.5px',
                            cursor: wetterLaedt ? 'wait' : 'pointer'
                        }}>
                        {wetterLaedt ? '...' : '\uD83D\uDCE1 Auto'}
                    </button>
                </div>
                <div style={{display:'grid', gridTemplateColumns:'repeat(4, 1fr)', gap:6, marginTop:6}}>
                    {[
                        {k:'Sonnig',   l:TWMAConfig.t('std_wetter_sonnig',  lang), i:'\u2600'},
                        {k:'Bewoelkt', l:TWMAConfig.t('std_wetter_bewoelkt',lang), i:'\u2601'},
                        {k:'Regen',    l:TWMAConfig.t('std_wetter_regen',   lang), i:'\u2614'},
                        {k:'Schnee',   l:TWMAConfig.t('std_wetter_schnee',  lang), i:'\u2744'}
                    ].map(function(w) {
                        const aktiv = wetter === w.k;
                        return (
                            <button key={w.k} onClick={function(){ setWetter(w.k); }}
                                style={{
                                    padding:'8px 4px',
                                    background: aktiv ? 'linear-gradient(135deg,#1E88E5,#1565C0)' : 'var(--bg-secondary)',
                                    color: aktiv ? '#fff' : 'var(--text-light)',
                                    border: aktiv ? '2px solid #fff' : '1px solid var(--border-color)',
                                    borderRadius:'var(--radius-md)',
                                    fontSize:11, fontFamily:'Oswald,sans-serif',
                                    textTransform:'uppercase', letterSpacing:'0.5px',
                                    cursor:'pointer',
                                    display:'flex', flexDirection:'column', alignItems:'center', gap:2
                                }}>
                                <span style={{fontSize:18}}>{w.i}</span>
                                <span>{w.l}</span>
                            </button>
                        );
                    })}
                </div>
            </div>

            {/* Speichern */}
            <button onClick={speichernUndPdf}
                disabled={speichert}
                style={Object.assign({}, stdBtnSuccess, {
                    opacity: speichert ? 0.6 : 1,
                    cursor: speichert ? 'wait' : 'pointer'
                })}>
                {speichert
                    ? TWMAConfig.t('std_pdf_erzeugen', lang)
                    : '\u2713 ' + TWMAConfig.t('std_speichern_pdf', lang)}
            </button>

            <MaterialPopup lang={lang} offen={materialOffen}
                gewaehlt={material} onChange={setMaterial}
                onClose={function(){ setMaterialOffen(false); }} />
        </div>
    );
}

// ===== Haupt-Komponente ======================================

function MAStunden(props) {
    const { lang } = props;
    const [tab, setTab] = React.useState('heute');
    const [historie, setHistorie] = React.useState([]);
    const [pdfVorschau, setPdfVorschau] = React.useState(null);

    async function reloadHistorie() {
        const heute = new Date();

        // Wochenstart: Montag
        const woMontag = new Date(heute);
        const tag = (heute.getDay() + 6) % 7; // 0 = Mo, 6 = So
        woMontag.setDate(heute.getDate() - tag);
        const vor30 = new Date(heute);
        vor30.setDate(heute.getDate() - 30);

        let filter = {};
        if (tab === 'heute') {
            filter = { datum: formatDatumIso(heute) };
        } else if (tab === 'woche') {
            filter = { datum_ab: formatDatumIso(woMontag), datum_bis: formatDatumIso(heute) };
        } else {
            filter = { datum_ab: formatDatumIso(vor30), datum_bis: formatDatumIso(heute) };
        }

        const list = await TWMAStorage.listStunden(filter).catch(function(){ return []; });
        list.sort(function(a,b){ return (b.ts||0) - (a.ts||0); });
        setHistorie(list);
    }

    React.useEffect(function() {
        if (tab !== 'heute') reloadHistorie();
        window.addEventListener('tw-ma-sync-progress', reloadHistorie);
        return function() { window.removeEventListener('tw-ma-sync-progress', reloadHistorie); };
    }, [tab]);

    function onPdfAnzeigen(stunde) {
        setPdfVorschau(stunde);
        reloadHistorie();
    }

    return (
        <div style={{flex:1, display:'flex', flexDirection:'column', minHeight:0}}>
            <StdTabs lang={lang} aktiv={tab} onChange={setTab} />

            <div style={{flex:1, overflowY:'auto'}}>
                {tab === 'heute' ? (
                    <StundenFormular lang={lang} onPdfAnzeigen={onPdfAnzeigen} />
                ) : (
                    <StundenListe lang={lang} eintraege={historie} onOeffnen={onPdfAnzeigen} />
                )}
            </div>

            <PdfVorschau stunde={pdfVorschau} lang={lang}
                onClose={function(){ setPdfVorschau(null); }} />
        </div>
    );
}

// ============================================================
// TW Baustellen-App  -  Modul Nachrichten (Etappe 7 Phase B+C)
// ============================================================
// 2-Tab-Struktur:
//   1. "Chat"        - WhatsApp-Stil 1:1 mit Buero (Thomas)
//   2. "Anweisungen" - Pinnwand-Karten von Thomas (mit Lesequittung)
//
// Chat-Workflow (Sender-Seite):
//   1. MA tippt Text in MA-Sprache (oder Mic-Eingabe)
//   2. Klick "Senden"
//   3. Sofort lokale Bubble mit Status "wartet" einblenden
//   4. TWMATranslate.translate(text, MA-Sprache, 'de')
//   5. TWMAFirebase.sendMessage({ original, uebersetzung })
//   6. Bubble-Status auf "gesendet"
//
// Bubbles:
//   - Eigene (rechts, blau): Original oben + Uebersetzung darunter (kleiner)
//   - Fremde (links, grau):   Uebersetzung oben (in MA-Sprache) + Original darunter
//
// Auto-Scroll: bei neuer Nachricht ans Bubble-Ende
// Lese-Quittung: alle empfangenen Nachrichten beim Tab-Open als gelesen markieren
// ============================================================

// ===== Tabs ===================================================

function NchTabs(props) {
    const { lang, aktiv, onChange, anweisungenUngelesen } = props;
    const tabs = [
        { id: 'chat',         label: TWMAConfig.t('nch_tab_chat', lang),         badge: 0 },
        { id: 'anweisungen',  label: TWMAConfig.t('nch_tab_anweisungen', lang),  badge: anweisungenUngelesen || 0 }
    ];
    return (
        <div style={{
            display:'flex', gap:0,
            background:'var(--bg-secondary)',
            borderBottom:'1px solid var(--border-color)'
        }}>
            {tabs.map(function(t) {
                const an = aktiv === t.id;
                return (
                    <button key={t.id} onClick={function(){ onChange(t.id); }}
                        style={{
                            flex:1, padding:'12px 8px',
                            background: an ? 'var(--bg-card)' : 'transparent',
                            color: an ? 'var(--accent-blue)' : 'var(--text-muted)',
                            border:'none',
                            borderBottom: an ? '3px solid var(--accent-blue)' : '3px solid transparent',
                            fontFamily:'Oswald,sans-serif', fontSize:12, fontWeight:600,
                            textTransform:'uppercase', letterSpacing:'1px',
                            cursor:'pointer',
                            position:'relative'
                        }}>
                        {t.label}
                        {t.badge > 0 && (
                            <span style={{

                                background:'#c41e1e', color:'#fff',
