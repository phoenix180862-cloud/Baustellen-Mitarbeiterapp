            <defs>
                <linearGradient id={'helm-' + props.id} x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%"   stopColor="#f39c12" />
                    <stop offset="100%" stopColor="#e67e22" />

            {/* Kopf */}

            {/* Koerper */}

            {/* Arme */}

            <rect x="26" y="44" width="5" height="10" fill="#2D3436" rx="1" />

// ===== MicButton + useSpeech (Etappe 5: Web Speech API) =====
// Mapping MA-Sprachen -> BCP47-Codes fuer Web Speech API
const SPEECH_LANG_MAP = {
    de: 'de-DE',
    cz: 'cs-CZ',
    sk: 'sk-SK',
    pl: 'pl-PL',
    en: 'en-US',
    ro: 'ro-RO',
    ua: 'uk-UA'
};

function speechSupported() {
    return !!(window.SpeechRecognition || window.webkitSpeechRecognition);
}

// Hook: liefert {transcript, recording, supported, start, stop, reset}
function useSpeech(lang) {
    const [transcript, setTranscript] = React.useState('');
    const [recording, setRecording]   = React.useState(false);
    const [supported]                 = React.useState(speechSupported());
    const recRef = React.useRef(null);
    const finalRef = React.useRef('');

    function ensureRecognition() {
        if (recRef.current) return recRef.current;
        const Ctor = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!Ctor) return null;
        const rec = new Ctor();
        rec.continuous = true;
        rec.interimResults = true;
        rec.lang = SPEECH_LANG_MAP[lang] || 'de-DE';

        rec.onresult = function(event) {
            let interim = '';
            for (let i = event.resultIndex; i < event.results.length; i++) {
                const res = event.results[i];
                if (res.isFinal) {
                    finalRef.current += res[0].transcript + ' ';
                } else {
                    interim += res[0].transcript;
                }
            }
            setTranscript(finalRef.current + interim);
        };
        rec.onend = function() {
            setRecording(false);
        };
        rec.onerror = function(e) {
            if (window.TWMACore) TWMACore.log('warn', 'Speech', 'Error', e.error);
            setRecording(false);
        };
        recRef.current = rec;
        return rec;
    }

    // Sprach-Update anwenden
    React.useEffect(function() {
        if (recRef.current) {
            recRef.current.lang = SPEECH_LANG_MAP[lang] || 'de-DE';
        }
    }, [lang]);

    // Cleanup bei Unmount
    React.useEffect(function() {
        return function() {
            if (recRef.current) {
                try { recRef.current.abort(); } catch (_) {}
                recRef.current = null;
            }
        };
    }, []);

    return {
        transcript: transcript,
        recording:  recording,
        supported:  supported,
        start: function() {
            const rec = ensureRecognition();
            if (!rec) return;
            finalRef.current = '';
            setTranscript('');
            try {
                rec.start();
                setRecording(true);
            } catch (e) {
                // Meist: "already started"
                if (window.TWMACore) TWMACore.log('warn', 'Speech', 'Start', e.message);
            }
        },
        stop: function() {
            if (recRef.current) {
                try { recRef.current.stop(); } catch (_) {}
            }
            setRecording(false);
        },
        reset: function() {
            finalRef.current = '';
            setTranscript('');
        },
        setTranscript: function(text) {
            finalRef.current = text || '';
            setTranscript(text || '');
        }
    };
}

function MicButton(props) {
    const size = props.size || 48;
    const recording = props.recording;
    const disabled = props.disabled;

    return (
        <React.Fragment>
            <style>{`
                @keyframes tw-mic-pulse {
                    0%, 100% { box-shadow: 0 4px 12px rgba(196,30,30,0.3); }
                    50%      { box-shadow: 0 4px 22px rgba(196,30,30,0.8), 0 0 0 8px rgba(196,30,30,0.15); }
                }
            `}</style>
            <button
                onClick={props.onClick}
                disabled={disabled}
                style={{
                    width: size, height: size, borderRadius: '50%',
                    background: disabled
                        ? 'var(--bg-secondary)'
                        : recording
                            ? 'linear-gradient(135deg, #c41e1e, #8e1414)'
                            : 'var(--accent-red)',
                    color: disabled ? 'var(--text-muted)' : '#fff',
                    border: recording ? '2px solid #fff' : 'none',
                    fontSize: size * 0.45, cursor: disabled ? 'not-allowed' : 'pointer',
                    boxShadow: '0 4px 12px rgba(196,30,30,0.3)',
                    animation: recording ? 'tw-mic-pulse 1.2s ease-in-out infinite' : 'none',
                    display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
                    transition: 'transform 0.12s ease'
                }}
                title={recording ? 'Stopp' : 'Sprach-Notiz'}
            >
                {recording ? '\u25A0' : '\uD83C\uDF99\uFE0F'}
            </button>
        </React.Fragment>
    );
}

function MAFirebaseConfigDialog(props) {
    const lang = props.lang;
    const [apiKey, setApiKey]       = React.useState('');
    const [databaseURL, setDbUrl]   = React.useState('https://einkaufsliste-98199-default-rtdb.europe-west1.firebasedatabase.app');
    const [projectId, setProjectId] = React.useState('einkaufsliste-98199');

    function submit() {
        if (!apiKey.trim()) return;
        props.onSubmit({
            apiKey:      apiKey.trim(),
            authDomain:  projectId + '.firebaseapp.com',
            databaseURL: databaseURL.trim(),
            projectId:   projectId.trim(),
            storageBucket: projectId + '.appspot.com',
            appId:       appId.trim()
        });

        width: '100%', padding: '12px 14px', fontSize: 14,

                    fontFamily: 'Oswald, sans-serif', fontSize: 20,

                    textTransform: 'uppercase', letterSpacing: '1.5px',

                }}>
                    {TWMAConfig.t('firebase_config_titel', lang)}

function MAPinSetup(props) {
    const lang = props.lang;
    const [pin, setPin]         = React.useState('');
    const [pinRepeat, setRepeat] = React.useState('');
    const [error, setError]     = React.useState(null);
    const [working, setWorking] = React.useState(false);

    function submit() {
        setError(null);
        if (pin.length < 4) { setError('pin_zu_kurz'); return; }
        if (pin !== pinRepeat) { setError('pin_mismatch'); return; }
        setWorking(true);
        props.onSetPin(pin).catch(function(e) {
            setWorking(false);
            setError('pin_mismatch');
            TWMACore.log('error', 'PinSetup', e);
        });
    }

    const input = {
        width: '100%', padding: '16px', fontSize: 22,
        textAlign: 'center', letterSpacing: '8px',
        background: 'var(--bg-secondary)', color: 'var(--text-white)',

        borderRadius: 'var(--radius-md)',
        fontFamily: 'Oswald, sans-serif', marginBottom: 10,
        boxSizing: 'border-box'
    };

    return (
        <MAOnboardingContainer lang={lang}>
            <div style={{
                maxWidth: 380, width: '100%',
                background: 'var(--bg-card)',
                border: '1px solid var(--success)',
                borderRadius: 'var(--radius-xl)',

                <div style={{color: 'var(--success)', fontSize: 13, fontFamily: 'Oswald, sans-serif',
                    textTransform: 'uppercase', letterSpacing: '1.5px', marginBottom: 6}}>
                    &#10003; {TWMAConfig.t('onboarding_freigegeben', lang)}
                </div>
                <div style={{
                    fontFamily: 'Oswald, sans-serif', fontSize: 20,
                    color: 'var(--text-white)',
                    textTransform: 'uppercase', letterSpacing: '1.5px',
                    marginBottom: 8
                }}>
                    {TWMAConfig.t('pin_setup_titel', lang)}
                </div>
                <div style={{color: 'var(--text-muted)', fontSize: 13, marginBottom: 20}}>
                    {TWMAConfig.t('pin_setup_info', lang)}
                </div>

                <input type="password" style={input}
                    inputMode="numeric" pattern="[0-9]*"

                    placeholder="PIN"

                <input type="password" style={input}
                    inputMode="numeric" pattern="[0-9]*"

                    placeholder={TWMAConfig.t('pin_bestaetigen', lang)}
                    value={pinRepeat}
                    onChange={e => setRepeat(e.target.value.replace(/\D/g, '').substring(0, 6))} />

                    <div style={{
                        color: 'var(--accent-red-light)', fontSize: 13,

                    className="btn-action"
                    style={{
                        width: '100%', marginTop: 12,
                        opacity: (pin.length >= 4 && pin === pinRepeat && !working) ? 1 : 0.4
                    }}>
                    {TWMAConfig.t('speichern', lang)}
                </button>
            </div>
        </MAOnboardingContainer>
    );
}

// ===== 4) PIN-Login ==========================================
function MAPinLogin(props) {
    const lang = props.lang;
    const [pin, setPin]     = React.useState('');
    const [error, setError] = React.useState(false);
    const [versuche, setVersuche] = React.useState(0);
    const VERSUCHE_MAX = 5;

    React.useEffect(function() {
        if (pin.length >= 4) {
            props.onCheckPin(pin).then(function(ok) {
                if (!ok) {
                    setError(true);
                    setVersuche(v => {
                        const neu = v + 1;
                        if (neu >= VERSUCHE_MAX) {
                            props.onTooManyFailures();
                        }
                        return neu;
                    });
                    setTimeout(function() { setPin(''); setError(false); }, 700);
                }
                // bei ok: App uebernimmt Transition, wir tun nichts
            });
        }
    }, [pin]);

    const verbleibend = VERSUCHE_MAX - versuche;

    return (
        <MAOnboardingContainer lang={lang}>
            <div style={{
                maxWidth: 380, width: '100%',
                background: 'var(--bg-card)',
                border: error ? '2px solid var(--accent-red)' : '1px solid var(--border-color)',
                borderRadius: 'var(--radius-xl)',
                padding: 24, textAlign: 'center',
                transition: 'border 0.2s ease'
            }}>
                <div style={{
                    fontFamily: 'Oswald, sans-serif', fontSize: 20,
                    color: 'var(--text-white)',
                    textTransform: 'uppercase', letterSpacing: '1.5px',
                    marginBottom: 16
                }}>
                    {TWMAConfig.t('pin_login_titel', lang)}
                </div>

                <input type="password"
                    inputMode="numeric" pattern="[0-9]*"
                    maxLength={6} autoFocus
                    value={pin}
                    onChange={e => setPin(e.target.value.replace(/\D/g, '').substring(0, 6))}
                    style={{
                        width: '100%', padding: '20px', fontSize: 28,
                        textAlign: 'center', letterSpacing: '12px',
                        background: 'var(--bg-secondary)',
                        color: error ? 'var(--accent-red-light)' : 'var(--text-white)',
                        border: '1px solid var(--border-color)',

                        fontFamily: 'Oswald, sans-serif',
                        boxSizing: 'border-box',
                        animation: error ? 'tw-shake 0.4s' : 'none'

                {versuche > 0 && (
                    <div style={{
                        marginTop: 14, color: 'var(--accent-red-light)', fontSize: 13

                        {TWMAConfig.t('pin_falsch', lang)} &middot; {verbleibend} {TWMAConfig.t('pin_versuche_uebrig', lang)}

                )}
            </div>
        </MAOnboardingContainer>
    );
}

function UhrBlock(props) {
    const lang = props.lang || 'de';
    const [now, setNow] = React.useState(new Date());
    const [pulse, setPulse] = React.useState(true);

    React.useEffect(() => {
        const t = setInterval(() => setNow(new Date()), 1000);
        const p = setInterval(() => setPulse(x => !x), 500);
        return () => { clearInterval(t); clearInterval(p); };
    }, []);

    const hh = String(now.getHours()).padStart(2, '0');
    const mm = String(now.getMinutes()).padStart(2, '0');
    const ss = String(now.getSeconds()).padStart(2, '0');

    const dayIdx   = now.getDay();
    const monatIdx = now.getMonth();
    const wochentag = (WOCHENTAGE[lang] || WOCHENTAGE.de)[dayIdx];
    const datum = now.getDate() + '. ' + (MONATE[lang] || MONATE.de)[monatIdx] + ' ' + now.getFullYear();

    return (

            position: 'relative',
            padding: '26px 36px',

            <div style={{
                position: 'absolute', top: -40, right: -40,
                width: 120, height: 120, borderRadius: '50%',
                background: 'radial-gradient(circle, rgba(30,136,229,0.15) 0%, transparent 70%)',
                pointerEvents: 'none'
            }}/>
            <div style={{
                position: 'absolute', bottom: -30, left: -30,
                width: 90, height: 90, borderRadius: '50%',
                background: 'radial-gradient(circle, rgba(230,126,34,0.08) 0%, transparent 70%)',
                pointerEvents: 'none'
            }}/>

            {/* Wochentag */}
            <div style={{
                fontFamily: 'Oswald, sans-serif', fontSize: 14,
                color: 'var(--accent-blue)', letterSpacing: '3px',

            }}>
                <span>{hh}</span>
                <span style={{opacity: pulse ? 1 : 0.15, transition: 'opacity 0.3s'}}>:</span>
                <span>{mm}</span>
                <span style={{opacity: pulse ? 0.3 : 1, transition: 'opacity 0.3s', fontSize: 38, marginLeft: 2}}>:{ss}</span>
            </div>

            {/* Datum */}

// ===== Hilfsfunktionen =======================================
function formatDateiGroesse(bytes) {
    if (!bytes) return '';
    const kb = bytes / 1024;
    if (kb < 1024) return kb.toFixed(0) + ' KB';
    return (kb / 1024).toFixed(1) + ' MB';
}

function dateiIstBild(mime, name) {
    if (mime && mime.indexOf('image/') === 0) return true;
    return /\.(jpg|jpeg|png|gif|webp|bmp)$/i.test(name || '');
}

function dateiIstPdf(mime, name) {
    if (mime === 'application/pdf') return true;
    return /\.pdf$/i.test(name || '');
}

function ermittlePraefixFilter(name) {
    if (!name) return 'alle';
    const upper = name.toUpperCase();
    if (upper.startsWith('KALENDER_'))    return 'kalender';
    if (upper.startsWith('NACHRICHT_'))   return 'nachrichten';
    if (upper.startsWith('ANWEISUNG_'))   return 'anweisungen';
    return 'anweisungen'; // Default laut Master-Dok 6.5
}

// ===== Ansicht 1: Liste ======================================
function MABaustellenListe(props) {
    const lang = props.lang;
    const [baustellen, setBaustellen] = React.useState([]);
    const [suche, setSuche]           = React.useState('');
    const [laedt, setLaedt]           = React.useState(true);

    React.useEffect(() => {
        if (!window.TWMAFirebase || !TWMAFirebase.isReady()) {
            setLaedt(false);
            return;
        }
        const unsub = TWMAFirebase.listenAktiveBaustellen(function(list) {
            // Sortierung: zuletzt angefasste oben
            list.sort(function(a, b) {
                return (b.zuletzt_geaendert || b.ts || 0) - (a.zuletzt_geaendert || a.ts || 0);
            });
            setBaustellen(list);
            setLaedt(false);
        });
        return unsub;
    }, []);

    const gefiltert = React.useMemo(() => {
        if (!suche.trim()) return baustellen;
        const s = suche.toLowerCase();
        return baustellen.filter(function(b) {
            return (b.name || '').toLowerCase().indexOf(s) !== -1
                || (b.adresse || '').toLowerCase().indexOf(s) !== -1
                || (b.bauherr || '').toLowerCase().indexOf(s) !== -1;
        });
    }, [baustellen, suche]);

    return (
        <div style={{flex: 1, padding: '16px 14px 20px', display: 'flex', flexDirection: 'column', gap: 12}}>
            {/* Suchfeld */}
            <div style={{position: 'relative'}}>
                <input type="text" value={suche}
                    onChange={e => setSuche(e.target.value)}
                    placeholder={TWMAConfig.t('bst_suche', lang)}
                    style={{
                        width: '100%', padding: '12px 14px 12px 40px',
                        background: 'var(--bg-card)', color: 'var(--text-primary)',
                        border: '1px solid var(--border-color)',
                        borderRadius: 'var(--radius-md)',
                        fontSize: 14, fontFamily: 'Source Sans 3, sans-serif',
                        boxSizing: 'border-box'
                    }} />
                <span style={{
                    position: 'absolute', left: 14, top: '50%', transform: 'translateY(-50%)',
                    color: 'var(--text-muted)', fontSize: 16

// ============================================================
// TW Baustellen-App  -  Modul Fotos (Etappe 5 - HERZSTUECK)
// ============================================================
// Stufen-Workflow:
//   1. Baustelle waehlen
//   2. Raum waehlen oder neu anlegen
//   3. Phase waehlen (Rohzustand / Abdichtung / Fertigstellung)
//   4. Wand-Auswahl (2x2 / 3x2 / 4x2 Grid + Boden + Decke)
//   5. Kamera aufrufen + Foto aufnehmen
//   6. Sprach-Notiz + Uebersetzung + Speichern
//
// Datenfluss:
//   - Foto wird lokal als Blob in IndexedDB gespeichert
//   - Automatisch in sync_queue eingereiht
//   - TWMASync laedt hoch sobald online
//
// Separater Zweig: Allgemeines Foto (bis 20/Baustelle, kein Raum noetig)
// ============================================================

// ===== Kompressions-Utility ==================================
// Komprimiert ein File/Blob auf max 1920px lange Seite (JPEG q=0.85)
async function komprimiereFoto(fileOrBlob, maxDim) {
    maxDim = maxDim || 1920;
    const bitmap = await createImageBitmap(fileOrBlob);
    const faktor = Math.min(1, maxDim / Math.max(bitmap.width, bitmap.height));
    const w = Math.round(bitmap.width * faktor);
    const h = Math.round(bitmap.height * faktor);
    const canvas = document.createElement('canvas');
    canvas.width = w; canvas.height = h;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(bitmap, 0, 0, w, h);
    try { bitmap.close(); } catch (_) {}
    return await new Promise(function(resolve) {
        canvas.toBlob(function(b) { resolve(b); }, 'image/jpeg', 0.85);
    });
}

async function erstelleThumbnail(blob) {
    return komprimiereFoto(blob, 320);
}

function formatTs(ts) {
    if (!ts) return '';
    const d = new Date(ts);
    const pad = n => n < 10 ? '0' + n : '' + n;
    return d.getFullYear() + pad(d.getMonth()+1) + pad(d.getDate()) + '-'
        + pad(d.getHours()) + pad(d.getMinutes()) + pad(d.getSeconds());
}

function buildUploadName(foto, geraeteKurz) {
    // IVAN_roh_bad-1_wand-1_20260418-143022.jpg
    const phaseKurz = { rohzustand: 'roh', abdichtung: 'abd', fertigstellung: 'fert', allgemein: 'allg' }[foto.phase] || foto.phase;
    return [
        geraeteKurz || 'MA',
        phaseKurz,
        foto.raum_id || 'allg',
        foto.wand_id || 'x',
        formatTs(foto.aufgenommen_am)
    ].join('_') + '.jpg';
}

function blobObjectUrl(blob) {
    if (!blob) return null;
    try { return URL.createObjectURL(blob); } catch (_) { return null; }
}

                padding: '6px 10px',
                background: props.online ? 'linear-gradient(135deg,#1E88E5,#1565C0)' : 'var(--bg-card)',
                color: props.online ? '#fff' : 'var(--text-muted)',
                border: '1px solid var(--border-color)',
                borderRadius: 'var(--radius-md)',
                fontFamily: 'Oswald, sans-serif', fontSize: 11,
                cursor: props.online ? 'pointer' : 'not-allowed',
                letterSpacing: '0.5px'

        </button>
    );
}

// ===== Stufe 1: Baustellen-Auswahl ===========================
function FotBaustellenWahl(props) {
    const lang = props.lang;
    const [baustellen, setBaustellen] = React.useState([]);
    const [laedt, setLaedt] = React.useState(true);

    React.useEffect(function() {
        if (!window.TWMAFirebase || !TWMAFirebase.isReady()) {
            setLaedt(false); return;
        }
        const unsub = TWMAFirebase.listenAktiveBaustellen(function(list) {
            list.sort(function(a, b) { return (b.zuletzt_geaendert || 0) - (a.zuletzt_geaendert || 0); });
            setBaustellen(list);
            setLaedt(false);
        });
        return unsub;
    }, []);

    return (
        <div style={{flex:1, display:'flex', flexDirection:'column', minHeight:0}}>
            <FotoKopfzeile titel={TWMAConfig.t('fot_baustelle_waehlen', lang)} />
            <div style={{flex:1, overflowY:'auto', padding:'12px 14px', display:'flex', flexDirection:'column', gap:10}}>
                {laedt && (
                    <div style={{textAlign:'center', padding:20, color:'var(--text-muted)'}}>
                        {TWMAConfig.t('bst_lade', lang)}
                    </div>
                )}
                {!laedt && baustellen.length === 0 && (
                    <div style={{textAlign:'center', padding:20, color:'var(--text-muted)', fontStyle:'italic'}}>
                        {TWMAConfig.t('fot_keine_baustellen', lang)}
                    </div>
                )}
                {baustellen.map(function(b) {
                    return (
                        <button key={b.id} onClick={function(){ props.onWahl(b); }}
                            style={{
                                display:'flex', flexDirection:'column', gap:4,
                                padding:'14px 16px', textAlign:'left',
                                background:'var(--bg-card)',
                                border:'1px solid var(--border-color)',
                                borderRadius:'var(--radius-lg)',
                                cursor:'pointer', color:'var(--text-primary)'
                            }}>
                            <div style={{
                                fontFamily:'Oswald, sans-serif', fontSize:16, fontWeight:600,
                                color:'var(--text-white)', letterSpacing:'0.5px'
                            }}>{b.name}</div>
                            {b.adresse && <div style={{fontSize:12, color:'var(--text-muted)'}}>{b.adresse}</div>}
                            {b.bauherr && <div style={{fontSize:11, color:'var(--text-muted)', fontStyle:'italic'}}>{b.bauherr}</div>}
                        </button>
                    );
                })}
            </div>
        </div>
    );
}

// ===== Stufe 2: Raum-Auswahl / Neuer Raum ====================
function NeuerRaumDialog(props) {
    const lang = props.lang;
    const [bezeichnung, setBezeichnung] = React.useState('');
    const [raumNr, setRaumNr] = React.useState('');
    const [geschoss, setGeschoss] = React.useState('EG');
    const [wandZahl, setWandZahl] = React.useState(4);
    const speech = useSpeech(lang);

    React.useEffect(function() {
        if (speech.transcript) setBezeichnung(speech.transcript);
    }, [speech.transcript]);

    if (!props.offen) return null;

    const gs = [
        { code:'KG', label:TWMAConfig.t('fot_gs_kg', lang) },
        { code:'EG', label:TWMAConfig.t('fot_gs_eg', lang) },
        { code:'OG', label:TWMAConfig.t('fot_gs_og', lang) },
        { code:'DG', label:TWMAConfig.t('fot_gs_dg', lang) }
    ];

    function speichern() {
        const trim = bezeichnung.trim();
        if (!trim) return;
        const raum = {
            id: 'raum_' + Date.now().toString(36) + Math.random().toString(36).slice(2,6),
            baustelle_id: props.baustelleId,
            bezeichnung: trim,
            raum_nr: raumNr.trim() || null,
            geschoss: geschoss,
            wand_zahl: wandZahl,
            wand_labels: [],
            ts: Date.now()
        };
        TWMAStorage.saveRaum(raum).then(function() {
            props.onGespeichert(raum);
        }).catch(function(e) {
            alert('Speicher-Fehler: ' + e.message);
        });
    }

    return (
        <div style={{
            position:'fixed', inset:0, zIndex:1000,
            background:'rgba(0,0,0,0.75)',
            display:'flex', alignItems:'center', justifyContent:'center', padding:16
        }} onClick={props.onSchliessen}>
            <div onClick={function(e){e.stopPropagation();}}
                style={{
                    width:'100%', maxWidth:420, maxHeight:'90vh', overflowY:'auto',
                    background:'var(--bg-card)',
                    border:'1px solid var(--border-color)',
                    borderRadius:'var(--radius-xl)',
                    padding:20, display:'flex', flexDirection:'column', gap:14
                }}>
                <div style={{
                    fontFamily:'Oswald,sans-serif', fontSize:18, fontWeight:600,
                    color:'var(--text-white)', textTransform:'uppercase', letterSpacing:'1px'
                }}>{TWMAConfig.t('fot_neuer_raum', lang)}</div>

                {/* Bezeichnung + Mic */}
                <div>
                    <label style={{fontSize:12, color:'var(--text-muted)', fontFamily:'Oswald,sans-serif', letterSpacing:'0.5px', textTransform:'uppercase'}}>
                        {TWMAConfig.t('fot_raum_bezeichnung', lang)}
                    </label>
                    <div style={{display:'flex', gap:8, marginTop:6}}>
                        <input type="text" value={bezeichnung}
                            onChange={function(e){ setBezeichnung(e.target.value); }}
                            style={inputStyle} />
                        {speech.supported && (
                            <MicButton size={42}
                                recording={speech.recording}
                                onClick={function(){ speech.recording ? speech.stop() : speech.start(); }} />
                        )}
                    </div>
                </div>

                {/* Raum-Nr */}
                <div>
                    <label style={labelStyle}>{TWMAConfig.t('fot_raum_nr', lang)}</label>
                    <input type="text" value={raumNr}
                        onChange={function(e){ setRaumNr(e.target.value); }}
                        style={inputStyle} />
                </div>

                {/* Geschoss */}
                <div>
                    <label style={labelStyle}>{TWMAConfig.t('fot_geschoss', lang)}</label>
                    <div style={{display:'grid', gridTemplateColumns:'repeat(4, 1fr)', gap:6, marginTop:6}}>
                        {gs.map(function(g) {
                            const aktiv = g.code === geschoss;
                            return (
                                <button key={g.code} onClick={function(){ setGeschoss(g.code); }}
                                    style={{
                                        padding:'10px 4px',
                                        background: aktiv ? 'linear-gradient(135deg,#1E88E5,#1565C0)' : 'var(--bg-secondary)',
                                        color: aktiv ? '#fff' : 'var(--text-light)',
                                        border: aktiv ? '2px solid #fff' : '1px solid var(--border-color)',
                                        borderRadius:'var(--radius-md)',
                                        fontFamily:'Oswald,sans-serif', fontSize:11, fontWeight:600,
                                        textTransform:'uppercase', letterSpacing:'0.5px',
                                        cursor:'pointer'
                                    }}>{g.label}</button>
                            );
                        })}
                    </div>
                </div>

                {/* Wandzahl */}
                <div>
                    <label style={labelStyle}>{TWMAConfig.t('fot_wandzahl', lang)}</label>
                    <div style={{display:'grid', gridTemplateColumns:'repeat(6, 1fr)', gap:6, marginTop:6}}>
                        {[3,4,5,6,7,8].map(function(n) {
                            const aktiv = n === wandZahl;
                            return (
                                <button key={n} onClick={function(){ setWandZahl(n); }}
                                    style={{
                                        padding:'10px 4px',
                                        background: aktiv ? 'linear-gradient(135deg,#1E88E5,#1565C0)' : 'var(--bg-secondary)',
                                        color: aktiv ? '#fff' : 'var(--text-light)',
                                        border: aktiv ? '2px solid #fff' : '1px solid var(--border-color)',
                                        borderRadius:'var(--radius-md)',
                                        fontFamily:'Oswald,sans-serif', fontSize:15, fontWeight:700,
                                        cursor:'pointer'
                                    }}>{n}</button>
                            );
                        })}
                    </div>
                </div>

                {/* Buttons */}
                <div style={{display:'flex', gap:8, marginTop:6}}>
                    <button onClick={props.onSchliessen} style={btnGhost}>
                        {TWMAConfig.t('abbrechen', lang)}
                    </button>
                    <button onClick={speichern}
                        disabled={!bezeichnung.trim()}
                        style={Object.assign({}, btnPrimary, bezeichnung.trim() ? {} : {opacity:0.4, cursor:'not-allowed'})}>
                        {TWMAConfig.t('speichern', lang)}
                    </button>
                </div>
            </div>
        </div>
    );
}

function FotRaumWahl(props) {
    const lang = props.lang;
    const [raeume, setRaeume] = React.useState([]);
    const [dialogOffen, setDialogOffen] = React.useState(false);
    const [laedt, setLaedt] = React.useState(true);

    async function reload() {
        setLaedt(true);
        const list = await TWMAStorage.listRaeume(props.baustelle.id).catch(() => []);
        list.sort(function(a,b){ return (b.ts||0) - (a.ts||0); });
        setRaeume(list);
        setLaedt(false);
    }

    React.useEffect(function() { reload(); }, [props.baustelle.id]);

    function onGespeichert(raum) {
        setDialogOffen(false);
        reload();
        props.onWahl(raum);
    }

    async function loescheRaum(raum) {
        if (!window.confirm(TWMAConfig.t('fot_raum_loeschen_warn', lang))) return;
        await TWMAStorage.deleteRaum(raum.id).catch(() => {});
        // Fotos zum Raum mitloeschen
        const fotos = await TWMAStorage.listFotos({ baustelle_id: props.baustelle.id, raum_id: raum.id }).catch(() => []);
        for (let i = 0; i < fotos.length; i++) {
            await TWMAStorage.deleteFoto(fotos[i].id).catch(() => {});
            await TWMAStorage.removeSyncItemsByFotoId(fotos[i].id).catch(() => {});
        }
        reload();
    }

    return (
        <div style={{flex:1, display:'flex', flexDirection:'column', minHeight:0}}>
            <FotoKopfzeile titel={props.baustelle.name} onBack={props.onBack}
                rechts={<SyncBadge pending={props.pending} online={props.online} onSync={props.onSync} />} />
            <div style={{flex:1, overflowY:'auto', padding:'12px 14px', display:'flex', flexDirection:'column', gap:10}}>

                <button onClick={function(){ setDialogOffen(true); }}
                    style={{
                        padding:'14px',
                        background:'linear-gradient(135deg,#27ae60,#1e8449)',
                        color:'#fff', border:'2px dashed rgba(255,255,255,0.3)',
                        borderRadius:'var(--radius-lg)',
                        fontFamily:'Oswald,sans-serif', fontSize:14, fontWeight:600,
                        textTransform:'uppercase', letterSpacing:'1px',
                        cursor:'pointer'
                    }}>
                    + {TWMAConfig.t('fot_neuer_raum', lang)}
                </button>

                <button onClick={function(){ props.onAllgemein(); }}
                    style={{
                        padding:'14px',
                        background:'linear-gradient(135deg,#8e44ad,#6c3483)',
                        color:'#fff', border:'none',
                        borderRadius:'var(--radius-lg)',
                        fontFamily:'Oswald,sans-serif', fontSize:14, fontWeight:600,
                        textTransform:'uppercase', letterSpacing:'1px',
                        cursor:'pointer',
                        display:'flex', alignItems:'center', justifyContent:'center', gap:8
                    }}>
                    <span style={{fontSize:18}}>&#128247;</span>
                    <span>{TWMAConfig.t('fot_allgemeines_foto', lang)}</span>
                </button>

                {laedt && (
                    <div style={{textAlign:'center', padding:20, color:'var(--text-muted)'}}>
                        {TWMAConfig.t('bst_lade', lang)}
                    </div>
                )}

                {!laedt && raeume.length === 0 && (
                    <div style={{textAlign:'center', padding:20, color:'var(--text-muted)', fontStyle:'italic'}}>
                        {TWMAConfig.t('fot_keine_raeume', lang)}
                    </div>
                )}

                {raeume.map(function(r) {
                    return (
                        <div key={r.id} style={{
                            background:'var(--bg-card)',
                            border:'1px solid var(--border-color)',
                            borderRadius:'var(--radius-lg)',
                            display:'flex', alignItems:'stretch'
                        }}>
                            <button onClick={function(){ props.onWahl(r); }}
                                style={{
                                    flex:1, padding:'14px 16px', textAlign:'left',
                                    background:'transparent', border:'none',
                                    color:'var(--text-primary)', cursor:'pointer',
                                    display:'flex', flexDirection:'column', gap:3
                                }}>
                                <div style={{
                                    fontFamily:'Oswald,sans-serif', fontSize:15, fontWeight:600,
                                    color:'var(--text-white)'
                                }}>{r.bezeichnung}</div>
                                <div style={{fontSize:11, color:'var(--text-muted)'}}>
                                    {r.geschoss}{r.raum_nr ? ' \u2022 Nr. ' + r.raum_nr : ''}{' \u2022 ' + r.wand_zahl + ' ' + TWMAConfig.t('fot_wand', lang)}
                                </div>
                            </button>
                            <button onClick={function(){ loescheRaum(r); }}
                                title={TWMAConfig.t('fot_raum_loeschen', lang)}
                                style={{
                                    padding:'0 14px', background:'transparent',
                                    color:'var(--accent-red-light)',
                                    border:'none', borderLeft:'1px solid var(--border-color)',
                                    fontSize:18, cursor:'pointer'
                                }}>&#128465;</button>
                        </div>
                    );
                })}
            </div>
            <NeuerRaumDialog
                offen={dialogOffen}
                lang={lang}
                baustelleId={props.baustelle.id}
                onSchliessen={function(){ setDialogOffen(false); }}
                onGespeichert={onGespeichert} />
        </div>
    );
}

// ===== Stufe 3: Phase-Auswahl ================================
function FotPhaseWahl(props) {
    const lang = props.lang;
    const [fortschritt, setFortschritt] = React.useState({});

    React.useEffect(function() {
        async function calc() {
            const f = {};
            const phasen = ['rohzustand', 'abdichtung', 'fertigstellung'];
            for (let i = 0; i < phasen.length; i++) {
                const fotos = await TWMAStorage.listFotos({
                    baustelle_id: props.baustelle.id,
                    raum_id: props.raum.id,
                    phase: phasen[i]
                }).catch(() => []);
                const waende = new Set(fotos.map(function(x){ return x.wand_id; }));
                f[phasen[i]] = waende.size;
            }
            setFortschritt(f);
        }
        calc();
    }, [props.baustelle.id, props.raum.id]);

    const phasen = [
        { id:'rohzustand', label:TWMAConfig.t('fot_phase_roh', lang), beschr:TWMAConfig.t('fot_phase_roh_beschr', lang),
          gradient:'linear-gradient(135deg,#546e7a,#37474f)' },
        { id:'abdichtung', label:TWMAConfig.t('fot_phase_abd', lang), beschr:TWMAConfig.t('fot_phase_abd_beschr', lang),
          gradient:'linear-gradient(135deg,#e67e22,#ca6f1e)' },
        { id:'fertigstellung', label:TWMAConfig.t('fot_phase_fert', lang), beschr:TWMAConfig.t('fot_phase_fert_beschr', lang),
          gradient:'linear-gradient(135deg,#27ae60,#1e8449)' }
    ];

    const total = (props.raum.wand_zahl || 4) + 2; // +Boden +Decke

    return (
        <div style={{flex:1, display:'flex', flexDirection:'column', minHeight:0}}>
            <FotoKopfzeile titel={props.raum.bezeichnung} onBack={props.onBack}
                rechts={<SyncBadge pending={props.pending} online={props.online} onSync={props.onSync} />} />
            <div style={{flex:1, overflowY:'auto', padding:'14px', display:'flex', flexDirection:'column', gap:12}}>
                <div style={{
                    textAlign:'center', color:'var(--text-muted)',
                    fontFamily:'Oswald,sans-serif', fontSize:12, letterSpacing:'1px',
                    textTransform:'uppercase'
                }}>
                    {TWMAConfig.t('fot_phase_waehlen', lang)}
                </div>
                {phasen.map(function(p) {
                    const cnt = fortschritt[p.id] || 0;
                    return (
                        <button key={p.id} onClick={function(){ props.onWahl(p.id); }}
                            style={{
                                padding:'20px 18px',
                                background: p.gradient, color:'#fff',
                                border:'1px solid rgba(255,255,255,0.12)',
                                borderRadius:'var(--radius-lg)',
                                display:'flex', flexDirection:'column', gap:6,
                                textAlign:'left', cursor:'pointer',
                                boxShadow:'0 4px 12px rgba(0,0,0,0.25)'
                            }}>
                            <div style={{
                                fontFamily:'Oswald,sans-serif', fontSize:18, fontWeight:600,
                                textTransform:'uppercase', letterSpacing:'1px'
                            }}>{p.label}</div>
                            <div style={{fontSize:12, opacity:0.85}}>{p.beschr}</div>
                            <div style={{
                                marginTop:4, fontSize:12, fontFamily:'Oswald,sans-serif',
                                padding:'4px 10px', alignSelf:'flex-start',
                                background:'rgba(0,0,0,0.25)',
                                borderRadius:'var(--radius-sm)', letterSpacing:'0.5px'
                            }}>
                                {cnt} {TWMAConfig.t('fot_fortschritt', lang)} {total} {TWMAConfig.t('fot_waende_dokumentiert', lang)}
                            </div>
                        </button>
                    );
                })}
            </div>
        </div>
    );
}

// ===== Stufe 4: Wand-Auswahl =================================
function WandKachel(props) {
    const { label, foto, onClick, farbe } = props;
    const url = foto ? blobObjectUrl(foto.thumb_blob || foto.foto_blob) : null;
    const status = !foto ? 'leer' : (foto.sync_status === 'uploaded' ? 'ok' : foto.sync_status === 'fehler' ? 'fehler' : 'pending');

    React.useEffect(function() {
        return function() { if (url) try { URL.revokeObjectURL(url); } catch(_){} };
    }, [url]);

    const statusFarbe = status === 'ok' ? '#27ae60' : status === 'fehler' ? '#c41e1e' : status === 'pending' ? '#f39c12' : '#7f8c8d';
    const statusIcon  = status === 'ok' ? '\u2713' : status === 'fehler' ? '!' : status === 'pending' ? '\u21BB' : '';

    return (
        <button onClick={onClick} style={{
            position:'relative',
            aspectRatio:'1',
            background: url ? '#000' : (farbe || 'var(--bg-card)'),
            border:'1px solid var(--border-color)',
            borderRadius:'var(--radius-md)',
            cursor:'pointer', padding:0, overflow:'hidden',
            display:'flex', flexDirection:'column'
        }}>
            {url ? (
                <img src={url} alt={label} style={{
                    position:'absolute', inset:0, width:'100%', height:'100%',
                    objectFit:'cover', opacity:0.75
                }} />
            ) : null}
            <div style={{
                position:'absolute', inset:0,
                display:'flex', alignItems:'center', justifyContent:'center',
                fontFamily:'Oswald,sans-serif', fontSize:12, fontWeight:600,
                color:'#fff', textShadow:'0 1px 3px rgba(0,0,0,0.8)',
                textTransform:'uppercase', letterSpacing:'0.5px',
                textAlign:'center', padding:4
            }}>{label}</div>
            {foto && (
                <div style={{
                    position:'absolute', top:4, right:4,
                    width:22, height:22, borderRadius:'50%',
                    background: statusFarbe, color:'#fff',
                    display:'flex', alignItems:'center', justifyContent:'center',
                    fontSize:12, fontWeight:700,
                    boxShadow:'0 2px 6px rgba(0,0,0,0.5)'
                }}>{statusIcon}</div>
            )}
        </button>
    );
}

function FotWandWahl(props) {
    const lang = props.lang;
    const [fotos, setFotos] = React.useState([]);
    const [zeigeDecke, setZeigeDecke] = React.useState(false);

    async function reload() {
        const list = await TWMAStorage.listFotos({
            baustelle_id: props.baustelle.id,
            raum_id: props.raum.id,
            phase: props.phase
        }).catch(() => []);
        setFotos(list);
    }

    React.useEffect(function() {
        reload();
        window.addEventListener('tw-ma-sync-progress', reload);
        return function() { window.removeEventListener('tw-ma-sync-progress', reload); };
    }, [props.baustelle.id, props.raum.id, props.phase]);

    // Gruppieren: latest per wand_id gewinnt
    const fotoByWand = React.useMemo(function() {
        const m = {};
        fotos.forEach(function(f) {
            if (!m[f.wand_id] || (m[f.wand_id].aufgenommen_am || 0) < (f.aufgenommen_am || 0)) {
                m[f.wand_id] = f;
            }
        });
        return m;
    }, [fotos]);

    const wandZahl = props.raum.wand_zahl || 4;
    const spalten = wandZahl <= 4 ? 2 : wandZahl <= 6 ? 3 : 4;
    const waende = [];
    for (let i = 1; i <= wandZahl; i++) waende.push('wand-' + i);

    const phaseLabel = {
        rohzustand:    TWMAConfig.t('fot_phase_roh', lang),
        abdichtung:    TWMAConfig.t('fot_phase_abd', lang),
        fertigstellung:TWMAConfig.t('fot_phase_fert', lang)
    }[props.phase];

    function onKachel(wandId) {
        props.onKameraOffnen(wandId);
    }

    return (
        <div style={{flex:1, display:'flex', flexDirection:'column', minHeight:0}}>
            <FotoKopfzeile
                titel={props.raum.bezeichnung + ' \u2022 ' + phaseLabel}
                onBack={props.onBack}
                rechts={<SyncBadge pending={props.pending} online={props.online} onSync={props.onSync} />} />

            <div style={{flex:1, overflowY:'auto', padding:'12px 14px'}}>
                <div style={{
                    display:'grid', gap:8,
                    gridTemplateColumns: 'repeat(' + spalten + ', 1fr)'
                }}>
                    {waende.map(function(wid, idx) {
                        return (
                            <WandKachel key={wid}
                                label={TWMAConfig.t('fot_wand', lang) + ' ' + (idx+1)}
                                foto={fotoByWand[wid]}
                                onClick={function(){ onKachel(wid); }} />
                        );
                    })}
                </div>
                <div style={{
                    display:'grid', gap:8, marginTop:8,
                    gridTemplateColumns: zeigeDecke ? '1fr 1fr' : '1fr'
                }}>
                    <WandKachel
                        label={TWMAConfig.t('fot_boden', lang)}
                        foto={fotoByWand['boden']}
                        farbe="linear-gradient(135deg,#5d4037,#3e2723)"

// ===== Stufe 5+6: Foto aufnehmen + Sprach-Notiz ==============
function FotAufnahme(props) {
    const lang = props.lang;
    const [fotoBlob, setFotoBlob] = React.useState(null);
    const [fotoUrl, setFotoUrl]   = React.useState(null);
    const [komprimiere, setKomprimiere] = React.useState(false);
    const [notiz, setNotiz]       = React.useState('');
    const [notizDe, setNotizDe]   = React.useState('');
    const [speichert, setSpeichert] = React.useState(false);
    const [uebersetze, setUebersetze] = React.useState(false);
    const fileInputRef = React.useRef(null);
    const speech = useSpeech(lang);

    // URL-Cleanup
    React.useEffect(function() {
        return function() { if (fotoUrl) try { URL.revokeObjectURL(fotoUrl); } catch(_){} };
    }, [fotoUrl]);

    // Speech-Transkript ins Feld spiegeln + ggf uebersetzen
    React.useEffect(function() {
        if (speech.transcript) setNotiz(speech.transcript);
    }, [speech.transcript]);

    // Auto-Kamera-Oeffnen beim ersten Rendern
    React.useEffect(function() {
        if (!fotoBlob && fileInputRef.current) {
            // Kleiner Delay fuer mobiles Chrome
            setTimeout(function() {
                try { fileInputRef.current.click(); } catch(_){}
            }, 100);
        }
    }, []);

    async function onFileSelect(e) {
        const file = e.target.files && e.target.files[0];
        if (!file) return;
        setKomprimiere(true);
        try {
            const blob = await komprimiereFoto(file, 1920);
            setFotoBlob(blob);
            setFotoUrl(URL.createObjectURL(blob));
        } catch (err) {
            alert('Foto-Fehler: ' + err.message);
        }
        setKomprimiere(false);
        e.target.value = ''; // reset fuer Wiederholungs-Klick
    }

    function wiederholen() {
        if (fotoUrl) try { URL.revokeObjectURL(fotoUrl); } catch(_){}
        setFotoBlob(null);
        setFotoUrl(null);
        setNotiz(''); setNotizDe('');
        speech.reset();
        setTimeout(function() {
            if (fileInputRef.current) fileInputRef.current.click();
        }, 100);
    }

    async function uebersetzeNotiz() {
        if (!notiz.trim() || lang === 'de') {
            setNotizDe(notiz.trim());
            return;
        }
        if (!window.TWMATranslation || !TWMATranslation.translate) {
            // Etappe 7 liefert echte Uebersetzung. Vorerst Passthrough.
            setNotizDe(notiz);
            return;
        }
        setUebersetze(true);
        try {
            const t = await TWMATranslation.translate(notiz, lang, 'de');
            setNotizDe(t || notiz);
        } catch (_) {
            setNotizDe(notiz);
        }
        setUebersetze(false);
    }

    // Auto-Uebersetzung wenn Mic stoppt
    React.useEffect(function() {
        if (!speech.recording && notiz.trim()) {
            uebersetzeNotiz();
        }
    }, [speech.recording]);

    async function speichereFoto() {
        if (!fotoBlob) return;
        setSpeichert(true);
        try {
            const thumb = await erstelleThumbnail(fotoBlob);
            const geraeteId = TWMACore.getDeviceId();
            const geraeteKurz = (geraeteId || 'MA').slice(-6).toUpperCase();
            const id = 'foto_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2,8);
            const foto = {
                id: id,
                baustelle_id: props.baustelle.id,
                raum_id: props.raum ? props.raum.id : 'allgemein',
                phase: props.phase,
                wand_id: props.wandId,
                wand_label: props.wandLabel || null,
                foto_blob: fotoBlob,
                thumb_blob: thumb,
                notiz_original: {
                    sprache: lang,
                    text: notiz.trim()
                },
                notiz_deutsch: (notizDe || notiz || '').trim(),
                aufgenommen_am: Date.now(),
                aufgenommen_von: geraeteId,
                sync_status: 'pending',
                upload_name: null
            };
            foto.upload_name = buildUploadName(foto, geraeteKurz);

            await TWMAStorage.saveFoto(foto);
            await TWMAStorage.enqueueSync({ foto_id: id });

            // Sofort Sync antriggern wenn online
            if (navigator.onLine && window.TWMASync) {
                TWMASync.triggerNow();
            }
            if (window.TWMASync) TWMASync.updateProgress();

            props.onFertig();
        } catch (err) {
            alert('Speicher-Fehler: ' + err.message);
        }
        setSpeichert(false);
    }

    const titelParts = [];
    if (props.raum) titelParts.push(props.raum.bezeichnung);
    if (props.wandLabel) titelParts.push(props.wandLabel);
    else if (props.wandId) titelParts.push(props.wandId);

    return (
        <div style={{flex:1, display:'flex', flexDirection:'column', minHeight:0, background:'var(--bg-primary)'}}>
            <FotoKopfzeile titel={titelParts.join(' \u2022 ')} onBack={props.onBack} />

            {/* Hidden File Input (Mobile-Kamera) */}
            <input ref={fileInputRef} type="file"
                accept="image/*" capture="environment"
                onChange={onFileSelect}
                style={{display:'none'}} />

            <div style={{flex:1, overflowY:'auto', padding:'14px', display:'flex', flexDirection:'column', gap:14}}>

                {komprimiere && (
                    <div style={{
                        textAlign:'center', padding:40, color:'var(--accent-blue)',
                        fontFamily:'Oswald,sans-serif', fontSize:14,
                        textTransform:'uppercase', letterSpacing:'1px'
                    }}>
                        {TWMAConfig.t('bst_lade', lang)}
                    </div>
                )}

                {!komprimiere && !fotoBlob && (
                    <div style={{
                        display:'flex', flexDirection:'column', gap:10,
                        padding:'40px 20px', textAlign:'center'
                    }}>
                        <div style={{fontSize:48}}>&#128247;</div>
                        <button onClick={function(){ if (fileInputRef.current) fileInputRef.current.click(); }}
                            style={Object.assign({}, btnPrimary, {padding:'16px', fontSize:14})}>
                            {TWMAConfig.t('fot_foto_aufnehmen', lang)}
                        </button>
                    </div>
                )}

                {!komprimiere && fotoBlob && fotoUrl && (
                    <React.Fragment>
                        {/* Foto-Vorschau */}
                        <div style={{
                            position:'relative', width:'100%',
                            background:'#000',
                            borderRadius:'var(--radius-lg)',
                            overflow:'hidden',
                            aspectRatio:'4/3'
                        }}>
                            <img src={fotoUrl} style={{
                                width:'100%', height:'100%', objectFit:'contain'
                            }} />
                        </div>

                        {/* Wiederholen/Verwenden (erst wenn noch keine Notiz) */}
                        <div style={{display:'flex', gap:8}}>
                            <button onClick={wiederholen} style={Object.assign({}, btnGhost, {
                                background:'var(--accent-red)', color:'#fff', border:'none'
                            })}>
                                &#10006; {TWMAConfig.t('fot_wiederholen', lang)}
                            </button>
                        </div>

                        {/* Sprach-Notiz-Bereich */}
                        <div style={{
                            background:'var(--bg-card)',
                            border:'1px solid var(--border-color)',
                            borderRadius:'var(--radius-lg)',
                            padding:14,
                            display:'flex', flexDirection:'column', gap:10
                        }}>
                            <div style={{display:'flex', alignItems:'center', gap:10}}>
                                <MicButton size={54}
                                    disabled={!speech.supported}
                                    recording={speech.recording}
                                    onClick={function(){ speech.recording ? speech.stop() : speech.start(); }} />
                                <div style={{flex:1, fontFamily:'Oswald,sans-serif', fontSize:12,
                                    color: speech.supported ? 'var(--text-light)' : 'var(--text-muted)',
                                    letterSpacing:'0.5px', textTransform:'uppercase'}}>
                                    {speech.supported
                                        ? TWMAConfig.t('fot_notiz_aufnehmen', lang)
                                        : TWMAConfig.t('fot_mic_nicht_verfuegbar', lang)}
                                </div>
                            </div>

                            <div>
                                <label style={labelStyle}>{TWMAConfig.t('fot_notiz_original', lang)} ({lang.toUpperCase()})</label>
                                <textarea value={notiz}
                                    onChange={function(e){ setNotiz(e.target.value); speech.setTranscript(e.target.value); }}
                                    onBlur={uebersetzeNotiz}
                                    placeholder={TWMAConfig.t('fot_notiz_platzhalter', lang)}
                                    rows={3}
                                    style={Object.assign({}, inputStyle, {resize:'vertical', marginTop:6})} />
                            </div>

                            {lang !== 'de' && (
                                <div>
                                    <label style={labelStyle}>
                                        {TWMAConfig.t('fot_notiz_deutsch', lang)}
                                        {uebersetze && <span style={{marginLeft:8, fontStyle:'italic', textTransform:'none'}}>...</span>}
                                    </label>
                                    <textarea value={notizDe}
                                        onChange={function(e){ setNotizDe(e.target.value); }}
                                        rows={2}
                                        style={Object.assign({}, inputStyle, {
                                            resize:'vertical', marginTop:6,
                                            background:'rgba(30,136,229,0.08)'
                                        })} />
                                </div>
                            )}
                        </div>

                        {/* Speichern-Button */}
                        <button onClick={speichereFoto}
                            disabled={speichert}
                            style={Object.assign({}, btnPrimary, {
                                padding:'16px', fontSize:14,
                                background:'linear-gradient(135deg,#27ae60,#1e8449)',
                                opacity: speichert ? 0.6 : 1,
                                cursor: speichert ? 'wait' : 'pointer'
                            })}>
                            {speichert ? '...' : '\u2713 ' + TWMAConfig.t('fot_speichern', lang)}
                        </button>
                    </React.Fragment>
                )}
            </div>
        </div>
    );
}

// ===== Allgemein-Ansicht =====================================
function FotAllgemein(props) {
    const lang = props.lang;
    const [fotos, setFotos] = React.useState([]);

    async function reload() {
        const list = await TWMAStorage.listFotos({
            baustelle_id: props.baustelle.id
        }).catch(() => []);
        const allg = list.filter(function(f){ return f.phase === 'allgemein' || f.raum_id === 'allgemein'; });
        allg.sort(function(a,b){ return (b.aufgenommen_am||0) - (a.aufgenommen_am||0); });
        setFotos(allg);
    }

    React.useEffect(function() {
        reload();
        window.addEventListener('tw-ma-sync-progress', reload);
        return function() { window.removeEventListener('tw-ma-sync-progress', reload); };
    }, [props.baustelle.id]);

    const limit = 20;
    const verfuegbar = fotos.length < limit;

    function neuesFoto() {
        const n = fotos.length + 1;
        const wandId = 'allgemein-' + n;
        props.onKameraOffnen(wandId);
    }

    async function loescheFoto(f) {
        if (!window.confirm(TWMAConfig.t('fot_bestaetigung_loeschen', lang))) return;
        await TWMAStorage.deleteFoto(f.id).catch(() => {});
        await TWMAStorage.removeSyncItemsByFotoId(f.id).catch(() => {});
        reload();
    }

    return (
        <div style={{flex:1, display:'flex', flexDirection:'column', minHeight:0}}>
            <FotoKopfzeile
                titel={props.baustelle.name + ' \u2022 ' + TWMAConfig.t('fot_allgemein', lang)}
                onBack={props.onBack}
                rechts={<SyncBadge pending={props.pending} online={props.online} onSync={props.onSync} />} />
            <div style={{flex:1, overflowY:'auto', padding:'12px 14px', display:'flex', flexDirection:'column', gap:10}}>

                <button onClick={neuesFoto}
                    disabled={!verfuegbar}
                    style={Object.assign({}, btnPrimary, {
                        padding:'14px',
                        background: verfuegbar ? 'linear-gradient(135deg,#8e44ad,#6c3483)' : 'var(--bg-secondary)',
                        opacity: verfuegbar ? 1 : 0.5,
                        cursor: verfuegbar ? 'pointer' : 'not-allowed'
                    })}>
                    {verfuegbar
                        ? '+ ' + TWMAConfig.t('fot_allgemeines_foto', lang) + ' (' + fotos.length + '/' + limit + ')'
                        : TWMAConfig.t('fot_allg_limit', lang)}
                </button>

                <div style={{display:'grid', gap:8, gridTemplateColumns:'repeat(2, 1fr)'}}>
                    {fotos.map(function(f) {
                        const url = blobObjectUrl(f.thumb_blob || f.foto_blob);
                        const status = f.sync_status === 'uploaded' ? '\u2713'
                                     : f.sync_status === 'fehler'   ? '!'
                                     : '\u21BB';
                        const statusColor = f.sync_status === 'uploaded' ? '#27ae60'
                                          : f.sync_status === 'fehler'   ? '#c41e1e'
                                          : '#f39c12';
                        return (
                            <div key={f.id} style={{
                                position:'relative', aspectRatio:'1',
                                background:'var(--bg-card)', overflow:'hidden',
                                borderRadius:'var(--radius-md)',
                                border:'1px solid var(--border-color)'
                            }}>
                                {url ? (
                                    <img src={url} style={{width:'100%', height:'100%', objectFit:'cover'}}/>
                                ) : (
                                    <div style={{
                                        position:'absolute', inset:0,
                                        display:'flex', alignItems:'center', justifyContent:'center',
                                        color:'var(--text-muted)', fontSize:11
                                    }}>{TWMAConfig.t('fot_sync_ok', lang)}</div>
                                )}
                                <div style={{
                                    position:'absolute', top:4, right:4,
                                    width:22, height:22, borderRadius:'50%',
                                    background: statusColor, color:'#fff',
                                    display:'flex', alignItems:'center', justifyContent:'center',
                                    fontSize:12, fontWeight:700
                                }}>{status}</div>
                                <button onClick={function(){ loescheFoto(f); }}
                                    style={{
                                        position:'absolute', bottom:4, right:4,
                                        width:28, height:28, borderRadius:'50%',
                                        background:'rgba(0,0,0,0.7)', color:'#fff',
                                        border:'none', fontSize:14, cursor:'pointer'
                                    }}>&#128465;</button>
                                {f.notiz_deutsch && (
                                    <div style={{
                                        position:'absolute', bottom:0, left:0, right:0,
                                        padding:'4px 6px',
                                        background:'linear-gradient(to top, rgba(0,0,0,0.85), transparent)',
                                        color:'#fff', fontSize:10,
                                        overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'
                                    }}>{f.notiz_deutsch}</div>
                                )}
                            </div>
                        );
                    })}
                </div>
            </div>
        </div>
    );
}

// ===== Haupt-Komponente =====================================
function MAFotos(props) {
    const lang = props.lang;
    // View-Stack: { stufe: 'baustelle'|'raum'|'phase'|'wand'|'aufnahme'|'allgemein', ... }
    const [baustelle, setBaustelle] = React.useState(null);
    const [raum, setRaum]           = React.useState(null);
    const [phase, setPhase]         = React.useState(null);
    const [aufnahmeKontext, setAufnahmeKontext] = React.useState(null); // {wandId, wandLabel, raum, phase}
    const [allgemeinOffen, setAllgemeinOffen]   = React.useState(false);

    // Sync-Progress
    const [pending, setPending] = React.useState(0);
    const [online, setOnline]   = React.useState(navigator.onLine);

    React.useEffect(function() {
        function onProgress(e) {
            if (e.detail) setPending(e.detail.pending || 0);
        }
        function onOnline()  { setOnline(true);  }
        function onOffline() { setOnline(false); }
        window.addEventListener('tw-ma-sync-progress', onProgress);
        window.addEventListener('online', onOnline);
        window.addEventListener('offline', onOffline);
        // Initial-Lesung
        if (window.TWMAStorage) {
            TWMAStorage.countPendingSyncItems().then(function(n){ setPending(n); }).catch(() => {});
        }
        return function() {
            window.removeEventListener('tw-ma-sync-progress', onProgress);
            window.removeEventListener('online', onOnline);
            window.removeEventListener('offline', onOffline);
        };
    }, []);

    function syncTriggern() {
        if (window.TWMASync) TWMASync.triggerNow();
    }

    const syncProps = { pending: pending, online: online, onSync: syncTriggern };

    // Routing
    if (aufnahmeKontext) {
        return (
            <FotAufnahme
                lang={lang}
                baustelle={baustelle}
                raum={aufnahmeKontext.raum}
                phase={aufnahmeKontext.phase}
                wandId={aufnahmeKontext.wandId}
                wandLabel={aufnahmeKontext.wandLabel}
                onBack={function(){ setAufnahmeKontext(null); }}
                onFertig={function(){ setAufnahmeKontext(null); }}
            />
        );
    }

    if (allgemeinOffen && baustelle) {
        return (
            <FotAllgemein
                lang={lang}
                baustelle={baustelle}
                {...syncProps}
                onBack={function(){ setAllgemeinOffen(false); }}
                onKameraOffnen={function(wandId) {
                    setAufnahmeKontext({
                        wandId: wandId,
                        wandLabel: null,
                        raum: null,
                        phase: 'allgemein'
                    });
                }}
            />
        );
    }

    if (!baustelle) {
        return <FotBaustellenWahl lang={lang} onWahl={setBaustelle} />;
    }

    if (!raum) {
        return (
            <FotRaumWahl
                lang={lang}
                baustelle={baustelle}
                {...syncProps}
                onBack={function(){ setBaustelle(null); }}
                onWahl={setRaum}
                onAllgemein={function(){ setAllgemeinOffen(true); }}
            />
        );
    }

    if (!phase) {
        return (
            <FotPhaseWahl
                lang={lang}
                baustelle={baustelle}
                raum={raum}
                {...syncProps}
                onBack={function(){ setRaum(null); }}
                onWahl={setPhase}
            />
        );
    }

    return (
        <FotWandWahl
            lang={lang}
            baustelle={baustelle}
            raum={raum}
            phase={phase}
            {...syncProps}
            onBack={function(){ setPhase(null); }}
            onKameraOffnen={function(wandId) {
                setAufnahmeKontext({
                    wandId: wandId,
                    wandLabel: null,
                    raum: raum,
                    phase: phase
                });
            }}
        />
    );
}

// ===== Utility-Funktionen ====================================

function formatDatumIso(date) {
    const y = date.getFullYear();
    const m = String(date.getMonth()+1).padStart(2,'0');
    const d = String(date.getDate()).padStart(2,'0');
    return y + '-' + m + '-' + d;
}

function formatDatumKurz(iso) {
    if (!iso) return '';
    const p = iso.split('-');
    return p[2] + '.' + p[1] + '.';
}

function parseTimeToMin(hhmm) {
    if (!hhmm || typeof hhmm !== 'string') return 0;
    const p = hhmm.split(':');
    return (parseInt(p[0],10) || 0) * 60 + (parseInt(p[1],10) || 0);
}

function berechneNettoMin(anfang, ende, pauseMin) {
    const a = parseTimeToMin(anfang);
    const e = parseTimeToMin(ende);
    let diff = e - a;
    if (diff < 0) diff += 24 * 60; // Nachtschicht-Toleranz
    return Math.max(0, diff - (pauseMin || 0));
}

function fmtMinAsStd(mins) {
    if (!mins && mins !== 0) return '';
    const h = Math.floor(mins / 60);
    const m = mins % 60;
    return h + ':' + (m < 10 ? '0'+m : m) + ' h';
}

// Mapping Wetter-Code (Open-Meteo WMO) -> unsere 4 Kategorien
function wmoToWetter(code) {
    if (code == null) return null;
    if (code === 0 || code === 1) return 'Sonnig';
    if (code === 2 || code === 3) return 'Bewoelkt';
    if (code >= 51 && code <= 67) return 'Regen';
    if (code >= 71 && code <= 77) return 'Schnee';
    if (code >= 80 && code <= 82) return 'Regen';
    if (code >= 85 && code <= 86) return 'Schnee';
    if (code >= 95) return 'Regen';
    return 'Bewoelkt';
}

// Open-Meteo API (kostenfrei, kein Key noetig)
async function holeWetterAuto(lat, lng) {
    const url = 'https://api.open-meteo.com/v1/forecast?latitude=' + lat
              + '&longitude=' + lng + '&current_weather=true';
    const res = await fetch(url);
    if (!res.ok) throw new Error('Wetter-API ' + res.status);
    const data = await res.json();
    const code = data && data.current_weather && data.current_weather.weathercode;
    return wmoToWetter(code);
}

// Liefert Lat/Lng aus Browser-Geolocation
function holeStandort() {
    return new Promise(function(resolve, reject) {
        if (!navigator.geolocation) { reject(new Error('Keine Geolocation')); return; }
        navigator.geolocation.getCurrentPosition(
            function(pos) { resolve({ lat: pos.coords.latitude, lng: pos.coords.longitude }); },
            function(err) { reject(err); },
            { timeout: 8000, maximumAge: 600000 }
        );
    });
}

// ===== Taetigkeits-Picker ====================================

function TaetigkeitsPicker(props) {
    const { lang, selected, onChange } = props;
    const taet = TWMAConfig.TAETIGKEITEN;
    const [sonstigText, setSonstigText] = React.useState('');

    const selSet = React.useMemo(function() {
        return new Set((selected || []).filter(function(s) {
            return typeof s === 'string' && s.indexOf('__free:') !== 0;
        }));
    }, [selected]);

    const freeTexts = React.useMemo(function() {
        return (selected || []).filter(function(s) {
            return typeof s === 'string' && s.indexOf('__free:') === 0;
        }).map(function(s){ return s.substring(7); });
    }, [selected]);

    function toggle(id) {
        const neu = new Set(selSet);
        if (neu.has(id)) neu.delete(id);
        else neu.add(id);
        onChange([].concat(Array.from(neu), freeTexts.map(function(t){ return '__free:' + t; })));
    }

    function addFreeText() {
        if (!sonstigText.trim()) return;
        const neu = Array.from(selSet)
            .concat(freeTexts.map(function(t){ return '__free:' + t; }))
            .concat('__free:' + sonstigText.trim());
        onChange(neu);
        setSonstigText('');
    }

    function removeFreeText(idx) {
        const neu = freeTexts.filter(function(_,i){ return i !== idx; });
        onChange(Array.from(selSet).concat(neu.map(function(t){ return '__free:' + t; })));
    }

    return (
        <div style={{display:'flex', flexDirection:'column', gap:8}}>
            <div style={{fontSize:11, color:'var(--text-muted)', marginBottom:4}}>
                {TWMAConfig.t('std_taetigkeiten_waehlen', lang)}
            </div>
            <div style={{display:'grid', gridTemplateColumns:'repeat(2, 1fr)', gap:6}}>
                {taet.map(function(t) {
                    const aktiv = selSet.has(t.id);
                    return (
                        <button key={t.id} onClick={function(){ toggle(t.id); }}
                            style={{
                                padding:'8px 10px',
                                background: aktiv ? 'linear-gradient(135deg,#1E88E5,#1565C0)' : 'var(--bg-secondary)',
                                color: aktiv ? '#fff' : 'var(--text-light)',
                                border: aktiv ? '2px solid #fff' : '1px solid var(--border-color)',
                                borderRadius:'var(--radius-sm)',
                                fontSize:11, fontWeight:600,
                                fontFamily:'inherit',
                                cursor:'pointer', textAlign:'left',
                                lineHeight:1.2
                            }}>
                            {aktiv ? '\u2713 ' : ''}{TWMAConfig.taetigkeit(t.id, lang)}
                        </button>
                    );
                })}
            </div>

            {/* Sonstiges Freitext */}
            <div style={{display:'flex', gap:6, marginTop:4}}>
                <input type="text" value={sonstigText}
                    onChange={function(e){ setSonstigText(e.target.value); }}
                    placeholder={TWMAConfig.t('std_taet_sonstiges', lang)}
                    style={stdInputStyle} />
                <button onClick={addFreeText}
                    disabled={!sonstigText.trim()}
                    style={{
                        padding:'0 16px',
                        background:'var(--accent-blue)', color:'#fff',
                        border:'none', borderRadius:'var(--radius-md)',
                        fontSize:18, fontWeight:700, cursor:'pointer',
                        opacity: sonstigText.trim() ? 1 : 0.4
                    }}>+</button>
            </div>
            {freeTexts.length > 0 && (
                <div style={{display:'flex', flexWrap:'wrap', gap:6, marginTop:4}}>
                    {freeTexts.map(function(t, i) {
                        return (
                            <span key={i} style={{
                                display:'inline-flex', alignItems:'center', gap:6,
                                padding:'4px 10px',
                                background:'var(--bg-secondary)',
                                border:'1px solid var(--border-color)',
                                borderRadius:999, fontSize:12,
                                color:'var(--text-light)'
                            }}>
                                {t}
                                <button onClick={function(){ removeFreeText(i); }}
                                    style={{
                                        background:'transparent', color:'var(--accent-red-light)',
                                        border:'none', cursor:'pointer', fontSize:14,
                                        padding:0, lineHeight:1
                                    }}>&times;</button>
                            </span>
                        );
                    })}
                </div>
            )}
        </div>
    );
}

function MaterialPopup(props) {
