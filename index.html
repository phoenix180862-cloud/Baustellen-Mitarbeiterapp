// ============================================================
// MAWandRaster - Stufe 4: Wand-Kachel-Raster + Foto-Aufnahme (B6.2)
// ============================================================
// Master-Dokument 8.6 + 8.7:
//   - Bei 4 Waenden: 2x2-Grid, bei 6 Waenden: 3x2, bei 8: 4x2
//   - Plus Boden + Decke (optional)
//   - Klick auf Kachel: bei leerer Kachel direkt Kamera, bei
//     belegter Kachel Detail-Dialog (Foto anzeigen + Aktionen).
//   - Foto wird via <input capture="environment"> aufgenommen, mit
//     Canvas auf 1920px / q=0.85 komprimiert und in IndexedDB
//     persistiert.

function MAWandRaster({ baustelle, raum, phase, onZurueck, onAenderung }) {
    const lang = useSprache();
    const [fotosByWand, setFotosByWand] = useState({});
    const [laden, setLaden] = useState(true);

    // Aktive Wand fuer den Aufnahme-/Vorschau-Workflow
    const [aktiveWand, setAktiveWand] = useState(null);
    // Vorschau-Foto (frisch aufgenommen, noch nicht gespeichert)
    const [vorschauFoto, setVorschauFoto] = useState(null);
    const [komprimiere, setKomprimiere] = useState(false);
    const [fehler, setFehler] = useState(null);

    const fileInputRef = React.useRef(null);

    // Fotos der aktuellen Phase laden
    function reloadFotos() {
        if (!window.TWMaStorage || !window.TWMaStorage.listFotos) {
            setLaden(false);
            return;
        }
        setLaden(true);
        window.TWMaStorage.listFotos(raum.id, phase.key).then(function(liste){
            const map = {};
            (liste || []).forEach(function(f){ map[f.wand_id] = f; });
            setFotosByWand(map);
            setLaden(false);
        }).catch(function(){
            setFotosByWand({});
            setLaden(false);
        });
    }

    useEffect(function(){
        reloadFotos();
    }, [raum.id, phase.key]);

    // Wand-Liste (Master-Dokument 8.6)
    const waende = [];
    for (let i = 1; i <= (raum.wandzahl || 4); i++) {
        waende.push({ id: 'wand-'+i, kind: 'wand', nr: i });
    }
    if (raum.hatBoden) waende.push({ id: 'boden', kind: 'boden' });
    if (raum.hatDecke) waende.push({ id: 'decke', kind: 'decke' });

    // Grid-Spalten je nach Wandzahl (Master-Dokument 8.6)
    const wandzahl = raum.wandzahl || 4;
    let spalten;
    if (wandzahl <= 4) spalten = 2;
    else if (wandzahl <= 6) spalten = 3;
    else spalten = 4;

    // ------------------------------------------------------------
    // Workflow: Kachel-Klick
    // ------------------------------------------------------------
    function handleWandClick(wand) {
        const vorhanden = fotosByWand[wand.id];
        setAktiveWand(wand);
        setFehler(null);
        if (vorhanden) {
            // Wand hat bereits ein Foto - Detail-Dialog zeigen
            setVorschauFoto(null);
        } else {
            // Wand leer - Kamera direkt oeffnen
            setVorschauFoto(null);
            triggerKamera();
        }
    }

    function triggerKamera() {
        if (!fileInputRef.current) return;
        fileInputRef.current.value = ''; // damit gleiche Datei nochmal triggern kann
        fileInputRef.current.click();
    }

    // File ausgewaehlt -> komprimieren -> Vorschau anzeigen
    function handleFileChange(e) {
        const file = e.target.files && e.target.files[0];
        if (!file) return;
        if (!window.TWMaStorage || !window.TWMaStorage.compressFileToDataUrl) {
            setFehler(tConfig('fotos.aufnahme.fehler.storage'));
            return;
        }
        setKomprimiere(true);
        setFehler(null);
        window.TWMaStorage.compressFileToDataUrl(file, 1920, 0.85)
            .then(function(res){
                setVorschauFoto({
                    dataUrl: res.dataUrl,
                    breite: res.breite,
                    hoehe:  res.hoehe,
                    originalGroesse: res.originalGroesse,
                    neueGroesse:     res.neueGroesse
                });
                setKomprimiere(false);
            })
            .catch(function(err){
                setKomprimiere(false);
                setFehler(tConfig('fotos.aufnahme.fehler.komprimierung') + ' ' + (err.message || ''));
            });
    }

    // "Verwenden" - Foto in IndexedDB speichern
    function handleVerwenden() {
        if (!vorschauFoto || !aktiveWand) return;
        if (!window.TWMaStorage || !window.TWMaStorage.saveFoto) {
            setFehler(tConfig('fotos.aufnahme.fehler.storage'));
            return;
        }

        const baustelleId = baustelle.id || baustelle.staging_folder_id || baustelle.name;
        const onb = (window.TWMaCore && window.TWMaCore.getDeviceId) ? window.TWMaCore.getDeviceId() : 'unbekannt';
        const fotoId = 'foto-' + raum.id + '-' + phase.key + '-' + aktiveWand.id + '-' + Date.now();

        // Thumbnail im Hintergrund erzeugen (Wand-Kachel wird damit befuellt)
        const thumbPromise = (window.TWMaStorage.erzeugeThumbnail
            ? window.TWMaStorage.erzeugeThumbnail(vorschauFoto.dataUrl, 220)
            : Promise.resolve(null));

        thumbPromise.then(function(thumb){
            const datensatz = {
                id: fotoId,
                baustelle_id: baustelleId,
                raum_id: raum.id,
                phase: phase.key,
                wand_id: aktiveWand.id,
                wand_kind: aktiveWand.kind,
                wand_nr: aktiveWand.nr || null,
                foto_dataurl: vorschauFoto.dataUrl,
                thumbnail_dataurl: thumb,
                breite: vorschauFoto.breite,
                hoehe:  vorschauFoto.hoehe,
                drawings: [],
                crop_rect: null,
                notiz_original: null,
                notiz_deutsch: null,
                aufgenommen_am: new Date().toISOString(),
                aufgenommen_von: onb,
                sync_status: 'pending'
            };
            return window.TWMaStorage.saveFoto(datensatz);
        }).then(function(){
            setVorschauFoto(null);
            setAktiveWand(null);
            reloadFotos();
            if (typeof onAenderung === 'function') onAenderung();
        }).catch(function(err){
            setFehler(tConfig('fotos.aufnahme.fehler.speichern') + ' ' + (err.message || ''));
        });
    }

    function handleWiederholen() {
        setVorschauFoto(null);
        setFehler(null);
        triggerKamera();
    }

    function handleAbbrechen() {
        setVorschauFoto(null);
        setAktiveWand(null);
        setFehler(null);
    }

    function handleFotoNeu() {
        // Fotos einer Wand werden ersetzt: vorhandene id beibehalten waere
        // konsistenter, aber einfacher ist altes loeschen + neues machen.
        // Wir loeschen das alte erst nach erfolgreichem Speichern (im saveFoto-
        // path - aber da nutzen wir andere id). Einfacher: alte Foto-id beibehalten:
        // wir wechseln in den Aufnahme-Modus und ueberschreiben beim Speichern.
        triggerKamera();
    }

    function handleFotoLoeschen() {
        if (!aktiveWand) return;
        const vorhanden = fotosByWand[aktiveWand.id];
        if (!vorhanden) return;
        if (!confirm(tConfig('fotos.aufnahme.loeschen.bestaetigen'))) return;
        if (!window.TWMaStorage || !window.TWMaStorage.deleteFoto) return;
        window.TWMaStorage.deleteFoto(vorhanden.id).then(function(){
            setAktiveWand(null);
            reloadFotos();
            if (typeof onAenderung === 'function') onAenderung();
        }).catch(function(err){
            setFehler(tConfig('fotos.aufnahme.fehler.loeschen') + ' ' + (err.message || ''));
        });
    }

    // Anzahl belegter Waende fuer Header-Anzeige
    const slotsTotal = waende.length;
    const belegt = waende.filter(function(w){ return !!fotosByWand[w.id]; }).length;

    return (
        <div className="ma-bau-container" style={maContainerStyle}>
            <MASubHeader
                titel={tConfig('fotos.phase.' + phase.key + '.label')}
                untertitel={raum.bezeichnung + (raum.geschoss ? ' \u00B7 ' + raum.geschoss : '') + ' \u00B7 ' + belegt + '/' + slotsTotal}
                farbe={phase.color}
                onZurueck={onZurueck}/>

            <div style={{padding:'16px', maxWidth:620, margin:'0 auto', width:'100%'}}>
                {/* Phase-Banner */}
                <div style={{
                    padding:'10px 14px',
                    background: phase.color + '15',
                    border:'1px solid ' + phase.color + '55',
                    borderRadius:8,
                    fontSize:'0.85rem',
                    color:'#333',
                    marginBottom:14,
                    display:'flex',
                    alignItems:'center',
                    gap:8
                }}>
                    <div style={{
                        width:10, height:10, borderRadius:'50%',
                        background: phase.color, flexShrink:0
                    }}/>
                    <span>{tConfig('fotos.phase.' + phase.key + '.subtitle')}</span>
                </div>

                {laden ? (
                    <div style={{textAlign:'center', padding:30, color:'#999', fontSize:'0.9rem'}}>
                        {tConfig('fotos.aufnahme.lade')}
                    </div>
                ) : (
                    <React.Fragment>
                        {/* Waende-Grid */}
                        <div style={{
                            display:'grid',
                            gridTemplateColumns:'repeat(' + spalten + ', 1fr)',
                            gap:8,
                            marginBottom:16
                        }}>
                            {waende.filter(function(w){ return w.kind === 'wand'; }).map(function(w){
                                const foto = fotosByWand[w.id];
                                return (
                                    <MAWandKachel
                                        key={w.id}
                                        wand={w}
                                        phase={phase}
                                        foto={foto}
                                        onClick={function(){ handleWandClick(w); }}/>
                                );
                            })}
                        </div>

                        {/* Boden / Decke separat */}
                        {(raum.hatBoden || raum.hatDecke) ? (
                            <div style={{
                                display:'grid',
                                gridTemplateColumns:'repeat(2, 1fr)',
                                gap:8
                            }}>
                                {raum.hatBoden ? (
                                    <MAWandKachel
                                        wand={{ id:'boden', kind:'boden' }}
                                        phase={phase}
                                        foto={fotosByWand['boden']}
                                        onClick={function(){ handleWandClick({ id:'boden', kind:'boden' }); }}/>
                                ) : null}
                                {raum.hatDecke ? (
                                    <MAWandKachel
                                        wand={{ id:'decke', kind:'decke' }}
                                        phase={phase}
                                        foto={fotosByWand['decke']}
                                        onClick={function(){ handleWandClick({ id:'decke', kind:'decke' }); }}/>
                                ) : null}
                            </div>
                        ) : null}
                    </React.Fragment>
                )}
            </div>

            {/* Hidden file input fuer Kamera */}
            <input
                ref={fileInputRef}
                type="file"
                accept="image/*"
                capture="environment"
                onChange={handleFileChange}
                style={{display:'none'}}/>

            {/* Komprimieren-Indikator */}
            {komprimiere ? (
                <MAOverlay>
                    <MAOverlayBox>
                        <div style={{fontSize:'2.2rem', marginBottom:10}}>{'\u{23F3}'}</div>
                        <div style={{fontSize:'0.95rem', fontWeight:600, color:'#212121'}}>
                            {tConfig('fotos.aufnahme.komprimiere')}
                        </div>
                    </MAOverlayBox>
                </MAOverlay>
            ) : null}

            {/* Fehler-Snackbar */}
            {fehler ? (
                <div
                    onClick={function(){ setFehler(null); }}
                    style={{
                        position:'fixed',
                        bottom:16, left:16, right:16,
                        background:'#C62828',
                        color:'#fff',
                        padding:'12px 16px',
                        borderRadius:10,
                        boxShadow:'0 6px 20px rgba(0,0,0,0.3)',
                        zIndex:1100,
                        fontSize:'0.9rem',
                        cursor:'pointer'
                    }}>
                    {fehler}
                </div>
            ) : null}

            {/* Vorschau-Dialog (frisch aufgenommen) */}
            {vorschauFoto && aktiveWand ? (
                <MAFotoVorschau
                    foto={vorschauFoto}
                    wand={aktiveWand}
                    phase={phase}
                    onWiederholen={handleWiederholen}
                    onVerwenden={handleVerwenden}
                    onAbbrechen={handleAbbrechen}/>
            ) : null}

            {/* Detail-Dialog (vorhandenes Foto) */}
            {!vorschauFoto && aktiveWand && fotosByWand[aktiveWand.id] && !komprimiere ? (
                <MAFotoDetail
                    foto={fotosByWand[aktiveWand.id]}
                    wand={aktiveWand}
                    phase={phase}
                    onSchliessen={handleAbbrechen}
                    onNeuFotografieren={handleFotoNeu}
                    onLoeschen={handleFotoLoeschen}/>
            ) : null}
        </div>
    );
}

// Sub-Komponente: einzelne Wand-Kachel
function MAWandKachel({ wand, phase, foto, onClick }) {
    const [pressed, setPressed] = useState(false);
    const hatFoto = !!foto;

    let label;
    let icon;
    if (wand.kind === 'wand') { label = tConfig('fotos.wand.label', { n: wand.nr }); icon = '\u{1F9F1}'; }
    else if (wand.kind === 'boden') { label = tConfig('fotos.boden'); icon = '\u{1F538}'; }
    else if (wand.kind === 'decke') { label = tConfig('fotos.decke'); icon = '\u{1F537}'; }

    const thumbUrl = foto && (foto.thumbnail_dataurl || foto.foto_dataurl);

    return (
        <button
            onClick={onClick}
            onPointerDown={function(){ setPressed(true); }}
            onPointerUp={function(){ setPressed(false); }}
            onPointerLeave={function(){ setPressed(false); }}
            style={{
                aspectRatio:'1 / 1',
                padding:0,
                background: hatFoto ? '#000' : '#fff',
                border:'2px solid ' + (hatFoto ? '#43A047' : '#DDD'),
                borderRadius:12,
                cursor:'pointer',
                boxShadow: pressed
                    ? '0 1px 3px rgba(0,0,0,0.06)'
                    : '0 2px 8px rgba(0,0,0,0.05)',
                display:'flex',
                flexDirection:'column',
                alignItems:'center',
                justifyContent:'center',
                gap:6,
                position:'relative',
                overflow:'hidden',
                transform: pressed ? 'translateY(1px)' : 'translateY(0)',
                transition:'all 0.12s ease-out'
            }}>
            {/* Hintergrund-Thumbnail wenn Foto vorhanden */}
            {thumbUrl ? (
                <img
                    src={thumbUrl}
                    alt={label}
                    style={{
                        position:'absolute', inset:0,
                        width:'100%', height:'100%',
                        objectFit:'cover',
                        borderRadius:10
                    }}/>
            ) : null}

            {/* Overlay fuer Lesbarkeit der Beschriftung */}
            {hatFoto ? (
                <div style={{
                    position:'absolute', left:0, right:0, bottom:0,
                    height:'40%',
                    background:'linear-gradient(to top, rgba(0,0,0,0.75), rgba(0,0,0,0))',
                    pointerEvents:'none'
                }}/>
            ) : null}

            {!hatFoto ? (
                <React.Fragment>
                    <div style={{fontSize:'1.8rem', opacity:0.7}}>{icon}</div>
                    <div style={{
                        fontSize:'0.82rem',
                        fontWeight:600,
                        color:'#666',
                        fontFamily:'var(--font-headline, Oswald)',
                        textAlign:'center',
                        padding:'0 4px'
                    }}>
                        {label}
                    </div>
                </React.Fragment>
            ) : (
                <div style={{
                    position:'absolute', left:8, right:8, bottom:6,
                    fontSize:'0.78rem',
                    fontWeight:700,
                    color:'#fff',
                    fontFamily:'var(--font-headline, Oswald)',
                    textShadow:'0 1px 3px rgba(0,0,0,0.6)',
                    textAlign:'center'
                }}>
                    {label}
                </div>
            )}

            {/* Status-Badge oben rechts */}
            <div style={{
                position:'absolute',
                top:6, right:6,
                width:22, height:22,
                borderRadius:'50%',
                background: hatFoto ? '#43A047' : '#DDD',
                color:'#fff',
                fontSize:'0.85rem',
                fontWeight:700,
                display:'flex', alignItems:'center', justifyContent:'center',
                lineHeight:1,
                boxShadow: hatFoto ? '0 2px 6px rgba(67,160,71,0.5)' : 'none',
                border: hatFoto ? '2px solid #fff' : 'none'
            }}>
                {hatFoto ? '\u2713' : ''}
            </div>
        </button>
    );
}

// ============================================================
// MAOverlay / MAOverlayBox - Wiederverwendete Modal-Helper
// ============================================================

function MAOverlay({ children, onClick }) {
    return (
        <div
            onClick={onClick}
            style={{
                position:'fixed', inset:0,
                background:'rgba(0,0,0,0.65)',
                display:'flex', alignItems:'center', justifyContent:'center',
                zIndex:1050,
                padding:16
            }}>
            {children}
        </div>
    );
}

function MAOverlayBox({ children, breit }) {
    return (
        <div
            onClick={function(e){ e.stopPropagation(); }}
            style={{
                background:'#fff',
                borderRadius:14,
                padding:'18px 18px',
                maxWidth: breit ? 600 : 420,
                width:'100%',
                textAlign:'center',
                boxShadow:'0 16px 40px rgba(0,0,0,0.4)',
                maxHeight:'90vh',
                overflowY:'auto'
            }}>
            {children}
        </div>
    );
}

// ============================================================
// MAFotoVorschau - frisch aufgenommenes Foto bestaetigen
// ============================================================
// Master-Dokument 8.7: Vorschau mit "Wiederholen" (rotes X) und
// "Verwenden" (gruener Haken).

function MAFotoVorschau({ foto, wand, phase, onWiederholen, onVerwenden, onAbbrechen }) {
    const lang = useSprache();

    let wandLabel;
    if (wand.kind === 'wand') wandLabel = tConfig('fotos.wand.label', { n: wand.nr });
    else if (wand.kind === 'boden') wandLabel = tConfig('fotos.boden');
    else if (wand.kind === 'decke') wandLabel = tConfig('fotos.decke');

    return (
        <MAOverlay onClick={onAbbrechen}>
            <MAOverlayBox breit={true}>
                {/* Header */}
                <div style={{
                    display:'flex', alignItems:'center', gap:10, marginBottom:12,
                    paddingBottom:10, borderBottom:'1px solid #EEE'
                }}>
                    <div style={{
                        width:8, height:30, borderRadius:4,
                        background: phase.color
                    }}/>
                    <div style={{flex:1, textAlign:'left'}}>
                        <div style={{fontSize:'0.95rem', fontWeight:700, color:'#212121', fontFamily:'var(--font-headline, Oswald)'}}>
                            {wandLabel}
                        </div>
                        <div style={{fontSize:'0.78rem', color:'#666'}}>
                            {tConfig('fotos.phase.' + phase.key + '.label')}
                        </div>
                    </div>
                    <button
                        onClick={onAbbrechen}
                        style={{
                            background:'transparent', border:'none', cursor:'pointer',
                            fontSize:'1.4rem', color:'#999',
                            padding:'4px 8px'
                        }}
                        title={tConfig('fotos.aufnahme.abbrechen')}>
                        {'\u2715'}
                    </button>
                </div>

                {/* Foto-Vorschau */}
                <div style={{
                    background:'#000',
                    borderRadius:10,
                    overflow:'hidden',
                    marginBottom:12,
                    aspectRatio:'4 / 3',
                    display:'flex', alignItems:'center', justifyContent:'center'
                }}>
                    <img
                        src={foto.dataUrl}
                        alt="Vorschau"
                        style={{
                            maxWidth:'100%', maxHeight:'60vh',
                            objectFit:'contain'
                        }}/>
                </div>

                {/* Foto-Infos klein */}
                <div style={{
                    fontSize:'0.72rem', color:'#999',
                    marginBottom:14,
                    fontFamily:'monospace'
                }}>
                    {foto.breite + ' \u00D7 ' + foto.hoehe + ' px'}
                    {foto.neueGroesse ? ' \u00B7 ' + Math.round(foto.neueGroesse / 1024) + ' KB' : ''}
                </div>

                {/* Buttons: Wiederholen / Verwenden */}
                <div style={{display:'flex', gap:10}}>
                    <button
                        onClick={onWiederholen}
                        style={{
                            flex:1,
                            padding:'14px',
                            background:'#fff',
                            color:'#C62828',
                            border:'2px solid #C62828',
                            borderRadius:10,
                            fontSize:'0.95rem',
                            fontWeight:700,
                            fontFamily:'var(--font-headline, Oswald)',
                            cursor:'pointer',
                            minHeight:50,
                            display:'flex',
                            alignItems:'center',
                            justifyContent:'center',
                            gap:8
                        }}>
                        <span style={{fontSize:'1.1rem'}}>{'\u21BB'}</span>
                        {tConfig('fotos.aufnahme.wiederholen')}
                    </button>
                    <button
                        onClick={onVerwenden}
                        style={{
                            flex:2,
                            padding:'14px',
                            background:'linear-gradient(135deg, #43A047, #2E7D32)',
                            color:'#fff',
                            border:'none',
                            borderRadius:10,
                            fontSize:'1rem',
                            fontWeight:700,
                            fontFamily:'var(--font-headline, Oswald)',
                            cursor:'pointer',
                            minHeight:50,
                            display:'flex',
                            alignItems:'center',
                            justifyContent:'center',
                            gap:8,
                            boxShadow:'0 4px 12px rgba(67,160,71,0.4)'
                        }}>
                        <span style={{fontSize:'1.1rem'}}>{'\u2713'}</span>
                        {tConfig('fotos.aufnahme.verwenden')}
                    </button>
                </div>
            </MAOverlayBox>
        </MAOverlay>
    );
}

// ============================================================
// MAFotoDetail - vorhandenes Foto anzeigen + Aktionen
// ============================================================

function MAFotoDetail({ foto, wand, phase, onSchliessen, onNeuFotografieren, onLoeschen }) {
    const lang = useSprache();

    let wandLabel;
    if (wand.kind === 'wand') wandLabel = tConfig('fotos.wand.label', { n: wand.nr });
    else if (wand.kind === 'boden') wandLabel = tConfig('fotos.boden');
    else if (wand.kind === 'decke') wandLabel = tConfig('fotos.decke');

    // Aufnahme-Zeit kurz formatieren
    let zeit = '';
    try {
        const d = new Date(foto.aufgenommen_am);
        zeit = d.toLocaleString('de-DE', {
            day:'2-digit', month:'2-digit', year:'numeric',
            hour:'2-digit', minute:'2-digit'
        });
    } catch(e) {}

    return (
        <MAOverlay onClick={onSchliessen}>
            <MAOverlayBox breit={true}>
                {/* Header */}
                <div style={{
                    display:'flex', alignItems:'center', gap:10, marginBottom:12,
                    paddingBottom:10, borderBottom:'1px solid #EEE'
                }}>
                    <div style={{
                        width:8, height:30, borderRadius:4,
                        background: phase.color
                    }}/>
                    <div style={{flex:1, textAlign:'left'}}>
                        <div style={{fontSize:'0.95rem', fontWeight:700, color:'#212121', fontFamily:'var(--font-headline, Oswald)'}}>
                            {wandLabel}
                        </div>
                        <div style={{fontSize:'0.78rem', color:'#666'}}>
                            {tConfig('fotos.phase.' + phase.key + '.label')}
                            {zeit ? ' \u00B7 ' + zeit : ''}
                        </div>
                    </div>
                    <button
                        onClick={onSchliessen}
                        style={{
                            background:'transparent', border:'none', cursor:'pointer',
                            fontSize:'1.4rem', color:'#999',
                            padding:'4px 8px'
                        }}>
                        {'\u2715'}
                    </button>
                </div>

                {/* Foto-Anzeige */}
                <div style={{
                    background:'#000',
                    borderRadius:10,
                    overflow:'hidden',
                    marginBottom:12,
                    display:'flex', alignItems:'center', justifyContent:'center'
                }}>
                    <img
                        src={foto.foto_dataurl}
                        alt={wandLabel}
                        style={{
                            maxWidth:'100%', maxHeight:'60vh',
                            objectFit:'contain'
                        }}/>
                </div>

                {/* Sync-Status klein */}
                {foto.sync_status ? (
                    <div style={{
                        fontSize:'0.72rem', color:'#999',
                        marginBottom:14,
                        display:'flex', alignItems:'center', justifyContent:'center', gap:6
                    }}>
                        <span style={{
                            width:8, height:8, borderRadius:'50%',
                            background: foto.sync_status === 'uploaded' ? '#43A047'
                                      : foto.sync_status === 'fehler'   ? '#C62828'
                                      : '#FFA726'
                        }}/>
                        <span>{tConfig('fotos.aufnahme.status.' + foto.sync_status)}</span>
                    </div>
                ) : null}

                {/* Hinweis: Editor (Markieren / Zeichnen) kommt in B6.3 */}
                <div style={{
                    fontSize:'0.78rem',
                    color:'#888',
                    fontStyle:'italic',
                    marginBottom:14,
                    padding:'8px 12px',
                    background:'#FFF8E1',
                    borderRadius:8
                }}>
                    {tConfig('fotos.aufnahme.editor.bald')}
                </div>

                {/* Aktions-Buttons */}
                <div style={{display:'flex', gap:8, flexWrap:'wrap'}}>
                    <button
                        onClick={onLoeschen}
                        style={{
                            flex:'1 1 100px',
                            padding:'12px',
                            background:'#fff',
                            color:'#C62828',
                            border:'1px solid #C62828',
                            borderRadius:10,
                            fontSize:'0.85rem',
                            fontWeight:600,
                            cursor:'pointer',
                            minHeight:48
                        }}>
                        {'\u{1F5D1}\uFE0F'} {tConfig('fotos.aufnahme.loeschen')}
                    </button>
                    <button
                        onClick={onNeuFotografieren}
                        style={{
                            flex:'1 1 100px',
                            padding:'12px',
                            background:'#1E88E5',
                            color:'#fff',
                            border:'none',
                            borderRadius:10,
                            fontSize:'0.85rem',
                            fontWeight:600,
                            cursor:'pointer',
                            minHeight:48
                        }}>
                        {'\u{1F4F7}'} {tConfig('fotos.aufnahme.neu')}
                    </button>
                    <button
                        onClick={onSchliessen}
                        style={{
                            flex:'2 1 120px',
                            padding:'12px',
                            background:'linear-gradient(135deg, #43A047, #2E7D32)',
                            color:'#fff',
                            border:'none',
                            borderRadius:10,
                            fontSize:'0.95rem',
                            fontWeight:700,
                            fontFamily:'var(--font-headline, Oswald)',
                            cursor:'pointer',
                            minHeight:48
                        }}>
                        {tConfig('fotos.aufnahme.ok')}
                    </button>
                </div>
            </MAOverlayBox>
        </MAOverlay>
    );
}
