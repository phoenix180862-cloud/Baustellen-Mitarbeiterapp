<body>
    <div id="root">
        <!-- Loading-Placeholder bis React gerendert hat -->
        <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:sans-serif;background:linear-gradient(180deg,#E3F2FD 0%,#F4F6F8 100%);color:#1E88E5;">
            <div style="text-align:center;">
                <div style="width:96px;height:96px;margin:0 auto 16px;border-radius:24px;background:linear-gradient(135deg,#1E88E5,#0D47A1);display:flex;align-items:center;justify-content:center;color:#fff;font-size:2.6rem;font-weight:700;letter-spacing:3px;box-shadow:0 8px 24px rgba(30,136,229,0.35);">TW</div>
                <div style="font-size:0.9rem;color:#666;">Lade Baustellen-App ...</div>
            </div>
        </div>
    </div>

    <!-- Service Worker Registration mit Update-Benachrichtigung -->
    <script>
        (function(){
            if (!('serviceWorker' in navigator)) return;

            window.addEventListener('load', function(){
                navigator.serviceWorker.register('service-worker.js')
                    .then(function(reg){
                        console.log('[SW] registriert:', reg.scope);

                        // Listener fuer Update-Benachrichtigung
                        reg.addEventListener('updatefound', function(){
                            var newWorker = reg.installing;
                            if (!newWorker) return;
                            newWorker.addEventListener('statechange', function(){
                                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                    // Neue Version ist da, alter SW laeuft noch
                                    window.dispatchEvent(new CustomEvent('tw-ma-sw-update-ready'));
                                }
                            });
                        });
                    })
                    .catch(function(err){ console.warn('[SW] Registrierung fehlgeschlagen:', err); });

                // Messages vom SW entgegennehmen
                navigator.serviceWorker.addEventListener('message', function(event){
                    if (event.data && event.data.type === 'SW_UPDATED') {
                        console.log('[SW] aktiviert Version', event.data.version);
                    }
                });
            });

            // Initial-Tab aus URL-Query lesen (fuer Manifest-Shortcuts)
            window.__TW_MA_INITIAL_TAB__ = (function(){
                try {
                    var params = new URLSearchParams(window.location.search);
                    var tab = params.get('tab');
                    var valid = ['start','baustellen','nachrichten'];
                    if (tab && valid.indexOf(tab) >= 0) return tab;
                } catch (e) {}
                return 'start';
            })();
        })();
    </script>
</body>
</html>

<script type="text/babel">
// ============================================================
// TW Baustellen-App - Shared Components
// ============================================================
// Enthaelt wiederverwendbare Komponenten:
// - MAFirmenLogo (Schablone analog Master-App)
// - MABauteamAnimation (3 Fliesenleger-Silhouetten, laufend)
// - MAUhrBlock (Premium-Uhr mit Tag/Datum/Zeit)
// - MASprachPill (kompakter Sprach-Waehler)
// - MASprachModal (Modal zum Sprach-Wechsel)
// - MAStatusIndikator (online/offline, letzter Sync, neue Nachrichten)
// - MAMicButton (Stub fuer Etappe 7)
// - MAPlatzhalterView (fuer leere Module in Etappe 1)
// ============================================================

const { useState, useEffect, useRef, useCallback } = React;

// ============================================================
// Helper-Hook: auf Sprach-Aenderungen lauschen
// ============================================================

function useSprache() {
    const [lang, setLang] = useState(window.TWMaConfig.getCurrentLanguage());
    useEffect(function(){
        function handler(e){ setLang(e.detail.code); }
        window.addEventListener('tw-ma-lang-changed', handler);
        return function(){ window.removeEventListener('tw-ma-lang-changed', handler); };
    }, []);
    return lang;
}

// Kurzform fuer Uebersetzungs-Funktion
const t = function(key, repl){ return window.TWMaConfig.t(key, repl); };

// ============================================================
// MAFirmenLogo - Schablone
// ============================================================
// Inspiriert vom Master-App FirmenLogo, eigenstaendige Implementation.
// size: 'small' | 'medium' | 'large'
// ============================================================

function MAFirmenLogo({ size }) {
    const sizeMap = {
        small:  { w: 60,  h: 60,  font: 14 },
        medium: { w: 90,  h: 90,  font: 20 },
        large:  { w: 140, h: 140, font: 30 }
    };
    const s = sizeMap[size] || sizeMap.medium;

    return (
        <div style={{
            width: s.w, height: s.h,
            borderRadius: '50%',
            background: 'linear-gradient(135deg, #1E88E5, #1565C0)',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            boxShadow: '0 6px 20px rgba(30,136,229,0.35), inset 0 2px 4px rgba(255,255,255,0.25)',
            border: '3px solid rgba(255,255,255,0.6)',
            flexShrink: 0
        }}>
            <div style={{
                color: '#fff',
                fontFamily: 'var(--font-headline)',
                fontSize: s.font,
                fontWeight: 500,
                letterSpacing: '2px',
                textShadow: '0 2px 4px rgba(0,0,0,0.25)'
            }}>TW</div>
        </div>
    );
}

// ============================================================
// MABauteamAnimation - drei Fliesenleger laufen ueber die Baustelle
// ============================================================
// Nutzt SVG und CSS-Animationen. Responsiv.
// ============================================================

function MABauteamAnimation() {
    return (
        <div style={{
            width: '100%',
            maxWidth: 520,
            margin: '0 auto',
            position: 'relative',
            aspectRatio: '5 / 2',
            overflow: 'hidden',
            borderRadius: 'var(--radius-lg)',
            background: 'linear-gradient(to bottom, #87CEEB 0%, #B3D9E8 60%, #D4B896 60%, #C19A6B 100%)',
            boxShadow: 'var(--shadow-md)'
        }}>
            {/* Sonne */}
            <div style={{
                position: 'absolute', top: '15%', right: '12%',
                width: 40, height: 40, borderRadius: '50%',
                background: 'radial-gradient(circle, #FFD700 0%, #FFA500 100%)',
                boxShadow: '0 0 30px rgba(255,200,0,0.6)'
            }}/>

            {/* Gerueste und Baustellen-Silhouette im Hintergrund */}
            <svg viewBox="0 0 500 200" preserveAspectRatio="none" style={{
                position:'absolute', inset:0, width:'100%', height:'100%'
            }}>
                {/* Haus links */}
                <rect x="20"  y="80"  width="90" height="80" fill="#D9C9A8"/>
                <polygon points="10,80 65,40 120,80" fill="#8B5A2B"/>
                <rect x="55" y="110" width="20" height="50" fill="#6B4226"/>

                {/* Haus rechts */}
                <rect x="380" y="60"  width="100" height="100" fill="#E5D4B1"/>
                <polygon points="370,60 430,20 490,60" fill="#8B5A2B"/>
                <rect x="405" y="100" width="24" height="60" fill="#6B4226"/>

                {/* Gerueste */}
                <g stroke="#444" strokeWidth="2" fill="none" opacity="0.7">
                    <line x1="20"  y1="160" x2="20"  y2="60"/>
                    <line x1="110" y1="160" x2="110" y2="60"/>
                    <line x1="20"  y1="90"  x2="110" y2="90"/>
                    <line x1="20"  y1="130" x2="110" y2="130"/>
                </g>
            </svg>

            {/* 3 Bauarbeiter - mit Laufanimation (unterschiedliche Geschwindigkeiten) */}
            {[0, 1, 2].map(function(i){
                return (
                    <div key={i} style={{
                        position: 'absolute',
                        bottom: '5%',
                        left: (15 + i * 30) + '%',
                        animation: 'ma-walk '+(1.8 + i*0.3)+'s ease-in-out infinite alternate'
                    }}>
                        <MAFliesenleger farbe={['#1E88E5','#E53935','#43A047'][i]}/>
                    </div>
                );
            })}
        </div>
    );
}

// Sub-Komponente: einzelner Fliesenleger (SVG)
function MAFliesenleger({ farbe }) {
    return (
        <svg width="42" height="60" viewBox="0 0 42 60" style={{animation:'ma-bounce 0.6s ease-in-out infinite'}}>
            {/* Bauhelm */}
            <ellipse cx="21" cy="14" rx="11" ry="7" fill="#FFD700" stroke="#B8860B" strokeWidth="1"/>
            <rect x="10" y="13" width="22" height="2" fill="#FFD700" stroke="#B8860B" strokeWidth="0.5"/>
            {/* Kopf */}
            <circle cx="21" cy="18" r="5" fill="#F4C78A"/>
            {/* Koerper / Weste */}
            <rect x="14" y="23" width="14" height="20" fill={farbe} stroke="#000" strokeOpacity="0.3"/>
            {/* Reflektor-Streifen */}
            <rect x="14" y="28" width="14" height="2" fill="#FFEB3B" opacity="0.8"/>
            <rect x="14" y="36" width="14" height="2" fill="#FFEB3B" opacity="0.8"/>
            {/* Arme */}
            <rect x="11" y="24" width="3" height="14" fill={farbe}/>
            <rect x="28" y="24" width="3" height="14" fill={farbe}/>
            {/* Beine */}
            <rect x="15" y="43" width="5" height="14" fill="#2C3E50"/>
            <rect x="22" y="43" width="5" height="14" fill="#2C3E50"/>
            {/* Stiefel */}
            <rect x="14" y="56" width="7" height="3" fill="#000"/>
            <rect x="21" y="56" width="7" height="3" fill="#000"/>
        </svg>
    );
}

// ============================================================
// MAUhrBlock - Premium-Uhr-Block
// ============================================================

function MAUhrBlock() {
    const [now, setNow] = useState(new Date());
    const lang = useSprache();

    useEffect(function(){
        const iv = setInterval(function(){ setNow(new Date()); }, 1000);
        return function(){ clearInterval(iv); };
    }, []);

    const wochentagKeys = ['tag.sonntag','tag.montag','tag.dienstag','tag.mittwoch','tag.donnerstag','tag.freitag','tag.samstag'];
    const wochentag = t(wochentagKeys[now.getDay()]).toUpperCase();
    const monat     = t('monat.'+(now.getMonth()+1));
    const hh = String(now.getHours()).padStart(2,'0');
    const mm = String(now.getMinutes()).padStart(2,'0');
    const ss = String(now.getSeconds()).padStart(2,'0');
    const colonOn = now.getSeconds() % 2 === 0;

    return (
        <div style={{
            background: 'linear-gradient(135deg, #0D47A1 0%, #1565C0 50%, #1E88E5 100%)',
            color: '#fff',
            borderRadius: 'var(--radius-lg)',
            padding: '24px 16px',
            textAlign: 'center',
            position: 'relative',
            overflow: 'hidden',
            boxShadow: '0 10px 30px rgba(13, 71, 161, 0.35)',
            margin: '0 auto',
            maxWidth: 520
        }}>
            {/* Glanz-Lichter */}
            <div style={{
                position: 'absolute', inset: 0,
                background: 'radial-gradient(circle at 20% 20%, rgba(255,255,255,0.18) 0%, transparent 60%)',
                pointerEvents: 'none'
            }}/>
            <div style={{
                position: 'absolute', right: -40, top: -40,
                width: 150, height: 150, borderRadius: '50%',
                background: 'radial-gradient(circle, rgba(255,255,255,0.15) 0%, transparent 70%)',
                pointerEvents: 'none'
            }}/>

            <div style={{
                fontFamily: 'var(--font-headline)',
                fontSize: '1.1rem',
                letterSpacing: '4px',
                opacity: 0.9,
                position: 'relative'
            }}>{wochentag}</div>

            <div style={{
                fontFamily: 'var(--font-headline)',
                fontSize: 'clamp(3rem, 12vw, 4.5rem)',
                fontWeight: 300,
                lineHeight: 1,
                margin: '8px 0',
                textShadow: '0 4px 12px rgba(0,0,0,0.3)',
                position: 'relative'
            }}>
                {hh}
                <span style={{opacity: colonOn ? 1 : 0.3, transition:'opacity 0.25s'}}>:</span>
                {mm}
                <span style={{opacity: colonOn ? 1 : 0.3, fontSize:'0.55em', marginLeft:8, verticalAlign:'top'}}>{ss}</span>
            </div>

            <div style={{
                fontFamily: 'var(--font-body)',
                fontSize: '1.05rem',
                letterSpacing: '1.5px',
                opacity: 0.92,
                position: 'relative'
            }}>{now.getDate()}. {monat} {now.getFullYear()}</div>
        </div>
    );
}

// ============================================================
// MASprachPill - kompakter Sprach-Waehler
// ============================================================

function MASprachPill({ onClick }) {
    const lang = useSprache();
    const info = window.TWMaConfig.getLanguageInfo(lang);
    if (!info) return null;
    return (
        <button
            onClick={onClick}
            style={{
                display:'inline-flex', alignItems:'center', gap:8,
                background:'#fff',
                border:'1.5px solid var(--border-medium)',
                padding:'10px 20px',
                borderRadius:'var(--radius-pill)',
                boxShadow:'var(--shadow-sm)',
                fontFamily:'var(--font-body)',
                fontSize:'1rem',
                color:'var(--text-primary)',
                minHeight:'var(--touch-target-min)',
                transition:'transform 0.15s, box-shadow 0.15s'
            }}
            onMouseDown={function(e){ e.currentTarget.style.transform='scale(0.97)'; }}
            onMouseUp={function(e){ e.currentTarget.style.transform='scale(1)'; }}
            onMouseLeave={function(e){ e.currentTarget.style.transform='scale(1)'; }}
            aria-label={t('start.sprache')+': '+info.nativeName}
        >
            <span style={{fontSize:'1.3rem'}}>{info.flag}</span>
            <span style={{fontWeight:600}}>{info.nativeName}</span>
            <span style={{marginLeft:4, color:'var(--text-muted)'}}>\u25BE</span>
        </button>
    );
}

// ============================================================
// MASprachModal - Sprach-Auswahl als Modal
// ============================================================

function MASprachModal({ offen, onClose }) {
    const currentLang = useSprache();
    if (!offen) return null;
    const langs = window.TWMaConfig.SUPPORTED_LANGUAGES;

    function waehle(code) {
        window.TWMaConfig.setCurrentLanguage(code);
        onClose();
    }

    return (
        <div
            onClick={onClose}
            style={{
                position:'fixed', inset:0,
                background:'var(--bg-overlay)',
                zIndex:1000,
                display:'flex', alignItems:'center', justifyContent:'center',
                padding:16,
                animation:'ma-fadeIn 0.2s ease-out'
            }}>
            <div
                onClick={function(e){ e.stopPropagation(); }}
                style={{
                    background:'#fff',
                    borderRadius:'var(--radius-lg)',
                    padding:'24px 20px',
                    maxWidth:420, width:'100%',
                    boxShadow:'var(--shadow-lg)',
                    animation:'ma-fadeIn 0.25s ease-out'
                }}>
                <h2 style={{
                    fontFamily:'var(--font-headline)',
                    fontSize:'1.5rem',
                    textAlign:'center',
                    margin:'0 0 20px 0'
                }}>{t('lang.titel')}</h2>

                <div style={{display:'flex', flexDirection:'column', gap:8}}>
                    {langs.map(function(l){
                        const aktiv = (l.code === currentLang);
                        return (
                            <button
                                key={l.code}
                                onClick={function(){ waehle(l.code); }}
                                style={{
                                    display:'flex', alignItems:'center', gap:14,
                                    padding:'14px 18px',
                                    border: aktiv ? '2px solid var(--accent-blue)' : '2px solid var(--border-light)',
                                    borderRadius:'var(--radius-md)',
                                    background: aktiv ? 'rgba(30,136,229,0.08)' : '#fff',
                                    fontSize:'1.05rem',
                                    fontWeight: aktiv ? 700 : 500,
                                    color:'var(--text-primary)',
                                    textAlign:'left',
                                    minHeight:'var(--touch-target-min)',
                                    cursor:'pointer'
                                }}>
                                <span style={{fontSize:'1.8rem'}}>{l.flag}</span>
                                <span style={{flex:1}}>{l.nativeName}</span>
                                {aktiv && <span style={{color:'var(--accent-blue)', fontSize:'1.4rem'}}>\u2713</span>}
                            </button>
                        );
                    })}
                </div>

                <button
                    onClick={onClose}
                    style={{
                        marginTop:20, width:'100%',
                        padding:'12px',
                        background:'var(--bg-tertiary)',
                        color:'var(--text-primary)',
                        borderRadius:'var(--radius-md)',
                        fontSize:'1rem',
                        fontWeight:600,
                        minHeight:'var(--touch-target-min)',
                        cursor:'pointer'
                    }}>
                    {t('lang.abbrechen')}
                </button>
            </div>
        </div>
    );
}

// ============================================================
// MAStatusIndikator - kleine Leiste mit Online/Sync/Nachrichten
// ============================================================

function MAStatusIndikator({ onNachrichtenClick }) {
    const lang = useSprache();
    const [online, setOnline] = useState(navigator.onLine);
    const [letzterSync, setLetzterSync] = useState(null); /* spaeter: Date-Objekt */
    const [neueNachrichten] = useState(0); /* spaeter: aus Firebase */

    useEffect(function(){
        const unsub = window.TWMaCore.registriereOnlineOfflineHandler(
            function(){ setOnline(true); },
            function(){ setOnline(false); }
        );
        return unsub;
    }, []);

    function formatLetzterSync() {
        if (!letzterSync) return '--';
        const diffMin = Math.round((Date.now() - letzterSync) / 60000);
        return t('start.status.sync')+': '+t('start.status.vorMin', {n: diffMin});
    }

    return (
        <div style={{
            display:'flex', flexWrap:'wrap', gap:10, justifyContent:'center', alignItems:'center',
            padding:'10px 16px',
            background:'rgba(255,255,255,0.7)',
            borderRadius:'var(--radius-pill)',
            fontSize:'0.88rem',
            color:'var(--text-secondary)',
            maxWidth:520, margin:'0 auto',
            boxShadow:'var(--shadow-sm)',
            border:'1px solid var(--border-light)'
        }}>
            <span style={{display:'inline-flex', alignItems:'center', gap:5, color: online ? 'var(--accent-green)' : 'var(--accent-red)'}}>
                <span style={{
                    width:8, height:8, borderRadius:'50%',
                    background: online ? 'var(--accent-green)' : 'var(--accent-red)',
                    animation: online ? 'ma-pulse 2s infinite' : 'none'
                }}/>
                {online ? t('start.status.online') : t('start.status.offline')}
            </span>
            <span style={{color:'var(--border-medium)'}}>\u00B7</span>
            <span>{formatLetzterSync()}</span>
            {neueNachrichten > 0 && (
                <React.Fragment>
                    <span style={{color:'var(--border-medium)'}}>\u00B7</span>
                    <button
                        onClick={onNachrichtenClick}
                        style={{
                            display:'inline-flex', alignItems:'center', gap:5,
                            color:'var(--accent-orange)',
                            fontWeight:700,
                            cursor:'pointer',
                            background:'none', border:'none', padding:0
                        }}>
                        \uD83D\uDD14 {t('start.status.neueNachrichten', {n: neueNachrichten})}
                    </button>
                </React.Fragment>
            )}
        </div>
    );
}

// ============================================================
// MAMicButton - Stub fuer Spracheingabe (Etappe 7)
// ============================================================

function MAMicButton({ onText, disabled }) {
    return (
        <button
            disabled={disabled}
            onClick={function(){ alert('Spracheingabe: wird in Etappe 7 aktiviert.'); }}
            style={{
                width: 44, height: 44,
                borderRadius:'50%',
                background: disabled ? 'var(--bg-tertiary)' : 'var(--accent-blue)',
                color:'#fff',
                fontSize:'1.2rem',

// ============================================================
// MAPinLoginScreen
// ============================================================

function MAPinLoginScreen({ onboarding, onErfolg, onWipe }) {
    const lang = useSprache();
    const [pin, setPin] = useState('');
    const [fehler, setFehler] = useState('');
    const [versuche, setVersuche] = useState(0);
    const [laedt, setLaedt] = useState(false);

    useEffect(function(){
        if (window.TWMaStorage && window.TWMaStorage.getPinVersuche) {
            window.TWMaStorage.getPinVersuche().then(setVersuche);
        }
    }, []);

    function handlePinChange(e) {
        const filtered = e.target.value.replace(/\D/g, '').slice(0,8);
        setPin(filtered);
        if (fehler) setFehler('');
    }

    function handleSubmit() {
        if (laedt) return;
        if (pin.length < 4) return;
        setLaedt(true);

        window.TWMaStorage.pinZuHash(pin, onboarding.uid).then(function(hash){
            if (hash === onboarding.pinHash) {
                window.TWMaStorage.pinVersucheResetten();
                setLaedt(false);
                onErfolg();
            } else {
                window.TWMaStorage.pinVersucheErhoehen().then(function(neuerStand){
                    setVersuche(neuerStand);
                    setPin('');
                    setLaedt(false);

                    if (neuerStand >= AUTH_PIN_MAX_VERSUCHE) {
                        window.TWMaStorage.loescheOnboarding().then(function(){
                            window.TWMaStorage.pinVersucheResetten();
                            if (window.TWMaFirebase && window.TWMaFirebase.signOut) {
                                window.TWMaFirebase.signOut();
                            }
                            onWipe('zu_viele_versuche');
                        });
                    } else {
                        setFehler(t('pin.falsch'));
                    }
                });
            }
        }).catch(function(err){
            console.error('[PinLogin] Hash-Fehler:', err);
            setFehler(t('onboard.fehler.firebase_fehler'));
            setLaedt(false);
        });
    }

    function handleKeyDown(e) {
        if (e.key === 'Enter') handleSubmit();
    }

    const verbleibend = Math.max(0, AUTH_PIN_MAX_VERSUCHE - versuche);

    return (
        <div style={AUTH_STYLE_CONTAINER}>
            <div style={AUTH_STYLE_CARD}>
                <MAFirmenLogo size="medium"/>
                <h1 style={{
                    fontFamily:'var(--font-headline, Oswald)',
                    fontSize:'1.5rem', fontWeight:600,
                    color:'var(--accent-blue-dark, #0D47A1)',
                    margin:0
                }}>{t('pin.titel')}</h1>
                <p style={{fontSize:'1rem', color:'#555', margin:0}}>
                    {t('pin.hallo', { name: onboarding.mitarbeiterName || '' })}
                </p>

                <input
                    type="password"
                    inputMode="numeric"
                    autoComplete="off"
                    autoFocus
                    value={pin}
                    onChange={handlePinChange}
                    onKeyDown={handleKeyDown}
                    style={AUTH_STYLE_PIN_INPUT}
                    placeholder="\u2022\u2022\u2022\u2022"
                    maxLength={8}
                    aria-label={t('pin.label')}/>

                {fehler && (
                    <div style={AUTH_STYLE_FEHLER} role="alert">
                        <div><strong>{fehler}</strong></div>
                        {verbleibend > 0 && (
                            <div style={{fontSize:'0.85rem', marginTop:4}}>
                                {t('pin.versuche', { n: verbleibend })}
                            </div>
                        )}
                    </div>
                )}

                <button
                    type="button"
                    onClick={handleSubmit}
                    disabled={pin.length < 4 || laedt}
                    style={Object.assign({}, AUTH_STYLE_BTN_PRIMARY, (pin.length < 4 || laedt) ? {
                        opacity:0.5, cursor:'not-allowed', boxShadow:'none'
                    } : {})}>
                    {t('pin.ok')}
                </button>
            </div>
        </div>
    );
}

// ------------------------------------------------------------
// Fehler-Code-Mapping (Firebase-Exceptions -> UI-Label)
// ------------------------------------------------------------

function onbFehlerLabel(errorCode) {
    switch (errorCode) {
        case 'invitation-not-found':     return t('auth.error.not_found');
        case 'invitation-wrong-pin':     return t('auth.error.wrong_pin');
        case 'invitation-already-used':  return t('auth.error.already_used');
        case 'invitation-revoked':       return t('auth.error.revoked');
        case 'invitation-expired':       return t('auth.error.expired');
        case 'invitation-race-lost':     return t('auth.error.already_used');
        case 'network-error':            return t('auth.error.network');
        default:                         return t('auth.error.generic');
    }
}

// ------------------------------------------------------------
// MAOnboardingFlow (Top-Level State-Machine)
// ------------------------------------------------------------

function MAOnboardingFlow({ onFertig, onGewipt }) {
    const lang = useSprache();

    // 'eingabe' | 'pruefe' | 'wartend' | 'freigegeben'
    const [phase, setPhase] = useState('eingabe');

    const [code, setCode]         = useState('');
    const [pin, setPin]           = useState('');
    const [geraet, setGeraet]     = useState('');
    const [fehler, setFehler]     = useState('');

    // Daten aus Firebase nach Einloesung
    const [uid, setUid]                     = useState('');
    const [mitarbeiterName, setMitarbeiterName] = useState('');
    const [pinHash, setPinHash]             = useState('');

    // ========================================================
    // Schritt 1: Einloesen + Wartend-Screen
    // ========================================================

    function handleAnmelden() {
        setFehler('');

        const normCode = (code || '').toUpperCase().trim();
        if (normCode.length !== 6) {
            setFehler(t('auth.error.not_found'));
            return;
        }
        if (!pin || pin.length < 4) {
            setFehler(t('auth.error.wrong_pin'));
            return;
        }

        setPhase('pruefe');

        window.TWMaFirebase.redeemInvitation(normCode, pin.trim(), (geraet || '').trim())
            .then(function(result){
                // PIN-Hash lokal bilden
                return window.TWMaStorage.pinZuHash(pin, result.uid).then(function(hash){
                    setUid(result.uid);
                    setMitarbeiterName(result.mitarbeiterName);
                    setPinHash(hash);

                    // Onboarding schon jetzt in DB sichern
                    // (onboardingAbgeschlossen=false, weil Buero noch nicht freigegeben hat)
                    return window.TWMaStorage.speicherOnboarding({
                        uid:                     result.uid,
                        pinHash:                 hash,
                        mitarbeiterName:         result.mitarbeiterName,
                        geraetName:              (geraet || '').trim() || navigator.userAgent.substring(0, 80),
                        onboardingAbgeschlossen: false
                    }).then(function(){
                        setPhase('wartend');
                    });
                });
            })
            .catch(function(err){
                const msg = (err && err.message) || '';
                console.warn('[Onboarding] Einloesen fehlgeschlagen:', msg);
                setFehler(onbFehlerLabel(msg));
                setPhase('eingabe');
            });
    }

    // ========================================================
    // Schritt 2: Auf Buero-Freigabe warten
    // ========================================================

    function handleFreigegeben() {
        // Onboarding in DB als abgeschlossen markieren
        window.TWMaStorage.speicherOnboarding({
            uid:                     uid,
            pinHash:                 pinHash,
            mitarbeiterName:         mitarbeiterName,
            geraetName:              (geraet || '').trim() || navigator.userAgent.substring(0, 80),
            onboardingAbgeschlossen: true
        }).then(function(){
            if (typeof onFertig === 'function') {
                onFertig({
                    uid:             uid,
                    pinHash:         pinHash,
                    mitarbeiterName: mitarbeiterName,
                    geraetName:      (geraet || '').trim() || navigator.userAgent.substring(0, 80)
                });
            }
        });
    }

    // ========================================================
    // Render
    // ========================================================

    if (phase === 'wartend') {
        return (
            <MAOnboardingWartend
                uid={uid}
                mitarbeiterName={mitarbeiterName}
                onFreigegeben={handleFreigegeben}
                onGewipt={onGewipt}/>
        );
    }

    return (

                        <React.Fragment>
                            <div style={ONB_SPINNER_STYLE}></div>
                            <h2 style={{
                                margin:'16px 0 8px', textAlign:'center',

                            </h2>
                        </React.Fragment>
                    ) : (
                        <React.Fragment>
                            <h2 style={{
                                margin:'0 0 12px', textAlign:'center',
                                fontFamily:'var(--font-headline, Oswald)',
                                color:'#0D47A1', fontSize:'1.4rem'
                            }}>
                                {t('auth.onboard.titel')}
                            </h2>

                                margin:'0 0 20px', textAlign:'center',
                                color:'#666', lineHeight:1.5, fontSize:'0.95rem'
                            }}>

                                type="text"
                                inputMode="text"
                                autoCapitalize="characters"
                                autoComplete="off"
                                autoCorrect="off"
                                spellCheck="false"
                                value={code}
                                onChange={function(e){
                                    const clean = e.target.value.toUpperCase()
                                        .replace(/[^A-HJKMNPQRTUVWXYZ23456789]/g, '')
                                        .substring(0, 6);
                                    setCode(clean);
                                }}
                                placeholder="ABC123"
                                maxLength={6}
                                style={ONB_INPUT_CODE_STYLE}
                            />
                            <div style={onbHintStyle}>{t('auth.onboard.code_hint')}</div>

                            <label style={Object.assign({}, onbLabelStyle, {marginTop:18})}>
                                {t('auth.onboard.pin')}
                            </label>
                            <input
                                type="password"
                                inputMode="numeric"
                                autoComplete="one-time-code"
                                value={pin}
                                onChange={function(e){
                                    setPin(e.target.value.replace(/\D/g,'').substring(0, 8));
                                }}
                                placeholder="****"
                                maxLength={8}
                                style={Object.assign({}, ONB_INPUT_STYLE, {
                                    letterSpacing:'0.4em', textAlign:'center', fontSize:'1.3rem'
                                })}
                            />
                            <div style={onbHintStyle}>{t('auth.onboard.pin_hint')}</div>

                            <label style={Object.assign({}, onbLabelStyle, {marginTop:18})}>
                                {t('auth.onboard.geraet')}
                            </label>
                            <input
                                type="text"
                                value={geraet}
                                onChange={function(e){ setGeraet(e.target.value); }}
                                placeholder=""
                                style={Object.assign({}, ONB_INPUT_STYLE, {fontFamily:'inherit'})}
                            />
                            <div style={onbHintStyle}>{t('auth.onboard.geraet_hint')}</div>

                            {fehler ? <div style={ONB_FEHLER_STYLE}>{fehler}</div> : null}

                            <button
                                onClick={handleAnmelden}
                                disabled={!code || !pin || code.length !== 6 || pin.length < 4}
                                style={Object.assign({}, ONB_BUTTON_STYLE, {
                                    marginTop: 22,
                                    opacity: (code.length === 6 && pin.length >= 4) ? 1 : 0.5,
                                    cursor: (code.length === 6 && pin.length >= 4) ? 'pointer' : 'not-allowed'
                                })}>
                                {t('auth.onboard.submit')}
                            </button>
                        </React.Fragment>
                    )}
                </div>
            </div>
        </div>
    );
}

function MAOnboardingWartend({ uid, mitarbeiterName, onFreigegeben, onGewipt }) {
    const lang = useSprache();

    useEffect(function(){
        if (!uid || !window.TWMaFirebase || !window.TWMaFirebase.subscribeUserStatus) {
            return undefined;
        }
        const unsub = window.TWMaFirebase.subscribeUserStatus(uid, function(statusObj){
            if (statusObj.status === 'approved') {
                if (typeof onFreigegeben === 'function') onFreigegeben();
            } else if (statusObj.status === 'locked' || statusObj.status === 'geloescht') {
                if (typeof onGewipt === 'function') onGewipt();
            }
        });
        return function(){ if (typeof unsub === 'function') unsub(); };
    }, [uid]);

    return (
        <div style={ONB_CONTAINER_STYLE}>
            <div style={{
                maxWidth:480, width:'100%', margin:'0 auto',
                display:'flex', flexDirection:'column', alignItems:'center'
            }}>

// ============================================================
// TW Baustellen-App - Modul: Baustellen (Etappe 4b - Vollausbau)
// ============================================================
// Container-Komponente fuer den Baustellen-Bereich.
//
// Interne Navigation (eigener State, unabhaengig vom Top-Level-Tab):
//   liste     - Kunden-Liste (was das Buero freigegeben hat)
//   detail    - Eine Baustelle gewaehlt, zeigt 5 Sub-Kacheln
//   browser   - Eine Sub-Kachel offen - je nach Kachel-Typ:
//                 Zeichnungen / Anweisungen -> Drive-Browser
//                 Baustellendaten           -> strukturierte Felder-Ansicht
//                 Fotos / Stunden           -> Stub-Ansicht bis Etappe 6/7
//
// Etappe 4b: Drive-Browser + Baustellendaten implementiert,
//            Fotos + Stunden bleiben explizite Stubs.
// ============================================================

function MABaustellenModul({ wechseleZuTab }) {
    const lang = useSprache();

    // View-State (innerhalb dieses Moduls)
    const [view, setView]                   = useState('liste');
    const [aktiveBaustelle, setAktive]      = useState(null);
    const [aktiveKachel, setAktiveKachel]   = useState(null);

    function zurueckZuStart() { wechseleZuTab('start'); }
    function zurueckZuListe() { setView('liste');  setAktive(null); setAktiveKachel(null); }
    function zurueckZuDetail(){ setView('detail'); setAktiveKachel(null); }

    function wechseleZuDetail(baustelle) {
        setAktive(baustelle);
        setView('detail');
    }

    function wechseleZuBrowser(kachel) {
        setAktiveKachel(kachel);
        setView('browser');
    }

    if (view === 'detail' && aktiveBaustelle) {
        return (
            <MABaustelleDetail
                baustelle={aktiveBaustelle}
                onZurueck={zurueckZuListe}
                onKachelClick={wechseleZuBrowser}/>
        );
    }

    if (view === 'browser' && aktiveBaustelle && aktiveKachel) {
        return (
            <MAKachelRouter
                baustelle={aktiveBaustelle}
                kachel={aktiveKachel}
                onZurueck={zurueckZuDetail}/>
        );
    }

    return (
        <MABaustellenListe
            onZurueck={zurueckZuStart}
            onSelect={wechseleZuDetail}/>
    );
}

function MABaustellenListe({ onZurueck, onSelect }) {
    const lang = useSprache();
    const [baustellen, setBaustellen] = useState(null); // null = laedt, [] = leer
    const [fehler, setFehler]         = useState('');

    useEffect(function(){
        if (!window.TWMaFirebase || !window.TWMaFirebase.subscribeAktiveBaustellen) {
            setBaustellen([]);
            return;
        }
        // Live-Subscription: Liste aktualisiert sich, wenn das Buero eine neue
        // Baustelle freigibt oder eine Baustelle den Status wechselt.
        const unsub = window.TWMaFirebase.subscribeAktiveBaustellen(function(liste){
            setBaustellen(liste || []);
            setFehler('');
        });
        return unsub;
    }, []);

    return (
        <div className="ma-bau-container" style={maContainerStyle}>
            <MASubHeader
                titel={t('baustellen.titel')}
                onZurueck={onZurueck}/>

            <div style={{padding:'16px', maxWidth:620, margin:'0 auto', width:'100%'}}>
                {baustellen === null ? (
                    <div style={maSpinnerContainerStyle}>
                        <div style={maSpinnerStyle}></div>
                        <div style={{marginTop:12, color:'#666', fontSize:'0.9rem'}}>
                            {t('baustellen.warte')}
                        </div>
                    </div>
                ) : baustellen.length === 0 ? (
                    <div style={maEmptyStateStyle}>
                        <div style={{fontSize:'3rem', marginBottom:8, opacity:0.4}}>{'\u{1F3D7}\uFE0F'}</div>
                        <div style={{color:'#666', fontSize:'0.95rem', lineHeight:1.5, maxWidth:320}}>
                            {t('baustellen.keine')}
                        </div>
                        {fehler ? (
                            <div style={{
                                marginTop:12, fontSize:'0.75rem', color:'#999',
                                fontFamily:'monospace', textAlign:'center'
                            }}>
                                {fehler}
                            </div>
                        ) : null}
                    </div>
                ) : (
                    <div style={{display:'flex', flexDirection:'column', gap:10}}>
                        {baustellen.map(function(b){
                            return <MABaustelleRow key={b.id} baustelle={b} onClick={function(){ onSelect(b); }}/>;
                        })}
                    </div>
                )}
            </div>
        </div>
    );
}

function MAKachelRouter({ baustelle, kachel, onZurueck }) {
    if (kachel.id === 'baustellendaten') {
        return <MABaustellendatenView baustelle={baustelle} kachel={kachel} onZurueck={onZurueck}/>;
    }
    if (kachel.id === 'fotos') {
        return (
            <MAStubView
                baustelle={baustelle} kachel={kachel} onZurueck={onZurueck}
                emoji={'\u{1F4F8}'}
                titel={t('stub.fotos.titel')}
                text={t('stub.fotos.text')}/>
        );
    }
    if (kachel.id === 'stunden') {
        return (
            <MAStubView
                baustelle={baustelle} kachel={kachel} onZurueck={onZurueck}
                emoji={'\u{23F1}\uFE0F'}
                titel={t('stub.stunden.titel')}
                text={t('stub.stunden.text')}/>
        );
    }
    // Default: Zeichnungen + Anweisungen -> echter Drive-Browser
    return <MABaustelleBrowser baustelle={baustelle} kachel={kachel} onZurueck={onZurueck}/>;
}

//
// Status-Maschine:
//   lade              - Initial-Listing laeuft
//   ok                - Eintraege geladen (auch [] = leerer Ordner)
//   keinApiKey        - DRIVE_CONFIG.apiKey nicht gesetzt
//   nichtKonfig       - baustelle.staging_folder_id fehlt
//   unterordnerFehlt  - Root existiert, aber Unterordner (z.B. "Zeichnungen") fehlt
//   fehler            - HTTP-Fehler
//
// pfadStack: Array<{folderId, name}>
//   - Index 0 = Wurzel (die Sub-Kachel, z.B. "Zeichnungen")
//   - jeder weitere Eintrag = Ordner tiefer geklickt
// ============================================================

function MABaustelleBrowser({ baustelle, kachel, onZurueck }) {
    const lang = useSprache();
    const [status, setStatus]         = useState('lade');
    const [eintraege, setEintraege]   = useState([]);
    const [fehler, setFehler]         = useState('');
    const [pfadStack, setPfadStack]   = useState([]);
    const [vorschau, setVorschau]     = useState(null); // {type:'bild'|'pdf', file}

    function ladeWurzel() {
        setStatus('lade');
        setFehler('');
        const ds = window.TWMaDriveService;
        if (!ds || !ds.listKachelFolder) {
            setStatus('fehler');
            setFehler('DriveService nicht geladen');
            return;
        }
        ds.listKachelFolder(baustelle, kachel.id).then(function(res){
            if (res.kind === 'ok') {
                setEintraege(res.eintraege || []);
                setPfadStack([{ folderId: res.folderId, name: kachel.label }]);
                setStatus('ok');
            } else if (res.kind === 'keinApiKey') {
                setStatus('keinApiKey');
            } else if (res.kind === 'nichtKonfig') {
                setStatus('nichtKonfig');
            } else if (res.kind === 'unterordnerFehlt') {
                setStatus('unterordnerFehlt');
                setFehler(res.missingName || kachel.label);
            } else {
                setStatus('fehler');
                setFehler((res.fehler && res.fehler.message) || 'Unbekannter Fehler');
            }
        }).catch(function(err){
            setStatus('fehler');
            setFehler((err && err.message) || String(err));
        });
    }

    useEffect(ladeWurzel, [baustelle && baustelle.id, kachel && kachel.id]);

    function oeffneUnterordner(folder) {
        setStatus('lade');
        setFehler('');
        window.TWMaDriveService.listFolder(folder.id).then(function(entries){
            setEintraege(entries);
            setPfadStack(function(prev){
                return prev.concat([{ folderId: folder.id, name: folder.name }]);
            });
            setStatus('ok');
        }).catch(function(err){
            setStatus('fehler');
            setFehler((err && err.message) || String(err));
        });
    }

    function springeZuBreadcrumb(index) {
        // Alles ab index+1 verwerfen, dann das Listing des Ziels neu laden
        const ziel = pfadStack[index];
        if (!ziel) return;
        setStatus('lade');
        setFehler('');
        window.TWMaDriveService.listFolder(ziel.folderId).then(function(entries){
            setEintraege(entries);
            setPfadStack(pfadStack.slice(0, index + 1));
            setStatus('ok');
        }).catch(function(err){
            setStatus('fehler');
            setFehler((err && err.message) || String(err));
        });
    }

    function eineEbeneHoch() {
        if (pfadStack.length <= 1) {
            // Schon auf Wurzel-Ebene -> zurueck zum Baustellen-Detail
            onZurueck();
            return;
        }
        springeZuBreadcrumb(pfadStack.length - 2);
    }

    function aktualisieren() {
        // Cache leeren und aktuellen Ordner neu laden
        if (window.TWMaDriveService && window.TWMaDriveService.clearCache) {
            window.TWMaDriveService.clearCache();
        }
        if (pfadStack.length === 0) {
            ladeWurzel();
        } else {
            springeZuBreadcrumb(pfadStack.length - 1);
        }
    }

    function klickAufEintrag(eintrag) {
        if (eintrag.isFolder) {
            oeffneUnterordner(eintrag);
            return;
        }
        if (eintrag.isImage) {
            setVorschau({ type: 'bild', file: eintrag });
            return;
        }
        if (eintrag.isPdf) {
            setVorschau({ type: 'pdf', file: eintrag });
            return;
        }
        // Office / sonstiges: in neuem Tab auf Drive oeffnen
        const url = window.TWMaDriveService.getViewUrl(eintrag.id);
        window.open(url, '_blank', 'noopener');
    }

    // Header-Titel = Kachel-Label + aktueller Ordnername (falls tiefer)
    const headerTitel = pfadStack.length > 1
        ? (pfadStack[pfadStack.length-1].name + ' \u00B7 ' + (baustelle.name || baustelle.id))
        : (kachel.label + ' \u00B7 ' + (baustelle.name || baustelle.id));

    return (
        <div className="ma-bau-container" style={maContainerStyle}>
            <MASubHeader titel={headerTitel} onZurueck={eineEbeneHoch}/>

            {/* Breadcrumb + Refresh-Leiste (nur wenn Daten geladen) */}
            {status === 'ok' && pfadStack.length > 0 ? (
                <MABrowserToolbar
                    pfadStack={pfadStack}
                    onBreadcrumbClick={springeZuBreadcrumb}
                    onAktualisieren={aktualisieren}
                    anzahl={eintraege.length}/>
            ) : null}

            <div style={{
                padding:'12px 16px 32px',
                maxWidth:720, margin:'0 auto', width:'100%',
                flex:1
            }}>
                {status === 'lade' ? (
                    <div style={maSpinnerContainerStyle}>
                        <div style={maSpinnerStyle}></div>
                        <div style={{marginTop:12, color:'#666', fontSize:'0.9rem'}}>
                            {t('browser.laden')}
                        </div>
                    </div>
                ) : status === 'keinApiKey' ? (
                    <MABrowserHinweis
                        emoji={'\u{1F511}'}
                        titel={t('browser.keinApiKey')}
                        farbe="#F9A825"/>
                ) : status === 'nichtKonfig' ? (
                    <MABrowserHinweis
                        emoji={'\u{1F527}'}
                        titel={t('browser.nichtKonfig')}
                        farbe="#455A64"/>
                ) : status === 'unterordnerFehlt' ? (
                    <MABrowserHinweis
                        emoji={'\u{1F4C2}'}
                        titel={t('browser.unterordnerFehlt', { name: fehler || kachel.label })}
                        farbe="#455A64"/>
                ) : status === 'fehler' ? (
                    <MABrowserHinweis
                        emoji={'\u{26A0}\uFE0F'}
                        titel={t('browser.fehler')}
                        farbe="#C62828"
                        detail={fehler}/>
                ) : eintraege.length === 0 ? (
                    <MABrowserHinweis
                        emoji={'\u{1F4ED}'}
                        titel={t('browser.leer')}
                        farbe="#9E9E9E"/>
                ) : (
                    <MADateiListe
                        eintraege={eintraege}
                        onClick={klickAufEintrag}/>
                )}
            </div>

            {/* Vorschau-Overlays */}
            {vorschau && vorschau.type === 'bild' ? (
                <MABildLightbox
                    datei={vorschau.file}
                    onClose={function(){ setVorschau(null); }}/>
            ) : null}
            {vorschau && vorschau.type === 'pdf' ? (
                <MAPdfViewer
                    datei={vorschau.file}
                    onClose={function(){ setVorschau(null); }}/>
            ) : null}
        </div>
    );
}

// ============================================================
// Browser-Toolbar: Breadcrumb + Refresh-Button
// ============================================================

function MABrowserToolbar({ pfadStack, onBreadcrumbClick, onAktualisieren, anzahl }) {
    return (
        <div style={{
            display:'flex', alignItems:'center', gap:8,
            padding:'8px 16px',
            background:'#FAFAFA',
            borderBottom:'1px solid #EEE',
            fontSize:'0.8rem'
        }}>
            {/* Breadcrumb */}
            <div style={{
                flex:1, minWidth:0,
                display:'flex', alignItems:'center', gap:4,
                overflow:'hidden', color:'#666'
            }}>
                {pfadStack.map(function(p, idx){
                    const isLast = idx === pfadStack.length - 1;
                    return (
                        <React.Fragment key={p.folderId + ':' + idx}>
                            {idx > 0 ? <span style={{color:'#BBB', flexShrink:0}}>/</span> : null}
                            <button
                                onClick={function(){ if (!isLast) onBreadcrumbClick(idx); }}
                                disabled={isLast}
                                style={{
                                    background:'transparent',
                                    border:'none',
                                    padding:'2px 4px',
                                    cursor: isLast ? 'default' : 'pointer',
                                    color: isLast ? '#212121' : '#1976D2',
                                    fontSize:'0.8rem',
                                    fontWeight: isLast ? 600 : 400,
                                    overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap',
                                    maxWidth:160
                                }}>
                                {p.name}
                            </button>
                        </React.Fragment>
                    );
                })}
            </div>

            {/* Datei-Zaehler */}
            <div style={{color:'#999', flexShrink:0, fontSize:'0.75rem'}}>
                {t('browser.dateien', { n: anzahl })}
            </div>

            {/* Refresh */}
            <button
                onClick={onAktualisieren}
                title={t('browser.aktualisieren')}
                style={{
                    background:'transparent',
                    border:'1px solid #DDD',
                    borderRadius:6,
                    padding:'4px 8px',
                    cursor:'pointer',
                    color:'#666',
                    display:'flex', alignItems:'center',
                    flexShrink:0
                }}>
                <MAIcon name="aktualisieren" size={14}/>
            </button>
        </div>
    );
}

// ============================================================
// Datei-Liste (nur Layout - Klicks oben im Browser verdrahtet)
// ============================================================

function MADateiListe({ eintraege, onClick }) {
    return (
        <div style={{display:'flex', flexDirection:'column', gap:6}}>
            {eintraege.map(function(e){
                return <MADateiRow key={e.id} eintrag={e} onClick={function(){ onClick(e); }}/>;
            })}
        </div>
    );
}

function MADateiRow({ eintrag, onClick }) {
    const farbe = eintrag.isFolder ? '#F9A825'
                : eintrag.isImage  ? '#7B1FA2'
                : eintrag.isPdf    ? '#C62828'
                : '#455A64';

    const meta = [];
    if (eintrag.sizeHuman)     meta.push(eintrag.sizeHuman);
    if (eintrag.modifiedHuman) meta.push(eintrag.modifiedHuman);
    const metaText = meta.join(' \u00B7 ');

    return (
        <button
            onClick={onClick}
            style={{
                display:'flex', alignItems:'center', gap:12,
                padding:'10px 12px',
                background:'#fff',
                border:'1px solid #EEE',
                borderRadius:10,
                cursor:'pointer',
                textAlign:'left',
                width:'100%',
                minHeight:56
            }}>
            <div style={{
                width:36, height:36, borderRadius:8,
                background: farbe + '18',
                display:'flex', alignItems:'center', justifyContent:'center',
                flexShrink:0, color: farbe
            }}>
                <MAIcon name={eintrag.iconName || 'datei'} size={18}/>
            </div>
            <div style={{flex:1, minWidth:0}}>
                <div style={{
                    fontSize:'0.95rem',
                    color:'#212121',
                    overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'
                }}>
                    {eintrag.name}
                </div>
                {metaText ? (
                    <div style={{fontSize:'0.72rem', color:'#999', marginTop:2}}>
                        {metaText}
                    </div>
                ) : null}
            </div>
            <div style={{color:'#BBB', flexShrink:0}}>{'\u203A'}</div>
        </button>
    );
}

// ============================================================
// Bild-Lightbox (Fullscreen-Vorschau fuer Images)
// ============================================================

function MABildLightbox({ datei, onClose }) {
    const bildUrl = window.TWMaDriveService.getFileContentUrl(datei.id);
    const downloadUrl = window.TWMaDriveService.getDownloadUrl(datei.id);

    // ESC-Handler
    useEffect(function(){
        const onKey = function(ev){ if (ev.key === 'Escape') onClose(); };
        window.addEventListener('keydown', onKey);
        return function(){ window.removeEventListener('keydown', onKey); };
    }, []);

    return (
        <div
            onClick={onClose}
            style={{
                position:'fixed', inset:0,
                background:'rgba(0,0,0,0.92)',
                zIndex:9999,
                display:'flex', flexDirection:'column',
                animation:'ma-fadeIn 0.2s ease-out'
            }}>
            {/* Header mit Dateiname + Schliessen */}
            <div style={{
                display:'flex', alignItems:'center', gap:8,
                padding:'12px 16px',
                color:'#fff', fontSize:'0.85rem',
                background:'rgba(0,0,0,0.5)'
            }}>
                <div style={{
                    flex:1, minWidth:0,
                    overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap',
                    opacity:0.9
                }}>
                    {datei.name}
                </div>
                <a
                    href={downloadUrl}
                    onClick={function(ev){ ev.stopPropagation(); }}
                    target="_blank" rel="noopener"
                    style={{
                        display:'flex', alignItems:'center', gap:4,
                        padding:'6px 10px',
                        background:'rgba(255,255,255,0.1)',
                        border:'1px solid rgba(255,255,255,0.25)',
                        borderRadius:6,
                        color:'#fff',
                        textDecoration:'none',
                        fontSize:'0.8rem'
                    }}>
                    <MAIcon name="download" size={14}/>
                    <span>{t('browser.herunterladen')}</span>
                </a>
                <button
                    onClick={function(ev){ ev.stopPropagation(); onClose(); }}
                    style={{
                        display:'flex', alignItems:'center', justifyContent:'center',
                        width:36, height:36,
                        background:'rgba(255,255,255,0.1)',
                        border:'1px solid rgba(255,255,255,0.25)',
                        borderRadius:'50%',
                        color:'#fff', cursor:'pointer'
                    }}
                    aria-label={t('browser.schliessen')}>
                    <MAIcon name="x-close" size={18}/>
                </button>
            </div>

            {/* Bild-Bereich */}
            <div
                onClick={function(ev){ ev.stopPropagation(); }}
                style={{
                    flex:1,
                    display:'flex', alignItems:'center', justifyContent:'center',
                    padding:'8px', overflow:'auto',
                    touchAction:'pinch-zoom'
                }}>
                <img
                    src={bildUrl}
                    alt={datei.name}
                    style={{
                        maxWidth:'100%', maxHeight:'100%',
                        objectFit:'contain',
                        userSelect:'none'
                    }}/>
            </div>
        </div>
    );
}

// ============================================================
// Baustellendaten-Ansicht (strukturierte Firebase-Felder)
// ============================================================
//
// Datenquelle: baustelle.baustellendaten (Objekt aus /aktive_baustellen/{id}/)
// Erwartete Felder (alle optional):
//   bauherr, bauherr_tel, bauherr_mail, architekt, architekt_tel,
//   bauleitung, bauleitung_tel, ansprechpartner, ansprechpartner_tel,
//   hausmeister, hausmeister_tel, zugangsinfo,
//   strom_verfuegbar (bool), wasser_verfuegbar (bool),
//   start_datum, end_datum, besonderheiten
//
// Neben baustellendaten lesen wir auch direkt von baustelle:
//   name, adresse (Top-Level-Felder des aktive_baustellen-Eintrags)
// ============================================================

function MABaustellendatenView({ baustelle, kachel, onZurueck }) {
    const lang = useSprache();
    const bd = baustelle.baustellendaten || {};

    // Pruefen, ob ueberhaupt etwas inhaltliches da ist
    function hatWert(v) {
        if (v === undefined || v === null) return false;
        if (typeof v === 'string') return v.trim().length > 0;
        if (typeof v === 'boolean') return true;
        if (typeof v === 'number') return true;
        return false;
    }
    const bdFelder = ['bauherr','bauherr_tel','bauherr_mail','architekt','architekt_tel',
                      'bauleitung','bauleitung_tel','ansprechpartner','ansprechpartner_tel',
                      'hausmeister','hausmeister_tel','zugangsinfo',
                      'strom_verfuegbar','wasser_verfuegbar',
                      'start_datum','end_datum','besonderheiten'];
    const hatBdDaten = bdFelder.some(function(k){ return hatWert(bd[k]); });
    const hatObjektDaten = hatWert(baustelle.name) || hatWert(baustelle.adresse);

    const titel = kachel.label + ' \u00B7 ' + (baustelle.name || baustelle.id);

    if (!hatBdDaten && !hatObjektDaten) {
        return (
            <div className="ma-bau-container" style={maContainerStyle}>
                <MASubHeader titel={titel} onZurueck={onZurueck}/>
                <MABrowserHinweis
                    emoji={'\u{1F4CB}'}
                    titel={t('bdaten.leer')}
                    farbe="#455A64"/>
            </div>
        );
    }

    return (
        <div className="ma-bau-container" style={maContainerStyle}>
            <MASubHeader titel={titel} onZurueck={onZurueck}/>

            <div style={{padding:'16px', maxWidth:620, margin:'0 auto', width:'100%'}}>
                {/* Gruppe: Objekt */}
                <MABdGruppe titel={t('bdaten.gruppe.objekt')}>
                    <MABdFeld label={t('bdaten.name')}    wert={baustelle.name}/>
                    <MABdFeld label={t('bdaten.adresse')} wert={baustelle.adresse}/>
                </MABdGruppe>

                {/* Gruppe: Bauherr */}
                <MABdGruppe titel={t('bdaten.gruppe.bauherr')}>
                    <MABdFeld label={t('bdaten.bauherr')}      wert={bd.bauherr}/>
                    <MABdFeld label={t('bdaten.bauherr_tel')}  wert={bd.bauherr_tel}  tel={bd.bauherr_tel}/>
                    <MABdFeld label={t('bdaten.bauherr_mail')} wert={bd.bauherr_mail} mail={bd.bauherr_mail}/>
                </MABdGruppe>

                {/* Gruppe: Beteiligte */}
                <MABdGruppe titel={t('bdaten.gruppe.beteiligte')}>
                    <MABdFeld label={t('bdaten.architekt')}          wert={bd.architekt}/>
                    <MABdFeld label={t('bdaten.architekt_tel')}      wert={bd.architekt_tel}      tel={bd.architekt_tel}/>
                    <MABdFeld label={t('bdaten.bauleitung')}         wert={bd.bauleitung}/>
                    <MABdFeld label={t('bdaten.bauleitung_tel')}     wert={bd.bauleitung_tel}     tel={bd.bauleitung_tel}/>
                    <MABdFeld label={t('bdaten.ansprechpartner')}    wert={bd.ansprechpartner}/>
                    <MABdFeld label={t('bdaten.ansprechpartner_tel')} wert={bd.ansprechpartner_tel} tel={bd.ansprechpartner_tel}/>
                </MABdGruppe>

                {/* Gruppe: Zugang */}
                <MABdGruppe titel={t('bdaten.gruppe.zugang')}>
                    <MABdFeld label={t('bdaten.hausmeister')}     wert={bd.hausmeister}/>
                    <MABdFeld label={t('bdaten.hausmeister_tel')} wert={bd.hausmeister_tel} tel={bd.hausmeister_tel}/>
                    <MABdFeld label={t('bdaten.zugangsinfo')}     wert={bd.zugangsinfo}/>
                </MABdGruppe>

                {/* Gruppe: Technik */}
                <MABdGruppe titel={t('bdaten.gruppe.technik')}>
                    <MABdFeld label={t('bdaten.strom')}  wert={formatBool(bd.strom_verfuegbar)}/>
                    <MABdFeld label={t('bdaten.wasser')} wert={formatBool(bd.wasser_verfuegbar)}/>
                </MABdGruppe>

                {/* Gruppe: Zeitraum */}
                <MABdGruppe titel={t('bdaten.gruppe.zeitraum')}>
                    <MABdFeld label={t('bdaten.start')} wert={formatDatum(bd.start_datum)}/>
                    <MABdFeld label={t('bdaten.ende')}  wert={formatDatum(bd.end_datum)}/>
                </MABdGruppe>

                {/* Gruppe: Besonderheiten */}
                <MABdGruppe titel={t('bdaten.gruppe.besonderheiten')}>
                    <MABdFeld label={''} wert={bd.besonderheiten} mehrzeilig={true}/>
                </MABdGruppe>
            </div>
        </div>
    );
}

function formatBool(v) {
    if (v === true)  return t('bdaten.ja');
    if (v === false) return t('bdaten.nein');
    return '';
}

function formatDatum(v) {
    if (!v) return '';
    // Erlaubt: ISO "2026-05-01", Unix-ms, oder schon fertig formatiert
    try {
        if (typeof v === 'number') {
            const d = new Date(v);
            if (!isNaN(d.getTime())) {
                const pad = function(x){ return x < 10 ? '0'+x : ''+x; };
                return pad(d.getDate()) + '.' + pad(d.getMonth()+1) + '.' + d.getFullYear();
            }
        }
        if (typeof v === 'string' && /^\d{4}-\d{2}-\d{2}/.test(v)) {
            const parts = v.substring(0, 10).split('-');
            return parts[2] + '.' + parts[1] + '.' + parts[0];
        }
    } catch(e) { /* fallthrough */ }
    return String(v);
}

function MABdGruppe({ titel, children }) {
    // Wenn alle Kinder leer sind, blende die ganze Gruppe aus.
    // Trick: wir rendern die Kinder in einem Container und pruefen per Filter.

    const sichtbare = kinder.filter(function(c){

        return c && c.props && (c.props.wert || c.props.wert === 0 || c.props.wert === t('bdaten.nein'));

    return (
        <div style={{

function MAUpdateToast() {
    const [sichtbar, setSichtbar] = useState(false);

    useEffect(function(){
        function handler(){ setSichtbar(true); }
        window.addEventListener('tw-ma-sw-update-ready', handler);
        return function(){ window.removeEventListener('tw-ma-sw-update-ready', handler); };
    }, []);

    function jetztAktualisieren() {
        // SW zum skipWaiting auffordern, dann Seite reloaden
        if (navigator.serviceWorker && navigator.serviceWorker.controller) {
            navigator.serviceWorker.getRegistration().then(function(reg){
                if (reg && reg.waiting) {
                    reg.waiting.postMessage({ action: 'skipWaiting' });
                }
                setTimeout(function(){ location.reload(); }, 300);
            });
        } else {
            location.reload();
        }
    }

    if (!sichtbar) return null;

    return (
        <div style={{
            position:'fixed',
            bottom:20,
            left:'50%',
            transform:'translateX(-50%)',
            background:'linear-gradient(135deg, #1E88E5, #0D47A1)',

                Neue Version verfuegbar
            </span>
            <button
                onClick={jetztAktualisieren}
                style={{
                    background:'#fff',
                    color:'var(--accent-blue-dark)',
                    border:'none',
                    borderRadius:'var(--radius-pill)',
                    padding:'8px 16px',
                    fontFamily:'var(--font-headline)',
                    fontWeight:700,
                    fontSize:'0.85rem',
                    letterSpacing:'0.5px',

                    padding:'4px 8px',
