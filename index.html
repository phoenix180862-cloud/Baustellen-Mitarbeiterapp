<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TW Baustellen-App — Thomas Willwacher Fliesenlegermeister e.K.</title>
    
    <!-- PWA -->
    <meta name="theme-color" content="#2D3436">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="TW Bau">
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <!-- React + Babel -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
    
    <!-- Global Error Handler -->
    <script>
    window.onerror = function(msg, url, line) {
        console.error('App Error:', msg, 'Line:', line);
        var d = document.getElementById('crash-info');
        if (!d) {
            d = document.createElement('div');
            d.id = 'crash-info';
            d.style.cssText = 'position:fixed;top:20px;left:20px;right:20px;padding:20px;background:#2D3436;color:#F5A623;border:2px solid #F5A623;border-radius:12px;z-index:99999;font-family:monospace;font-size:13px;max-height:80vh;overflow:auto;';
            document.body.appendChild(d);
        }
        d.innerHTML = '<b>⚠️ Fehler:</b> ' + msg + '<br><b>Zeile:</b> ' + line +
            '<br><button onclick="this.parentNode.remove()" style="margin-top:10px;padding:8px 16px;background:#F5A623;color:#2D3436;border:none;border-radius:6px;cursor:pointer;font-weight:bold">Schließen</button>';
    };

    // ═══════════════════════════════════════════════════════
    // PWA SERVICE WORKER (Inline-Registrierung)
    // ═══════════════════════════════════════════════════════
    if ('serviceWorker' in navigator) {
        var swCode = 'var CACHE="tw-bau-v1";' +
            'var URLS=["/"];' +
            'self.addEventListener("install",function(e){e.waitUntil(caches.open(CACHE).then(function(c){return c.addAll(URLS)}))});' +
            'self.addEventListener("fetch",function(e){e.respondWith(caches.match(e.request).then(function(r){return r||fetch(e.request).then(function(res){return caches.open(CACHE).then(function(c){c.put(e.request,res.clone());return res})})}))});';
        var swBlob = new Blob([swCode], { type: 'application/javascript' });
        var swUrl = URL.createObjectURL(swBlob);
        navigator.serviceWorker.register(swUrl).then(function() {
            console.log('✅ Service Worker registriert (PWA ready)');
        }).catch(function(e) {
            console.log('SW Registrierung übersprungen:', e.message);
        });
    }
    </script>

    <style>
    /* ═══════════════════════════════════════════════════════ */
    /* TW BAUSTELLEN-APP — CSS                                */
    /* ═══════════════════════════════════════════════════════ */
    
    :root {
        --color-primary: #2D3436;
        --color-primary-light: #3d4a4d;
        --color-accent: #F5A623;
        --color-accent-hover: #e69a1e;
        --color-bg: #1a2332;
        --color-bg-card: #243447;
        --color-bg-input: #1e2d3d;
        --color-text: #e0e6ed;
        --color-text-dim: #8899aa;
        --color-success: #4CAF50;
        --color-danger: #F44336;
        --color-info: #2196F3;
        --color-warning: #FF9800;
        --color-online: #4CAF50;
        --color-offline: #F44336;
        --color-away: #FF9800;
        --color-vacation: #2196F3;
        --color-sick: #FF5722;
        --color-pending: #2196F3;
        --color-weekend: #1e2d3d;
        --color-holiday: #37474F;
        --radius: 12px;
        --radius-sm: 8px;
        --shadow: 0 4px 20px rgba(0,0,0,0.3);
        --shadow-sm: 0 2px 8px rgba(0,0,0,0.2);
        --transition: all 0.3s ease;
        --font: 'Nunito', sans-serif;
        --safe-top: env(safe-area-inset-top, 0px);
        --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
        font-family: var(--font);
        background: var(--color-bg);
        color: var(--color-text);
        min-height: 100vh;
        -webkit-font-smoothing: antialiased;
        overflow-x: hidden;
    }
    
    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--color-bg); }
    ::-webkit-scrollbar-thumb { background: var(--color-primary-light); border-radius: 3px; }
    
    /* ── Loading Spinner ── */
    .spinner {
        width: 40px; height: 40px;
        border: 4px solid var(--color-bg-card);
        border-top-color: var(--color-accent);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    /* ── Buttons ── */
    .btn {
        display: inline-flex; align-items: center; justify-content: center; gap: 8px;
        padding: 12px 24px; border: none; border-radius: var(--radius-sm);
        font-family: var(--font); font-size: 15px; font-weight: 700;
        cursor: pointer; transition: var(--transition);
        text-decoration: none;
    }
    .btn-primary { background: var(--color-accent); color: var(--color-primary); }
    .btn-primary:hover { background: var(--color-accent-hover); transform: translateY(-1px); }
    .btn-secondary { background: var(--color-bg-card); color: var(--color-text); border: 1px solid var(--color-primary-light); }
    .btn-secondary:hover { background: var(--color-primary-light); }
    .btn-success { background: var(--color-success); color: white; }
    .btn-danger { background: var(--color-danger); color: white; }
    .btn-sm { padding: 8px 16px; font-size: 13px; }
    .btn-lg { padding: 16px 32px; font-size: 17px; }
    .btn-block { width: 100%; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    
    /* ── Cards ── */
    .card {
        background: var(--color-bg-card);
        border-radius: var(--radius);
        padding: 20px;
        box-shadow: var(--shadow-sm);
    }
    
    /* ── Inputs ── */
    .input-field {
        width: 100%; padding: 12px 16px;
        background: var(--color-bg-input); color: var(--color-text);
        border: 1px solid var(--color-primary-light);
        border-radius: var(--radius-sm);
        font-family: var(--font); font-size: 15px;
        transition: var(--transition);
    }
    .input-field:focus { outline: none; border-color: var(--color-accent); }
    .input-field::placeholder { color: var(--color-text-dim); }
    
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; margin-bottom: 6px; font-size: 13px; color: var(--color-text-dim); font-weight: 600; }
    
    /* ── Status Dots ── */
    .status-dot {
        width: 12px; height: 12px; border-radius: 50%;
        display: inline-block;
    }
    .status-dot.online { background: var(--color-online); box-shadow: 0 0 8px var(--color-online); }
    .status-dot.offline { background: var(--color-offline); }
    .status-dot.away { background: var(--color-away); }
    .status-dot.vacation { background: var(--color-vacation); }
    .status-dot.sick { background: var(--color-sick); }
    .status-dot.pending { background: var(--color-pending); animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    
    /* ── Badge ── */
    .badge {
        display: inline-flex; align-items: center; justify-content: center;
        min-width: 20px; height: 20px; padding: 0 6px;
        background: var(--color-danger); color: white;
        border-radius: 10px; font-size: 11px; font-weight: 700;
    }
    
    /* ══════════════════════════════════════════════════ */
    /* LAYOUT: DASHBOARD (Desktop/Büro-PC)              */
    /* ══════════════════════════════════════════════════ */
    .dashboard-container {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
    }
    .dashboard-header {
        display: flex; align-items: center; justify-content: space-between;
        padding: 16px 32px;
        background: var(--color-primary);
        border-bottom: 3px solid var(--color-accent);
    }
    .dashboard-header h1 {
        font-size: 20px; font-weight: 800;
        color: var(--color-accent);
    }
    .dashboard-header-actions {
        display: flex; align-items: center; gap: 16px;
    }
    .dashboard-body {
        flex: 1; padding: 24px 32px;
    }
    
    /* ── Employee Grid ── */
    .employee-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 20px;
        margin-bottom: 32px;
    }
    .employee-card {
        background: var(--color-bg-card);
        border-radius: var(--radius);
        padding: 20px;
        cursor: pointer;
        transition: var(--transition);
        border: 2px solid transparent;
    }
    .employee-card:hover {
        border-color: var(--color-accent);
        transform: translateY(-2px);
        box-shadow: var(--shadow);
    }
    .employee-card-header {
        display: flex; align-items: center; gap: 12px;
        margin-bottom: 12px;
    }
    .employee-card-name {
        font-size: 16px; font-weight: 700;
    }
    .employee-card-project {
        font-size: 13px; color: var(--color-text-dim);
    }
    .employee-card-time {
        font-size: 12px; color: var(--color-text-dim);
        margin-top: 4px;
    }
    
    /* ── Mirror View ── */
    .mirror-container {
        display: flex; gap: 24px;
        height: calc(100vh - 140px);
    }
    .mirror-phone {
        width: 375px;
        min-width: 375px;
        height: 667px;
        border: 3px solid var(--color-primary-light);
        border-radius: 32px;
        overflow: hidden;
        background: var(--color-bg);
        box-shadow: var(--shadow);
    }
    .mirror-sidebar {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 16px;
        overflow-y: auto;
    }
    .admin-toolbar {
        display: flex; flex-wrap: wrap; gap: 8px;
        padding: 16px;
        background: var(--color-bg-card);
        border-radius: var(--radius);
    }
    .activity-log {
        flex: 1;
        background: var(--color-bg-card);
        border-radius: var(--radius);
        padding: 16px;
        overflow-y: auto;
    }
    .activity-log-item {
        padding: 8px 0;
        border-bottom: 1px solid var(--color-bg);
        font-size: 13px;
    }
    .activity-log-item:last-child { border-bottom: none; }
    .activity-log-time {
        color: var(--color-text-dim);
        font-size: 11px;
        margin-right: 8px;
    }
    
    /* ── Notification Bell ── */
    .notification-bell {
        position: relative;
        cursor: pointer;
        font-size: 24px;
    }
    .notification-bell .badge {
        position: absolute;
        top: -6px; right: -6px;
    }
    
    /* ── Approval Cards ── */
    .approval-section {
        margin-bottom: 24px;
    }
    .approval-card {
        background: var(--color-bg-card);
        border-radius: var(--radius);
        padding: 16px;
        border-left: 4px solid var(--color-pending);
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 12px;
    }
    .approval-info { flex: 1; }
    .approval-actions { display: flex; gap: 8px; }
    
    /* ── Recent Events ── */
    .events-section {
        margin-bottom: 24px;
    }
    .event-item {
        display: flex; align-items: center; gap: 12px;
        padding: 10px 0;
        border-bottom: 1px solid var(--color-bg-card);
        font-size: 14px;
    }
    .event-time { color: var(--color-text-dim); font-size: 12px; min-width: 50px; }
    
    /* ══════════════════════════════════════════════════ */
    /* LAYOUT: MOBILE APP (Mitarbeiter-Handy)           */
    /* ══════════════════════════════════════════════════ */
    .mobile-container {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        max-width: 500px;
        margin: 0 auto;
    }
    .mobile-header {
        display: flex; align-items: center; justify-content: space-between;
        padding: 12px 16px;
        padding-top: calc(12px + var(--safe-top));
        background: var(--color-primary);
        border-bottom: 2px solid var(--color-accent);
    }
    .mobile-header h2 {
        font-size: 16px; font-weight: 700;
        color: var(--color-accent);
    }
    .mobile-body {
        flex: 1;
        padding: 16px;
        padding-bottom: 80px;
        overflow-y: auto;
    }
    .mobile-nav {
        position: fixed;
        bottom: 0; left: 0; right: 0;
        display: flex;
        justify-content: space-around;
        background: var(--color-primary);
        border-top: 2px solid var(--color-accent);
        padding: 8px 0;
        padding-bottom: calc(8px + var(--safe-bottom));
        z-index: 100;
    }
    .nav-item {
        display: flex; flex-direction: column; align-items: center;
        gap: 2px; padding: 4px 8px;
        color: var(--color-text-dim); font-size: 10px; font-weight: 600;
        cursor: pointer; transition: var(--transition);
        text-decoration: none;
        border: none; background: none;
    }
    .nav-item.active, .nav-item:hover {
        color: var(--color-accent);
    }
    .nav-icon { font-size: 22px; }
    
    /* ── Module Menu Grid ── */
    .module-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 16px;
        padding: 8px 0;
    }
    .module-tile {
        background: var(--color-bg-card);
        border-radius: var(--radius);
        padding: 24px 16px;
        text-align: center;
        cursor: pointer;
        transition: var(--transition);
        border: 2px solid transparent;
    }
    .module-tile:hover, .module-tile:active {
        border-color: var(--color-accent);
        transform: scale(1.02);
    }
    .module-tile-icon { font-size: 36px; margin-bottom: 8px; }
    .module-tile-label { font-size: 13px; font-weight: 700; }
    
    /* ── Language Selector ── */
    .language-screen {
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        min-height: 100vh; padding: 32px;
        text-align: center;
    }
    .language-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 16px; margin-top: 32px;
        max-width: 400px; width: 100%;
    }
    .language-btn {
        display: flex; flex-direction: column; align-items: center;
        gap: 8px; padding: 20px;
        background: var(--color-bg-card);
        border: 2px solid transparent;
        border-radius: var(--radius);
        cursor: pointer; transition: var(--transition);
        color: var(--color-text); font-family: var(--font);
    }
    .language-btn:hover { border-color: var(--color-accent); }
    .language-flag { font-size: 40px; }
    .language-name { font-size: 14px; font-weight: 700; }
    
    /* ── Registration Form ── */
    .register-screen {
        min-height: 100vh; padding: 32px;
        max-width: 500px; margin: 0 auto;
    }
    .register-screen h2 {
        text-align: center; margin-bottom: 24px;
        color: var(--color-accent); font-size: 22px;
    }
    
    /* ── Waiting Screen ── */
    .waiting-screen {
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        min-height: 100vh; padding: 32px;
        text-align: center;
    }
    .waiting-icon { font-size: 80px; margin-bottom: 24px; }
    .waiting-text { font-size: 18px; max-width: 400px; line-height: 1.6; }
    
    /* ══════════════════════════════════════════════════ */
    /* SECTION HEADERS                                   */
    /* ══════════════════════════════════════════════════ */
    .section-title {
        font-size: 16px; font-weight: 800;
        color: var(--color-text);
        margin-bottom: 16px;
        display: flex; align-items: center; gap: 8px;
    }
    .section-title-icon { color: var(--color-accent); }
    
    /* ── Document Upload Modal ── */
    .modal-overlay {
        position: fixed; top: 0; left: 0; right: 0; bottom: 0;
        background: rgba(0,0,0,0.7);
        display: flex; align-items: center; justify-content: center;
        z-index: 1000;
    }
    .modal-content {
        background: var(--color-bg);
        border-radius: var(--radius);
        padding: 24px;
        max-width: 500px; width: 90%;
        max-height: 90vh; overflow-y: auto;
        box-shadow: var(--shadow);
    }
    .modal-header {
        display: flex; align-items: center; justify-content: space-between;
        margin-bottom: 20px;
    }
    .modal-header h3 { font-size: 18px; color: var(--color-accent); }
    .modal-close {
        background: none; border: none; color: var(--color-text-dim);
        font-size: 24px; cursor: pointer;
    }
    
    /* ── Drop Zone ── */
    .drop-zone {
        border: 2px dashed var(--color-primary-light);
        border-radius: var(--radius);
        padding: 40px;
        text-align: center;
        cursor: pointer;
        transition: var(--transition);
    }
    .drop-zone:hover, .drop-zone.active {
        border-color: var(--color-accent);
        background: rgba(245,166,35,0.05);
    }
    .drop-zone-icon { font-size: 40px; margin-bottom: 8px; }
    .drop-zone-text { font-size: 14px; color: var(--color-text-dim); }
    
    /* ══════════════════════════════════════════════════ */
    /* MODULE: STUNDENZETTEL                              */
    /* ══════════════════════════════════════════════════ */
    .timesheet-form { display: flex; flex-direction: column; gap: 12px; }
    .timesheet-header {
        background: var(--color-bg-card); border-radius: var(--radius);
        padding: 16px; text-align: center; border-bottom: 3px solid var(--color-accent);
    }
    .timesheet-header h3 { font-size: 14px; color: var(--color-accent); margin-bottom: 4px; }
    .timesheet-header p { font-size: 11px; color: var(--color-text-dim); }
    .time-row {
        display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px;
    }
    .material-tag {
        display: inline-flex; align-items: center; gap: 4px;
        background: var(--color-bg); padding: 4px 10px;
        border-radius: 20px; font-size: 12px; margin: 2px;
    }
    .photo-thumbs {
        display: flex; gap: 8px; flex-wrap: wrap;
    }
    .photo-thumb {
        width: 60px; height: 60px; border-radius: var(--radius-sm);
        background: var(--color-bg); display: flex; align-items: center;
        justify-content: center; font-size: 24px; cursor: pointer;
        border: 1px dashed var(--color-primary-light);
    }
    .voice-btn {
        width: 44px; height: 44px; border-radius: 50%;
        background: var(--color-accent); border: none;
        display: flex; align-items: center; justify-content: center;
        font-size: 20px; cursor: pointer; transition: var(--transition);
    }
    .voice-btn.active { background: var(--color-danger); animation: pulse 1s infinite; }

    /* ══════════════════════════════════════════════════ */
    /* MODULE: MONATSKALENDER                            */
    /* ══════════════════════════════════════════════════ */
    .month-calendar { margin-top: 12px; }
    .month-nav {
        display: flex; align-items: center; justify-content: space-between;
        margin-bottom: 16px;
    }
    .month-nav h3 { font-size: 16px; color: var(--color-accent); }
    .month-nav button { background: none; border: none; color: var(--color-text); font-size: 20px; cursor: pointer; padding: 4px 12px; }
    .weekday-header {
        display: grid; grid-template-columns: repeat(7, 1fr);
        text-align: center; font-size: 11px; font-weight: 700;
        color: var(--color-text-dim); margin-bottom: 4px;
    }
    .day-grid {
        display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px;
    }
    .day-cell {
        aspect-ratio: 1; display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        border-radius: var(--radius-sm); font-size: 13px; font-weight: 700;
        cursor: pointer; transition: var(--transition); gap: 2px;
        background: var(--color-bg-card); position: relative;
    }
    .day-cell:hover { border: 1px solid var(--color-accent); }
    .day-cell.empty { background: transparent; cursor: default; }
    .day-cell.empty:hover { border: none; }
    .day-cell.weekend { background: var(--color-weekend); opacity: 0.6; cursor: default; }
    .day-cell.weekend:hover { border: none; }
    .day-cell.today { border: 2px solid var(--color-accent); }
    .day-cell.done { background: rgba(76,175,80,0.2); }
    .day-cell.vacation { background: rgba(33,150,243,0.2); }
    .day-cell.sick { background: rgba(244,67,54,0.2); }
    .day-hours { font-size: 9px; color: var(--color-text-dim); }
    .day-status { font-size: 8px; position: absolute; top: 2px; right: 2px; }
    .month-summary {
        margin-top: 16px; padding: 12px; background: var(--color-bg-card);
        border-radius: var(--radius); font-size: 13px;
    }
    .summary-row {
        display: flex; justify-content: space-between; padding: 4px 0;
    }
    .summary-row span:last-child { font-weight: 700; color: var(--color-accent); }

    /* ══════════════════════════════════════════════════ */
    /* MODULE: FOTOS                                     */
    /* ══════════════════════════════════════════════════ */
    .photo-grid {
        display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
    }
    .photo-card {
        aspect-ratio: 1; background: var(--color-bg-card);
        border-radius: var(--radius-sm); display: flex;
        align-items: center; justify-content: center;
        font-size: 32px; cursor: pointer; overflow: hidden;
        transition: var(--transition); position: relative;
    }

    /* ══════════════════════════════════════════════════ */
    .project-list { display: flex; flex-direction: column; gap: 12px; }
    .project-card {
        background: var(--color-bg-card); border-radius: var(--radius);
        padding: 16px; cursor: pointer; transition: var(--transition);
        border-left: 4px solid var(--color-accent);
    }
    .project-card:hover { transform: translateX(4px); }
    .project-card h4 { font-size: 15px; margin-bottom: 4px; }
    .project-card p { font-size: 12px; color: var(--color-text-dim); }
    .folder-list { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; }
    .folder-item {
        display: flex; align-items: center; gap: 10px;
        padding: 12px; background: var(--color-bg-card);
        border-radius: var(--radius-sm); cursor: pointer;
        transition: var(--transition);
    }
    .folder-item:hover { background: var(--color-primary-light); }
    .folder-icon { font-size: 24px; }
    .folder-name { font-size: 14px; }
    .folder-access { font-size: 10px; color: var(--color-text-dim); }

    /* ══════════════════════════════════════════════════ */
    /* MODULE: KALENDER                                  */
    /* ══════════════════════════════════════════════════ */
    .calendar-view { overflow-x: auto; }
    .gantt-row {
        display: flex; align-items: center; min-height: 36px;
        border-bottom: 1px solid var(--color-bg);
    }
    .gantt-label {
        min-width: 120px; font-size: 12px; font-weight: 600;
        padding: 4px 8px; white-space: nowrap;
    }
    .gantt-bar-container { flex: 1; display: flex; gap: 1px; }
    .gantt-cell {
        width: 20px; height: 28px; border-radius: 2px;
    }
    .gantt-cell.work { background: var(--color-success); }
    .gantt-cell.vacation { background: var(--color-info); }
    .gantt-cell.sick { background: var(--color-danger); }
    .gantt-cell.weekend { background: var(--color-weekend); }
    .gantt-cell.empty { background: transparent; }

    /* ══════════════════════════════════════════════════ */
    /* MODULE: PRIVATER BEREICH                          */
    /* ══════════════════════════════════════════════════ */
    .private-section {
        background: var(--color-bg-card); border-radius: var(--radius);
        padding: 16px; margin-bottom: 16px;
    }
    .private-section h4 {
        font-size: 14px; color: var(--color-accent);
        margin-bottom: 12px; display: flex; align-items: center; gap: 8px;
    }
    .private-row {
        display: flex; justify-content: space-between;
        padding: 6px 0; font-size: 13px;
        border-bottom: 1px solid var(--color-bg);
    }
    .private-row:last-child { border-bottom: none; }
    .private-row span:first-child { color: var(--color-text-dim); }
    .private-row span:last-child { font-weight: 700; }

    /* ══════════════════════════════════════════════════ */
    /* MODULE: CHAT                                      */
    /* ══════════════════════════════════════════════════ */
    .chat-container { display: flex; flex-direction: column; height: calc(100vh - 200px); }
    .chat-messages { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; padding: 8px 0; }
    .chat-bubble {
        max-width: 80%; padding: 10px 14px;
        border-radius: 16px; font-size: 14px; line-height: 1.4;
    }
    .chat-bubble.sent {
        align-self: flex-end; background: var(--color-accent);
        color: var(--color-primary); border-bottom-right-radius: 4px;
    }
    .chat-bubble.received {
        align-self: flex-start; background: var(--color-bg-card);
        border-bottom-left-radius: 4px;
    }
    .chat-bubble-time { font-size: 10px; opacity: 0.7; margin-top: 4px; }
    .chat-input-bar {
        display: flex; gap: 8px; padding: 8px 0;

    .chat-input-bar input { flex: 1; }

    /* ══════════════════════════════════════════════════ */

    /* ══════════════════════════════════════════════════ */
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeIn 0.4s ease-out; }
    
    @keyframes slideUp {
        from { opacity: 0; transform: translateY(40px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .slide-up { animation: slideUp 0.5s ease-out; }

    const FirebaseService = {
        // ── Benutzer registrieren ──
        async registerUser(email, password, profileData) {
            if (!firebaseAuth) return { success: false, error: 'Firebase nicht konfiguriert' };
            try {
                const cred = await firebaseAuth.createUserWithEmailAndPassword(email, password);
                await firebaseDB.ref('users/' + cred.user.uid + '/profile').set(profileData);
                await firebaseDB.ref('users/' + cred.user.uid + '/approved').set(false);
                await firebaseDB.ref('users/' + cred.user.uid + '/role').set('worker');
                return { success: true, uid: cred.user.uid };
            } catch(e) { return { success: false, error: e.message }; }
        },

        // ── Echtzeit-Listener: Mitarbeiter-Status ──
        onEmployeesChanged(callback) {
            if (!firebaseDB) return () => {};
            const ref = firebaseDB.ref('users');
            ref.on('value', snap => callback(snap.val() || {}));
            return () => ref.off('value');
        },

        // ── Echtzeit-Listener: Freigabe-Status (für Wartebildschirm) ──
        onApprovalChanged(uid, callback) {
            if (!firebaseDB) return () => {};
            const ref = firebaseDB.ref('users/' + uid + '/approved');
            ref.on('value', snap => callback(snap.val()));
            return () => ref.off('value');
        },

        // ── Monatsabrechnung speichern ──
        async saveDayEntry(uid, year, month, day, data) {
            if (!firebaseDB) { console.log('DEMO: saveDayEntry', { uid, year, month, day, data }); return; }
            await firebaseDB.ref(`monthlyRecords/${uid}/${year}/${String(month).padStart(2,'0')}/${String(day).padStart(2,'0')}`).set(data);
        },

        // ── Stundenzettel speichern ──
        async saveTimesheet(projectId, data) {
            if (!firebaseDB) { console.log('DEMO: saveTimesheet', { projectId, data }); return; }
            const ref = firebaseDB.ref(`projects/${projectId}/timesheets`).push();
            await ref.set({ ...data, createdAt: firebase.database.ServerValue.TIMESTAMP });
        },

        // ── Dokument-Upload ──
        async uploadDocument(projectId, file, metadata) {
            if (!firebaseStorage) { console.log('DEMO: uploadDocument', { projectId, file: file.name, metadata }); return; }
            const path = `projects/${projectId}/documents/${Date.now()}_${file.name}`;
            const ref = firebaseStorage.ref(path);
            await ref.put(file);
            const url = await ref.getDownloadURL();
            await firebaseDB.ref(`projects/${projectId}/documents`).push().set({ ...metadata, url, uploadedAt: firebase.database.ServerValue.TIMESTAMP });
            return url;
        },

        // ── Online-Status tracken (Mitarbeiter) ──
        trackPresence(uid) {
            if (!firebaseDB) return;
            const connRef = firebaseDB.ref('.info/connected');
            const statusRef = firebaseDB.ref(`dashboard/activeApps/${uid}`);
            connRef.on('value', snap => {
                if (snap.val() === true) {
                    statusRef.set({ online: true, lastSeen: firebase.database.ServerValue.TIMESTAMP });
                    statusRef.onDisconnect().update({ online: false, lastSeen: firebase.database.ServerValue.TIMESTAMP });
                }
            });
        },

        // ── Mitarbeiter freischalten ──
        async approveUser(uid) {
            if (!firebaseDB) { console.log('DEMO: approveUser', uid); return; }
            await firebaseDB.ref('users/' + uid + '/approved').set(true);
        },

        // ── Mitarbeiter sperren ──
        async rejectUser(uid) {
            if (!firebaseDB) { console.log('DEMO: rejectUser', uid); return; }
            await firebaseDB.ref('users/' + uid + '/approved').set(false);
        }
    };

    // SPRACHEINGABE — Web Speech API Wrapper
    // ═══════════════════════════════════════════════════════
    const VoiceService = {
        recognition: null,
        isSupported: !!(window.SpeechRecognition || window.webkitSpeechRecognition),
        
        start(langCode, onResult, onEnd) {
            if (!this.isSupported) { alert('Spracheingabe nicht unterstützt'); return; }
            const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
            this.recognition = new SpeechRec();
            const langMap = { de: 'de-DE', cs: 'cs-CZ', sk: 'sk-SK', en: 'en-GB', es: 'es-ES', fr: 'fr-FR', pl: 'pl-PL' };
            this.recognition.lang = langMap[langCode] || 'de-DE';
            this.recognition.continuous = true;
            this.recognition.interimResults = true;
            this.recognition.onresult = (event) => {
                let transcript = '';
                for (let i = 0; i < event.results.length; i++) {
                    transcript += event.results[i][0].transcript;
                }
                onResult(transcript);
            };
            this.recognition.onend = () => { if (onEnd) onEnd(); };
            this.recognition.onerror = (e) => { console.error('Voice error:', e.error); if (onEnd) onEnd(); };
            this.recognition.start();
        },

        stop() {
            if (this.recognition) { this.recognition.stop(); this.recognition = null; }
        }
    };

    function EmployeeCard({ employee, onClick }) {
        const getStatusClass = () => {
            if (employee.status === 'vacation') return 'vacation';
            if (employee.status === 'sick') return 'sick';
            if (employee.online) return 'online';
            const minAgo = (Date.now() - employee.lastSeen) / 60000;
            if (minAgo < 5) return 'online';
            if (minAgo < 15) return 'away';
            return 'offline';
        };

        const getStatusText = () => {
            if (employee.status === 'vacation') return `URLAUB bis ${employee.vacationUntil}`;
            if (employee.status === 'sick') return 'KRANK';
            if (employee.online) {
                const since = new Date(employee.lastSeen);
                return `Seit ${String(since.getHours()).padStart(2,'0')}:${String(since.getMinutes()).padStart(2,'0')}`;
            }
            const minAgo = Math.round((Date.now() - employee.lastSeen) / 60000);
            return `Offline ${minAgo}m`;
        };

        const lang = LANGUAGES.find(l => l.code === employee.language);

        return (
            <div className="employee-card" onClick={() => onClick(employee)}>
                <div className="employee-card-header">
                    <span className={`status-dot ${getStatusClass()}`}></span>
                    <div>
                        <div className="employee-card-name">
                            {lang?.flag} {employee.firstName} {employee.lastName}
                        </div>
                        <div className="employee-card-project">
                            {employee.currentProject || '—'}
                        </div>
                        <div className="employee-card-time">{getStatusText()}</div>
                    </div>
                </div>
                <button className="btn btn-primary btn-sm btn-block">
                    📱 Öffnen
                </button>
            </div>
        );
    }

    // KOMPONENTE: MATERIAL-POPUP (Fliesenleger-Katalog)
    // ═══════════════════════════════════════════════════════
    function MaterialPopup({ onClose, onSelect, selected }) {
        const [search, setSearch] = useState('');
        const [openCat, setOpenCat] = useState(null);
        const [items, setItems] = useState(selected || []);

        const filtered = search ? DEMO_MATERIALS.map(cat => ({
            ...cat,
            items: cat.items.filter(i => i.name.toLowerCase().includes(search.toLowerCase()))
        })).filter(cat => cat.items.length > 0) : DEMO_MATERIALS;

        const toggleItem = (item) => {
            setItems(prev => {
                const exists = prev.find(i => i.id === item.id);
                if (exists) return prev.filter(i => i.id !== item.id);
                return [...prev, { ...item, amount: '' }];
            });
        };

        const setAmount = (id, amount) => {
            setItems(prev => prev.map(i => i.id === id ? { ...i, amount } : i));
        };

        const isSelected = (id) => items.some(i => i.id === id);

        return (
            <div className="modal-overlay" onClick={onClose}>
                <div className="modal-content" onClick={e => e.stopPropagation()} style={{ maxHeight: '85vh' }}>
                    <div className="modal-header">
                        <h3>📦 Material auswählen</h3>
                        <button className="modal-close" onClick={onClose}>✕</button>
                    </div>
                    <div className="form-group">
                        <input className="input-field" placeholder="🔍 Suchen..." value={search} onChange={e => setSearch(e.target.value)} />
                    </div>
                    <div style={{ maxHeight: '50vh', overflowY: 'auto' }}>
                        {filtered.map((cat, ci) => (
                            <div key={ci} style={{ marginBottom: 8 }}>
                                <div onClick={() => setOpenCat(openCat === ci ? null : ci)}
                                    style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '10px 12px', background: 'var(--color-bg-card)', borderRadius: 'var(--radius-sm)', cursor: 'pointer', fontWeight: 700, fontSize: 14 }}>
                                    <span>{openCat === ci || search ? '▾' : '▸'}</span>
                                    <span>{cat.cat}</span>
                                    <span style={{ marginLeft: 'auto', fontSize: 11, color: 'var(--color-text-dim)' }}>{cat.items.length}</span>
                                </div>
                                {(openCat === ci || search) && (
                                    <div style={{ padding: '4px 0 4px 12px' }}>
                                        {cat.items.map(item => (
                                            <div key={item.id} style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '8px 0', borderBottom: '1px solid var(--color-bg)', fontSize: 13 }}>
                                                <button onClick={() => toggleItem(item)} style={{
                                                    width: 28, height: 28, borderRadius: 6,
                                                    border: isSelected(item.id) ? '2px solid var(--color-success)' : '2px solid var(--color-primary-light)',
                                                    background: isSelected(item.id) ? 'rgba(76,175,80,0.2)' : 'transparent',
                                                    color: isSelected(item.id) ? 'var(--color-success)' : 'var(--color-text-dim)',
                                                    cursor: 'pointer', fontWeight: 700, fontSize: 14,
                                                    display: 'flex', alignItems: 'center', justifyContent: 'center'
                                                }}>
                                                    {isSelected(item.id) ? '✓' : '+'}
                                                </button>
                                                <span style={{ flex: 1 }}>{item.name}</span>
                                                {isSelected(item.id) && (
                                                    <input type="text" placeholder="Menge"
                                                        value={items.find(i => i.id === item.id)?.amount || ''}
                                                        onChange={e => setAmount(item.id, e.target.value)}
                                                        style={{ width: 60, padding: '4px 8px', background: 'var(--color-bg-input)', border: '1px solid var(--color-primary-light)', borderRadius: 4, color: 'var(--color-text)', fontSize: 12, textAlign: 'right' }}
                                                    />
                                                )}
                                                <span style={{ fontSize: 11, color: 'var(--color-text-dim)', minWidth: 40 }}>{item.unit}</span>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        ))}
                    </div>
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginTop: 16, paddingTop: 12, borderTop: '1px solid var(--color-primary-light)' }}>
                        <span style={{ fontSize: 13, color: 'var(--color-text-dim)' }}>Ausgewählt: {items.length} Positionen</span>
                        <button className="btn btn-primary btn-sm" onClick={() => { onSelect(items); onClose(); }}>
                            ✅ Übernehmen
                        </button>
                    </div>
                </div>
            </div>
        );
    }

    // MODUL: STUNDENZETTEL (mit Material-Popup + Spracheingabe)
    // ═══════════════════════════════════════════════════════
    function ModuleTimesheet({ lang, onBack, employeeName }) {
        const [isRecording, setIsRecording] = useState(false);
        const [showMaterialPopup, setShowMaterialPopup] = useState(false);
        const [materials, setMaterials] = useState([
            { id: 'A01', name: 'Flüssigfolie', amount: '5,0', unit: 'kg' },
            { id: 'A02', name: 'Dichtband 120mm', amount: '12,0', unit: 'lfm' },
            { id: 'A03', name: 'Dichtmanschette DN50', amount: '1', unit: 'Stück' },
        ]);
        const [description, setDescription] = useState('Abdichtungsarbeiten im Duschbereich EG, Raum 1.04. Flüssigfolie 2-lagig aufgetragen, Dichtband an Wandanschlüsse und Bodeneinlauf eingebaut.');
        const [timeFrom, setTimeFrom] = useState('07:00');
        const [timeTo, setTimeTo] = useState('16:30');
        const [breakMin, setBreakMin] = useState(30);
        const today = new Date();
        const dateStr = `${String(today.getDate()).padStart(2,'0')}.${String(today.getMonth()+1).padStart(2,'0')}.${today.getFullYear()}`;
        
        // Stunden berechnen
        const calcHours = () => {
            const [fH, fM] = timeFrom.split(':').map(Number);
            const [tH, tM] = timeTo.split(':').map(Number);
            const total = (tH * 60 + tM - fH * 60 - fM - breakMin) / 60;
            return Math.max(0, total).toFixed(1);
        };

        const toggleVoice = () => {
            if (isRecording) {
                VoiceService.stop();
                setIsRecording(false);
            } else {
                setIsRecording(true);
                VoiceService.start(lang, (text) => setDescription(text), () => setIsRecording(false));
            }
        };

        const handleSave = () => {
            const data = { date: dateStr, timeFrom, timeTo, breakMinutes: breakMin, totalHours: parseFloat(calcHours()), description, materials, photos: [], status: 'submitted' };
            FirebaseService.saveTimesheet('proj-001', data);
            alert('✅ Stundenzettel gespeichert!');
        };

        return (
            <div className="fade-in">
                <button className="btn btn-secondary btn-sm" onClick={onBack} style={{ marginBottom: 12 }}>← {t('nav.home', lang)}</button>
                <div className="timesheet-header">
                    <h3>THOMAS WILLWACHER</h3>
                    <p>Fliesenlegermeister e.K. · Flurweg 14a · 56472 Nisterau</p>
                </div>
                <div className="card" style={{ marginTop: 12, padding: 16 }}>
                    <h4 style={{ color: 'var(--color-accent)', marginBottom: 12, textAlign: 'center', letterSpacing: 2 }}>S T U N D E N N A C H W E I S</h4>
                    <div className="timesheet-form">
                        <div className="form-group"><label className="form-label">Datum</label><input className="input-field" type="text" value={dateStr} readOnly /></div>
                        <div className="form-group"><label className="form-label">Baustelle</label>
                            <select className="input-field">{DEMO_PROJECTS.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}</select>
                        </div>
                        <div className="time-row">
                            <div className="form-group"><label className="form-label">Von</label><input className="input-field" type="time" value={timeFrom} onChange={e => setTimeFrom(e.target.value)} /></div>
                            <div className="form-group"><label className="form-label">Bis</label><input className="input-field" type="time" value={timeTo} onChange={e => setTimeTo(e.target.value)} /></div>
                            <div className="form-group"><label className="form-label">Pause (Min)</label><input className="input-field" type="number" value={breakMin} onChange={e => setBreakMin(Number(e.target.value))} /></div>
                        </div>
                        <div style={{ textAlign: 'center', fontSize: 16, color: 'var(--color-accent)', fontWeight: 800, padding: '8px 0' }}>
                            Gesamtstunden: {calcHours()} Std.
                        </div>
                        <div className="form-group">
                            <label className="form-label" style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                                <span>Arbeitsbeschreibung</span>
                                <button className={`voice-btn ${isRecording ? 'active' : ''}`} onClick={toggleVoice} title="Spracheingabe">
                                    {isRecording ? '⏹️' : '🎤'}
                                </button>
                            </label>
                            <textarea className="input-field" rows={4} value={description} onChange={e => setDescription(e.target.value)} />
                            {isRecording && <div style={{ fontSize: 11, color: 'var(--color-danger)', marginTop: 4 }}>🔴 Aufnahme läuft...</div>}
                        </div>
                        <div className="form-group">
                            <label className="form-label">Material ({materials.length} Positionen)</label>
                            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 4, marginBottom: 8 }}>
                                {materials.map((m, i) => (
                                    <span className="material-tag" key={i}>
                                        {m.name}{m.amount ? `: ${m.amount} ${m.unit}` : ''}
                                        <button onClick={() => setMaterials(prev => prev.filter((_, j) => j !== i))}

    // ═══════════════════════════════════════════════════════
    // MODUL: MONATSKALENDER (mit Tageseintrag-Modal)
    // ═══════════════════════════════════════════════════════
    function ModuleMonthly({ lang, onBack }) {
        const [currentMonth, setCurrentMonth] = useState(3);
        const [currentYear] = useState(2026);
        const [selectedDay, setSelectedDay] = useState(null);
        const [dayEntries, setDayEntries] = useState(DEMO_MONTHLY.days);
        const monthNames = ['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
        const weekdays = { de: ['Mo','Di','Mi','Do','Fr','Sa','So'], cs: ['Po','Út','St','Čt','Pá','So','Ne'], en: ['Mo','Tu','We','Th','Fr','Sa','Su'], es: ['Lu','Ma','Mi','Ju','Vi','Sá','Do'], fr: ['Lu','Ma','Me','Je','Ve','Sa','Di'], sk: ['Po','Ut','St','Št','Pi','So','Ne'], pl: ['Pn','Wt','Śr','Cz','Pt','So','Nd'] };
        const wDays = weekdays[lang] || weekdays.de;

        const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
        const firstDayOfWeek = (new Date(currentYear, currentMonth, 1).getDay() + 6) % 7;
        const today = new Date();
        const isToday = (d) => today.getDate() === d && today.getMonth() === currentMonth && today.getFullYear() === currentYear;
        const isWeekend = (d) => { const dow = (new Date(currentYear, currentMonth, d).getDay() + 6) % 7; return dow >= 5; };
        const vacDays = DEMO_MONTHLY.vacation;

        let totalHours = 0; let workedDays = 0;
        Object.values(dayEntries).forEach(d => { totalHours += d.hours; workedDays++; });

        const handleDayClick = (d) => { if (!isWeekend(d)) setSelectedDay(d); };

        const saveDayEntry = (data) => {
            setDayEntries(prev => ({ ...prev, [selectedDay]: { ...data, status: 'done' } }));
            FirebaseService.saveDayEntry('emp-001', currentYear, currentMonth + 1, selectedDay, data);
            setSelectedDay(null);
        };

        return (
            <div className="fade-in">
                <button className="btn btn-secondary btn-sm" onClick={onBack} style={{ marginBottom: 12 }}>← {t('nav.home', lang)}</button>
                <div className="section-title"><span className="section-title-icon">📊</span> {t('modules.monthly', lang)}</div>
                <div className="month-calendar">
                    <div className="month-nav">
                        <button onClick={() => setCurrentMonth(p => Math.max(0, p-1))}>◀</button>
                        <h3>{monthNames[currentMonth]} {currentYear}</h3>
                        <button onClick={() => setCurrentMonth(p => Math.min(11, p+1))}>▶</button>
                    </div>
                    <div className="weekday-header">{wDays.map(d => <div key={d}>{d}</div>)}</div>
                    <div className="day-grid">
                        {Array.from({ length: firstDayOfWeek }, (_, i) => <div className="day-cell empty" key={`e${i}`} />)}
                        {Array.from({ length: daysInMonth }, (_, i) => {
                            const d = i + 1;
                            const dayData = dayEntries[d];
                            const isVac = vacDays.includes(d);
                            let cls = 'day-cell';
                            if (isWeekend(d)) cls += ' weekend';
                            else if (isVac) cls += ' vacation';
                            else if (dayData) cls += ' done';
                            if (isToday(d)) cls += ' today';
                            return (
                                <div className={cls} key={d} onClick={() => handleDayClick(d)}>
                                    <span>{d}</span>
                                    {dayData && <span className="day-hours">{dayData.hours}h</span>}
                                    {dayData && <span className="day-status">✅</span>}
                                    {isVac && <span className="day-status">🏖️</span>}
                                </div>
                            );
                        })}
                    </div>
                    <div className="month-summary">
                        <div className="summary-row"><span>Arbeitstage</span><span>22</span></div>
                        <div className="summary-row"><span>Erfasst</span><span>{workedDays}</span></div>
                        <div className="summary-row"><span>Offen</span><span>{Math.max(0, 22 - workedDays - vacDays.length)}</span></div>
                        <div className="summary-row"><span>Urlaub</span><span>{vacDays.length}</span></div>
                        <div className="summary-row"><span>Stunden gesamt</span><span>{totalHours.toFixed(1)} Std.</span></div>
                        <div className="summary-row"><span>⌀ pro Tag</span><span>{workedDays ? (totalHours / workedDays).toFixed(1) : '—'} Std.</span></div>
                    </div>
                </div>
                {selectedDay && (
                    <DayEntryModal day={selectedDay} month={currentMonth + 1} year={currentYear} lang={lang}
                        existing={dayEntries[selectedDay]} onSave={saveDayEntry} onClose={() => setSelectedDay(null)} />
                )}
            </div>
        );
    }

    // ═══════════════════════════════════════════════════════
    // KOMPONENTE: TAGESEINTRAG MODAL (Monatsabrechnung)
    // ═══════════════════════════════════════════════════════
    function DayEntryModal({ day, month, year, lang, existing, onSave, onClose }) {
        const [startTime, setStartTime] = useState(existing?.start || '07:00');
        const [endTime, setEndTime] = useState(existing?.end || '16:30');
        const [breakMin, setBreakMin] = useState(existing?.breakMin || 30);
        const [desc, setDesc] = useState(existing?.desc || '');
        const [project, setProject] = useState(existing?.project || DEMO_PROJECTS[0]?.name || '');
        const [isRecording, setIsRecording] = useState(false);

        const calcHours = () => {
            const [fH, fM] = startTime.split(':').map(Number);
            const [tH, tM] = endTime.split(':').map(Number);
            return Math.max(0, (tH * 60 + tM - fH * 60 - fM - breakMin) / 60);
        };

        const validate = () => {
            if (!desc.trim()) return 'Bitte Leistung beschreiben';
            if (calcHours() <= 0) return 'Arbeitsende muss nach Arbeitsbeginn liegen';
            if (calcHours() > 12) return 'Maximale Arbeitszeit: 12 Stunden';
            if (calcHours() > 6 && breakMin < 30) return 'Bei >6 Stunden mind. 30 Min. Pause';
            return null;
        };

        const toggleVoice = () => {
            if (isRecording) { VoiceService.stop(); setIsRecording(false); }
            else { setIsRecording(true); VoiceService.start(lang, (t) => setDesc(t), () => setIsRecording(false)); }
        };

        const handleSave = () => {
            const err = validate();
            if (err) { alert('⚠️ ' + err); return; }
            onSave({ start: startTime, end: endTime, breakMin, hours: calcHours(), desc, project, descriptionLang: lang });
        };

        const dayName = new Date(year, month - 1, day).toLocaleDateString('de-DE', { weekday: 'long' });

        return (
            <div className="modal-overlay" onClick={onClose}>
                <div className="modal-content" onClick={e => e.stopPropagation()}>
                    <div className="modal-header">
                        <h3>📅 {dayName}, {day}.{String(month).padStart(2,'0')}.{year}</h3>
                        <button className="modal-close" onClick={onClose}>✕</button>
                    </div>
                    <div className="form-group">
                        <label className="form-label">Baustelle</label>
                        <select className="input-field" value={project} onChange={e => setProject(e.target.value)}>
                            {DEMO_PROJECTS.map(p => <option key={p.id} value={p.name}>{p.name}</option>)}
                        </select>
                    </div>
                    <div className="time-row">
                        <div className="form-group"><label className="form-label">Beginn</label><input className="input-field" type="time" value={startTime} onChange={e => setStartTime(e.target.value)} /></div>
                        <div className="form-group"><label className="form-label">Ende</label><input className="input-field" type="time" value={endTime} onChange={e => setEndTime(e.target.value)} /></div>
                        <div className="form-group"><label className="form-label">Pause</label><input className="input-field" type="number" value={breakMin} onChange={e => setBreakMin(Number(e.target.value))} /></div>
                    </div>
                    <div style={{ textAlign: 'center', fontSize: 16, color: 'var(--color-accent)', fontWeight: 800, padding: '8px 0' }}>
                        {calcHours().toFixed(1)} Stunden
                    </div>
                    <div className="form-group">
                        <label className="form-label" style={{ display: 'flex', justifyContent: 'space-between' }}>
                            <span>Ausgeführte Leistung</span>
                            <button className={`voice-btn ${isRecording ? 'active' : ''}`} onClick={toggleVoice} style={{ width: 36, height: 36, fontSize: 16 }}>
                                {isRecording ? '⏹️' : '🎤'}
                            </button>
                        </label>
                        <textarea className="input-field" rows={4} value={desc} onChange={e => setDesc(e.target.value)} placeholder="Beschreibung der Arbeit..." />
                        {isRecording && <div style={{ fontSize: 11, color: 'var(--color-danger)', marginTop: 4 }}>🔴 Spracheingabe aktiv ({LANGUAGES.find(l => l.code === lang)?.native})...</div>}
                    </div>
                    <div style={{ display: 'flex', gap: 8 }}>
                        <button className="btn btn-secondary" onClick={onClose}>❌</button>
                        <button className="btn btn-primary btn-block" onClick={handleSave}>💾 Speichern</button>
                    </div>
                </div>
            </div>
        );
    }

        };

        // ── ROUTING ──
        // Admin-Modus: URL-Parameter ?admin=true oder localStorage
        const isAdmin = useMemo(() => {
            const params = new URLSearchParams(window.location.search);
            if (params.get('admin') === 'true') {
                localStorage.setItem('tw-bau-admin', 'true');
                return true;
            }
            return localStorage.getItem('tw-bau-admin') === 'true';
        }, []);

        // Admin → Dashboard
        if (isAdmin) {
            return <Dashboard />;
        }

        // Worker → Auth Flow
        switch (appState.screen) {
            case 'language':
                return <LanguageSelect onSelect={setLanguage} />;
            case 'register':
                return <Registration lang={appState.language} onSubmit={handleRegister} onBack={() => setScreen('language')} />;
            case 'waiting':
                return <WaitingApproval lang={appState.language} />;
            case 'app':
                return <MobileApp userId={appState.userId} language={appState.language} />;
            default:
                return <LanguageSelect onSelect={setLanguage} />;
        }
    }

    // ═══════════════════════════════════════════════════════
    // APP RENDERN
    // ═══════════════════════════════════════════════════════
    const root = ReactDOM.createRoot(document.getElementById('app-root'));
    root.render(<App />);
    </script>
</body>
</html>
