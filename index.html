    <!-- ===== Globaler Error-Handler ===== -->
    <script>
    window.onerror = function(msg, url, line, col, err) {
        console.error('App Error:', msg, 'Line:', line, err);
        var d = document.getElementById('crash-info');
        if (!d) {
            d = document.createElement('div');
            d.id = 'crash-info';
            d.style.cssText = 'position:fixed;top:20px;left:20px;right:20px;padding:20px;background:#1a2638;color:#ff4757;border:2px solid #c41e1e;border-radius:14px;z-index:99999;font-family:monospace;font-size:13px;max-height:80vh;overflow:auto;';
            document.body.appendChild(d);
        }
        d.innerHTML = '<b>Fehler:</b> ' + msg + '<br><b>Zeile:</b> ' + line +
            '<br><button onclick="this.parentNode.remove()" style="margin-top:10px;padding:8px 16px;background:#1E88E5;color:#fff;border:none;border-radius:8px;cursor:pointer;font-weight:bold">Schliessen</button>';
    };
    </script>

    <!-- ===== Service-Worker-Registrierung ===== -->
    <script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
            navigator.serviceWorker.register('service-worker.js')
                .then(function(reg) { console.log('SW registriert:', reg.scope); })
                .catch(function(err) { console.warn('SW Fehler:', err); });

    <style>
    /* ═══════════════════════════════════════════════════════════
       TW BAUSTELLEN-APP — Etappe 1 v2 — IDENTISCH zur Master-App
       Quelle: tw-design.css der Master-App (1:1 übernommen)
       ═══════════════════════════════════════════════════════════ */

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    button {
        -webkit-tap-highlight-color: rgba(30,136,229,0.2);
        touch-action: manipulation;
        -webkit-user-select: none;
        user-select: none;
        cursor: pointer;
    }

    :root {
        --bg-primary: #0f1923;
        --bg-secondary: #1a2a3c;
        --bg-tertiary: #223448;
        --bg-card: #2a3a50;
        --bg-hover: #324560;
        --accent-red: #c41e1e;
        --accent-red-light: #e63535;
        --accent-blue: #4da6ff;
        --accent-orange: #e67e22;
        --accent-orange-light: #f39c12;
        --text-primary: #e8ecf1;
        --text-secondary: #b0c0d4;
        --text-white: #f0f2f5;
        --text-light: #b8c4d4;
        --text-muted: #8a9ab4;
        --border-color: #2e4562;
        --success: #27ae60;
        --shadow-lg: 0 10px 40px rgba(0,0,0,0.4);
        --shadow-md: 0 4px 20px rgba(0,0,0,0.3);
        --radius-sm: 6px;
        --radius-md: 12px;
        --radius-lg: 20px;
        --safe-top: env(safe-area-inset-top, 0px);
        --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    html, body {
        height: 100%;
        font-family: 'Source Sans 3', -apple-system, sans-serif;
        background: var(--bg-primary);
        color: var(--text-white);
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
    }

    #root {
        min-height: 100%;
        display: flex;
        flex-direction: column;
    }

    /* Schriftgrösse-Toggle (wie Master-App) */
    body.tw-font-large {
        font-size: 1.5em;
    }

    /* ═══════════════════════════════════════════
       LOGO STYLES (1:1 Master-App)
       ═══════════════════════════════════════════ */
    .logo-container {
        display: inline-flex;
        flex-direction: column;
        align-items: flex-start;
        user-select: none;
    }

    .logo-thomas-row {
        display: flex;
        align-items: baseline;
        margin-bottom: -18px;
        padding-left: 1px;
        align-self: flex-start;
        position: relative;
        z-index: 2;
    }

    .logo-thomas-text {
        font-family: 'Source Sans 3', serif;
        font-style: italic;
        font-weight: 700;
        color: var(--accent-red);
        font-size: 14.5px;
        letter-spacing: 0.3px;
    }

    .logo-word-row {
        display: flex;
        align-items: baseline;
        font-family: 'Oswald', sans-serif;
        font-weight: 700;
        color: var(--text-white);
        line-height: 1;
    }

    .logo-w { font-size: 62px; }

    .logo-i-wrap {
        position: relative;
        font-size: 62px;
        display: inline-block;
    }

    .logo-i-wrap .logo-i-char { font-size: 62px; }

    .logo-i-dot {
        position: absolute;
        top: 6px;
        left: 50%;
        transform: translateX(-50%);
        width: 10px;
        height: 10px;
        background: var(--accent-red);
    }

    .logo-LL {
        font-size: 84px;
        letter-spacing: 1px;
        line-height: 0.75;
    }

    .logo-wacher { font-size: 62px; }

    .logo-subtitle-row {
        display: flex;
        justify-content: flex-end;
        width: 100%;
        margin-top: 1px;
    }

    .logo-subtitle-text {
        font-family: 'Source Sans 3', sans-serif;
        font-weight: 600;
        color: var(--accent-red);
        font-size: 14.5px;
        letter-spacing: 2.5px;
    }

    .logo-address {
        font-family: 'Source Sans 3', sans-serif;
        font-weight: 400;
        color: var(--text-muted);
        font-size: 12px;
        letter-spacing: 0.5px;
        margin-top: 10px;
        text-align: center;
        width: 100%;
    }

    /* ═══════════════════════════════════════════
       APP HEADER (1:1 Master-App)
       ═══════════════════════════════════════════ */
    .app-header {
        background: linear-gradient(180deg, var(--bg-secondary) 0%, var(--bg-primary) 100%);
        border-bottom: 1px solid var(--border-color);
        padding: calc(12px + var(--safe-top)) 16px 12px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        position: sticky;
        top: 0;
        z-index: 100;
        gap: 8px;
    }

    .header-title {
        font-family: 'Oswald', sans-serif;
        font-size: 14px;
        font-weight: 500;
        color: var(--text-light);
        letter-spacing: 2px;
        text-transform: uppercase;
        flex: 1;
        text-align: center;
    }

    /* ═══════════════════════════════════════════
       MODUL-TAB-LEISTE (rote Pillen, wie Bild 1)
       ═══════════════════════════════════════════ */
    .modul-tabs {
        display: grid;
        grid-template-columns: repeat(6, 1fr);
        gap: 6px;
        padding: 8px 12px;
        background: var(--bg-secondary);
        border-bottom: 1px solid var(--border-color);
    }

    .modul-tab {
        padding: 10px 4px;
        border: none;
        border-radius: var(--radius-sm);
        background: linear-gradient(135deg, var(--accent-red-light), var(--accent-red));
        color: var(--text-white);
        font-family: 'Oswald', sans-serif;
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.6px;
        cursor: pointer;
        box-shadow: 0 3px 10px rgba(196,30,30,0.3);
        transition: all 0.2s ease;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 3px;
        line-height: 1;
    }

    .modul-tab:active { transform: scale(0.96); }

    .modul-tab.active {
        background: linear-gradient(135deg, #e84040, #ff5252);
        box-shadow: 0 0 0 2px var(--accent-orange), 0 4px 14px rgba(196,30,30,0.5);
    }

    .modul-tab svg {
        width: 18px;
        height: 18px;
        stroke-width: 2;
    }

    /* ═══════════════════════════════════════════
       STARTSEITE (1:1 Master-App)
       ═══════════════════════════════════════════ */
    .startseite {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        padding: 30px 24px calc(24px + var(--safe-bottom));
        position: relative;
        overflow: hidden;
    }

    /* Subtle tile pattern background — der schöne Schachbrett-Effekt */
    .startseite::before {
        content: '';
        position: absolute;
        inset: 0;
        background-image:
            linear-gradient(45deg, rgba(255,255,255,0.015) 25%, transparent 25%),
            linear-gradient(-45deg, rgba(255,255,255,0.015) 25%, transparent 25%),
            linear-gradient(45deg, transparent 75%, rgba(255,255,255,0.015) 75%),
            linear-gradient(-45deg, transparent 75%, rgba(255,255,255,0.015) 75%);
        background-size: 40px 40px;
        background-position: 0 0, 0 20px, 20px -20px, -20px 0;
        pointer-events: none;
    }

    .logo-section {
        position: relative;
        z-index: 1;
        margin-bottom: 30px;
        animation: fadeInDown 0.8s ease-out;
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    @keyframes fadeInDown {
        from { opacity: 0; transform: translateY(-20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    /* ═══════════════════════════════════════════
       UHR-PULSE
       ═══════════════════════════════════════════ */
    .tw-clock-pulse {
        animation: tw-clock-pulse-anim 1s ease-in-out infinite;
    }
    @keyframes tw-clock-pulse-anim {
        0%, 100% { opacity: 1; }
        50%      { opacity: 0.3; }
    }

    /* ═══════════════════════════════════════════
       SPRACH-PILLE (statt Verbindungs-Buttons)
       ═══════════════════════════════════════════ */
    .sprach-pill {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 10px 20px;
        background: var(--bg-secondary);
        border: 1px solid var(--border-color);
        border-radius: 50px;
        color: var(--text-primary);
        font-family: 'Source Sans 3', sans-serif;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        position: relative;
        z-index: 1;
    }

    .sprach-pill:hover { border-color: var(--accent-blue); }
    .sprach-pill .flag { font-size: 20px; }

    /* ═══════════════════════════════════════════
       MODUL-PLATZHALTER
       ═══════════════════════════════════════════ */
    .modul-platzhalter {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 60px 20px;
        gap: 20px;
        position: relative;
        z-index: 1;
    }

    .modul-platzhalter-icon {
        width: 96px;
        height: 96px;
        background: linear-gradient(135deg, var(--bg-card), var(--bg-secondary));
        border: 2px dashed var(--accent-blue);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--accent-blue);
    }
    .modul-platzhalter-icon svg { width: 48px; height: 48px; }

    .modul-platzhalter-titel {
        font-family: 'Oswald', sans-serif;
        font-size: 26px;
        font-weight: 600;
        color: var(--text-white);
        text-transform: uppercase;
        letter-spacing: 2px;
    }

    .modul-platzhalter-text {
        font-size: 15px;
        color: var(--text-light);
        max-width: 320px;
        line-height: 1.5;
    }

    .modul-platzhalter-info {
        margin-top: 12px;
        padding: 14px 20px;
        background: var(--bg-card);
        border-left: 3px solid var(--accent-orange);
        border-radius: var(--radius-sm);
        font-size: 13px;
        color: var(--text-light);
        max-width: 360px;
        text-align: left;
    }

    /* ═══════════════════════════════════════════
       MODAL (Sprach-Auswahl)
       ═══════════════════════════════════════════ */
    .modal-backdrop {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.7);
        backdrop-filter: blur(4px);
        z-index: 1000;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        animation: fade-in 0.2s ease;
    }

    @keyframes fade-in {
        from { opacity: 0; }
        to { opacity: 1; }
    }

    .modal {
        background: var(--bg-secondary);
        border: 1px solid var(--border-color);
        border-radius: var(--radius-lg);
        padding: 24px;
        max-width: 400px;
        width: 100%;
        max-height: 80vh;
        overflow-y: auto;
        box-shadow: var(--shadow-lg);
    }

    .modal-titel {
        font-family: 'Oswald', sans-serif;
        font-size: 18px;
        color: var(--text-white);
        margin-bottom: 16px;
        text-align: center;
        letter-spacing: 1.5px;
        text-transform: uppercase;
    }

    .sprach-liste {
        display: flex;
        flex-direction: column;
        gap: 8px;
    }

    .sprach-option {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 12px 16px;
        background: var(--bg-tertiary);
        border: 1px solid var(--border-color);
        border-radius: var(--radius-md);
        cursor: pointer;
        transition: all 0.15s;
        font-size: 15px;
        color: var(--text-primary);
    }

    .sprach-option:hover {
        border-color: var(--accent-blue);
        background: var(--bg-hover);
    }

    .sprach-option.aktiv {
        border-color: var(--accent-blue);
        background: rgba(77,166,255,0.15);
    }

    .sprach-option .flag { font-size: 24px; }
    .sprach-option .name { flex: 1; font-weight: 600; }
    .sprach-option .check { color: var(--success); font-weight: 700; }

    /* Status unten */
    .status-leiste {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        padding: 8px 12px;
        font-size: 11px;
        color: var(--text-muted);
        position: relative;
        z-index: 1;
    }

    .status-dot {
        display: inline-block;
        width: 8px;
        height: 8px;
        border-radius: 50%;
    }
    .status-dot.online { background: var(--success); box-shadow: 0 0 8px var(--success); }

    </style>
</head>

    /* ═══════════════════════════════════════════════════════════

    filter: blur(3px);
}

/* ─── Individuelle Geh-Charakteristik pro Figur ───
   Jede Figur bekommt eine andere Geschwindigkeit und Phase,
   sodass sie NICHT im Gleichschritt laufen. Das wird erreicht,
   indem wir die Animationen in den Kind-Elementen der Figur
   auf anderen Speed/Delay-Werten laufen lassen. */
.tw-fig-wrap { display: inline-block; }

/* Ivan — schneller, forsch */
.tw-fig-1 .tw-leg-l, .tw-fig-1 .tw-leg-r,
.tw-fig-1 .tw-arm-l, .tw-fig-1 .tw-arm-r { animation-duration: 0.85s; }
.tw-fig-1 .tw-figure { animation-duration: 0.425s; }

/* Michal — gemaechlich, breitbeinig */
.tw-fig-2 .tw-leg-l, .tw-fig-2 .tw-leg-r,
.tw-fig-2 .tw-arm-l, .tw-fig-2 .tw-arm-r { animation-duration: 1.15s; animation-delay: -0.3s; }
.tw-fig-2 .tw-figure { animation-duration: 0.575s; animation-delay: -0.15s; }

/* Iurii — schlurfender Gang, langsamer Oberkoerper */
.tw-fig-3 .tw-leg-l, .tw-fig-3 .tw-leg-r,
.tw-fig-3 .tw-arm-l, .tw-fig-3 .tw-arm-r { animation-duration: 1.25s; animation-delay: -0.6s; }
.tw-fig-3 .tw-figure { animation-duration: 0.75s; animation-delay: -0.3s; }

/* Peter — zuegig, rhythmisch */
.tw-fig-4 .tw-leg-l, .tw-fig-4 .tw-leg-r,
.tw-fig-4 .tw-arm-l, .tw-fig-4 .tw-arm-r { animation-duration: 0.95s; animation-delay: -0.1s; }
.tw-fig-4 .tw-figure { animation-duration: 0.475s; }

/* Luca (AM) — locker, entspannt */
.tw-fig-5 .tw-leg-l, .tw-fig-5 .tw-leg-r,
.tw-fig-5 .tw-arm-l, .tw-fig-5 .tw-arm-r { animation-duration: 1.05s; animation-delay: -0.4s; }
.tw-fig-5 .tw-figure { animation-duration: 0.525s; animation-delay: -0.2s; }

/* Luca 2 — sehr flott */
.tw-fig-6 .tw-leg-l, .tw-fig-6 .tw-leg-r,
.tw-fig-6 .tw-arm-l, .tw-fig-6 .tw-arm-r { animation-duration: 0.8s; animation-delay: -0.2s; }
.tw-fig-6 .tw-figure { animation-duration: 0.4s; }

/* Silke — elegant, ruhig */
.tw-fig-7 .tw-leg-l, .tw-fig-7 .tw-leg-r,
.tw-fig-7 .tw-arm-l, .tw-fig-7 .tw-arm-r { animation-duration: 1.1s; animation-delay: -0.5s; }
.tw-fig-7 .tw-figure { animation-duration: 0.55s; animation-delay: -0.25s; }

.tw-group {
    left: -400px;
    opacity: 0;
    animation: twGroupWalk 45s linear infinite;
}
.tw-group-1 { animation-delay: 0s; }
.tw-group-2 { animation-delay: 15s; }
.tw-group-3 { animation-delay: 30s; }
@keyframes twGroupWalk {
    0%    { left: -400px; opacity: 1; }
    33.3% { left: 100%; opacity: 1; }
    33.4% { left: 100%; opacity: 0; }
    100%  { left: 100%; opacity: 0; }
}
`}} />
                </div>
            );
        }

    /* ═══════════════════════════════════════════════════════════
       UHR-BLOCK (1:1 aus Master-App tw-aufmass.jsx Z. 217-274)
       ═══════════════════════════════════════════════════════════ */
    function UhrBlock({ lang }) {
        const [currentTime, setCurrentTime] = useState(new Date());

        useEffect(() => {
            const t = setInterval(() => setCurrentTime(new Date()), 1000);
            return () => clearInterval(t);
        }, []);

        // Sprach-spezifische Wochentage und Monate
        const tageMap = {
            de: ['Sonntag','Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'],
            cs: ['Nedele','Pondeli','Utery','Streda','Ctvrtek','Patek','Sobota'],
            sk: ['Nedela','Pondelok','Utorok','Streda','Stvrtok','Piatok','Sobota'],
            pl: ['Niedziela','Poniedzialek','Wtorek','Sroda','Czwartek','Piatek','Sobota'],
            en: ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'],
            ro: ['Duminica','Luni','Marti','Miercuri','Joi','Vineri','Sambata'],
            uk: ['Nedilya','Ponedilok','Vivtorok','Sereda','Chetver','Pyatnytsya','Subota']
        };
        const monateMap = {
            de: ['Januar','Februar','M\u00e4rz','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'],
            cs: ['Leden','Unor','Brezen','Duben','Kveten','Cerven','Cervenec','Srpen','Zari','Rijen','Listopad','Prosinec'],
            sk: ['Januar','Februar','Marec','April','Maj','Jun','Jul','August','September','Oktober','November','December'],
            pl: ['Styczen','Luty','Marzec','Kwiecien','Maj','Czerwiec','Lipiec','Sierpien','Wrzesien','Pazdziernik','Listopad','Grudzien'],
            en: ['January','February','March','April','May','June','July','August','September','October','November','December'],
            ro: ['Ianuarie','Februarie','Martie','Aprilie','Mai','Iunie','Iulie','August','Septembrie','Octombrie','Noiembrie','Decembrie'],
            uk: ['Sichen','Lyutyi','Berezen','Kviten','Traven','Cherven','Lypen','Serpen','Veresen','Zhovten','Lystopad','Hruden']
        };
        const tage = tageMap[lang] || tageMap.de;
        const monate = monateMap[lang] || monateMap.de;

        const tag = tage[currentTime.getDay()];
        const datum = currentTime.getDate() + '. ' + monate[currentTime.getMonth()] + ' ' + currentTime.getFullYear();
        const stunden = String(currentTime.getHours()).padStart(2,'0');
        const minuten = String(currentTime.getMinutes()).padStart(2,'0');
        const sekunden = String(currentTime.getSeconds()).padStart(2,'0');

        return (
            <div style={{
                margin:'0 0 12px', padding:'24px 20px',
                background:'linear-gradient(135deg, rgba(15,25,35,0.95) 0%, rgba(20,40,70,0.9) 100%)',
                borderRadius:'20px', textAlign:'center', position:'relative', overflow:'hidden',
                border:'1px solid rgba(77,166,255,0.2)',
                boxShadow:'0 8px 32px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.05)',
                width: '100%', maxWidth: '480px',
                zIndex: 1
            }}>
                <div style={{position:'absolute', top:'-20px', right:'-20px', width:'120px', height:'120px', background:'radial-gradient(circle, rgba(77,166,255,0.15) 0%, transparent 70%)', borderRadius:'50%'}} />
                <div style={{position:'absolute', bottom:'-15px', left:'-15px', width:'80px', height:'80px', background:'radial-gradient(circle, rgba(46,204,113,0.1) 0%, transparent 70%)', borderRadius:'50%'}} />

                <div style={{fontSize:'12px', fontWeight:'600', color:'rgba(77,166,255,0.7)', letterSpacing:'5px', textTransform:'uppercase', marginBottom:'8px'}}>
                    {tag}
                </div>

                <div style={{
                    fontSize:'64px', fontWeight:'200', color:'#ffffff', letterSpacing:'6px',
                    fontFamily:'"SF Pro Display", "Helvetica Neue", system-ui, sans-serif',
                    lineHeight:'1', marginBottom:'10px', position:'relative'
                }}>
                    <span style={{fontWeight:'300'}}>{stunden}</span>
                    <span className="tw-clock-pulse" style={{color:'var(--accent-blue)', fontWeight:'100'}}>:</span>
                    <span style={{fontWeight:'300'}}>{minuten}</span>
                    <span style={{fontSize:'28px', fontWeight:'200', color:'rgba(255,255,255,0.35)', marginLeft:'4px', verticalAlign:'super'}}>{sekunden}</span>
                </div>

                <div style={{fontSize:'16px', fontWeight:'500', color:'rgba(255,255,255,0.6)', letterSpacing:'1.5px'}}>
                    {datum}
                </div>

                <div style={{margin:'14px auto 0', width:'60px', height:'2px', background:'linear-gradient(90deg, transparent, rgba(77,166,255,0.4), transparent)', borderRadius:'1px'}} />
            </div>
        );
    }

    /* ═══════════════════════════════════════════════════════════
       SPRACH-MODAL
       ═══════════════════════════════════════════════════════════ */
    function SprachModal({ aktuell, onWaehle, onSchliessen }) {
        return (
            <div className="modal-backdrop" onClick={onSchliessen}>
                <div className="modal" onClick={e => e.stopPropagation()}>
                    <div className="modal-titel">{t('sprache_waehlen', aktuell)}</div>
                    <div className="sprach-liste">
                        {SPRACHEN.map(s => (
                            <div key={s.code}
                                 className={'sprach-option' + (s.code === aktuell ? ' aktiv' : '')}
                                 onClick={() => onWaehle(s.code)}>
                                <span className="flag">{s.flag}</span>
                                <span className="name">{s.name}</span>
                                {s.code === aktuell && <span className="check">✓</span>}
                            </div>
                        ))}
                    </div>
                </div>
            </div>
        );
    }

    /* ═══════════════════════════════════════════════════════════
       STARTSEITE (1:1 Master-App-Optik, OHNE die 5 Verbindungs-Buttons)
       ═══════════════════════════════════════════════════════════ */
    function MAStartseite({ lang, onSprachOeffnen }) {
        const aktSprache = SPRACHEN.find(s => s.code === lang) || SPRACHEN[0];
        return (
            <div className="startseite">
                {/* FIRMEN-HEADER (identisch Master-App) */}
                <div className="logo-section">
                    <FirmenLogo size="large" />
                    <div className="logo-address">
                        Flurweg 14a · 56472 Nisterau · Tel. 02661-63101
                    </div>
                    <div style={{marginTop:'8px', fontSize:'13px', fontWeight:'700', color:'var(--accent-blue)', letterSpacing:'2px', textTransform:'uppercase'}}>
                        {t('baustellen_app', lang)}
                    </div>
                </div>

                {/* UHR-BLOCK */}
                <UhrBlock lang={lang} />

                {/* SPRACH-PILLE (statt der 5 Verbindungs-Buttons!) */}
                <button className="sprach-pill" onClick={onSprachOeffnen}>
                    <span className="flag">{aktSprache.flag}</span>
                    <span>{aktSprache.name}</span>
                    <span style={{fontSize: 11, color: 'var(--text-muted)'}}>▼</span>
                </button>

                {/* BAUTEAM-ANIMATION (1:1 Master-App) */}
                <BauteamAnimation />

                {/* Status */}
                <div className="status-leiste">
                    <span className="status-dot online"/>
                    <span>{t('online', lang)}</span>
                    <span style={{color: 'var(--text-muted)'}}>·</span>
                    <span>v{APP_VERSION}</span>
                </div>
            </div>
        );
    }

    /* ═══════════════════════════════════════════════════════════
       MODUL-PLATZHALTER (Module 2-6, kommen in späteren Etappen)
       ═══════════════════════════════════════════════════════════ */
    function ModulPlatzhalter({ lang, titel, IconComp }) {
        return (
            <div className="modul-platzhalter">
                <div className="modul-platzhalter-icon">
                    <IconComp/>
                </div>
                <div className="modul-platzhalter-titel">{titel}</div>
                <div className="modul-platzhalter-text">
                    {t('modul_im_bau_text', lang)}
                </div>
                <div className="modul-platzhalter-info">
                    🏗️ {t('modul_etappe', lang)}
                </div>
            </div>
        );
    }

    /* ═══════════════════════════════════════════════════════════
       NAV-HEADER (rot, wie Master-App)
       ═══════════════════════════════════════════════════════════ */
    function NavHeader({ lang, onBack, onForward, fontLarge, onToggleFont }) {
        const redBtnStyle = (active) => ({
            padding: '8px 14px',
            borderRadius: '8px',
            border: 'none',
            cursor: 'pointer',
            background: active
                ? 'linear-gradient(135deg, #e84040, #ff5252)'
                : 'linear-gradient(135deg, var(--accent-red-light), var(--accent-red))',
            color: '#fff',
            fontSize: '12px',
            fontWeight: '700',
            fontFamily: 'Oswald, sans-serif',
            textTransform: 'uppercase',
            letterSpacing: '0.6px',
            boxShadow: '0 3px 10px rgba(196,30,30,0.3)',
            transition: 'all 0.2s ease',
            whiteSpace: 'nowrap'
        });

        return (
            <header className="app-header">
                <div style={{display:'flex', gap:'6px'}}>
                    <button style={redBtnStyle(false)} onClick={onBack}>{t('zurueck', lang)}</button>
                    <button style={redBtnStyle(false)} onClick={onForward}>{t('vor', lang)}</button>
                </div>
                <span className="header-title">{t('baustellen_app', lang)}</span>
                <button style={Object.assign(redBtnStyle(fontLarge), {padding:'8px 12px'})}
                        onClick={onToggleFont}>
                    {fontLarge ? t('gross_klein_zurueck', lang) : t('gross_klein', lang)}
                </button>
            </header>
        );
    }

    /* ═══════════════════════════════════════════════════════════
       TOP-LEVEL APP
       ═══════════════════════════════════════════════════════════ */
    function MAApp() {
        const [lang, setLang] = useState(() => localStorage.getItem('tw-ma-sprache') || 'de');
        const [fontLarge, setFontLarge] = useState(() => localStorage.getItem('tw_font_scale') === 'large');
        const [aktiverTab, setAktiverTab] = useState('start');
        const [sprachModalOffen, setSprachModalOffen] = useState(false);

        useEffect(() => {
            if (fontLarge) {
                document.body.classList.add('tw-font-large');
                localStorage.setItem('tw_font_scale', 'large');
            } else {
                document.body.classList.remove('tw-font-large');
                localStorage.setItem('tw_font_scale', 'normal');
            }
        }, [fontLarge]);

        useEffect(() => {
            localStorage.setItem('tw-ma-sprache', lang);
        }, [lang]);

        const tabs = [
            { id: 'start',       label: t('start', lang),       Icon: Icon.Home },
            { id: 'baustellen',  label: t('baustellen', lang),  Icon: Icon.Helm },
            { id: 'kalender',    label: t('kalender', lang),    Icon: Icon.Kalender },
            { id: 'fotos',       label: t('fotos', lang),       Icon: Icon.Kamera },
            { id: 'stunden',     label: t('stunden', lang),     Icon: Icon.Uhr },
            { id: 'nachrichten', label: t('nachrichten', lang), Icon: Icon.Sprechblase }
        ];

        return (
            <>
                <NavHeader lang={lang}
                           onBack={() => history.back()}
                           onForward={() => history.forward()}
                           fontLarge={fontLarge}
                           onToggleFont={() => setFontLarge(f => !f)} />

                <div className="modul-tabs">
                    {tabs.map(tab => (
                        <button key={tab.id}
                                className={'modul-tab' + (aktiverTab === tab.id ? ' active' : '')}
                                onClick={() => setAktiverTab(tab.id)}>
                            <tab.Icon/>
                            <span>{tab.label}</span>
                        </button>
                    ))}
                </div>

                {aktiverTab === 'start' && (
                    <MAStartseite lang={lang} onSprachOeffnen={() => setSprachModalOffen(true)}/>
                )}
                {aktiverTab === 'baustellen' && (
                    <ModulPlatzhalter lang={lang} titel={t('baustellen', lang)} IconComp={Icon.Helm}/>
                )}
                {aktiverTab === 'kalender' && (
                    <ModulPlatzhalter lang={lang} titel={t('kalender', lang)} IconComp={Icon.Kalender}/>
                )}
                {aktiverTab === 'fotos' && (
                    <ModulPlatzhalter lang={lang} titel={t('fotos', lang)} IconComp={Icon.Kamera}/>
                )}
                {aktiverTab === 'stunden' && (
                    <ModulPlatzhalter lang={lang} titel={t('stunden', lang)} IconComp={Icon.Uhr}/>
                )}
                {aktiverTab === 'nachrichten' && (
                    <ModulPlatzhalter lang={lang} titel={t('nachrichten', lang)} IconComp={Icon.Sprechblase}/>
                )}

                {sprachModalOffen && (
                    <SprachModal aktuell={lang}
                                 onWaehle={(c) => { setLang(c); setSprachModalOffen(false); }}
                                 onSchliessen={() => setSprachModalOffen(false)}/>
                )}
            </>
        );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<MAApp/>);
    </script>
</body>
</html>
