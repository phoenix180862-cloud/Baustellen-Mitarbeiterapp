    <!-- ===== Globaler Error-Handler ===== -->
    <script>
    window.onerror = function(msg, url, line, col, err) {
        try { console.error('App Error:', msg, 'Line:', line, err); } catch(_){}
        var d = document.getElementById('crash-info');
        if (!d) {
            d = document.createElement('div');
            d.id = 'crash-info';
            d.style.cssText = 'position:fixed;top:20px;left:20px;right:20px;padding:20px;background:#1a2638;color:#ff4757;border:2px solid #c41e1e;border-radius:14px;z-index:99999;font-family:monospace;font-size:13px;max-height:80vh;overflow:auto;';
            if (document.body) document.body.appendChild(d);
            else document.addEventListener('DOMContentLoaded', function(){ document.body.appendChild(d); });
        }
        // Hinweis fuer haeufige Ursachen
        var hint = '';
        if (msg && msg.indexOf && msg.indexOf('is not defined') !== -1) {
            hint = '<div style="margin-top:10px;padding:10px;background:rgba(255,255,255,0.06);border-radius:8px;color:#ffd43b;font-size:12px">'
                 + '<b>Tipp:</b> Dieser Fehler deutet auf einen Cache-Konflikt hin. Bitte Browser-Cache leeren oder App neu installieren.'
                 + '</div>';
        }
        d.innerHTML = '<b>Fehler:</b> ' + msg + '<br><b>Zeile:</b> ' + line + hint +
            '<br><button onclick="this.parentNode.remove()" style="margin-top:10px;padding:8px 16px;background:#1E88E5;color:#fff;border:none;border-radius:8px;cursor:pointer;font-weight:bold">Schliessen</button>';
    };
    </script>

    <!-- ===== Service-Worker-Registrierung mit Cache-Killer ===== -->
    <script>
    (function() {
        if (!('serviceWorker' in navigator)) return;

        // Cache-Killer: Einmalig alle alten Caches und SW loeschen,
        // wenn noch kein Marker fuer diese Version gesetzt ist.
        var VERSION_MARKER = 'tw-ma-cache-killed-v0.8.2-keys-builtin';
        try {
            if (!localStorage.getItem(VERSION_MARKER)) {
                // Alle bestehenden SW deregistrieren
                navigator.serviceWorker.getRegistrations().then(function(regs) {
                    regs.forEach(function(r) { r.unregister(); });
                });
                // Alle Caches leeren
                if (window.caches) {
                    caches.keys().then(function(keys) {
                        keys.forEach(function(k) { caches.delete(k); });
                    });
                }
                localStorage.setItem(VERSION_MARKER, '1');
                console.log('TW-MA: Altcache bereinigt');
            }
        } catch (e) { /* Privacy-Mode: kein localStorage */ }

        window.addEventListener('load', function() {
            navigator.serviceWorker.register('service-worker.js')
                .then(function(reg) { console.log('SW registriert:', reg.scope); })
                .catch(function(err) { console.warn('SW Fehler:', err); });
        });
    })();
    </script>

/* ========== js/tw-ma-core.js ========== */
// ============================================================
// TW Baustellen-App  -  Core (Etappe 3)
// ============================================================
// Logger, Geraete-ID, PIN-Hash (SHA-256), Code-Generator,
// ExitGuard-Skelett.
// ============================================================

(function(global) {
    'use strict';

    const VERSION = '0.4.0';

    // ===== Mini-Logger ========================================
    const log = function(level, area, msg, data) {
        const ts = new Date().toISOString().substring(11, 19);
        const prefix = '[' + ts + '][' + area + ']';
        if (level === 'error') console.error(prefix, msg, data || '');
        else if (level === 'warn') console.warn(prefix, msg, data || '');
        else console.log(prefix, msg, data || '');
    };

    // ===== Geraete-ID (UUID v4 in localStorage) ==============
    const STORAGE_KEY_DEVICE = 'tw_ma_device_id';

    function getOrCreateDeviceId() {
        let id = null;
        try { id = localStorage.getItem(STORAGE_KEY_DEVICE); } catch (e) {}
        if (!id) {
            id = 'dev-' + (crypto.randomUUID ? crypto.randomUUID() : (Date.now() + '-' + Math.random().toString(36).substring(2, 10)));
            try { localStorage.setItem(STORAGE_KEY_DEVICE, id); } catch (e) {}
        }
        return id;
    }

    function clearDeviceId() {
        try { localStorage.removeItem(STORAGE_KEY_DEVICE); } catch (e) {}
    }

    // ===== 6-stelliger Anmelde-Code ==========================
    function generateAnmeldeCode() {
        // 100000-999999, kein fuehrender Null
        return String(Math.floor(100000 + Math.random() * 900000));
    }

    // ===== SHA-256-Hash (fuer PIN) ===========================
    async function sha256(text) {
        const buf = new TextEncoder().encode(text);
        const hashBuf = await crypto.subtle.digest('SHA-256', buf);
        const bytes = Array.from(new Uint8Array(hashBuf));
        return bytes.map(function(b) { return b.toString(16).padStart(2, '0'); }).join('');
    }

    // PIN + Geraete-ID als Salt -> stabilerer Hash
    async function hashPin(pin, deviceId) {
        return sha256((pin || '') + '::' + (deviceId || ''));
    }

    // ===== Komplett-Wipe (bei 5 falschen PIN) ================
    async function wipeApp() {
        log('warn', 'Core', 'WIPE ausgeloest - loesche alles lokal');
        try { localStorage.clear(); } catch (e) {}
        try { sessionStorage.clear(); } catch (e) {}
        // IndexedDB
        if (window.indexedDB) {
            try {
                const dbs = await (indexedDB.databases ? indexedDB.databases() : Promise.resolve([]));
                for (const d of dbs) { if (d.name) indexedDB.deleteDatabase(d.name); }
            } catch (e) { log('warn', 'Core', 'IndexedDB-Wipe', e); }
        }
        // Service-Worker-Caches
        if (window.caches) {
            try {
                const names = await caches.keys();
                await Promise.all(names.map(function(n) { return caches.delete(n); }));
            } catch (e) { log('warn', 'Core', 'Cache-Wipe', e); }
        }
    }

    // ===== Public API =========================================
    global.TWMACore = {
        VERSION:             VERSION,
        log:                 log,
        getDeviceId:         getOrCreateDeviceId,
        clearDeviceId:       clearDeviceId,
        generateAnmeldeCode: generateAnmeldeCode,
        sha256:              sha256,
        hashPin:             hashPin,
        wipeApp:             wipeApp,

        // Vollausbau in spaeteren Etappen:
        registerExitGuard: function(check) { /* TODO Etappe 5 */ },
        clearExitGuards:   function() { /* TODO Etappe 5 */ }
    };

    log('info', 'Core', 'TWMACore initialisiert v' + VERSION);
})(window);

/* ========== js/tw-ma-storage.js ========== */
// ============================================================
// TW Baustellen-App  -  Storage (Etappe 5 Vollausbau)
// ============================================================
// IndexedDB-Wrapper fuer Offline-Speicher.
//
// Stores:
//   fotos              { id, baustelle_id, raum_id, phase, wand_id,
//                        foto_blob, thumb_blob, notiz_original,
//                        notiz_deutsch, aufgenommen_am,
//                        aufgenommen_von, sync_status, upload_name }
//   raeume             { id, baustelle_id, bezeichnung, raum_nr,
//                        geschoss, wand_zahl, wand_labels[], ts }
//   sync_queue         { id(auto), foto_id, attempts, last_error,
//                        next_try_at }
//   wip                { modul, data }
//   translation_cache  { key, text, ts }
//   settings           { key, value }
// ============================================================

(function(global) {
    'use strict';

    const DB_NAME = 'tw-ma-db';
    const DB_VERSION = 3;  // v2: raeume, v3: stunden

    let dbPromise = null;

    function openDb() {
        if (dbPromise) return dbPromise;
        dbPromise = new Promise(function(resolve, reject) {
            const req = indexedDB.open(DB_NAME, DB_VERSION);
            req.onupgradeneeded = function(e) {
                const db = e.target.result;
                const tx = e.target.transaction;

                // Store 'fotos' - neu anlegen oder Indexe nachruesten
                let fotosStore;
                if (!db.objectStoreNames.contains('fotos')) {
                    fotosStore = db.createObjectStore('fotos', { keyPath: 'id' });
                } else {
                    fotosStore = tx.objectStore('fotos');
                }
                if (!fotosStore.indexNames.contains('baustelle'))
                    fotosStore.createIndex('baustelle', 'baustelle_id', { unique: false });
                if (!fotosStore.indexNames.contains('sync_status'))
                    fotosStore.createIndex('sync_status', 'sync_status', { unique: false });
                if (!fotosStore.indexNames.contains('raum_phase'))
                    fotosStore.createIndex('raum_phase', ['baustelle_id', 'raum_id', 'phase'], { unique: false });

                // Store 'sync_queue'
                let queueStore;
                if (!db.objectStoreNames.contains('sync_queue')) {
                    queueStore = db.createObjectStore('sync_queue', { keyPath: 'id', autoIncrement: true });
                } else {
                    queueStore = tx.objectStore('sync_queue');
                }
                if (!queueStore.indexNames.contains('foto_id'))
                    queueStore.createIndex('foto_id', 'foto_id', { unique: false });
                if (!queueStore.indexNames.contains('next_try_at'))
                    queueStore.createIndex('next_try_at', 'next_try_at', { unique: false });

                if (!db.objectStoreNames.contains('wip'))
                    db.createObjectStore('wip', { keyPath: 'modul' });
                if (!db.objectStoreNames.contains('translation_cache'))
                    db.createObjectStore('translation_cache', { keyPath: 'key' });
                if (!db.objectStoreNames.contains('settings'))
                    db.createObjectStore('settings', { keyPath: 'key' });

                // v2: Raeume-Store
                if (!db.objectStoreNames.contains('raeume')) {
                    const raeume = db.createObjectStore('raeume', { keyPath: 'id' });
                    raeume.createIndex('baustelle', 'baustelle_id', { unique: false });
                }

                // v3: Stunden-Store (Etappe 6)
                //   { id, datum (YYYY-MM-DD), baustelle_id, baustelle_name,
                //     mitarbeiter_id, anfang, ende, pause_min, netto_min,
                //     taetigkeiten[], material[], bemerkung_original, bemerkung_deutsch,
                //     wetter, pdf_blob, upload_name, sync_status, ts }
                if (!db.objectStoreNames.contains('stunden')) {
                    const stunden = db.createObjectStore('stunden', { keyPath: 'id' });
                    stunden.createIndex('datum', 'datum', { unique: false });
                    stunden.createIndex('sync_status', 'sync_status', { unique: false });
                }
            };
            req.onsuccess = function() { resolve(req.result); };
            req.onerror = function() { reject(req.error); };
        });
        return dbPromise;
    }

    // ===== Helper: Promise-Wrap fuer Transaktion =====
    function txPromise(storeName, mode, cb) {
        return openDb().then(function(db) {
            return new Promise(function(resolve, reject) {
                const tx = db.transaction(storeName, mode);
                const store = tx.objectStore(storeName);
                let result;
                try {
                    result = cb(store, tx);
                } catch (e) {
                    reject(e); return;
                }
                tx.oncomplete = function() { resolve(result); };
                tx.onerror    = function() { reject(tx.error); };
                tx.onabort    = function() { reject(tx.error); };
            });
        });
    }

    function reqPromise(req) {
        return new Promise(function(resolve, reject) {
            req.onsuccess = function() { resolve(req.result); };
            req.onerror   = function() { reject(req.error); };
        });
    }

    // ===== Settings =====
    function getSetting(key) {
        return openDb().then(function(db) {
            return new Promise(function(resolve, reject) {
                const tx = db.transaction('settings', 'readonly');
                const req = tx.objectStore('settings').get(key);
                req.onsuccess = function() { resolve(req.result ? req.result.value : null); };
                req.onerror = function() { reject(req.error); };
            });
        });
    }

    function setSetting(key, value) {
        return openDb().then(function(db) {
            return new Promise(function(resolve, reject) {
                const tx = db.transaction('settings', 'readwrite');
                const req = tx.objectStore('settings').put({ key: key, value: value });
                req.onsuccess = function() { resolve(); };
                req.onerror = function() { reject(req.error); };
            });
        });
    }

    // ===== Fotos =====
    function saveFoto(foto) {
        if (!foto || !foto.id) return Promise.reject(new Error('Foto ohne ID'));
        return txPromise('fotos', 'readwrite', function(store) {
            store.put(foto);
        });
    }

    function getFoto(id) {
        return openDb().then(function(db) {
            return reqPromise(db.transaction('fotos', 'readonly').objectStore('fotos').get(id));
        });
    }

    function deleteFoto(id) {
        return txPromise('fotos', 'readwrite', function(store) {
            store.delete(id);
        });
    }

    function listFotos(filter) {
        filter = filter || {};
        return openDb().then(function(db) {
            return new Promise(function(resolve, reject) {
                const tx = db.transaction('fotos', 'readonly');
                const store = tx.objectStore('fotos');
                const results = [];
                let cursorReq;
                if (filter.baustelle_id && filter.raum_id && filter.phase) {
                    cursorReq = store.index('raum_phase').openCursor(
                        IDBKeyRange.only([filter.baustelle_id, filter.raum_id, filter.phase])
                    );
                } else if (filter.baustelle_id) {
                    cursorReq = store.index('baustelle').openCursor(IDBKeyRange.only(filter.baustelle_id));
                } else if (filter.sync_status) {
                    cursorReq = store.index('sync_status').openCursor(IDBKeyRange.only(filter.sync_status));
                } else {
                    cursorReq = store.openCursor();
                }
                cursorReq.onsuccess = function(e) {
                    const cur = e.target.result;
                    if (!cur) { resolve(results); return; }
                    const val = cur.value;
                    // Zusaetzliche In-Memory-Filter
                    let ok = true;
                    if (filter.wand_id && val.wand_id !== filter.wand_id) ok = false;
                    if (filter.phase && val.phase !== filter.phase) ok = false;
                    if (filter.raum_id && val.raum_id !== filter.raum_id) ok = false;
                    if (filter.allgemein_only && !(val.wand_id || '').toString().startsWith('allgemein')) ok = false;
                    if (ok) results.push(val);
                    cur.continue();
                };
                cursorReq.onerror = function() { reject(cursorReq.error); };
            });
        });
    }

    function countFotosByStatus(status) {
        return openDb().then(function(db) {
            return new Promise(function(resolve, reject) {
                const idx = db.transaction('fotos', 'readonly').objectStore('fotos').index('sync_status');
                const req = idx.count(IDBKeyRange.only(status));
                req.onsuccess = function() { resolve(req.result || 0); };
                req.onerror   = function() { reject(req.error); };
            });
        });
    }

    // ===== Raeume =====
    function saveRaum(raum) {
        if (!raum || !raum.id) return Promise.reject(new Error('Raum ohne ID'));
        return txPromise('raeume', 'readwrite', function(store) {
            store.put(raum);
        });
    }

    function getRaum(id) {
        return openDb().then(function(db) {
            return reqPromise(db.transaction('raeume', 'readonly').objectStore('raeume').get(id));
        });
    }

    function listRaeume(baustelleId) {
        return openDb().then(function(db) {
            return new Promise(function(resolve, reject) {
                const idx = db.transaction('raeume', 'readonly').objectStore('raeume').index('baustelle');
                const results = [];
                const cursorReq = idx.openCursor(IDBKeyRange.only(baustelleId));
                cursorReq.onsuccess = function(e) {
                    const cur = e.target.result;
                    if (!cur) { resolve(results); return; }
                    results.push(cur.value);
                    cur.continue();
                };
                cursorReq.onerror = function() { reject(cursorReq.error); };
            });
        });
    }

    function deleteRaum(id) {
        return txPromise('raeume', 'readwrite', function(store) { store.delete(id); });
    }

    // ===== Sync-Queue =====
    function enqueueSync(item) {
        // item: { foto_id, attempts?, last_error?, next_try_at? }
        item = Object.assign({
            attempts: 0, last_error: null, next_try_at: Date.now()
        }, item);
        return txPromise('sync_queue', 'readwrite', function(store) {
            store.add(item);
        });
    }

    function listPendingSyncItems(limit) {
        limit = limit || 50;
        return openDb().then(function(db) {
            return new Promise(function(resolve, reject) {
                const now = Date.now();
                const results = [];
                const idx = db.transaction('sync_queue', 'readonly').objectStore('sync_queue').index('next_try_at');
                const cursorReq = idx.openCursor(IDBKeyRange.upperBound(now));
                cursorReq.onsuccess = function(e) {
                    const cur = e.target.result;
                    if (!cur || results.length >= limit) { resolve(results); return; }
                    results.push(cur.value);
                    cur.continue();
                };
                cursorReq.onerror = function() { reject(cursorReq.error); };
            });
        });
    }

    function updateSyncItem(id, patch) {
        return openDb().then(function(db) {
            return new Promise(function(resolve, reject) {
                const tx = db.transaction('sync_queue', 'readwrite');
                const store = tx.objectStore('sync_queue');
                const getReq = store.get(id);
                getReq.onsuccess = function() {
                    const rec = getReq.result;
                    if (!rec) { resolve(false); return; }
                    const merged = Object.assign(rec, patch);
                    const putReq = store.put(merged);
                    putReq.onsuccess = function() { resolve(true); };
                    putReq.onerror   = function() { reject(putReq.error); };
                };
                getReq.onerror = function() { reject(getReq.error); };
            });
        });
    }

    function removeSyncItem(id) {
        return txPromise('sync_queue', 'readwrite', function(store) { store.delete(id); });
    }

    function removeSyncItemsByFotoId(fotoId) {
        return openDb().then(function(db) {
            return new Promise(function(resolve, reject) {
                const tx = db.transaction('sync_queue', 'readwrite');
                const idx = tx.objectStore('sync_queue').index('foto_id');
                const req = idx.openCursor(IDBKeyRange.only(fotoId));
                req.onsuccess = function(e) {
                    const cur = e.target.result;
                    if (!cur) { resolve(); return; }
                    cur.delete();
                    cur.continue();
                };
                req.onerror = function() { reject(req.error); };
            });
        });
    }

    function countPendingSyncItems() {
        return openDb().then(function(db) {
            return new Promise(function(resolve, reject) {
                const req = db.transaction('sync_queue', 'readonly').objectStore('sync_queue').count();
                req.onsuccess = function() { resolve(req.result || 0); };
                req.onerror   = function() { reject(req.error); };
            });
        });
    }

    // ===== WIP (Etappe 6) =====
    function saveWip(modul, data) {
        return txPromise('wip', 'readwrite', function(store) {
            store.put({ modul: modul, data: data, ts: Date.now() });
        });
    }

    function loadWip(modul) {
        return openDb().then(function(db) {
            return reqPromise(db.transaction('wip', 'readonly').objectStore('wip').get(modul))
                .then(function(r) { return r ? r.data : null; });
        });
    }

    // ===== Speicher-Quota =====
    async function getSpeicherQuota() {
        if (navigator.storage && navigator.storage.estimate) {
            try {
                const est = await navigator.storage.estimate();
                return {
                    usage: est.usage || 0,
                    quota: est.quota || 0,
                    usage_mb: Math.round((est.usage || 0) / 1024 / 1024),
                    quota_mb: Math.round((est.quota || 0) / 1024 / 1024)
                };
            } catch (_) { /* fallthrough */ }
        }
        return { usage: 0, quota: 0, usage_mb: 0, quota_mb: 0 };
    }

    // ===== Stunden (Etappe 6) =====
    function saveStunde(stunde) {
        if (!stunde || !stunde.id) return Promise.reject(new Error('Stunde ohne ID'));
        return txPromise('stunden', 'readwrite', function(store) {
            store.put(stunde);
        });
    }

    function getStunde(id) {
        return openDb().then(function(db) {
            return reqPromise(db.transaction('stunden', 'readonly').objectStore('stunden').get(id));
        });
    }

    function deleteStunde(id) {
        return txPromise('stunden', 'readwrite', function(store) { store.delete(id); });
    }

    function listStunden(filter) {
        filter = filter || {};
        return openDb().then(function(db) {
            return new Promise(function(resolve, reject) {
                const store = db.transaction('stunden', 'readonly').objectStore('stunden');
                const results = [];
                const cursorReq = store.openCursor();
                cursorReq.onsuccess = function(e) {
                    const cur = e.target.result;
                    if (!cur) { resolve(results); return; }
                    const v = cur.value;
                    let ok = true;
                    if (filter.datum_ab && v.datum < filter.datum_ab) ok = false;
                    if (filter.datum_bis && v.datum > filter.datum_bis) ok = false;
                    if (filter.datum && v.datum !== filter.datum) ok = false;
                    if (ok) results.push(v);
                    cur.continue();
                };
                cursorReq.onerror = function() { reject(cursorReq.error); };
            });
        });
    }

    // ===== Public API =====
    global.TWMAStorage = {
        openDb: openDb,
        getSetting: getSetting,
        setSetting: setSetting,

        // Fotos
        saveFoto:            saveFoto,
        getFoto:             getFoto,
        deleteFoto:          deleteFoto,
        listFotos:           listFotos,
        countFotosByStatus:  countFotosByStatus,

        // Raeume
        saveRaum:   saveRaum,
        getRaum:    getRaum,
        listRaeume: listRaeume,
        deleteRaum: deleteRaum,

        // Stunden (Etappe 6)
        saveStunde:   saveStunde,
        getStunde:    getStunde,

// ============================================================
// TW Baustellen-App  -  Firebase (Etappe 3)
// ============================================================
// Scharf geschaltet: Realtime-DB-Anbindung fuer:
// - Geraete-Onboarding (Freigabe-Request, Status-Polling)
// - PIN-Hash speichern
// - Heartbeat (letzter-online-Zeitstempel)
// - Remote-Wipe-Erkennung
// ============================================================

(function(global) {
    'use strict';

    let initialized = false;
    let db = null;

    // ===== Init ==============================================
    function init(customConfig) {
        if (initialized) return true;
        const cfg = customConfig || (global.TWMAConfig && global.TWMAConfig.FIREBASE_CONFIG);
        if (!cfg || !cfg.apiKey) {
            if (window.TWMACore) TWMACore.log('warn', 'Firebase', 'Keine apiKey in Config - init uebersprungen');
            return false;
        }
        try {
            if (typeof firebase === 'undefined') {
                if (window.TWMACore) TWMACore.log('error', 'Firebase', 'Firebase SDK nicht geladen');
                return false;
            }
            if (!firebase.apps.length) firebase.initializeApp(cfg);
            db = firebase.database();
            initialized = true;
            if (window.TWMACore) TWMACore.log('info', 'Firebase', 'Initialisiert');
            return true;
        } catch (e) {
            if (window.TWMACore) TWMACore.log('error', 'Firebase', 'Init-Fehler', e);
            return false;
        }
    }

    // ===== Onboarding: Freigabe-Request =======================
    // Erzeugt einen Eintrag unter /geraete/{geraete-id} mit
    // Status "wartet" und dem Anmelde-Code.
    function requestDeviceApproval(deviceId, anmeldeCode) {
        if (!initialized || !db) return Promise.reject(new Error('Firebase nicht bereit'));
        return db.ref('geraete/' + deviceId).set({
            status:         'wartet',
            anmelde_code:   anmeldeCode,
            angefragt_am:   firebase.database.ServerValue.TIMESTAMP,
            user_agent:     navigator.userAgent.substring(0, 200),
            last_seen:      firebase.database.ServerValue.TIMESTAMP
        });
    }

    // ===== Status-Polling ====================================
    // Liefert Listener-Unsubscribe-Funktion.
    // Callback bekommt {status, name, ...} oder null.
    function onDeviceStatus(deviceId, callback) {
        if (!initialized || !db) { callback(null); return function() {}; }
        const ref = db.ref('geraete/' + deviceId);
        const handler = ref.on('value', function(snap) {
            callback(snap.val());
        });
        return function unsubscribe() { ref.off('value', handler); };
    }

    // ===== PIN-Hash speichern ================================
    function setPinHash(deviceId, pinHash) {
        if (!initialized || !db) return Promise.reject(new Error('Firebase nicht bereit'));
        return db.ref('geraete/' + deviceId + '/pin_hash').set(pinHash);
    }

    // ===== Falsche-PIN-Zaehler erhoehen =====================
    function incrementFailedPinCounter(deviceId) {
        if (!initialized || !db) return Promise.reject(new Error('Firebase nicht bereit'));
        const ref = db.ref('geraete/' + deviceId + '/pin_fails');
        return ref.transaction(function(current) { return (current || 0) + 1; });
    }

    function resetFailedPinCounter(deviceId) {
        if (!initialized || !db) return Promise.resolve();
        return db.ref('geraete/' + deviceId + '/pin_fails').set(0);
    }

    // ===== Heartbeat =========================================
    function heartbeat(deviceId) {
        if (!initialized || !db) return Promise.resolve();
        return db.ref('geraete/' + deviceId + '/last_seen').set(firebase.database.ServerValue.TIMESTAMP);
    }

    // ===== Public API =========================================
    global.TWMAFirebase = {
        init:                     init,
        isReady:                  function() { return initialized; },
        db:                       function() { return db; },
        requestDeviceApproval:    requestDeviceApproval,
        onDeviceStatus:           onDeviceStatus,
        setPinHash:               setPinHash,
        incrementFailedPinCounter: incrementFailedPinCounter,
        resetFailedPinCounter:    resetFailedPinCounter,
        heartbeat:                heartbeat,

        // ===== Nachrichten-Layer (Etappe 7) =====
        // Datenstruktur (Master-Dok 10.9):
        //   /nachrichten/{deviceId}/{msgId} = {
        //     id, richtung: 'von_buero'|'von_ma', absender_name,
        //     original: { sprache, text }, uebersetzung: { sprache, text },
        //     gesendet_am (ServerValue.TIMESTAMP), gelesen_am, anhang_url,
        //     typ: 'chat'|'anweisung', baustelle_id
        //   }
        listenForMessages: function(deviceId, callback) {
            if (!initialized || !db) { callback([]); return function() {}; }
            const ref = db.ref('nachrichten/' + deviceId).orderByChild('gesendet_am');
            const handler = ref.on('value', function(snap) {
                const val = snap.val() || {};
                const list = Object.keys(val).map(function(id) {
                    return Object.assign({ id: id }, val[id]);
                });
                list.sort(function(a, b) {
                    return (a.gesendet_am || 0) - (b.gesendet_am || 0);
                });
                callback(list);
            });
            return function() { ref.off('value', handler); };
        },

        // sendMessage erwartet: { deviceId, richtung, absender_name,
        //   original:{sprache,text}, uebersetzung:{sprache,text},
        //   typ?, baustelle_id?, anhang_url? }
        sendMessage: function(msg) {
            if (!initialized || !db) return Promise.reject(new Error('Firebase nicht bereit'));
            if (!msg || !msg.deviceId) return Promise.reject(new Error('deviceId fehlt'));
            const ref = db.ref('nachrichten/' + msg.deviceId).push();
            const payload = {
                richtung:        msg.richtung,
                absender_name:   msg.absender_name || '',
                original:        msg.original  || { sprache: 'de', text: '' },
                uebersetzung:    msg.uebersetzung || null,
                gesendet_am:     firebase.database.ServerValue.TIMESTAMP,
                gelesen_am:      null,
                anhang_url:      msg.anhang_url || null,
                typ:             msg.typ || 'chat',
                baustelle_id:    msg.baustelle_id || null,
                uebersetzung_status: msg.uebersetzung_status || 'ok'  // 'ok' | 'failed'
            };
            return ref.set(payload).then(function() { return ref.key; });
        },

        // Markiert eingehende Nachricht als gelesen (Server-Timestamp)
        markMessageAsRead: function(deviceId, messageId) {
            if (!initialized || !db || !messageId) return Promise.resolve();
            return db.ref('nachrichten/' + deviceId + '/' + messageId + '/gelesen_am')
                     .set(firebase.database.ServerValue.TIMESTAMP);
        },

        // Anweisungen-Tab: separater Pfad fuer Broadcasts vom Buero
        // /anweisungen/{baustelleOrAll}/{anweisungsId} = {
        //   titel, original:{sprache,text}, uebersetzung:..., gesendet_am,
        //   anhang_url, pflicht (bool)
        // }
        // Lese-Status pro Geraet: /anweisungen_gelesen/{deviceId}/{anweisungsId} = ts
        listenAnweisungen: function(deviceId, callback) {
            if (!initialized || !db) { callback([]); return function() {}; }
            // Wir hoeren auf /anweisungen/all (alle Mitarbeiter) — Erweiterung pro Baustelle spaeter
            const refAll = db.ref('anweisungen/all').orderByChild('gesendet_am');
            const refLes = db.ref('anweisungen_gelesen/' + deviceId);
            let liste = [];
            let gelesen = {};
            function emit() {
                const out = liste.map(function(a) {
                    return Object.assign({}, a, { gelesen_am: gelesen[a.id] || null });
                });
                out.sort(function(a, b) { return (b.gesendet_am || 0) - (a.gesendet_am || 0); });
                callback(out);
            }
            const h1 = refAll.on('value', function(snap) {
                const val = snap.val() || {};
                liste = Object.keys(val).map(function(id) { return Object.assign({ id: id }, val[id]); });
                emit();
            });
            const h2 = refLes.on('value', function(snap) {
                gelesen = snap.val() || {};
                emit();
            });
            return function() {
                refAll.off('value', h1);
                refLes.off('value', h2);
            };
        },

        markAnweisungAsRead: function(deviceId, anweisungsId) {
            if (!initialized || !db || !anweisungsId) return Promise.resolve();
            return db.ref('anweisungen_gelesen/' + deviceId + '/' + anweisungsId)
                     .set(firebase.database.ServerValue.TIMESTAMP);
        },

        // ===== Kalender-Listener (Etappe 8) =====
        // Pfad: /kalender/{deviceId}/{YYYYMMDD} = {
        //   baustelle_id, baustelle_name, von, bis,
        //   typ: 'arbeit'|'urlaub'|'krankheit'|'termin',
        //   bemerkung
        // }
        listenKalenderEintraege: function(deviceId, callback) {
            if (!initialized || !db) { callback({}); return function() {}; }
            const ref = db.ref('kalender/' + deviceId);
            const handler = ref.on('value', function(snap) {
                callback(snap.val() || {});
            });
            return function() { ref.off('value', handler); };
        },

        // ===== Baustellen-Listener (Etappe 4) =====
        // Horcht auf /aktive_baustellen und liefert aktuelles Array.
        // Rueckgabe: Unsubscribe-Funktion.
        listenAktiveBaustellen: function(callback) {
            if (!initialized || !db) { callback([]); return function() {}; }
            const ref = db.ref('aktive_baustellen');
            const handler = ref.on('value', function(snap) {
                const val = snap.val() || {};
                const list = Object.keys(val).map(function(id) {
                    return Object.assign({ id: id }, val[id]);
                });
                callback(list);
            });
            return function() { ref.off('value', handler); };
        },

        // ===== Baustellen-Dateien-Listener (Etappe 4 Fallback) =====
        // Horcht auf /baustellen_dateien/{baustelleId}
        // Erwartet Struktur:
        //   baustellen_dateien/{id}/{ordner}/{dateiId} = { name, url, mime, size, ts }
        // Ordner: "zeichnungen", "bilder", "stunden", "nachrichten"
        listenBaustelleDateien: function(baustelleId, ordner, callback) {
            if (!initialized || !db) { callback([]); return function() {}; }
            const ref = db.ref('baustellen_dateien/' + baustelleId + '/' + ordner);
            const handler = ref.on('value', function(snap) {
                const val = snap.val() || {};
                const list = Object.keys(val).map(function(id) {
                    return Object.assign({ id: id }, val[id]);
                }).sort(function(a, b) { return (b.ts || 0) - (a.ts || 0); });
                callback(list);
            });
            return function() { ref.off('value', handler); };
        }
    };

    if (window.TWMACore) TWMACore.log('info', 'Firebase', 'TWMAFirebase v0.4 geladen');
})(window);

// ============================================================
// TW Baustellen-App  -  Drive Service (Etappe 4)
// ============================================================
// Zugriff auf Google Drive Staging via Service-Account.
//
// BETRIEBSMODI:
//   1. Production-Mode: echtes Service-Account-JWT
//      - `TWMAConfig.DRIVE_SERVICE_ACCOUNT` muss gesetzt sein:
//         { client_email, private_key, staging_root_folder_id }
//      - Der private_key ist PEM-formatiert (-----BEGIN PRIVATE KEY-----)
//      - In Etappe 4 klartextkompatibel. Verschluesselung wird in
//        Etappe 7 mit dem Gemini-Key zusammen eingebaut.
//
//   2. Firebase-Fallback (default): Wenn keine Service-Account-Daten
//      eingebaut sind, laufen alle Datei-Operationen ueber Firebase
//      (siehe TWMAFirebase.listenBaustelleDateien). Ermoeglicht
//      vollstaendiges UI-Testen ohne Service-Account-Setup.
//
// Core-Konzept (gemaess Master-Dok Kapitel 12.2):
//   Service-Account hat NUR Zugriff auf den Staging-Root-Ordner.
//   Originale sind physisch unsichtbar.
// ============================================================

(function(global) {
    'use strict';

    let accessToken = null;
    let tokenExpiry = 0;   // ms seit Epoch
    let clientEmail = null;
    let privateKeyPem = null;
    let stagingRootId = null;

    // ===== Public: Modus-Detection ===========================
    function getMode() {
        const cfg = global.TWMAConfig && global.TWMAConfig.DRIVE_SERVICE_ACCOUNT;
        if (cfg && cfg.client_email && cfg.private_key) return 'production';
        return 'fallback';
    }

    // ===== JWT-Signing fuer Service-Account OAuth ============
    // Erzeugt Base64URL-kodiertes JWT, signiert mit RS256.
    // Dokumentation: https://developers.google.com/identity/protocols/oauth2/service-account

    function base64urlEncode(bufOrStr) {
        let bytes;
        if (typeof bufOrStr === 'string') {
            bytes = new TextEncoder().encode(bufOrStr);
        } else {
            bytes = new Uint8Array(bufOrStr);
        }
        let bin = '';
        for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
        return btoa(bin).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
    }

    // Extrahiert den DER-Inhalt aus einem PEM-String
    function pemToArrayBuffer(pem) {
        const cleaned = pem
            .replace('-----BEGIN PRIVATE KEY-----', '')
            .replace('-----END PRIVATE KEY-----', '')
            .replace(/\s/g, '');
        const bin = atob(cleaned);
        const buf = new Uint8Array(bin.length);
        for (let i = 0; i < bin.length; i++) buf[i] = bin.charCodeAt(i);
        return buf.buffer;
    }

    async function importRsaKey(pem) {
        const der = pemToArrayBuffer(pem);
        return crypto.subtle.importKey(
            'pkcs8', der,
            { name: 'RSASSA-PKCS1-v1_5', hash: 'SHA-256' },
            false, ['sign']
        );
    }

    async function signRs256(headerB64, payloadB64, pem) {
        const key = await importRsaKey(pem);
        const data = new TextEncoder().encode(headerB64 + '.' + payloadB64);
        const sigBuf = await crypto.subtle.sign('RSASSA-PKCS1-v1_5', key, data);
        return base64urlEncode(sigBuf);
    }

    async function createJwt(clientEmail, pem) {
        const now = Math.floor(Date.now() / 1000);
        const header  = { alg: 'RS256', typ: 'JWT' };
        const payload = {
            iss:   clientEmail,
            scope: 'https://www.googleapis.com/auth/drive',
            aud:   'https://oauth2.googleapis.com/token',
            iat:   now,
            exp:   now + 3600
        };
        const h64 = base64urlEncode(JSON.stringify(header));
        const p64 = base64urlEncode(JSON.stringify(payload));
        const sig = await signRs256(h64, p64, pem);
        return h64 + '.' + p64 + '.' + sig;
    }

    // ===== Access-Token-Beschaffung ==========================
    async function getAccessToken() {
        if (accessToken && Date.now() < tokenExpiry - 60000) return accessToken;
        if (getMode() !== 'production') {
            throw new Error('Drive-Service im Fallback-Modus - kein Token');
        }
        const cfg = global.TWMAConfig.DRIVE_SERVICE_ACCOUNT;
        clientEmail   = cfg.client_email;
        privateKeyPem = cfg.private_key;
        stagingRootId = cfg.staging_root_folder_id || null;

        const jwt = await createJwt(clientEmail, privateKeyPem);

        const res = await fetch('https://oauth2.googleapis.com/token', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: 'grant_type=urn:ietf:params:oauth:grant-type:jwt-bearer&assertion=' + encodeURIComponent(jwt)
        });
        if (!res.ok) {
            throw new Error('OAuth failed: ' + res.status + ' ' + await res.text());
        }
        const data = await res.json();
        accessToken = data.access_token;
        tokenExpiry = Date.now() + (data.expires_in * 1000);
        return accessToken;
    }

    // ===== Drive-API-Wrapper ==================================
    async function driveFetch(path, opts) {
        const token = await getAccessToken();
        opts = opts || {};
        opts.headers = Object.assign({}, opts.headers || {}, { 'Authorization': 'Bearer ' + token });
        const url = path.startsWith('http') ? path : ('https://www.googleapis.com' + path);
        const res = await fetch(url, opts);
        if (!res.ok) throw new Error('Drive-API: ' + res.status + ' ' + await res.text());
        return res;
    }

    // ===== listFolder: listet Dateien in einem Ordner ========
    // folderId = Drive-Folder-ID (oder null -> Staging-Root)
    async function listFolder(folderId) {
        if (getMode() !== 'production') {
            throw new Error('Fallback-Modus - listFolder nicht verfuegbar, nutze Firebase-Fallback');
        }
        const parent = folderId || stagingRootId;
        if (!parent) throw new Error('Kein Ordner angegeben und kein Staging-Root gesetzt');
        const q = encodeURIComponent("'" + parent + "' in parents and trashed = false");
        const fields = encodeURIComponent('files(id,name,mimeType,size,modifiedTime,thumbnailLink)');
        const res = await driveFetch('/drive/v3/files?q=' + q + '&fields=' + fields + '&pageSize=200');
        const data = await res.json();
        return data.files || [];
    }

    // ===== downloadFile: Datei-Inhalt als Blob ===============
    async function downloadFile(fileId) {
        if (getMode() !== 'production') {
            throw new Error('Fallback-Modus - downloadFile nicht verfuegbar');
        }
        const res = await driveFetch('/drive/v3/files/' + fileId + '?alt=media');
        return res.blob();
    }

    // ===== uploadFile (Etappe 5 vorbereitet) =================
    // Multipart-Upload einer Datei in einen Ordner.
    async function uploadFile(parentFolderId, fileName, mimeType, blob, metadata) {
        if (getMode() !== 'production') {
            throw new Error('Fallback-Modus - uploadFile nicht verfuegbar');
        }
        const token = await getAccessToken();
        const meta = Object.assign({
            name:     fileName,
            mimeType: mimeType,
            parents:  [parentFolderId]
        }, metadata || {});

        const boundary = 'tw-ma-' + Date.now();
        const delim = '\r\n--' + boundary + '\r\n';
        const closeDelim = '\r\n--' + boundary + '--';

        const bodyHead = delim +
            'Content-Type: application/json; charset=UTF-8\r\n\r\n' +
            JSON.stringify(meta) + delim +
            'Content-Type: ' + mimeType + '\r\n\r\n';

        // Blob-Komposition
        const fullBody = new Blob([bodyHead, blob, closeDelim], { type: 'multipart/related; boundary=' + boundary });

        const res = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
            method: 'POST',
            headers: {
                'Authorization': 'Bearer ' + token,
                'Content-Type': 'multipart/related; boundary=' + boundary
            },
            body: fullBody
        });
        if (!res.ok) throw new Error('Upload-Fehler: ' + res.status + ' ' + await res.text());
        return res.json();
    }

    // ===== findOrCreateFolder ================================
    async function findOrCreateFolder(parentId, folderName) {
        if (getMode() !== 'production') {
            throw new Error('Fallback-Modus - findOrCreateFolder nicht verfuegbar');
        }
        const q = encodeURIComponent(
            "'" + parentId + "' in parents and name = '" + folderName.replace(/'/g, "\\'") +
            "' and mimeType = 'application/vnd.google-apps.folder' and trashed = false"
        );
        const res = await driveFetch('/drive/v3/files?q=' + q + '&fields=files(id,name)');
        const data = await res.json();
        if (data.files && data.files.length > 0) return data.files[0].id;
        // Anlegen
        const token = await getAccessToken();
        const createRes = await fetch('https://www.googleapis.com/drive/v3/files', {
            method: 'POST',
            headers: {
                'Authorization': 'Bearer ' + token,
                'Content-Type':  'application/json'
            },
            body: JSON.stringify({
                name:     folderName,
                mimeType: 'application/vnd.google-apps.folder',
                parents:  [parentId]
            })
        });
        if (!createRes.ok) throw new Error('Folder-Create: ' + createRes.status);
        const created = await createRes.json();
        return created.id;
    }

    // ===== Public API =========================================
    global.TWMADriveService = {
        getMode:             getMode,
        isReady:             function() { return accessToken !== null && Date.now() < tokenExpiry; },
        getAccessToken:      getAccessToken,
        listFolder:          listFolder,
        downloadFile:        downloadFile,
        uploadFile:          uploadFile,
        findOrCreateFolder:  findOrCreateFolder
    };

    if (window.TWMACore) TWMACore.log('info', 'DriveService', 'Modus: ' + getMode());
})(window);

/* ========== js/tw-ma-translation.js ========== */
// ============================================================
// TW Baustellen-App  -  Translation-Engine (Etappe 7 Phase A)
// ============================================================
// Wrapper fuer Gemini Flash Uebersetzungen.
//
// API:
//   TWMATranslate.translate(text, fromLang, toLang)
//       -> Promise<{text, success, error?, cached?}>
//   TWMATranslate.detectLanguage(text) -> Promise<string>
//   TWMATranslate.uiLabel(key, lang) -> string  (sofort, ohne API)
//   TWMATranslate.setApiKey(key)     -> fuer Onboarding / Entschluesselung
//   TWMATranslate.hasApiKey()        -> boolean
//
// Caching: IndexedDB-Store 'translation_cache'
//   key: '{fromLang}_{toLang}_{hash(text)}'
//   value: { key, text, ts }
//   TTL: 90 Tage
//
// Fallback-Strategie:
//   1. Cache-Treffer -> sofort
//   2. Gemini Flash (schnell, billig)
//   3. Gemini Pro (langsamer, zuverlaessiger)
//   4. Total-Ausfall -> Original-Text + success:false
//
// API-Key: verschluesselt in TWMAConfig.ENCRYPTED_KEYS.gemini (AES-256)
//   Entschluesselung beim App-Start via AES-Decrypt (Web Crypto API)
//   Key liegt NUR in Closure, niemals in localStorage/window
// ============================================================

(function(global) {
    'use strict';

    // ---- Konstanten ----
    const GEMINI_FLASH_URL = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent';
    const GEMINI_PRO_URL   = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-pro:generateContent';
    const CACHE_TTL_MS     = 90 * 24 * 60 * 60 * 1000; // 90 Tage
    const REQUEST_TIMEOUT  = 8000;                     // 8s pro Gemini-Call

    // ---- API-Key (Closure, nie global) ----
    let apiKey = null;

    // ---- UI-Label (unveraendert aus Etappe 0) ----
    function uiLabel(key, lang) {
        if (global.TWMAConfig && global.TWMAConfig.t) return global.TWMAConfig.t(key, lang);
        return key;
    }

    // ---- API-Key setzen / pruefen ----
    function setApiKey(key) {
        if (typeof key === 'string' && key.length > 0) {
            apiKey = key;
            if (global.TWMACore) TWMACore.log('info', 'Translation', 'API-Key gesetzt');
            return true;
        }
        return false;
    }
    function hasApiKey() { return !!apiKey; }

    // ---- AES-Decrypt (Web Crypto API, Base64-Input) ----
    // Format: salt(16) || iv(12) || ciphertext
    // Passphrase wird via PBKDF2 auf 256-bit-Key gedehnt.
    async function aesDecryptBase64(base64, passphrase) {
        if (!base64 || !passphrase) return null;
        try {
            const bin = Uint8Array.from(atob(base64), function(c){ return c.charCodeAt(0); });
            if (bin.length < 28) throw new Error('Ciphertext zu kurz');
            const salt = bin.slice(0, 16);
            const iv   = bin.slice(16, 28);
            const ct   = bin.slice(28);

            const enc = new TextEncoder();
            const keyMat = await crypto.subtle.importKey(
                'raw', enc.encode(passphrase), { name: 'PBKDF2' }, false, ['deriveKey']
            );
            const derivedKey = await crypto.subtle.deriveKey(
                { name: 'PBKDF2', salt: salt, iterations: 100000, hash: 'SHA-256' },
                keyMat,
                { name: 'AES-GCM', length: 256 },
                false,
                ['decrypt']
            );
            const plainBuf = await crypto.subtle.decrypt(
                { name: 'AES-GCM', iv: iv }, derivedKey, ct
            );
            return new TextDecoder().decode(plainBuf);
        } catch (err) {
            if (global.TWMACore) TWMACore.log('warn', 'Translation', 'AES-Decrypt fehlgeschlagen', err.message);
            return null;
        }
    }

    // ---- Beim Start: Key aus Config laden (Klartext oder verschluesselt) ----
    async function initKeyFromConfig() {
        if (apiKey) return true;
        if (!global.TWMAConfig) return false;

        // 1. Versuche zuerst den Klartext-Key (FEST EINGEBAUT)
        if (TWMAConfig.GEMINI_API_KEY && TWMAConfig.GEMINI_API_KEY.length > 10) {
            apiKey = TWMAConfig.GEMINI_API_KEY.trim();
            return true;
        }

        // 2. Fallback: Verschluesselter Key (falls verwendet)
        if (!TWMAConfig.ENCRYPTED_KEYS) return false;
        const enc  = TWMAConfig.ENCRYPTED_KEYS.gemini;
        const pass = TWMAConfig.ENCRYPTED_KEYS.masterPassword;
        if (!enc || !pass) return false;

        const plain = await aesDecryptBase64(enc, pass);
        if (plain) { apiKey = plain.trim(); return true; }
        return false;
    }

    // ---- Cache-Hash (djb2, stabil ueber Sessions) ----
    function hashText(s) {
        let h = 5381;
        for (let i = 0; i < s.length; i++) h = ((h << 5) + h + s.charCodeAt(i)) | 0;
        return ('00000000' + (h >>> 0).toString(16)).slice(-8);
    }
    function cacheKey(from, to, text) {
        return from + '_' + to + '_' + hashText(text);
    }

    // ---- Cache-Zugriff ----
    async function cacheGet(key) {
        if (!global.TWMAStorage || !TWMAStorage.openDb) return null;
        try {
            const db = await TWMAStorage.openDb();
            return await new Promise(function(resolve) {
                const req = db.transaction('translation_cache', 'readonly')
                              .objectStore('translation_cache').get(key);
                req.onsuccess = function() {
                    const v = req.result;
                    if (!v) { resolve(null); return; }
                    if (Date.now() - (v.ts || 0) > CACHE_TTL_MS) { resolve(null); return; }
                    resolve(v.text);
                };
                req.onerror = function() { resolve(null); };
            });
        } catch (_) { return null; }
    }
    async function cachePut(key, text) {
        if (!global.TWMAStorage || !TWMAStorage.openDb) return;
        try {
            const db = await TWMAStorage.openDb();
            const tx = db.transaction('translation_cache', 'readwrite');
            tx.objectStore('translation_cache').put({ key: key, text: text, ts: Date.now() });
        } catch (_) {}
    }

    // ---- Sprach-Name fuer Prompt ----
    const LANG_NAMES = {
        de: 'German', cz: 'Czech', sk: 'Slovak', pl: 'Polish',
        en: 'English', ro: 'Romanian', ua: 'Ukrainian', ru: 'Russian'
    };
    function langName(code) { return LANG_NAMES[code] || code; }

    // ---- Fetch mit Timeout ----
    function fetchTimeout(url, opts, ms) {
        return new Promise(function(resolve, reject) {
            const ctrl = new AbortController();
            const timer = setTimeout(function() { ctrl.abort(); reject(new Error('Timeout')); }, ms);
            fetch(url, Object.assign({}, opts, { signal: ctrl.signal }))
                .then(function(r){ clearTimeout(timer); resolve(r); })
                .catch(function(e){ clearTimeout(timer); reject(e); });
        });
    }

    // ---- Gemini-Aufruf (einzeln) ----
    async function callGemini(url, text, fromLang, toLang) {
        if (!apiKey) throw new Error('Kein API-Key');

        const prompt = 'Translate the following text from ' + langName(fromLang)
                     + ' to ' + langName(toLang)
                     + '. Return ONLY the translated text. No explanations, no quotes, no commentary.\n\n'
                     + 'TEXT:\n' + text;

        const body = {
            contents: [{ parts: [{ text: prompt }] }],
            generationConfig: {
                temperature: 0.2,
                maxOutputTokens: 800,
                topP: 0.9
            }
        };

        const res = await fetchTimeout(url + '?key=' + encodeURIComponent(apiKey), {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        }, REQUEST_TIMEOUT);

        if (!res.ok) {
            const err = await res.text().catch(function(){ return ''; });
            throw new Error('Gemini ' + res.status + ': ' + err.slice(0, 120));
        }
        const data = await res.json();
        const parts = data && data.candidates && data.candidates[0]
                    && data.candidates[0].content && data.candidates[0].content.parts;
        if (!parts || !parts[0] || !parts[0].text) throw new Error('Leere Gemini-Antwort');

        return parts[0].text.trim();
    }

    // ---- HAUPT-FUNKTION: Uebersetzen mit Fallback-Kette ----
    async function translate(text, fromLang, toLang) {
        // Leerer Input -> durchreichen
        if (!text || typeof text !== 'string' || text.trim().length === 0) {
            return { text: text || '', success: true };
        }
        // Gleiche Sprache -> keine Uebersetzung noetig
        if (fromLang === toLang) {
            return { text: text, success: true };
        }

        const key = cacheKey(fromLang, toLang, text);

        // 1. Cache
        const cached = await cacheGet(key);
        if (cached !== null) {
            return { text: cached, success: true, cached: true };
        }

        // Key lazy-init
        if (!apiKey) await initKeyFromConfig();
        if (!apiKey) {
            return { text: text, success: false, error: 'Kein API-Key konfiguriert' };
        }

        // 2. Gemini Flash
        let lastErr = null;
        try {
            const tr = await callGemini(GEMINI_FLASH_URL, text, fromLang, toLang);
            await cachePut(key, tr);
            return { text: tr, success: true };
        } catch (err) {
            lastErr = err;
            if (global.TWMACore) TWMACore.log('warn', 'Translation', 'Flash fehlgeschlagen', err.message);
        }

        // 3. Gemini Pro (Fallback)
        try {
            const tr = await callGemini(GEMINI_PRO_URL, text, fromLang, toLang);
            await cachePut(key, tr);
            return { text: tr, success: true };
        } catch (err) {
            if (global.TWMACore) TWMACore.log('error', 'Translation', 'Pro fehlgeschlagen', err.message);
            lastErr = err;
        }

        // 4. Total-Ausfall
        return {
            text: text,
            success: false,
            error: (lastErr && lastErr.message) || 'Unbekannter Fehler'
        };
    }

    // ---- Sprach-Erkennung (einmaliger Gemini-Call, direkt ohne callGemini-Prompt) ----
    async function detectLanguage(text) {
        if (!text || text.trim().length === 0) return null;
        if (!apiKey) await initKeyFromConfig();
        if (!apiKey) return null;

        const prompt = 'What language is this text? Answer with ONLY the ISO 639-1 two-letter code (e.g. "de", "cz", "en"). No explanation.\n\nTEXT:\n' + text.slice(0, 400);
        try {
            const res = await fetchTimeout(GEMINI_FLASH_URL + '?key=' + encodeURIComponent(apiKey), {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }],
                    generationConfig: { temperature: 0, maxOutputTokens: 10 }
                })
            }, REQUEST_TIMEOUT);
            if (!res.ok) return null;
            const data = await res.json();
            const parts = data && data.candidates && data.candidates[0]
                        && data.candidates[0].content && data.candidates[0].content.parts;
            if (!parts || !parts[0] || !parts[0].text) return null;
            const m = parts[0].text.toLowerCase().match(/[a-z]{2}/);
            return m ? m[0] : null;
        } catch (_) { return null; }
    }

    // ---- Public API ----
    global.TWMATranslate = {
        uiLabel:         uiLabel,
        translate:       translate,
        detectLanguage:  detectLanguage,
        setApiKey:       setApiKey,
        hasApiKey:       hasApiKey,
        // Intern nutzbar, aber nicht empfohlen:
        _initKey:        initKeyFromConfig,
        _aesDecrypt:     aesDecryptBase64
    };

    // ---- Lazy-Init beim Laden (non-blocking) ----
    if (global.TWMAConfig && (
        TWMAConfig.GEMINI_API_KEY
        || (TWMAConfig.ENCRYPTED_KEYS && TWMAConfig.ENCRYPTED_KEYS.gemini && TWMAConfig.ENCRYPTED_KEYS.masterPassword)
    )) {
        initKeyFromConfig().then(function(ok) {
            if (ok && global.TWMACore) TWMACore.log('info', 'Translation', 'Gemini-Key beim Start geladen');
        });
    }

    if (global.TWMACore) TWMACore.log('info', 'Translation', 'TWMATranslate v0.7 geladen');
})(window);
